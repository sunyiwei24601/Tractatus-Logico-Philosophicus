s Glücklichen ist eine andere als die des Unglücklichen.","zh_wang":"如果善恶的意志改变了世界，它只能改变世界的界限，但不能改变事实，不能改变能通过语言来表述的东西。 简单说，世界必定因此变成另外样子。可以说，世界必然作为整体而消长。 幸福者的世界跟不幸者的世界完全不同。","zh_huang":"如果好的或坏的意志改变了世界，那改变的也只能是世界的界限，而不是事实，不是可以用语言表达的东西。 总之，世界肯定会整个不同起来。可以说，这肯定是一种整体上的兴衰。 幸福的人与不幸的人不是活在一个世界中。"},"children":[{"number":"6.431","texts":{"zh":"同样地，在死这一点上，世界不是改变，而是终止。","en":"Just as in death, the world does not change but ends.","de":"Wie auch beim Tod die Welt sich nicht ändert, sondern aufhört.","zh_wang":"也正如死时一样，世界并没有改变，只是终止了。","zh_huang":"至于在死亡的时候，世界不是变了，而是停止了。"},"children":[{"number":"6.4311","texts":{"zh":"死不是生活里的一件事情：人是没有经历过死的。 如果我们不把永恒性理解为时间的无限延续，而是理解为无时间性，那么此刻活着的人，也就永恒地活着。 人生之为无穷，正如视域之为无限。","en":"Death is not an event in life. Death is not experienced.If eternity is understood not as endless temporal duration but as timelessness, then someone who lives in the present lives eternally.Our life is endless just as our visual field is limitless.","de":"Der Tod ist kein Ereignis des Lebens. Den Tod erlebt man nicht. Wenn man unter Ewigkeit nicht unendliche Zeitdauer, sondern Unzeitlichkeit versteht, dann lebt der ewig, der in der Gegenwart lebt. Unser Leben ist ebenso endlos, wie unser Gesichtsfeld grenzenlos ist.","zh_wang":"死亡不是人生的一件事情。人没有体验过死亡。 如果把永久理解为不是无限的时间延续，而是没有时间性，那么现在活着的人就永久活着。 正如我们的视野是没有极限的，我们的人生也是无限的。","zh_huang":"死，这不是生命的事情。人不会活过死亡。 如果不把永恒理解为时间的无穷延续，而理解为无时间性，那么永恒的生命就属于活在当前的人。 正如视野没有边界，生命没有止境。"},"children":[]},{"number":"6.4312","texts":{"zh":"不仅人的灵魂在时间上的不灭，或者说它在死后的永存，是没有保证的；而且在任何情形下，这个假定都达不到人们所不断追求的目的。难道由于我的永生就能把一些谜解开吗？这种永恒的人生难道不像我们此刻的人生一样是一个谜吗？时空之中的人生之谜的解答，在于时空之外。 （所要解答的肯定不是自然科学的问题。）","en":"Not only does temporal immortality of the human soul—that is to say, its eternal survival after death—lack any kind of warrant but, most crucially, its assumption fails entirely to achieve the intended result. For is a riddle thereby solved by my eternal survival? Is this eternal life not just as mysterious as our present one? The solution to the riddle of life in space and time lies outside space and time.(It is not problems of natural science that have to be solved.)","de":"Die zeitliche Unsterblichkeit der Seele des Menschen, das heisst also ihr ewiges Fortleben auch nach dem Tode, ist nicht nur auf keine Weise verbürgt, sondern vor allem leistet diese Annahme gar nicht das, was man immer mit ihr erreichen wollte. Wird denn dadurch ein Rätsel gelöst, dass ich ewig fortlebe? Ist denn dieses ewige Leben dann nicht ebenso rätselhaft wie das gegenwärtige? Die Lösung des Rätsels des Lebens in Raum und Zeit liegt ausserhalb von Raum und Zeit. (Nicht Probleme der Naturwissenschaft sind ja zu lösen.)","zh_wang":"人类灵魂在时间上的不朽，也就是说，它死后不朽的存活，不仅没法得到保证，这个假定无论如何不能实现我们总想达到的目的。我永久存活，这个事实能解决一个谜团吗？这种不朽的生活不是跟现在的生活一样是个谜吗？时空中生活之谜的解决办法存在于时空之外。 （要解决的并不是自然科学的问题。）","zh_huang":"灵魂在时间意义上的不死，或者说，死后的永生，这不仅是绝无任何保障的，而且这个想法一开始就完全没有起到我们要它起的那种作用。困惑会因为我们的永生而解决吗？永恒的生命不和当前的生命一样，也是一个谜吗？时空之内的生命之谜，其解决在时空之外。 （要解决的当然不是自然科学问题）"},"children":[]}]},{"number":"6.432","texts":{"zh":"世界上的事物是怎样的，对于更高者完全无关紧要。上帝不在 世上 现身。","en":"How the world is, is of no concern at all for what is higher. God does not reveal himself in the world.","de":"Wie die Welt ist, ist für das Höhere vollkommen gleichgültig. Gott offenbart sich nicht in der Welt.","zh_wang":"世界怎样存在，与高级的东西完全无关。上帝不在世界中现身。","zh_huang":"世界是怎样的，这对更高的存在来说完全无关紧要。神不在世界中显身。"},"children":[{"number":"6.4321","texts":{"zh":"事实都只算是提出问题，而非问题的解答。","en":"The facts all pertain only to the problem, not to the solution.","de":"Die Tatsachen gehören alle nur zur Aufgabe, nicht zur Lösung.","zh_wang":"事实都只能提出问题，而不是解决问题。","zh_huang":"事实只构成问题，不构成解决。"},"children":[]}]}]},{"number":"6.44","texts":{"zh":"世界是怎样的 这一点并不神秘，而世界存在着，这一点是神秘的。","en":"Not how the world is, but that it is, is the mystical.","de":"Nicht wie die Welt ist, ist das Mystische, sondern dass sie ist.","zh_wang":"神秘的东西不是世界是怎样，而是世界存在。","zh_huang":"神秘的不是世界是怎样的，而是它存在。"},"children":[]},{"number":"6.45","texts":{"zh":"用永恒观点来观察世界，就是把它看作一个整体——个有界限的整体。 把世界作为一个有限整体的感觉是神秘的。","en":"Viewing the world sub specie aeterni is viewing it as a—limited—whole. Feeling the world as a limited whole is the mystical feeling.","de":"Die Anschauung der Welt sub specie aeterni ist ihre Anschauung als – begrenztes – Ganzes. Das Gefühl der Welt als begrenztes Ganzes ist das mystische.","zh_wang":"从本质上来看世界，就是把世界看作一个有限的整体。 把世界看作一个有限整体的感觉是神秘的。","zh_huang":"从永恒的观点看世界，就是把世界看作一个整体，一个有限的整体。 感觉到世界是有限的整体，这才是神秘的。"},"children":[]}]},{"number":"6.5","texts":{"zh":"若解答不可说，其问题也就不可说。 谜是不存在的。 当一个问题可以提出，它也就可能 得到解答。","en":"When an answer cannot be stated, neither can the question be stated. There is no such thing as the riddle. If a question can be posed at all, then it can also be answered.","de":"Zu einer Antwort, die man nicht aussprechen kann, kann man auch die Frage nicht aussprechen. Das Rätsel gibt es nicht. Wenn sich eine Frage überhaupt stellen lässt, so kann sie auch beantwortet werden.","zh_wang":"如果答案不能表达，问题也就不能表达。 谜是不存在的。 如果能提出问题，问题也就可以解决。","zh_huang":"如果答案是不能表达的，问题也就不能表达。 谜是不存在的。 如果问题终究还是能够提出，那么解答也就是可能的。"},"children":[{"number":"6.51","texts":{"zh":"怀疑论不是不可反驳的，而是因为它试图在不能提出问题的地方产生怀疑，所以显然是无意义的。 因为怀疑只能存在于有一定问题的地方，一定问题只能存在于有一定解答的地方，而解答则只能存在于有某种东西可说 的地方。","en":"Scepticism is not irrefutable, but obviously nonsensical, when it tries to doubt where nothing can be asked. For there can be doubt only where there is a question, a question only where there is an answer, and an answer only where something can be said.","de":"Skeptizismus ist nicht unwiderleglich, sondern offenbar unsinnig, wenn er bezweifeln will, wo nicht gefragt werden kann. Denn Zweifel kann nur bestehen, wo eine Frage besteht; eine Frage nur, wo eine Antwort besteht, und diese nur, wo etwas gesagt werden kann.","zh_wang":"怀疑论不是不可辩驳的，而是明显没有意义的，如果它在不能提出问题的地方进行怀疑。 因为怀疑只能存在于能提出问题的地方；一个问题只能存在于有答案的地方，而有答案则只存在于有某种东西可说的地方。","zh_huang":"怀疑论不是不能驳斥，而是显然的无意义，因为它要在没有问题可以问的地方提出怀疑。 因为怀疑只能存在于有问题的地方，问题只能存在于有答案的地方，答案则需要有东西可以说。"},"children":[]},{"number":"6.52","texts":{"zh":"我们觉得，即使一切可能的 科学问题都已得到解答，也还完全没有触及到人生问题。当然那时不再有问题留下来，而这也就正是解答。","en":"We feel that even if all possible scientific questions were answered, the problems of life would remain completely untouched. To be sure, not a single question would then be left; and precisely this is the answer.","de":"Wir fühlen, dass selbst, wenn alle möglichen wissenschaftlichen Fragen beantwortet sind, unsere Lebensprobleme noch gar nicht berührt sind. Freilich bleibt dann eben keine Frage mehr; und eben dies ist die Antwort.","zh_wang":"我们觉得即使所有可能的科学问题都能有答案，人生的问题仍然没有触及到。当然没有留下问题；而这就是答案。","zh_huang":"我们觉得，即使所有可能的科学问题都得到回答，生命的问题还是完全没有触及。当然，那时也就没有问题留下来了，而这本身就是回答。"},"children":[{"number":"6.521","texts":{"zh":"人生问题的解答在于这个问题的消除。 （有些人在长期怀疑之后发现他们明白了人生的意义，但是又不能说出来这意义究竟是什么，不就是这个道理吗？）","en":"The solution to the problem of life is found in the vanishing of the problem. (Is this not the reason why those to whom the meaning of life became clear after prolonged doubt, could not then say in what this meaning consisted?)","de":"Die Lösung des Problems des Lebens merkt man am Verschwinden dieses Problems. (Ist nicht dies der Grund, warum Menschen, denen der Sinn des Lebens nach langen Zweifeln klar wurde, warum diese dann nicht sagen konnten, worin dieser Sinn bestand.)","zh_wang":"人生问题的解决方法在这个问题消失以后才可以看到。 （人们在长时间的怀疑之后，人生的意义变得清晰，然而说不出这个意义在哪里，其理由是否就在此？）","zh_huang":"从问题的消失中，你会看到对生命问题的解决。 （从这儿不就可以看到，人们在经历了漫长的怀疑之后终于弄清生命的意义何在，在被问起时为什么却又不能说清这种意义是什么吗？）"},"children":[]},{"number":"6.522","texts":{"zh":"确实有不可说的东西。它们显示 自己，它们是神秘的东西。","en":"There is, though, the ineffable. This shows itself, it is the mystical.","de":"Es gibt allerdings Unaussprechliches. Dies zeigt sich, es ist das Mystische.","zh_wang":"确实有不能表述出来的东西。这是自身显示出来的，它是神秘。","zh_huang":"的确有不可表达的东西。它自己显示出来。它就是神秘的东西。"},"children":[]}]},{"number":"6.53","texts":{"zh":"哲学中正确的方法是：除了可说的东西，即自然科学的命题——也就是与哲学无关的某种东西之外，就不再说什么，而且一旦有人想说某种形而上学的东西时，立刻就向他指明，他没有给他的命题中的某些记号以指谓。虽然有人会不满意这种方法——他不觉得我们是在教他哲学——但是这 却是唯一严格正确的方法。","en":"The correct method in philosophy would really be this: to say nothing except what can be said, that is, propositions of natural science—that is, something that has nothing to do with philosophy; and then, whenever someone else wanted to say something metaphysical, to demonstrate to them that they had not given a meaning to certain signs in their propositions. This method would be unsatisfying to them—they would not have the feeling that we were teaching them philosophy—but this would be the only strictly correct one.","de":"Die richtige Methode der Philosophie wäre eigentlich die: Nichts zu sagen, als was sich sagen lässt, also Sätze der Naturwissenschaft – also etwas, was mit Philosophie nichts zu tun hat –, und dann immer, wenn ein anderer etwas Metaphysisches sagen wollte, ihm nachzuweisen, dass er gewissen Zeichen in seinen Sätzen keine Bedeutung gegeben hat. Diese Methode wäre für den anderen unbefriedigend – er hätte nicht das Gefühl, dass wir ihn Philosophie lehrten – aber sie wäre die einzig streng richtige.","zh_wang":"哲学的正确方法就在于此：除了可以表述的，如自然科学的命题——即跟哲学没关的东西之外，没什么可说的。并且，每当别人想说一些形而上学的东西时就向他指明：他对他的命题中某些记号没有给出含义。这个方法会让有些人觉得不够满意——他不会觉得我们是在教他哲学——但这是唯一严格正确的方法。","zh_huang":"在哲学中正确的方法是这样的：只说可以说的东西，即自然科学命题，而这是与哲学无关的句子；同时要坚持，只要有人要说起形而上学的东西，就向他说明，他没有赋予句子中的某些记号以意义。对其他人来说这种方法可能不让人满意，他不会觉得这是在教哲学，然而，这是唯一在严格意义上正确的方法。"},"children":[]},{"number":"6.54","texts":{"zh":"我的命题应当是以如下方式来起阐明作用的：任何理解我的人，当他用这些命题为梯级而超越了它们时，就会终于认识到它们是无意义的。（可以说，在登上高处之后他必须把梯子扔掉。） 他必须超越这些命题，然后他就会正确看待世界。","en":"My propositions elucidate when someone who understands me finally recognizes them as nonsensical by using them to climb up, over, and out of them. (They must throw away the ladder, so to speak, having used it to climb up.) They must get over these propositions, and then they see the world correctly.","de":"Meine Sätze erläutern dadurch, dass sie der, welcher mich versteht, am Ende als unsinnig erkennt, wenn er durch sie – auf ihnen – über sie hinausgestiegen ist. (Er muss sozusagen die Leiter wegwerfen, nachdem er auf ihr hinaufgestiegen ist.) Er muss diese Sätze überwinden, dann sieht er die Welt richtig.","zh_wang":"我的命题用以下方式来进行阐明的：理解我的人，当他用这些命题作为阶梯，并爬越它们的时候，最后会认识到它们是无意义的。（可以说他在登上高处之后，就必须把梯子扔掉。） 他必须超越这些命题，然后才能正确看世界。","zh_huang":"我所说的句子在这样一种意义上是阐明性的：任何人，只要他理解我，当他以这些句子为踏板，攀上去并越过它们，最终就会认识到这些句子是无意义的。（这么说吧，在爬上去以后他得丢掉梯子。） 他必须翻越这些句子，才能正确地看到这个世界。"},"children":[]}]}]},{"number":"7","texts":{"zh":"对于不可说的东西我们必须保持沉默。","en":"Of what one cannot speak, about that one must be silent. The decimal numbers ordering the individual propositions indicate the logical weight of the propositions, the stress placed upon them in my exposition. The propositions n.1, n.2, n.3, etc., are comments on proposition no. n; the propositions n.m1, n.m2, etc. are comments on proposition no. n.m; and so on.","de":"Wovon man nicht sprechen kann, darüber muss man schweigen.","zh_wang":"不可说的，只可不说。","zh_huang":"对不可说的，我们必须报以沉默。"},"children":[]}],"notes":{"en":{"2":["2 What is the case, a fact, is the obtaining of states-of-things : Was der Fall ist, die Tatsache, ist das Bestehen von Sachverhalten . Here—and throughout—‘Tatsache’ is translated as ‘fact’ (and ‘fact’ is used only in translating ‘Tatsache’), and ‘Sachverhalt’ as ‘state-of-things’ (which is used only to translate ‘Sachverhalt’). ‘Bestehen’ is translated here as ‘obtaining’, though elsewhere the verb ‘bestehen’ is rendered differently, as indicated in the Glossary and explained, where needed, in the relevant notes below. In the original translation of the Tractatus , Ramsey and Ogden rendered this proposition as ‘What is the case, the fact, is the existence of atomic facts’. This rightly draws attention to the connection between a ‘Tatsache’ and a ‘Sachverhalt’ (both are ‘ sach lich’ or ‘factual’), but does so in a misleading way, since it suggests that facts are somehow composed of ‘atomic facts’. What Wittgenstein actually says is more nuanced: that a fact is the obtaining of Sachverhalten . Talk of ‘existing’ rather than ‘existence’ here would be marginally better, but ‘obtaining’ (or ‘holding’) is best, since it carries less implication of ‘composition’. A fact is that a Sachverhalt obtains or that Sachverhalten obtain . In their later translation, Pears and McGuinness also render ‘Bestehen’ as ‘existence’, but this term is more appropriately reserved for ‘Existenz’, which Wittgenstein only uses seven times (see the Glossary). ‘Sachverhalt’ they translate as ‘state of affairs’, but this has too broad a meaning, suggesting a more complex state. As 4.21 makes clear, a Sachverhalt is indeed ‘atomic’—but not a fact . As Wittgenstein says in the proposition that immediately follows 2, a Sachverhalt is ‘a combination of objects (entities, things)’ (2.01). So ‘state of things’ seems better than ‘state of affairs’ (as Pears and McGuinness implicitly recognize in interpolating ‘state of things’ after ‘state of affairs’ in their translation of 2.01). Hyphens have been added, though, to form ‘state-of-things’, to highlight that what we have here is a unity —and hence to better reflect Wittgenstein’s use of the single German word ‘Sachverhalt’. In the present translation, ‘state of affairs’ is also used, but only as the translation of ‘Sachlage’ (which Pears and McGuinness render as ‘situation’). This brings out the connection between states-of-things and states of affairs: a state-of-things is an atomic or elementary state of affairs (but again, not a fact ). Cf. the note to 2.014 below."],"2.01":["2.01 objects (entities, things) . The three German terms are ‘ Gegenstände ’, ‘ Sachen ’, and ‘ Dinge ’, translated as ‘objects’, ‘entities’, and ‘things’, respectively. Wittgenstein is clearly using the terms here as roughly synonymous. ‘Gegenstand’ is translated throughout as ‘object’, and ‘Ding’ as ‘thing’."],"2.012":["2.012 prefigured : präjudiziert ."],"2.0122":["2.0122 proposition : Satz . This is the first occurrence of ‘Satz’ in the (main text of the) Tractatus , and might naturally be translated as ‘sentence’ here, as a linguistic expression in which words occur. But even here, and in similar cases throughout the text, Wittgenstein has in mind sentences that (at least purportedly) have a sense and a truth-value, so that ‘proposition’ is not inappropriate. In both the notes he left for Russell in October 1913 (partly in English but mostly translated by Russell himself; NB, App. I) and the notes he dictated to Moore in April 1914 (NB, App. II), ‘proposition’ is used throughout. ‘Proposition’ was a standard term in British philosophy at the time, although there was debate about its ‘nature’ and views changed. In his Principles of Mathematics of 1903, Russell had characterized a ‘proposition’ as ‘anything that is true or that is false’ (pp. 12–13), but by the time of his Introduction to Mathematical Philosophy of 1919, which appeared just before he met Wittgenstein to discuss the Tractatus and how it should be translated, he had given it a qualified linguistic inflection: ‘We mean by a “proposition” primarily a form of words which expresses what is either true or false. I say “primarily”, because I do not wish to exclude other than verbal symbols, or even mere thoughts if they have a symbolic character’ (p. 155). This is compatible with Wittgenstein’s use of ‘Satz’ in the Tractatus , and he raised no objections to its rendering as ‘proposition’ in the translation by Ramsey and Ogden. In the present translation, too, ‘Satz’ is rendered throughout by ‘proposition’, and ‘proposition’ is only used for ‘Satz’, so that one can read back the German term. See also the notes to 3.12 and 4.025 below."],"2.0123":["2.0123 know : kenne . Unlike ‘wissen’, the other verb that is generally translated as ‘know’, ‘kennen’ can also mean ‘be acquainted with’. Wittgenstein himself remarked that 2.0123 could be translated as ‘If I am acquainted with an object, then I also know …’, but made clear that he preferred ‘know’ for both uses of ‘kennen’. ‘To be acquainted with’, he writes, ‘seems to me to imply somehow that one knows a lot about an object, while to know here just means: I know it but I needn’t know anything about it’ (LO, p. 59). Cf. the notes to 4.243 and 6.2322 below."],"2.014":["2.014 states of affairs : Sachlagen . Wittgenstein (LO, p. 21) professed to dislike this translation but did not know what to suggest instead, though he had wondered about the Latin term ‘status rerum’ (‘state of things’). ‘Sachlage’ is indeed rendered by ‘state of affairs’ in the Ramsey–Ogden translation, though ‘fact’ and ‘circumstance’ are also used. In the present translation, it is rendered consistently by ‘state of affairs’ (which is only used for ‘Sachlage’, so that one can read back the German term). There is clearly a connection between ‘Sachlagen’ and ‘Sachverhalten’, which is reflected in their translations here: ‘states of affairs’ and ‘states-of-things’. A state-of-things is an elementary or atomic state of affairs. Cf. the note to 2 above."],"2.02":["2.02 An object is simple : Der Gegenstand ist einfach . This is a good (and appropriately simple) illustration of one of the most difficult things in translating German into English, surprising as that might seem to those who have never done it: translating the definite articles—der, die, das, etc. One should not assume that they can be rendered straightforwardly as ‘the’ in all contexts, since the use of the definite articles in German has a different (and wider) range than the use of ‘the’ in English. One striking difference between the Ramsey–Ogden and Pears–McGuinness translations is that the former uses the definite article much more in translating Wittgenstein’s uses, while the latter tends to use the indefinite article or pluralize. Ramsey and Ogden translate ‘Der Gegenstand ist einfach’ as ‘The object is simple’, for example, while Pears and McGuinness translate it as ‘Objects are simple’. But the use of the definite article in English can sound more formal, pompous, or archaic than it is in German (and certainly in Wittgenstein’s German), in comparable cases, while pluralizing may wrongly suggest that what we have is an empirical statement. The present translation uses both definite and indefinite articles, only occasionally pluralizing or, indeed, omitting altogether, depending on what sounds most natural in the context. The differences are so subtle that explanatory notes would become tedious, so the issue is only raised here (but cf. Wittgenstein’s remarks cited in the notes to 4.464 and 5.1361 below). It should be kept in mind in reading this translation, however, especially if detailed interpretations are being considered."],"2.0231":["2.0231 represented : dargestellt . With just one exception (see the Glossary), ‘darstellen’ is translated throughout as ‘represent’. But here is one case where ‘presented’ (as used in the Ramsey–Ogden translation) has some rationale, since in being ‘formed by the configuration of objects’, material properties can be seen as thereby ‘presented by propositions’. But ‘represented’ also works here, and it is better to reserve ‘present’ for ‘vorstellen’. Cf. the note to 2.201 below."],"2.02331":["2.02331 refer to it : darauf hinweisen ."],"2.024":["2.024 subsists : besteht . This rendering is needed to make clear the connection to the use of ‘Bestehende’ in 2.027 and 2.0271 (see the next two notes)."],"2.027":["2.027 the subsistent : das Bestehende . Here it would be misleading to translate ‘Bestehende’ as ‘existent’ or ‘obtaining’, as ‘contingent’ existence is clearly not meant."],"2.0271":["2.0271 The object … inconstant . A contrast is being drawn between the ‘Bestehende’ (‘subsistent’) and the ‘Unbeständige’ (‘inconstant’)."],"2.031":["2.031 In a state-of-things the objects stand to one another in a determinate way : Im Sachverhalt verhalten sich die Gegenstände in bestimmter Art und Weise zueinander . It is hard to capture the play between ‘Sachverhalt’ and ‘verhalten sich … zueinander’ in this key proposition, but using ‘stand to one another’ for the latter captures the main idea of a ‘state-of-things’."],"2.032":["2.032 connect : zusammenhängen ."],"2.1":["2.1 We picture facts : Wir machen uns Bilder der Tatsachen , lit., we make (to) ourselves, i.e. construct, pictures of facts. In the original version of 2.1 in the Prototractatus , it read ‘Die Tatsachen begreifen wir in Bildern’, lit., ‘The facts we grasp in pictures’, which is compatible with—and arguably reinforces—the translation provided here. The formulation was changed after 3.001 was added, though when exactly (and if this was the cause) is unclear. On the translation, see the note to 3.001 below."],"2.11":["2.11 presents : stellt … vor . This is one of just four uses of the verb ‘vorstellen’ in the Tractatus , three of which are translated as ‘present’ (the others in 2.15 and 4.0311), one as ‘represent’ (5.631). See the Glossary and the notes to the relevant propositions below."],"2.14":["2.14 standing to one another : sich … zu einander verhalten . Cf. 2.031 and the note to it above."],"2.15":["2.15 presents : stellt vor . To be consistent with its use in 2.11, especially, as well as 4.0311, this should be translated as ‘presents’, even though ‘represents’ would better fit the grammatical structure in English. The ‘That … that …’ structure must be captured, as Wittgenstein is talking here about facts."],"2.1511":["2.1511 connected : verknüpft ."],"2.1514":["2.1514 things : Sachen ."],"2.1515":["2.1515 feelers : Fühler . Wittgenstein explained that by ‘Fühler’ here ‘I meant the things which a butterfly has’ (LO, p. 24)."],"2.172":["2.172 it features it : es weist sie auf . ‘Features’ has the double meaning of ‘possessing’ and ‘manifesting’, which seems appropriate here."],"2.201":["2.201 A picture … states-of things . This is the first remark in which both the verbs ‘abbilden’ and ‘darstellen’ are used. The former is translated throughout by ‘depict’ (which is only used for ‘abbilden’) and the latter by ‘represent’, with just one exception (and ‘represent’ is only used for ‘darstellen’, with just two exceptions). See the Glossary for details. The translation by Ramsey and Ogden was not consistent in this respect, although the two verbs might indeed be used synonymously in some contexts. But Wittgenstein is careful in his use, distinguishing them. As 2.201 says, a picture depicts reality by representing possible states-of-things. Once propositions have been characterized as pictures, he can then claim that a proposition is true if what it represents agrees with what it depicts, and false otherwise (see e.g. 4.021 ff.)."],"2.223":["2.223 tell : erkennen ; also in 2.224. Its usual meaning of ‘recognize’ does not fit here."],"3.001":["3.001 means: we can picture it : heißt : wir können uns ein Bild von ihm machen . Wittgenstein had said that he didn’t know how to translate the latter sentence, but suggested ‘we can imagine it’: ‘because “imagine” comes from “image” and this is something like picture. In German it is a sort of pun’ (LO, p. 24). But he may not have appreciated the (idiomatic) use of ‘picture’ as a verb, which reflects much better the ‘pun’ of which he speaks."],"3.1":["3.1 perceptibly : sinnlich wahrnehmbar , lit., sense-perceptibly, i.e. in a way that can be perceived by the senses."],"3.12":["3.12 And a proposition … the world . This makes clear Wittgenstein’s ‘official’ conception of a Satz : a Satzzeichen in its projective relation to the world. It is this use of ‘Satz’ that is appropriately captured by ‘proposition’, leaving ‘Satzzeichen’ as ‘propositional sign’, for which ‘sentence’ could also be used—though that would then obscure the connection between ‘Satz’ and ‘Satzzeichen’. See the notes to 2.0122 above and 4.025 below."],"3.13":["3.13 Thus the possibility … expressing it . This is a good example of the difficulty of translating modal qualifiers such as ‘aber’, ‘allein’, ‘allerdings’, ‘also’, ‘auch’, ‘da’, ‘daher’, ‘darum’, ‘doch’, ‘eben’, ‘ja’, ‘jedenfalls’, ‘nämlich’, ‘obwohl’, ‘schon’, ‘so’, ‘sondern’, and ‘wohl’. They reflect the subtle relationships between the uses of phrases and sentences and the transitions from one to another, and can be a devil to translate, since they do not match up easily with English terms. One of the frequent qualifiers is ‘also’, which Ramsey and Ogden invariably render, and Pears and McGuinness often render, as ‘therefore’, as here in 3.13. But ‘also’ in German has a range of meanings, from the deductive through the elucidatory to the exclamatory, as it might be described. Listing them accordingly, it can mean ‘therefore’, ‘hence’, ‘thus’, or ‘so’, but also ‘that is’, ‘that is to say’, ‘namely’, or, especially in conversation, even just ‘well’ or something like ‘okay, then’. There are indeed arguments in the Tractatus , but it is also a work of elucidation, as Wittgenstein himself stresses. Often what he does is give variant formulations or a different aspect of something in clarifying it rather than deducing something else. In such contexts, ‘that is’ might be a better translation of ‘also’ than ‘therefore’. Here, in 3.13, something intermediate seems appropriate, and ‘thus’ has thus been used. Although it is hard to pick up the nuances of the various uses of modal qualifiers in the Tractatus , a policy of flexibility has been adopted throughout, listening to what the text says and how it sounds in choosing the best of what may be several options in English. (‘Therefore’ sounds too harsh and overly deductive in English here, and ‘thus’ gives a softer, semi-deductive, and more elucidatory feel.)"],"3.203":["3.203 A name means an object. The object is its meaning . Here ‘means’ translates ‘bedeutet’ and ‘meaning’ translates ‘Bedeutung’."],"3.221":["3.221 I can only speak of them, I cannot state them : Ich kann nur von ihnen sprechen, sie aussprechen kann ich nicht . ‘Aussprechen’ is translated as ‘state’ here, as in 4.116, 6.421, and 6.5 (see the relevant notes below); literally, it means ‘pronounce’ or ‘speak out about’, and might also be rendered as ‘articulate’. It is also translated as ‘spell out’ in 3.262 (see the relevant note below)."],"3.23":["3.23 demand : Forderun g."],"3.24":["3.24 The generality-sign contains a prototype . Allgemeinheitsbezeichnung = generality-sign; Urbild = prototype."],"3.261":["3.261 unpacked : auseinanderlegen . The German term covers both ‘unfold’ and ‘explicate’."],"3.262":["3.262 What … spells out : Was in den Zeichen nicht zum Ausdruck kommt, das zeigt ihre Anwendung. Was die Zeichen verschlucken, das spricht ihre Anwendung aus . It is hard to capture the aphoristic style and rhythm of this; ‘verschlucken’ literally means ‘swallow’, and ‘aussprechen’ has elsewhere been translated as ‘state’ (3.221, 4.116, 6.421, 6.5; see the relevant notes). But here ‘hold back’ and ‘spell out’ seem more appropriate, with the contrast captured by the ‘back’ and the ‘out’."],"3.3":["3.3 Only a proposition … meaning . What we have here is a formulation of what is now widely known as the context principle (first stated by Frege in The Foundations of Arithmetic of 1884), and indeed Wittgenstein himself explicitly requested that ‘Zusammenhang’ here be translated as ‘context’, not ‘connexion’ (LO, p. 24). But it is important to keep in mind that it still retains the core meaning of ‘connection’, which is how ‘Zusammenhang’ is best translated elsewhere (2.0122, 2.032, 2.15, 4.03, 4.22, 5.1311, 5.1362, 6.374), with the sole exception of 4.23, where ‘context’ is also appropriate."],"3.315":["3.315 mean : meinen ."],"3.316":["3.316 fixed … fixing . festgesetzt = fixed; Festsetzung = fixing. Wittgenstein only uses these terms in 3.316, 3.317, and 5.501; ‘determined’ and ‘determination’ are alternative renderings, but these terms have been reserved for ‘bestimmt’ and ‘Bestimmung’."],"3.323":["3.323 existence : Existenz . This is the first occurrence in the text of the noun ‘Existenz’, which has been translated throughout as ‘existence’, which has only been used to translate ‘Existenz’ (see the Glossary), despite the temptation to use it for other words such as ‘Bestehen’ (see e.g. the note to 2 above). 3.323 suggests that we should indeed be careful here."],"3.325":["3.325 concept-script : Begriffsschrift . ‘Begriffsschrift’ is the name that Frege gave to his logical notation."],"3.326":["3.326 senseful : sinnvoll . This is rendered as ‘significant’ in the Ramsey–Ogden translation, which Wittgenstein said he thought was ‘alright’, explaining the meaning of the proposition as follows: ‘that in order to recognize the symbol in a sign we must look at how this sign is used significantly in propositions. I.e. we must observe how the sign is used in accordance with the laws of logical syntax. Thus “significant” here means as much as “syntactically correct”’ (LO, p. 59). Reviving ‘senseful’ to capture ‘sinnvoll’ can do just the work Wittgenstein has in mind, while preserving the links to the relevant cognate terms; cf. the second note to 3.13 above."],"3.328":["3.328 not needed … Occam’s razor . nicht gebraucht = not needed; Sinn = point. Occam’s razor, named after William of Ockham ( c .1287–1347), is the methodological principle ‘Do not multiply entities beyond necessity’."],"3.331":["3.331 This remark …‘theory of types’ : Von dieser Bemerkung sehen wir in Russells „Theory of types“ hinüber . Wittgenstein himself requested ‘into’ rather than ‘to’ in rendering ‘in’ here (LO, pp. 59, 64), but the present translation offers a more fluent version than Ramsey and Ogden’s (‘From this observation we get a further view—into Russell’s Theory of Types ’)."],"3.334":["3.334 self-explanatory : sich von selbst verstehen . See the note to 6.2341 below."],"3.3411":["3.3411 the real name … a name . der eigentliche Name = the real name; Es würde sich so successive ergeben = It would thus progressively turn out. What is meant by ‘successive’ here is something like ‘as more and more examples of symbols are considered’."],"3.3442":["3.3442 propositional structure : Satzgefüge . Cf. 4.442, which contains the only other use of this term."],"4.002":["4.002 Language disguises thought … recognized . There is play here on ‘verkleidet’ (‘disguises’), ‘Kleid’ (‘clothing’), and ‘bekleidet’ (‘clothed’)."],"4.0031":["4.0031 Albeit not in Mauthner’s sense . The reference here is to the work of Fritz Mauthner (1849–1923): Beiträge zu einer Kritik der Sprache ( Contributions to a Critique of Language) , 3 vols. (Stuttgart: J. G. Cotta, 1901–3)."],"4.01":["4.01 as we conceive it: so wie wir sie uns denken ."],"4.011":["4.011 sign-languages : Zeichensprachen . Wittgenstein gave both ‘sign-languages’ and ‘symbolisms’ as alternative translations here, but expressed preference for the latter (LO, p. 25). But the former is more literal and less misleading (given his distinction between sign and symbol), and is adopted here and throughout."],"4.014":["4.014 Like the two youths … in the fairy tale . The reference here is to ‘Die Goldkinder’, one of the Brothers Grimms’ fairy tales."],"4.0141":["4.0141 That there is … record . When Wittgenstein finished the Tractatus (more or less), there were around a hundred propositions left over which he was still wondering whether to include or not; see the account given in §5 of ‘Note on the Text’. In the end only one of these supplementary propositions (number 72) was included, numbered 4.0141, elaborating on 4.014. Wittgenstein provided his own translation of this (LO, pp. 26, 40), which is followed here with some slight improvements to the English."],"4.015":["4.015 The possibility of all similes, of the whole pictoriality of our language : Die Möglichkeit aller Gleichnisse, der ganzen Bildhaftigkeit unserer Ausdrucksweise . The translation of ‘Gleichnisse’ as ‘similes’ (rather than ‘likenesses’) and of ‘Ausdrucksweise’ as ‘language’ (lit., ‘means of expression’) were suggested (albeit tentatively) by Wittgenstein (LO, p. 26). He also suggested (again, tentatively) ‘imagery’ for ‘Bildhaftigkeit’, but ‘pictoriality’ is the better term here, to resonate with all its cognate terms."],"4.022":["4.022 A proposition … stand . Wittgenstein suggested this translation, and in particular, translating ‘wie es sich verhält’ as ‘how things stand’. Ramsey and Ogden’s original translation had ‘how things are connected’, to which Wittgenstein responded that the German phrase ‘is quite a general expression for any fact; it does not mean things are connected etc.’ (LO, p. 27). Cf. the second note to 4.023 and the note to 4.5 below."],"4.023":["4.023 Reality must be fixed by a proposition to elicit either yes or no : Die Wirklichkeit muß durch den Satz auf ja oder nein fixiert sein . Wittgenstein wrote of this: ‘This prop[osition] I cannot translate’, but offered the following explanation: ‘The meaning of it should be that a prop[osition] determines reality such that by merely affirming or denying it one can make it agree with reality. A prop[osition] can〈n〉’t entirely determine reality for it al〈l〉ways can either be true or false; but it can ONLY be true or false. That means the prop [osition] determines reality so far that one only needs to say “yes” or “no” to it, and nothing more, to make it agree with reality . It is like fixing—say—a shelf on the wall with one nail and saying: now this is fixed so far that I only need turn it this way or that way and it will be right. What I have here underlined thus_____or something like it might serve as a translation if nothing better is suggested’ (LO, p. 27). The translation here has kept it simple and literal but adding ‘elicit’ to fill out the ‘auf’. Something like ‘so that all that is left is’ could be inserted before ‘to elicit’ to reflect Wittgenstein’s longer paraphrase."],"4.025":["4.025 The translation … translated . Here it might be most natural to translate the three occurrences of ‘Satz’ by ‘sentence’ rather than ‘proposition’. But in the interests of maximizing one–one correspondence between ‘Satz’ and ‘proposition’ throughout the translation (so that the German term can be read back), ‘proposition’ is used here, too. See the notes to 2.0122 and 3.12 above."],"4.026":["4.026 we communicate : verständigen wir uns , lit., we make ourselves understood, connecting with the use of ‘verstehen’ (‘understand’) in the previous sentence."],"4.0311":["4.0311 in this way the whole — like a tableau vivant—presents a state-of-things . Here ‘tableau vivant’ translates ‘lebendes Bild’, lit., living picture, and ‘presents’ translates ‘stellt … vor’."],"4.0312":["4.0312 The possibility … represented . Vertretung = representation; vertreten = represent. In other contexts, ‘vertreten’ is translated as ‘stand for’, but this does not work here, and there is no noun in English corresponding to the verb ‘stand for’."],"4.04":["4.04 Compare … Dynamical Models . This refers to the final section in chapter 3 of Book II of Heinrich Hertz’s Principles of Mechanics , tr. D. E. Jones and J. T. Walley (London: Macmillan, 1899)."],"4.0411":["4.0411 determine : feststellen . In agreeing this translation, Wittgenstein notes that it has the sense of ‘discover’ here (LO, p. 69)."],"4.063":["4.063 a Fregean truth-value . According to Frege, the Bedeutung (reference, meaning) of a proposition ( Satz ) is a truth-value, either the True or the False, understood as (logical) objects. On his account, propositions refer to truth-values just as names refer to objects."],"4.112":["4.112 a set of teachings : Lehre . Cf. the note to 6.13 below, where logic is characterized in the same way."],"4.114":["4.114 It should delimit … the thinkable . abgrenzen = delimit; begrenzen = limit. It is important to translate ‘abgrenzen’ and ‘begrenzen’ differently but connectedly (they are rendered the same in both the Ramsey–Ogden and Pears–McGuinness translations, as ‘limit’ and ‘set limit’, respectively). ‘abgrenzen’ has more the meaning of ‘demarcate’—of one thing from something different , whereas ‘begrenzen’ just means drawing a Grenze (boundary or limit), either from within or at any rate without specifying the ‘other side’; cf. 4.113. This distinction is crucial in Wittgenstein’s thinking, as is made clear in his preface."],"4.115":["4.115 indicate : bedeuten . ‘bedeuten’ has a wide range of meanings, somewhat like ‘mean’ does in English, but the respective ranges do not overlap exactly, so that ‘bedeuten’ is sometimes better translated by a different English term. Here it (arguably) means something like ‘indicate’ or ‘point to’; ‘signify’ is another possible translation (used by Pears and McGuinness), but this has been used consistently throughout for ‘bezeichnen’ (and only ‘bezeichnen’). See the Glossary for further details of how all the relevant terms have been translated."],"4.116":["4.116 Everything that can be stated can be stated clearly . sich aussprechen = state. Cf. 3.221, 6.421, and 6.5, where ‘state’ is also used, and 3.262, where ‘spell out’ is used (and ‘state’ doesn’t work): see the relevant notes."],"4.121":["4.121 It features it : er weist sie auf . See the note to 2.172 above."],"4.126":["4.126 real concepts : eigentliche Begriffe ."],"4.1272":["4.1272 pseudo-concept : Scheinbegriff . Wittgenstein suggested this translation (LO, p. 29), as well as ‘pseudo-proposition’ for ‘Scheinsatz’, used later in 4.1272."],"4.12721":["4.12721 primitive ideas : Grundbegriffe . The term literally means ‘basic concepts’, but the reference is to Russell’s talk of ‘primitive ideas’ in Principia Mathematica (see esp. *1)."],"4.128":["4.128 pre-eminent numbers : ausgezeichneten Zahlen . Ramsey had originally translated this as ‘special numbers’, to which Wittgenstein objected as not giving the right meaning: ‘What I meant was that in Logic there are no numbers which are in any sense more important or of any greater significance, in any sense preeminent, as compared with the rest of numbers. Such for instance many believe that the number one is such a number or the number 3. And if—for instance—there was in Logic a definite number of primitive prop[ositions] or of primitive ideas—say the number one or any other—then this number would have, in some sense, to prevail all through logic and consequently also throughout philosophy. It would then be a number more important than the rest, an “ausgezeichnete Zahl”. I have put “preeminent” instead of special. If this won’t do please alter it. (But don’t leave “special”.)’ (LO, p. 29) The phrase is also used in 5.453 and 5.553."],"4.221":["4.221 propositional unity : Satzverband . This rendering makes explicit that what is raised here is the problem of the unity of the proposition, as it has come to be known. The use of ‘Verband’ (in ‘Satzverband’) connects with the use of ‘Verbindung’ (‘combination’) in the previous sentence."],"4.23":["4.23 context : Zusammenhang . Though ‘Zusammenhang’ is best translated as ‘context’ here, there is a link to its use in 4.22, where it is (correctly) translated as ‘connection’. See the note to 3.3. If one wanted to bring out the link between 4.22 and 4.23, one could translate 4.23 as ‘A name occurs in a proposition only when connected in an elementary proposition’."],"4.241":["4.241 means : heißt ."],"4.243":["4.243 If I know … the same : Kenne ich etwa die Bedeutung eines englischen und eines gleichbedeutenden deutschen Wortes, so ist es unmöglich, daß ich nicht weiß, daß die beiden gleichbedeutend sind . Both ‘kennen’ and ‘wissen’ are here translated as ‘know’, and ‘gleichbedeutend’ translated by paraphrasing in terms of ‘meaning the same’. ‘Kennen’ has something of the meaning of ‘be acquainted with’ here; cf. the notes to 2.0123 above and 6.2322 below."],"4.411":["4.411 From the outset : von vornherein . Wittgenstein makes clear (LO, p. 29; cf. p. 31) that this does not mean ‘a priori’, and suggests something like ‘from the very beginning’ or ‘even on first sight’ (adopted by Ramsey and Ogden, with ‘at’ replacing ‘on’), but ‘from the outset’ seems better. Cf. the note to 5.43 below."],"4.431":["4.431 Frege … concept-script . See G. Frege, Begriffsschrift (Halle: L. Nebert, 1879), §§5–7; tr. in M. Beaney, ed., The Frege Reader (Oxford: Blackwell, 1997), 55–63."],"4.442":["4.442 Frege’s ‘judgement stroke’ … true . See G. Frege, Begriffsschrift (Halle: L. Nebert, 1879), §2; tr. in M. Beaney, ed., The Frege Reader (Oxford: Blackwell, 1997), 52–3."],"4.464":["4.464 The truth … impossible . Wittgenstein’s comment on translating this is instructive: ‘Here as in the preceding prop[osition] there is a great difficulty about the use of “the”. I would rather leave it out altogether before “tautology” and “contradiction”. But if this is impossible rather put “a” instead of “the”. So 4.464 would be: “The truth of tautology is certain, of propositions possible, of contradiction impossible.” Here I have put “tautology” and “contradiction” in the SINGULAR and “propositions” in the plural deliberately because there are in fact no contradictions but there is only contradiction, for they all mean the same, i.e. nothing. And the same applies to tautology’ (LO, p. 30). On the general difficulty in translating the definite articles in German, see the note to 2.02 above; and cf. the note to 5.1361 below."],"4.466":["4.466 combination of symbols : Zeichenverbindung . This might most naturally (and consistently with the uses elsewhere) be translated as ‘combination of signs’, but Wittgenstein specifically requested ‘symbols’ here (LO, pp. 60, 65), and this does seem to capture his meaning better, as 4.4661 helps clarify."],"4.5":["4.5 such and such is the case : Es verhält sich so und so . In his comments on the draft translation he was sent, Wittgenstein wrote: ‘This is the only English expression I know for it. Perhaps one could say “things stand such and such”. The expression must be one used in every day language to express that something or other is the case’ (LO, p. 30). Cf. the note to 4.022 and the second note to 4.023 above. The phrase is also translated this way in 5.552."],"5.101":["5.101 The truth-functions … the following kind . The square brackets at the end of (most of) the lines that follow were not in the original German, but Wittgenstein wanted them added in the English translation, with what is inside them being written in Russell’s symbolism, as in Principia Mathematica (LO, pp. 30, 42, 60). He also explains that ‘The expressions in words are not put in brackets except in the case of tautology and contradiction where they have to stand in round brackets as they do’ (LO, pp. 30–1). This was presumably to reflect the ‘senseless’ character of tautology and contradiction, as limiting cases of propositions. Wittgenstein was very sensitive to issues of typography and layout, and his wishes and instructions have been carefully followed here."],"5.1361":["5.1361 Superstition is the belief in the causal nexus : Der Glaube an den Kausalnexus ist der Aberglaube [with ‘Aberglaube’ gesperrt , i.e. with the letters more widely spaced, in the German text]. In commenting on Ramsey’s original translation, Wittgenstein wrote: ‘“Belief in the causal nexus is superstition” isn’t right. It ought to be: “Superstition is the belief in the causal nexus”. I didn’t mean to say that the belief in the causal nexus was one amongst superstitions but rather that superstition is nothing else than the belief in the causal nexus. In the German this is expressed by the definite article before “Aberglaube”’ (LO, p. 31). There is clearly a play here on ‘Glaube’ and ‘Aberglaube’, which cannot be captured in the English translation. German words that are gesperrt are now generally italicized in English translation, but Wittgenstein explicitly requested that ‘Superstition’ be left unitalicized."],"5.1363":["5.1363 from a proposition’s being self-evident … its self-evidence : daraus, dass ein Satz uns einleuchtet … das Einleuchten . Here ‘uns einleuchtet’ literally means ‘is clear to us’ or ‘is evident to us’."],"5.143":["5.143 the empty point at their centre : ihr substanzloser Mittelpunkt ."],"5.154":["5.154 factum : Faktum . ‘Fact’ is used throughout this translation to render ‘Tatsache’ and only ‘Tatsache’, which has a (semi-)technical meaning for Wittgenstein and which he did not use here."],"5.156":["5.156 extract : Auszug ."],"5.43":["5.43 is surely hard to believe : ist doch von vornherein kaum zu glauben . In his comments on the original translation here, Wittgenstein wrote: ‘“von vornherein” doesn’t mean “a priori” but something like “from the very beginning” but here you had better leave it out al〈l〉together’ (LO, p. 31). Cf. the note to 4.411 above."],"5.45":["5.45 occurrence : Dasein ."],"5.451":["5.451 what Frege said … primitive signs . See G. Frege, Grundgesetze der Arithmetik (Jena: H. Pohle, vol. I 1893, vol. II 1903), I, §33; II, §§58 ff.; tr. in M. Beaney, ed., The Frege Reader (Oxford: Blackwell, 1997), 222–3, 260 ff."],"5.452":["5.452 in Russell and Whitehead’s Principia Mathematica . See, for example, A. N. Whitehead and B. Russell, Principia Mathematica (Cambridge: Cambridge University Press, 1910–13; up to *56 repr. 1997), 94–7."],"5.453":["5.453 There are no pre-eminent numbers . See the note to 4.128 above."],"5.454":["5.454 juxtaposition : Nebeneinander , lit., next to one another. What Wittgenstein is rejecting is any kind of genus/species differentiation in logic, as the second sentence of 5.454 makes clear."],"5.4541":["5.4541 simplex sigillum veri . The Latin means ‘simplicity is the sign of truth’."],"5.4733":["5.4733 constructed : gebildete . The verb ‘bilden’ is translated throughout the 5s from this point on as ‘construct’. Elsewhere, with one exception (4.002), it is translated as ‘form’ (see the Glossary)."],"5.501":["5.501 fixing : Festsetzung . See the note to 3.316 above."],"5.511":["5.511 hooks and manipulations : Haken und Manipulationen ."],"5.521":["5.521 separate = trenne . Wittgenstein comments on this in responding to a question from Ogden: ‘I mean “separate” and not derive’. They were connected and I separate them’ (LO, pp. 61, 65)."],"5.53":["5.53 Identity … identity sign . Gleichheit = identity; Gleichheitszeichen = identity sign. Elsewhere Wittgenstein talks of ‘Identität’, not ‘Gleichheit’ (as in 5.5301, which immediately follows; see the Glossary). Presumably, preferring ‘Gleichheit’ here is to make the connection with his use of ‘Gleichheitszeichen’; but it shows that he treats ‘Identität’ and ‘Gleichheit’ (‘equality’) as synonymous (as did Frege)."],"5.5351":["5.5351 Thus Russell … propositions . See B. Russell, The Principles of Mathematics (Cambridge: Cambridge University Press, 1903), e.g. §§16, 41."],"5.552":["5.552 that such and such is the case : daß sich etwas so und so verhält . See the note to 4.5 above."],"5.553":["5.553 There is no pre-eminent number . See the note to 4.128 above."],"5.5542":["5.5542 what must there be in order that something can be-the-case? : was muß sein , damit etwas der-Fall-sein kann ? Wittgenstein’s own hyphens have been retained here."],"5.5563":["5.5563 All propositions … logical order . Wittgenstein explained this key idea as follows: ‘By this I meant to say that the prop[ositions]s of our ordinary language are not in any way logically less correct or less exact or more confused than prop[ositions]s written down, say, in Russell[’]s symbolism or any other “Begriffsschrift”. (Only it is easier for us to gather their logical form when they are expressed in an appropriate symbolism’ (LO, p. 50; cf. p. 53)."],"5.62":["5.62 means : meint ."],"5.631":["5.631 There is no thinking, representing subject : Das denkende, vorstellende, Subjekt gibt es nicht . A ‘vorstellendes Subjekt’ would be a subject who has ‘Vorstellungen’ (representations, ideas). The allusion here is to Schopenhauer’s work, The World as Will [Wille] and Representation [Vorstellung] ."],"5.6331":["5.6331 There has been a lot of controversy about the diagram here. In virtually all editions of the Tractatus, from the original German version and its first translation onwards, the eye is represented by a small circle within the supposed visual field, albeit at its tapered ‘origin’. In fact, as is clear from Wittgenstein’s correspondence with Ogden (LO, p. 20) and the manuscript sources, he intended it to be a small circle outside the visual field, but connected so that the visual field appears to spread out from the eye. Wittgenstein’s correction was never made, however. (For the manuscript evidence, see L. Bazzocchi, ‘A Significant “False Perception” of Wittgenstein’s Draft on Mind’s Eye’, Acta Analytica, 29 (2014), 255–66.) Arguably, Wittgenstein’s point was not (simply) the illegitimacy of taking the eye to be part of the visual field, but of seeing the whole ‘form’ of the visual field as a bounded space with some kind of ‘origin’ in an eye. (Cf. his claim in 6.4311 that ‘our visual field is limitless’.) This may account for why he did not press Ogden—and later Ramsey—to correct the picture, as the exact position of the eye, as long as it was recognizably at the ‘origin’ of the visual field, was less important than the overall ‘form’ that the visual field supposedly had."],"6.111":["6.111 the logical proposition . Here ‘jener Satz’, which literally means ‘that proposition’, is translated as ‘the logical proposition’, to make clear what is presumably the reference, the proposition ‘every proposition is either true or false’."],"6.121":["6.121 zero-method : Nullmethode . Wittgenstein explains this as follows: ‘“Nullmethode” in German is an expression used in physics; when—for instance—you measure an electric resistance by regulating another resistance until〈l〉 the galvanometer points to 0 again we call this a “Nullmethode”. Now there is sure to be an English word for it; but is it “null-method”? It should rather be “zero-method” but I don’t know’ (LO, p. 34)."],"6.124":["6.124 only the latter expresses : drückt nur dieses aus . This sounds as (slightly) odd in German as it does in English. Wittgenstein explains what he means in what immediately follows."],"6.127":["6.127 basic laws . Here ‘Grundgesetze’ is translated as ‘basic laws’, as Frege is referred to in what follows, rather than ‘primitive propositions’, which is Russell’s term. Cf. the note to 5.43 above."],"6.13":["6.13 Logic … the world . Lehre = set of teachings; Spiegelbild = mirror image. On ‘Lehre’, cf. the note to 4.112 above, where philosophy is characterized in the same way."],"6.232":["6.232 Frege says … sense . Frege distinguished between ‘Sinn’ and ‘Bedetung’ in his famous paper ‘Über Sinn und Bedeutung’ (1892). The Bedeutung of an expression is what it denotes or refers to (an object in the case of names, a concept or function in the case of concept-words or function-terms, a truth-value in the case of sentences/propositions). The Sinn of an expression is the ‘mode of determination’ (‘Bestimmungsweise’) or ‘mode of presentation’ (‘Art des Gegebenseins’) of its Bedeutung . ‘Sinn’ is unproblematically rendered as ‘sense’, but the translation of ‘Bedeutung’ has proved highly controversial (see M. Beaney, ‘Translating “Bedeutung” in Frege’s Writings’, in P. Ebert and M. Rossberg (eds.), Essays on Frege’s Basic Laws of Arithmetic (Oxford: Oxford University Press, 2019), 603–51). Since ‘Bedeutung’ has generally been rendered as ‘meaning’ in this translation of the Tractatus , ‘Bedeutung’ is also used here."],"6.2322":["6.2322 in knowing their meaning, I know whether = indem ich ihre Bedeuting kenne, weiss ich, ob . Both ‘kennen’ and ‘wissen’ here are translated as ‘know’ . Cf. the notes to 2.0123 and 4.243 above."],"6.233":["6.233 intuition : Anschauung . ‘Anschauung’ is a tricky term to translate into English, but ‘intuition’ is appropriate here as Wittgenstein is referring to a debate that is indeed described by talking of ‘intuition’. In his answer to the question he raises, followed up in 6.2331, however, he could be seen as subtly (recommending) changing the meaning of ‘intuition’ by playing more on other aspects of the meaning of ‘Anschauung’. Cf. the translation of ‘anschaulich’ as ‘perspicuous’ in 6.1203."],"6.2341":["6.2341 self-explanatory : sich von selbst verstehen . The German phrase has arguably two main meanings, one of which might be captured as ‘self-evident’ (as used in the Ramsey–Ogden translation), and the other as ‘go without saying’ (as used in the Pears–McGuinness translation), where there might be some implicit—but external—norm. The former does not fit with Wittgenstein’s talk of a method here, and the norm presupposed by mathematics is internal, not external; so it has been translated here as ‘self-explanatory’, which has something of both meanings. Interestingly, in the draft typescript on which Wittgenstein added comments, ‘self-intelligible’ is used (LO, p. 54+vii); it is unclear when and by whom this was changed to ‘self-evident’. The phrase is also used in 3.334."],"6.3":["6.3 regularity : Gesetzmäßigkeit . The allusion is to Hertz: see the note to 6.361 below."],"6.32":["6.32 The law of causality is not a law but the form of a law . In the only footnote added to the Ramsey–Ogden translation (other than the one about the numbering system right at the beginning), we find this remark: ‘ I.e. not the form of one particular law, but of any law of a certain sort (B. R.)’. The ‘B. R.’ shows that it was Bertrand Russell who added this. It is somewhat bizarre that this was the only one he selected for explanation in the text!"],"6.3431":["6.3431 Through their whole logical apparatus : Durch den ganzen logischen Apparat . This is hard to translate, but Wittgenstein insisted on ‘through’: ‘Instead of “throughout” it must be “through”. The word is used here in the same sense as when I say “I speak through a tube” or “I hear his voice through the wall” etc.’ (LO, p. 35)."],"6.361":["6.361 regular connections: gesetzmäßige Zusammenhänge . The use of ‘gesetzmäßige’ picks up on ‘Gesetz’ (‘law’) in 6.36, so ‘law-governed’ might be an appropriate translation, but Wittgenstein (LO, p. 35) wanted its rendering to reflect the standard English translation in Hertz’s Principles of Mechanics (see the reference to this in the note to 4.04 above). ‘Regular’ keeps the connotation of being ‘regulated’ by ‘rules’."],"6.372":["6.372 People thus stop … as if they were sacrosanct : So bleiben sie bei den Naturgesetzen als bei etwas Unantastbarem stehen . In criticizing the choice of ‘hold fast to’ in Ramsey’s original translation, Wittgenstein wrote: ‘it should be something like: “So people stop at the natural laws as at something …”. The prop[osition] means that people don’t enquire any further, their investigations STOP there as if they now had explained everything’ (LO, p. 35)."],"6.421":["6.421 cannot be stated : nicht aussprechen läßt . The verb ‘aussprechen’ is also translated as ‘state’ in 3.221, 4.116, and 6.5. Cf. 3.262, where ‘spell out’ is used, and 6.522. See the relevant notes to these."],"6.423":["6.423 bearer of the ethical : Träger des Ethischen . ‘Träger’ can mean ‘responsible agent’, so the phrase could be translated, more fully, as ‘bearer of responsibility for the ethical’."],"6.4311":["6.4311 experienced : erlebt . There is play on ‘Leben’ (‘life’) and ‘erlebt’."],"6.4312":["6.4312 Not only … space and time . Wittgenstein admitted the difficulties in translating this paragraph. He explained what he meant by the first sentence as follows: ‘If for instance one tries to prove a proposition in Physics we make certain assumptions and hope that they will do our business, i.e. that they will prove the point in question, i.e. that from them our proposition will follow. Now if we find that it doesn’t follow then what we will say about our assumptions is exactly what I tried to express. I think one would say something like: “These assumptions will not do our business” or “they will not prove what we tried to prove with them”’ (LO, pp. 35–6). He also remarks on the difficulty in translating ‘Rätsel’, noting that it has two meanings in German, an ordinary meaning, as illustrated in questions such as ‘Why is a raven like a writing desk?’, and a ‘higher meaning’, as he puts it, as when we talk of ‘das Rätsels des Lebens’. He asks Ogden: ‘Now do you use “riddle” in this second sense also? IF SO, IT IS QUITE RIGHT. Only I don’t w〈h〉ish that there should be anything ridiculous or profane or frivolous in the word when used in the connection “riddle of life” etc.’ (LO, p. 36). ‘Riddle’ does indeed have these two meanings in English, too, so is an appropriate translation. Wittgenstein also uses the adjective ‘rätselhaft’ in this paragraph, but this has been translated as ‘mysterious’, since ‘riddlesome’ would be inappropriate, not least in having rather less of the ‘higher meaning’."],"6.5":["6.5 stated : aussprechen . Cf. 3.221, 4.116, and 6.421, where ‘state’ is also used; 3.262, which has ‘spell out’; and 6.522: see the relevant notes."],"6.521":["6.521 the meaning of life : der Sinn des Lebens ."],"6.522":["6.522 There is, though, the ineffable : Es gibt allerdings Unaussprechliches . ‘Unaussprechliches’ comes from ‘aussprechen’, which has generally been translated as ‘state’, with the exception of 3.262, which has ‘spell out’ (see the relevant note above)."],"6.53":["6.53 to say nothing except what can be said, that is, propositions of natural science = Nichts zu sagen, als was sich sagen lässt, also Sätze der Naturwissenschaft . The phrase ‘was sich sagen lässt’ is most naturally translated into English as ‘what can be said’, but it literally means ‘what lets itself say’, illustrating what grammarians call the ‘middle’ or ‘medium’ voice—as opposed to the ‘active’ or ‘passive’ voice. Recognizing this makes better sense of how Wittgenstein goes on, in suggesting that what let themselves say are the propositions of natural science. If he had strictly meant ‘what cannot be said’, he could have written ‘was gesagt werden kann’ (a construction he uses, for example, in 4.1212). The middle voice is arguably present, in slightly different forms, at various points in the Tractatus —for example, in talking in 6.124 of what ‘expresses’ or ‘itself speaks’ in logic (cf. the notes to 6.124 above). For detailed discussion, in relation to the whole idea of ‘showing’, see J.-P. Narboux, ‘Showing, the Medium Voice, and the Unity of the Tractatus ’, Philosophical Topics , 42.2 (2014), 201–62."],"6.54":["6.54 My propositions elucidate when … : Meine Sätze erläutern dadurch, daß … Ramsey’s original translation of this had run ‘My propositions are explained in that …’, which Wittgenstein changed to ‘My propositions elucidate in this way that …’. Ogden then suggested replacing ‘elucidate’ by ‘are elucidated’, on the ground that ‘elucidate’ does not have an intransitive use (LO, pp. 54, 54+viii). Wittgenstein replied as follows: ‘ Here you misunderstand my meaning entirely . I didn’t mean to use “elucidate” intransitive[ly]: what I meant to say was: My prop[osition]s elucidate—whatever they do elucidate—in this way: etc. Similarly I might have said “My prop[osition]s clarify in this way …” meaning “My prop[osition]s clarify whatever they do clarify—say, the prop[osition]s of natural science—in this way: …”. Here clarify is not used intransitive[ly] al〈l〉though the object is not mentioned. You may put it thus: “My prop[osition]s elucidate philosophic matters in this way: …”. This is something like the right meaning. Or “My prop[osition]s are elucidations in this way: …” but this I suppose is bad. If nothing better is suggested and my first way of putting it real[l]y won’t do add “philosophic matters” as above’ (LO, p. 51). Ogden changed ‘elucidate’ to ‘are elucidatory’, so that the published version became: ‘My propositions are elucidatory in this way: …’. The present translation stays closer to Wittgenstein’s formulation in German and his original suggestion in English but simplifying by replacing ‘in this way’ by ‘when’, since ‘elucidate’ seems to work exactly like ‘erläutern’ does: in its ‘intransitive’ use there is an implicit object, and it is the propositions themselves that are being said to do the elucidating, as opposed to just having the property of being ‘elucidatory’. It is also worth noting that Wittgenstein does not question here the translation of ‘Sätze’ by ‘propositions’. Given that ‘philosophical propositions’ are to be recognized as nonsensical, on his view, it might be recommended that we translate ‘Sätze’ by ‘sentences’ instead. But perhaps the very use of ‘propositions’ here is precisely one of those things that he goes on to say we must ‘get over’; indeed, it is surely symbolic of what it is we have to get over to ‘see the world correctly’.","6.54 They must get over these propositions, and then they see the world correctly . überwinden = get over. ‘Er’ has again been translated here as ‘they’ (see the second note to 6.53 above). It is obvious that ‘they’ does not refer to Wittgenstein’s propositions."],"7":["7 Of what one cannot speak, about that one must be silent : Wovon man nicht sprechen kann, darüber muß man schweigen . This was translated by Ramsey and Ogden as ‘Whereof one cannot speak, thereof one must be silent’, which has become canonical, though it is too archaic for the present translation. What it literally says is ‘Of what one cannot speak, about that one must be silent’, which might be rephrased as ‘Of what one cannot speak, one must be silent about’ or ‘About what one cannot speak of, one must be silent’, but none of these seem elegant enough for the concluding proposition of what is a carefully crafted work. ‘About that of which one cannot speak, one must be silent’ might seem better, but the ‘that’ suggests a definiteness, of what it is that one cannot speak of, which is absent in the German (it prompts the question as to what exactly it is). Pears and McGuinness translated it as ‘What we cannot speak about we must pass over in silence’, which is a neat way of avoiding a dangling preposition as the very last word, or two prepositions in the first clause, although there is no sense of ‘passing over’ in the German and ‘of’ is arguably better than ‘about’ here. Wittgenstein also uses ‘man’ rather than ‘wir’, which he could have chosen had he wanted to be less impersonal and more inclusive. After all, he has just said a lot, so it seems, about what cannot be spoken of, on his view, so it would be ironic if he were then to say that we (including him) must be silent. Perhaps he was deliberately being ironic, but making him say ‘we’ to reflect this would be injecting an interpretation into the translation."]},"zh":{"1":["标记各个命题的十进数表明这些命题的逻辑重要性和在我的叙述中对它们的强调。命题n.1，n.2，n.3等等是对命题n的评注；命题n.m1，n.m2等等是对命题n.m的评注；余类推。"],"2":["“Sachverhalt”一词较早的英译文中都按照罗素的用语译为“原子事实”（atomic fact）。鉴于维特根斯坦对该词的使用与罗素的用语意思不全相同，因此在这里按照《逻辑哲学论》较新的英译本（1961年D.F.皮尔斯和B.F.麦克吉尼斯译）译为“事态”（State of affairs）。——译者"],"3.323":["德语“ist”一词也可用作表示“存在”、“有”。——译者","“格林是不成熟的。”——译者"],"3.328":["指奥卡姆的名言：“如无必要，勿增实体”；哲学史上称之为“奥卡姆剃刀”。——译者"],"4.032":["拉丁文动词“ambulare”的第一人称、现在时，意为：我走路、我散步。——译者"],"4.0411":["“Alg”是“Allgemeine”（一般、普遍）的缩写，本条下面的下标“a”和主目位置的“A”也是该词的缩写。——译者"],"4.1272":["“χ0”希伯来文字母，表示数学上的无穷数。——译者"],"4.241":["“Def.”为“Definition”（定义）一词的缩写。——译者"],"6.1264":["modus ponens，假言推理的肯定式。——译者"]},"zh_wang":{"1":["作为标记各个独立命题的号码的十进数，表明这些命题在逻辑上的重要性，表示在我的叙述中对它们的强调。命题n.1，n.2，n.3等是对n号命题的注解；命题n.m1，n.m2等是对n.m号命题的注解；如此等等。"],"3.323":["“格林是不成熟的。”"],"4.032":["ambulare：拉丁文，意思为“我走路，我散步”。"],"4.0411":["“Gen”：“General”（一般、普遍）的缩写。","ƒ（ x g ）：下标“ g ”和主目位置“G”也是“General”的缩写。"],"4.1272":["X 0 ：希伯来字母Aleph，在数学上用来表示无穷数。"],"4.241":["Def：Definition（定义、界说）的缩写。"],"6.32":["即不是一个特殊的规律形式，而是某一类的任何一个规律形式（罗素注）。"]},"zh_huang":{"1":["原注：分行列出的各个句子前加了十进制的数字作为编号。这些编号表示各个句子在逻辑上的重要性，以及在我的解说系统中的位置。比如，标有n.1、n.2、n.3等编号的句子是第n号句子的注解，而第n.m1、n.m2编号的句子则是对n.m号句子的注解。"],"2":["关于“事态”一词的翻译，参见译后记。"],"2.01231":["维特根斯坦赋予“内在性质”“内在关系”以及“外在性质”“外在关系”以专门意义，对此的正面解释参见4.122－4.1241。"],"2.021":["“基体”一词来自亚里士多德，通常译为“实体”。由于维特根斯坦对这个词的用法不同于亚里士多德式的形而上学用法，不能说对象包含在本体论中，故而译为“基体”，以示区别。"],"2.221":["在《逻辑哲学论》中，维特根斯坦用了两个词语来区分意义这个概念，一个是“Sinn/sense”，另一个是“Bedeutung/meaning/reference”。对后者的解释在3.203，关于两者的区分，参见3.3。 在需要区分或者可以区分时，我们分别将其译为“含义”和“指称”；而在无须区分或者不能区分时，就都译为“意义”。"],"3.1":["“句子”系依据德文词“Satz”译出。该词既有“句子”之意，又有“命题”之意。后者在哲学中有时用于比句子更加抽象的东西，比如句子所表达的内容本身，并且这样理解的内容可以在没有句子的情况下也存在。《逻辑哲学论》中并未承认有这种独立于句子的命题存在，故而一般将“Satz”译为“句子”。在需要照顾到汉语语感和惯常说法时，也会用“命题”来翻译。"],"3.11":["读者需注意记号（Zeichen）与符号（Symbol）的区别。关于“符号”的解释，参见3.31；符号与记号的区别，参见3.32－3.328。"],"3.141":["关于这一句的译法，参见译后记。"],"3.1432":["在罗素的记号系统中，通常用“ aRb ”这样的符号来表示 a 和 b 之间有关系 R 。当代常用的方式则是“ R ( a , b )”。"],"3.203":["按照本书的编号方法，3.201－3应该是解说3.2中所使用的概念，因此括号中的这句话应该是在解释如何识别记号。其意思应该是说，按照外观和发音来判断是哪个记号。"],"3.24":["维特根斯坦对词意接近的德文词“unsinnig”和“sinnlos”做了区分。这两个词在英译本中分别被译为“nonsense”和“senseless”。本书中则沿用韩林合的译法，分别译为“无意义的”和“空洞的”。空洞的句子可以有意义，比如重言式，而无意义的句子连空洞都谈不上。请读者自行辨析这两个词的正面意义。","原型在这里应该是作为部分确定的情况被提及的。“原型”一词的德文词为“Urbild”，意为“原始的图像”。但原型并非图像，而是本身体现了逻辑形式的图像要素。当把句子中的名称都换成变元，就得到了一个表明原型的式子。"],"3.3":["维特根斯坦虽然区分了含义与指称，但这种区别与弗雷格不同。弗雷格认为名称和句子都既有含义又有指称，而维特根斯坦则认为指称只能属于名称，含义只能属于句子。维特根斯坦在这一点上与罗素一致，认为句子的含义是句子结构性的特征，并且具有方向（3.144）。罗素关于句子含义的解释，参见Russell, Principles of Mathematics , Routledge, 1903/2010, §217; Russell, Theory of Knowledge: the 1913 Manuscript , ed. by Elizabeth Ramsden Eames, London and New York: Routledge, 1992, pp.86－89."],"3.313":["维特根斯坦把变元的意义理解为变元的值所共有的东西，这与当代的变元概念是不同的。当代的变元概念来自弗雷格，一个变元就是一个占位符，它单独并不限制取什么值。"],"3.314":["如果一个变元在名称中取值，那它就是名称变元。"],"3.323":["最后一个例子的要点是物与事实之间的区分。物只能用名称表示，事实只能用句子来描述（参见3.144以及3.221），但在形式上都可以用“Etwas/something”这个词来谈论。这一点在汉语中只能以“事物”近似表现。","这个例子的要点是，句子“Grün ist grün”中出现的两个“grün”是同音异义词。这一点在汉语中难以表现。"],"4.0031":["毛特纳（Fritz Mauthner, 1849－1923）是一位德国剧评家和哲学家。他从一种语言观出发发展出了怀疑论。他认为，语言主要是服务于社会和文化实践，因而不能用于表现实在的认识论目的。但是，由于还相信语言对于人们获取知识来说是不可或缺的，他从对语言的这种不信任过渡到知识论上的怀疑论。维特根斯坦不认同这种怀疑论。"],"4.013":["“♯”与“♭”在乐谱中分别代表升调符号和降调符号。"],"4.023":["按照当代的逻辑观点，逻辑推理可以用于仅仅保证推理的有效性，而并不需要前提为真。这里维特根斯坦之所以强调，可以从假的前提得出结论，这应该是在回应弗雷格。弗雷格在早期接受这种观点，但在1910年之前的几年改变了想法，认为推理的前提只能是真的。维特根斯坦与之相识时，这个观点应该给他留下了印象。参见 Posthumous Writings. ed. Hans Hermes, Friedrich Kambartel, and Friedrich Kaulbach. trans. Peter Long and Roger White. Chicago: University of Chicago Press, 1979, p.180; 261."],"4.032":["“Ambulo”在拉丁文中表示“我步行”，而“Ambulas”则表示“你步行”，“Curro”意为“我奔跑”。"],"4.0411":["“Alg”当为德文词“普遍性”（Allgemeinheit）一词的缩写形式。","本书中出现的“概括”一词都是从逻辑上讲的，在这种意义上，概括就是使用量词（全称量词和存在量词）。含有量词的句子就是概括句。"],"4.063":["在弗雷格的逻辑系统中，一个判断就是断定某个命题是真的。如果命题仅仅是作为内容被给出而未被断定，那就被称为一个“设定”。在推理中，一个命题如果不是其他命题的成分，那就总是以被断定为真的方式出现，在弗雷格的系统中就要加上断定符“⊦”。故而有命题的动词是“是真的”一说。当代数理逻辑中仍然沿用断定符。关于断定符的进一步评论，参见4.442。"],"4.121":["关于这一部分的解释，可参见译后记。"],"4.1252":["在弗雷格和罗素的数学基础研究中，数都是通过“后继”定义的。直观地说，在一个序列中，如果一个项位于另外一个项后面（“后面”这个概念通常用可以传递的非对称关系来定义），那么它就是后面那个项的后继。"],"4.126":["在弗雷格那里，“概念”一词不同于我们通常所说的概念，而是谓词所指的东西，它对应于性质或关系，但不等于性质和关系。比如，在“苏格拉底是要死的”这个句子中，谓词“是要死的”所指称的就是概念。弗雷格意义上的概念在维特根斯坦这里被称为“真正的概念”，但不是形式概念。在本书中，“概念”一词有时在这种专门意义上使用，有时又用于一般意义。请读者自行分辨。","“旧的逻辑”应当是指弗雷格和罗素所建立的数理逻辑。","在弗雷格那里，如果一个对象具备与一个概念相对应的性质，就称这个对象“落于这个概念之下”。比如，如果苏格拉底是要死的，那么苏格拉底就落于“要死的”这个概念之下。"],"4.1272":["在弗雷格那里，谓词，也就是指称概念的词，也被称为“概念词”。","在弗雷格和罗素那里，“类”指可以用谓词来加以定义的集合。函项和类均是需要用谓词来确定的。这里是在说弗雷格和罗素允许用普通谓词来表达形式概念。比如用“是一个复合物”这样的谓词来说 aRb 是一个复合物。但在维特根斯坦这里但复合物是一个形式概念，因而不能用谓词来确定或表达。"],"4.12721":["在一个逻辑系统中，初始概念是那些不加定义的概念，其他概念都是用初始概念定义的。按照罗素的逻辑哲学，落于初始概念之下的对象必须被承认是存在的。这样，其他概念的对象是什么，就可以用这些已经存在的对象来解释。"],"4.1273":["就以弗雷格为例来说明。在《算术基础》第76节，弗雷格说明了 b 是 a 的后继（ b 和 a 都是数）是如何表达的。用非形式的方式来叙述大意就是，存在一个概念 F 和对象 x ， x 落于 F 之下， b 是落于概念 F 之下的对象的数， a 则是“落于 F 之下但不是 x ”这个概念的数，在这种情况下， b 就是 a 的（直接）后继。这个定义中使用了量词，因而是概括命题，同时也使用了表示形式概念的词来充当谓词。"],"4.431":["弗雷格对表达式和句子的意义区分了Sinn和Bedeutung，名称（即经过分析后充当主目的词语）的Bedeutung是其所指称的对象，句子的Bedeutung则是真值。后来他又把句子当作名称，故而把真值当作对象。"],"4.441":["这里所说的横线、竖线以及括号是指用真值表来定义真值函项的几种形式。前面的表格以及后面的4.442以及5.101给出的就是这种形式。这里所说的“逻辑对象”是出现在弗雷格和罗素那里的概念。在弗雷格那里是指通过逻辑的手段构造出来的对象，在罗素那里则是逻辑常项所指称的对象。这里应该主要针对罗素。罗素认为一些逻辑函项指称了对象，即与命题结合的性质或者关系。这是些实际存在的东西。"],"4.442":["参见4.063以及相应注释。"],"4.461":["关于“sinnlos”一词的翻译，参见3.24注释。"],"4.463":["“刚体”是力学术语，指不可变形的物体。刚体实际上是不存在的，是为了计算方便而假定存在的理想物体。"],"5.02":["“Beschreibung/description”在汉语文献中也被译为“描述语”，意为包含了描述性成分的、指称单个对象的名词词组。比如“太阳系最大的行星”就是一个摹状词。"],"5.252":["这一节提到了罗素的类型论。维特根斯坦认为不同的逻辑类型可以构成一个形式序列，其中每个类型都是形式序列中的一个项。罗素认为量词在用于不同类型的对象时意义是不同的。由于把逻辑命题理解为普遍命题，罗素不得不认为不同类型的命题适用于不同的逻辑命题，因此有多少逻辑类型，就有多少个矛盾律。但这显然很不方便，于是他又希望同样的普遍命题（特别是逻辑命题）同时适用于所有类型。"],"5.451":["参见《算术的基本原则》（ Grundgesetze der Arithmetik ）第33节，第56－65节等处。弗雷格要求定义是完全的，也就是说，被定义的概念（弗雷格那种意义上的）对任何对象是否为真，都要确定下来。此外，他还严禁分情况定义。"],"5.473":["这句话与前一句的联系在于，按照罗素的思考方式，初始记号的意义来自语言之外，是由世界中有什么决定的，而前面实际上否定了所有以常项形式出现的逻辑初始记号，这就表明逻辑并不受制于世界中的存在物。逻辑是自主的。这句话在德文中含有自己为自己负责的意思。"],"5.4731":["罗素把自明性归为一种直觉知识，并一度认为一种自明性可以保证不可错的知识。参见《哲学问题》（ The Problems of Philosophy ）第八章。"],"5.4733":["在《算术的基本原则》（ Grundgesetze der Arithmetik ）中（例如第32节等处），弗雷格采纳了一种原则来保证构造出的句子确实表达的含义，方法就是通过保证句子中的词语都有指称，并且词语都按照正确的方式组合成句子。维特根斯坦采取了相反的理解方式，即只要是能够写出来的句子，就都可以通过设定指称的方式来使其具备正确的结构。他并不承认存在独立有效的合法性标准。","“相同”通常表示关系。关系用二元或多元谓词表示，表示性质则是一元谓词。维特根斯坦的例子利用了这个区别。"],"5.521":["应该说，并没有直接的证据表明弗雷格和罗素用了合取或析取来定义量化句。不过，维特根斯坦的意思应该还是清楚。比如，当用“ f ( a )˄ f ( b )˄ f ( c )˄……”（其中 a 、 b 、 c 等是 x 所取之值的名称）来定义“∀ xf ( x )”，我们用了省略号，意思是，对“ x ”的所有值来说“ f ( x )”都是真的，这就使用了“所有”一词。"],"5.524":["这里的意思不是说，对对象和命题的列举就确定了所有对象和命题，而是说，给出这种列举也就给出了相应的原型，而原型让我们知道所有的对象和基本命题是什么。"],"5.525":["对于模态词“可能的”和“必然的”，弗雷格与罗素的解释都与当代的用可能世界的解释不同。罗素把模态词解释成命题函项的谓词，“ f ( x )是可能的”是指对 x 的有些值“ f ( x )”是真的，“ f ( x )是必然的”意思是，对 x 的所有值“ f ( x )”都是真的。参见《逻辑与知识》，苑莉均译，商务印书馆，1996年，第279页以下。"],"5.526":["如果补全，这句话的意思应该是，对于常规的表达“ f ( a )”，可以用概括句“有且仅有一个 x ， f ( x )”。"],"5.5302":["罗素曾经用“不可区分物同一”这一原则来定义等同，也就是说，如果a和b的所有性质相同，那么它们就是同一个东西。参见“The Theory of Logical Types”（in The Collected Papers of Bertrand Russell vol.6: Logical and philosophical papers, 1909－13 , John G. Slater et al. ed., Routledge, 1992），pp.24－25。这一原则和“同一物不可区分”原则一起，也被称为“莱布尼茨律”。"],"5.535":["在《数学原理》中，为了使罗素给出的逻辑系统成立，必须假定世界中有无穷多个对象。这一点通过设置无穷公理得到满足，但这样逻辑也就不再是先验的了。"],"5.5351":["参见《数学的原则》（ Principles of Mathematics ）第16节。在《数学原理》中，罗素放弃了这种定义，而把“基本命题”当作初始概念。"],"5.541":["在罗素和摩尔那里，这类句子被认为表达了“命题态度”（propositional attitudes），即一个人（或他的心灵）与一个命题之间的关系。“命题态度”这个术语至今仍然沿用。"],"5.5422":["这里提到的应当是罗素著名的多重关系理论，这是一种判断理论，按照这种理论，命题是不需要的。参见《逻辑原子主义哲学》（载于《逻辑与知识》，苑莉均译，商务印书馆，1996年），第260页以下。"],"5.5521":["这段颇为费解的话应该预设了，要把逻辑运用于世界，就得承认逻辑依赖于世界（在世界是“什么”而不是“如何”的意义上），也就是说，的确是有了世界才会有一种逻辑。读者可把这里表达的思想与前面5.473对比一下，看是否有冲突。"],"5.553":["罗素曾经表达过这样一种想法：对于特定数目的关系项，总是存在一种最为简单的关系，这些关系项的数目决定了这种关系的形式。比如，对于三个关系项 A 、 B 、 C ，将其联系到一起的可以是 A 与 B 之间的父子关系和 A 与 C 之间的母子关系，也可以是 A 为了 C 而忌妒 B 这样一种关系。后一种关系是最简单的形式，因此，“……为了……而忌妒……”所表示的关系是一种三元关系。总之，一种关系的形式是由它作为最简单的关系所能联系的项数决定的。参见罗素，《我们关于外间世界的知识》，陈启伟译，上海译文出版社，1990年，第39－40页。"],"5.5561":["这里和5.556中所说的“等级系统”都是指通过真值操作获得的句子系统，其基础为基本命题，上层句子是下层句子的真值函项。这个系统同时也是形式序列。参见5.25及以下。"],"6.022":["“数变元”一词原文为“die variable Zahl”，直译为“变化的数”。这在学理上说不通。数都是确定的，没有变化的数一说。另外，把形式概念理解为变元，这是前面已经采取过的方式（例如4.1271）。因此，译者怀疑原文为笔误，或者是一种松散的说法，故而译为“数变元”，即在数中取值的变元。"],"6.031":["类是弗雷格和罗素用来定义自然数的基础概念。"],"6.123":["参见5.252注释。"],"6.1232":["在罗素的分支类型论中，命题函项和主目都被区分成不同类型，只有特定的搭配才能构成合法的命题，这样才得以避免悖论。参与这种合法搭配的函项被称为“直谓函项”。可还原公理是说，任何一个函项都可以有一个与之外延等价的直谓函项。有了可还原公理，就可以用命题函项来定义类。可还原公理是否是逻辑命题，这一点备受争议。关于可还原公理，可以参见《数理哲学导论》（晏成书译，商务印书馆，1982年）第178－179页。在那里，可还原公理被译为“还原公理”。"],"6.1263":["这里涉及两个区别，一个是逻辑命题与普通句子的区别（参见4.46－4.4661），另外一个则是两种证明的区别，一种证明只利用逻辑推理规则，另外一种则还需要逻辑命题为前提。"],"6.1271":["弗雷格没有把自明性当作衡量逻辑公理的正式标准，但在论述中常诉诸自明性。"],"6.13":["4.121和5.511也联系到了镜子的比喻。镜面与图画一样，通过反射光线来表现事物。因此，图像显示一些东西，这与镜子的反映是类似的。镜子形成的镜像是二维的，但它表现有深度的图景。这里的镜像就是所显示的东西，而表现的图景相当于被言说的东西。进一步的解释参见译后记。"],"6.232":["弗雷格在语言哲学中做出的奠基性贡献，就是区分了语言的含义（Sinn）与指称（Bedeutung）。在《论含义与指称》这篇经典文章中，这个区分就是通过讨论等式为什么能够传达知识内容做出的。"],"6.2331":["关于“实验”一词的意义，可以对照4.031。实验是一种只控制过程而结果开放的操作活动。实验就是要在过程得到控制的情况下，看能得到什么结果。"],"6.361":["维特根斯坦这里应该是对赫兹的一个想法的延伸。赫兹在《力学原理》（ The Principle of Mechanics ）第109、第110节表达了这样一个观点：力学定律在质点系统的各点间建立的联系将排除掉一些可能的位移，这样，就可以从可能位移被排除的情况中，看出那种联系的存在。在维特根斯坦这里，可能性的排除与确定性的获得是同时的，而确定性则是可思考性的前提。"],"6.36111":["在《未来形而上学导论》第13节，康德提出了这样一个问题：为什么一些空间对象就内部性质来说是完全一样的，但不能放到同一个空间中？用几何学的术语来说就是，为什么有些全等的图形不能重合。康德自己给出了一个回答，他把不能重合归咎于对象（物自体）与主体的感性之间的关系。维特根斯坦引入这个问题，应该是联系到前面6.3611最后一段谈到的对称性。"],"6.43":["本书一开始，世界作为事实的总体出现，现在则作为界限出现。请注意其中的区别和联系。"]}},"noteCounts":{"en":131,"zh":10,"zh_wang":8,"zh_huang":69}}</script>
    <script>
      const payload = JSON.parse(document.querySelector('#data').textContent);
      payload.note = payload.note.replace('双击节点气泡显示多译本正文和原书注释', '点击序号旁的图标按钮显示多译本正文和原书注释；双击正文只用于选择文字；树图区域支持双指缩放');
      const tree = document.querySelector('#tree');
      const canvas = document.querySelector('.canvas');
      const note = document.querySelector('#note');
      const search = document.querySelector('#search');
      const langPicker = document.querySelector('#langPicker');
      const font = document.querySelector('#font');
      const zoomOut = document.querySelector('#zoomOut');
      const zoomIn = document.querySelector('#zoomIn');
      const zoomReset = document.querySelector('#zoomReset');
      const zoomValue = document.querySelector('#zoomValue');
      const toggle = document.querySelector('#toggle');
      const sourceNotesToggle = document.querySelector('#sourceNotesToggle');
      const exportNotes = document.querySelector('#exportNotes');
      const importNotes = document.querySelector('#importNotes');
      const importFile = document.querySelector('#importFile');
      const allNodes = flatten(payload.tree);
      const nodeByNumber = new Map(allNodes.map(node => [node.number, node]));
      const annotationStorageKey = 'tractatus-tree-reader-annotations-v1';
      const languageOrderStorageKey = 'tractatus-tree-reader-language-order-v1';
      const selectedLanguagesStorageKey = 'tractatus-tree-reader-selected-languages-v1';
      const zoomStorageKey = 'tractatus-tree-reader-zoom-v1';
      const expandedNodesStorageKey = 'tractatus-tree-reader-expanded-nodes-v1';
      const expandedTranslationsStorageKey = 'tractatus-tree-reader-expanded-translations-v1';
      const centerCardStorageKey = 'tractatus-tree-reader-center-card-v1';
      const expandableNodeNumbers = allNodes.filter(node => node.children.length).map(node => node.number);
      const expandedNodes = loadExpandedSet(expandedNodesStorageKey, ['root', '2', '2.2'], value => {
        return value === 'root' || nodeByNumber.has(value);
      });
      const expandedTranslations = loadExpandedSet(expandedTranslationsStorageKey, [], value => {
        return nodeByNumber.has(value);
      });
      const zoomMin = 10;
      const zoomMax = 160;
      const zoomStep = 10;
      let treeZoom = loadZoom();
      const annotations = loadAnnotations();
      const languageOrder = Object.keys(payload.labels);
      const sourceNotes = payload.notes || {};
      // Canonical terms come from the Oxford edition glossary, supplemented by
      // fixed phrases whose complete English wording appears in the propositions.
      const zhGlosses = [
        ['真正的概念', 'real concept'],
        ['命题结构', 'propositional structure'],
        ['命题记号', 'propositional sign'],
        ['命题符号', 'propositional sign'],
        ['命题变项', 'propositional variable'],
        ['命题变元', 'propositional variable'],
        ['形式概念', 'formal concept'],
        ['形式属性', 'formal property'],
        ['形式性质', 'formal property'],
        ['形式系列', 'form-series'],
        ['形式序列', 'form-series'],
        ['真正概念', 'real concept'],
        ['专有概念', 'real concept'],
        ['固有概念', 'real concept'],
        ['逻辑记号法', 'concept-script'],
        ['概念文字', 'concept-script'],
        ['内部关系', 'internal relation'],
        ['内在关系', 'internal relation'],
        ['外部关系', 'external relation'],
        ['外在关系', 'external relation'],
        ['真值函项', 'truth-function'],
        ['真值函数', 'truth-function'],
        ['主目位置', 'argument-place'],
        ['符号语言', 'sign-language'],
        ['记号语言', 'sign-language'],
        ['初始概念', 'primitive idea'],
        ['伪命题', 'pseudo-proposition'],
        ['伪概念', 'pseudo-concept'],
        ['逻辑形式', 'logical form'],
        ['基本命题', 'elementary proposition'],
        ['逻辑空间', 'logical space'],
        ['简单记号', 'simple sign'],
        ['重言式', 'tautology'],
        ['矛盾式', 'contradiction'],
        ['复合物', 'complex'],
        ['事态', 'state-of-things'],
        ['事实', 'fact'],
        ['事情', 'case'],
        ['事物', 'thing'],
        ['对象', 'object'],
        ['名称', 'name'],
        ['命题', 'proposition'],
        ['实体', 'substance'],
        ['形式', 'form'],
        ['结构', 'structure'],
        ['配置', 'configuration'],
        ['图像', 'pictures'],
        ['实在', 'reality'],
        ['意义', 'sense'],
        ['指谓', 'meaning/reference'],
        ['表达式', 'expression'],
        ['原型', 'prototype'],
        ['主目', 'argument'],
        ['函项', 'function'],
        ['函数', 'function'],
        ['概念', 'concept'],
        ['记号', 'sign'],
      ];
      const zhGlossMap = new Map(zhGlosses);
      const zhGlossPattern = new RegExp(
        zhGlosses
          .map(([term]) => term)
          .sort((a, b) => b.length - a.length)
          .map(term => term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))
          .join('|'),
        'g'
      );
      let showSourceNotes = true;
      let draggedLangOption = null;
      let centerSaveTimer = null;
      let restoringCenterCard = false;

      function annotationCount() {
        return Object.values(annotations).filter(value => String(value || '').trim()).length;
      }

      function sourceNoteCount() {
        return Object.values(sourceNotes).reduce((sum, byNumber) => {
          return sum + Object.values(byNumber || {}).reduce((inner, notes) => inner + notes.length, 0);
        }, 0);
      }

      function updateNote() {
        note.textContent = `${payload.note} 共 ${payload.counts.total} 个命题节点，原书注释 ${sourceNoteCount()} 条。已保存 ${annotationCount()} 条批注。`;
      }

      function loadAnnotations() {
        try {
          const raw = localStorage.getItem(annotationStorageKey);
          return raw ? JSON.parse(raw) || {} : {};
        } catch {
          return {};
        }
      }

      function saveAnnotations() {
        try {
          localStorage.setItem(annotationStorageKey, JSON.stringify(annotations));
          updateNote();
          return true;
        } catch {
          note.textContent = '批注保存失败：当前浏览器可能禁用了本地存储。';
          return false;
        }
      }

      function loadExpandedSet(storageKey, fallback, isValid) {
        try {
          const raw = localStorage.getItem(storageKey);
          if (raw === null) return new Set(fallback);
          const saved = JSON.parse(raw);
          if (!Array.isArray(saved)) return new Set(fallback);
          return new Set(saved.filter(value => typeof value === 'string' && isValid(value)));
        } catch {
          return new Set(fallback);
        }
      }

      function saveExpandedState() {
        try {
          localStorage.setItem(expandedNodesStorageKey, JSON.stringify([...expandedNodes]));
          localStorage.setItem(expandedTranslationsStorageKey, JSON.stringify([...expandedTranslations]));
        } catch {
          // Expansion remains available for this session when storage is unavailable.
        }
      }

      function allBranchesExpanded() {
        return expandedNodes.has('root')
          && expandableNodeNumbers.every(number => expandedNodes.has(number));
      }

      function syncExpandAllButton() {
        toggle.textContent = allBranchesExpanded() ? '收起全部' : '展开全部';
      }

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, char => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
        }[char]));
      }

      function flatten(nodes, out = []) {
        for (const node of nodes) {
          out.push(node);
          flatten(node.children, out);
        }
        return out;
      }

      function nodeText(node) {
        const noteText = languageOrder.flatMap(code => sourceNotes[code]?.[node.number] || []);
        return [node.number, ...languageOrder.map(code => node.texts[code] || ''), ...noteText, annotations[node.number] || ''].join(' ').toLowerCase();
      }

      function matches(node, query) {
        if (!query) return true;
        return nodeText(node).includes(query.toLowerCase());
      }

      function branchMatches(node, query) {
        return matches(node, query) || node.children.some(child => branchMatches(child, query));
      }
