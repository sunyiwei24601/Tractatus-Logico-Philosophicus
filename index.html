ruth-operation that, in the same way as elementary propositions give rise to their truth-function, truth-functions give rise to a new one. Every truth-operation generates, from truth-functions of elementary propositions, another truth-function of elementary propositions, a proposition. The result of every truth-operation on the results of truth-operations on elementary propositions is also the result of one truth-operation on elementary propositions. Every proposition is the result of truth-operations on elementary propositions.","de":"Alle Sätze sind Resultate von Wahrheitsoperationen mit den Elementarsätzen. Die Wahrheitsoperation ist die Art und Weise, wie aus den Elementarsätzen die Wahrheitsfunktion entsteht. Nach dem Wesen der Wahrheitsoperation wird auf die gleiche Weise, wie aus den Elementarsätzen ihre Wahrheitsfunktion, aus Wahrheitsfunktionen eine Neue. Jede Wahrheitsoperation erzeugt aus Wahrheitsfunktionen von Elementarsätzen wieder eine Wahrheitsfunktion von Elementarsätzen, einen Satz. Das Resultat jeder Wahrheitsoperation mit den Resultaten von Wahrheitsoperationen mit Elementarsätzen ist wieder das Resultat Einer Wahrheitsoperation mit Elementarsätzen. Jeder Satz ist das Resultat von Wahrheitsoperationen mit Elementarsätzen.","zh_wang":"一切命题都是基本命题真值运算的结果。 真值运算是从基本命题产生真值函项的方法。 按照真值运算的本性，用从基本命题产生它们的真值函项一样的办法，也可以从真值函项产生一个新的真值函项。每个真值运算都从基本命题的真值函项再创造出基本命题的另外一个真值函项，即一个命题。对在基本命题的真值运算的结果所作的真值运算的结果，也是对基本命题的一个真值运算的结果。 每个命题都是对基本命题的真值运算的结果。","zh_huang":"所有句子都是对基本命题进行真值操作的结果。 真值操作是从基本命题得到真值函项的方法。 真值操作本质上就是不仅要从基本命题得到其真值函项，而且要以同样的方式，从真值函项得到新的真值函项。当对基本命题的真值函项运用真值操作，就总是得到基本命题另外的真值函项，即另一个句子。当对基本命题的真值操作结果再次运用真值操作，总是有对基本命题进行的单次操作，会得到与之相同的结果。 所有句子都是对基本命题进行真值操作的结果。"},"children":[{"number":"5.31","texts":{"zh":"即使“p”、“q”、“r”等等不是基本命题，4.31的图式也是有指谓的。 容易看出，即使“p”和“q”是基本命题的真值函项，4.442中的命题记号也仍然是表达基本命题的一个真值函项。","en":"The schemata in 4.31 also have a meaning, then, when ‘p’, ‘q’, ‘r’, etc. are not elementary propositions. And it is easy to see that the propositional sign in 4.442 expresses one truth-function of elementary propositions even when ‘p’ and ‘q’ are truth-functions of elementary propositions.","de":"Die Schemata No. 4.31 haben auch dann eine Bedeutung, wenn „p“, „q“, „r“, etc. nicht Elementarsätze sind. Und es ist leicht zu sehen, dass das Satzzeichen in No. 4.442, auch wenn „p“ und „q“ Wahrheitsfunktionen von Elementarsätzen sind, Eine Wahrheitsfunktion von Elementarsätzen ausdrückt.","zh_wang":"即使“p ”、“q ”、“r ”等都不是基本命题，那么4.31的图式也是有指谓的。 很容易看出，即使在“p ”和“q ”是基本命题的真值函项的时候，4.42中的命题符号表达的仍是基本命题的一个真值函项。","zh_huang":"在4.31的表中，即使“p”“q”“r”等不是基本命题，表格还是有意义的。 容易看出，即使4.442中的“p”和“q”是基本命题的真值函项，这个表还是表达了基本命题的一个真值函项。"},"children":[]},{"number":"5.32","texts":{"zh":"所有真值函项都是把有限数量的真值运算连续应用于基本命题的结果。","en":"All truth-functions are results of the successive application of a finite number of truth-operations to elementary propositions.","de":"Alle Wahrheitsfunktionen sind Resultate der successiven Anwendung einer endlichen Anzahl von Wahrheitsoperationen auf die Elementarsätze.","zh_wang":"一切真值函项都是将有限数目的真值运算连续应用于基本命题的结果。","zh_huang":"所有真值函项都是对基本命题运用真值操作的有限次迭代的结果。"},"children":[]}]},{"number":"5.4","texts":{"zh":"这就表明，没有（在弗雷格和罗素的意义上的）“逻辑对象”或“逻辑常项”。","en":"This shows that there are no ‘logical objects’, no ‘logical constants’ (in Frege’s and Russell’s sense).","de":"Hier zeigt es sich, dass es „logische Gegenstände“, „logische Konstante“ (im Sinne Freges und Russells) nicht gibt.","zh_wang":"这就清楚表明，没有（罗素和弗雷格所说意义上的）“逻辑对象”或“逻辑常项”","zh_huang":"这样，没有“逻辑对象”或“逻辑常项”（在弗雷格和罗素的意义上）这样的东西，也就是明显的。"},"children":[{"number":"5.41","texts":{"zh":"因为：所有的对于真值函项的真值运算结果，只要它们是基本命题的同一个真值函项，就都是等同的。","en":"For all results of truth-operations on truth-functions are identical whenever they are one and the same truth-function of elementary propositions.","de":"Denn: Alle Resultate von Wahrheitsoperationen mit Wahrheitsfunktionen sind identisch, welche eine und dieselbe Wahrheitsfunktion von Elementarsätzen sind.","zh_wang":"因为进行真值运算的真值函项，只要是基本命题的同一个真值函项，所有那些真值运算的结果就是等同的。","zh_huang":"因为，对真值函项进行真值操作，只要是基本命题的同样的真值函项，其结果也就总是相同的。"},"children":[]},{"number":"5.42","texts":{"zh":"显然，∨、⊃等等不是右和左等等那种意义上的关系。 弗雷格和罗素的逻辑“初始记号”的交叉定义已足以表明，它们不是初始记号，更不是关系的记号。 显然，通过“～”和“∨”定义的“⊃”和在“∨”的定义中与“～”一起出现的那个“⊃”是等同的；而且后面这个“∨”与前一个“∨”也是等同的，如此等等。","en":"That v, ⊃, etc. are not relations in the sense of right and left, etc., is evident. The interdefinability of Frege’s and Russell’s ‘primitive signs’ of logic shows in itself that these are not primitive signs and, even more, that they do not signify relations. And it is obvious that the ‘⊃’ that we define by means of ‘~’ and ‘v’ is identical with the one by means of which, with ‘~’, we define ‘v’, and that this ‘v’ is identical with the first; and so on.","de":"Dass ∨, ⊃, etc. nicht Beziehungen im Sinne von rechts und links etc. sind, leuchtet ein. Die Möglichkeit des kreuzweisen Definierens der logischen „Urzeichen“ Freges und Russells zeigt schon, dass dies keine Urzeichen sind, und schon erst recht, dass sie keine Relationen bezeichnen. Und es ist offenbar, dass das „⊃“, welches wir durch „∼“ und „∨“ definieren, identisch ist mit dem, durch welches wir „∨ “ mit „∼“ definieren und dass dieses „∨“ mit dem ersten identisch ist. U. s. w.","zh_wang":"显然，v、⊃，等等，不是右和左等等那样意义上的关系。 弗雷格和罗素可以提出逻辑“初始符号”的交叉定义就已经表明，它们不是初始符号，并且不表示任何关系。 显然，我们通过“～”和“v”来定义“⊃”和在“v”的定义中与“～”一起出现的那个“⊃”是等同的，而且这个“v”与前一个“v”也是等同的，如此等等。","zh_huang":"˅、➛等不是左与右那种意义上的关系，也是显然的。 弗雷格和罗素的“初始记号”可以交叉定义，这足以表明它们不是初始记号，更不是关系记号。 显然，用“~”和“˅”来定义的“➛”，与用来和“~”一起定义“˅”的是同一个东西，而第二个“˅”与第一个“˅”也是同一个东西，等等。"},"children":[]},{"number":"5.43","texts":{"zh":"从一个事实p会得出无数其它事实，即～～p，～～～p等等，这看起来有点令人难以置信。同样使人惊讶的是，无数的逻辑（数学）命题是从半打“初始命题”得出来的。 但是一切逻辑命题之所说都是相同的，即什么也没有说。","en":"It is surely hard to believe that from one fact p infinitely many others should follow, namely, ~~p, ~~~~p, etc. And no less remarkable is it that the infinite number of propositions of logic (mathematics) follow from half a dozen ‘primitive propositions’. All propositions of logic, however, say the same. Namely, nothing.","de":"Dass aus einer Tatsache p unendlich viele andere folgen sollten, nämlich ∼∼p, ∼∼∼∼p, etc., ist doch von vornherein kaum zu glauben. Und nicht weniger merkwürdig ist, dass die unendliche Anzahl der Sätze der Logik (der Mathematik) aus einem halben Dutzend „Grundgesetzen“ folgen. Alle Sätze der Logik sagen aber dasselbe. Nämlich Nichts.","zh_wang":"从一个事实p 可以得出无限多个其它的事实，即～～p ，～～～～p 等等，这确实有些难以相信。同样令人惊讶的是，无限多的逻辑（数学）命题是可以从半打“基本命题”得出来的。 但是一切逻辑命题都在说相同的事情，即什么都没有说。","zh_huang":"从一个事实p推出无穷多不同的事实，即~~p、~~~~p，等等，这真的让人无法相信。你也难以相信，从半打“初始命题”居然能推出无穷多的逻辑（数学）命题。 其实，所有逻辑命题说的都是同样的事情，也就是什么都没说。"},"children":[]},{"number":"5.44","texts":{"zh":"真值函项不是实质函项。 例如，肯定可以由双否定产生，因此否定是否在某种意义上就包含在肯定之中呢？“～～p”是否定～p，还是肯定p，还是两者都是呢？ 命题“～～p”并不是把否定作为一个对象而与之相关；而另一方面，否定的可能性在肯定中又是早就预定了的。 而且，如果存在一个称为“～”的对象，那么就会得出，“～～p”说了某种不同于“p”所说的东西。这是因为一个命题涉及“～”，而另一个命题则否。","en":"Truth-functions are not material functions. If an affirmation, for example, can be generated by double negation, then is negation—in some sense—contained in affirmation? Does ‘~~p’ negate ~p, or does it affirm p, or both? The proposition ‘~~p’ is not concerned with negation as if it were an object; but the possibility of negation is certainly already presupposed in affirmation. And if there were an object called ‘~’, then what ‘~~p’ and ‘p’ say would have to be different. For the one proposition would then be concerned with ~, the other not.","de":"Die Wahrheitsfunktionen sind keine materiellen Funktionen. Wenn man z. B. eine Bejahung durch doppelte Verneinung erzeugen kann, ist dann die Verneinung – in irgend einem Sinn – in der Bejahung enthalten? Verneint „∼∼p“ ∼p, oder bejaht es p; oder beides? Der Satz „∼∼p“ handelt nicht von der Verneinung wie von einem Gegenstand; wohl aber ist die Möglichkeit der Verneinung in der Bejahung bereits präjudiziert. Und gäbe es einen Gegenstand, der „∼“ hiesse, so müsste „∼∼p“ etwas anderes sagen als „p“. Denn der eine Satz würde dann eben von ∼ handeln, der andere nicht.","zh_wang":"真值函项不是实质函项。 例如，如果一个肯定可以由双重否定产生，那么否定在某种意义上是否就包含在肯定之中呢？ “～～p ”是否定～p ，还是肯定p ？或者两者都是呢？ 命题“～～p ”并没有把否定当作一个对象来对待；但是否定的可能性在肯定中却早就被预定了。 而且，如果有一个被叫做“～”的对象，那么“～～p ”就要说出不同于“p ”的东西。因为一个命题会涉及“～”，而另一个命题则不会。","zh_huang":"真值函项不是实质性的函项。 比如，双重否定就得到肯定，这不就意味着在某种意义上否定就包含在肯定中吗？“~~p”是在否定~p，还是在肯定p，还是兼而有之？ 句子“~~p”不是像谈论对象一样在谈论否定，而应当说，否定的可能性已经预先包含在肯定中。 如果有种被称为“~”的对象，那么“~~p”就在说与“p”不同的东西，因为一个句子在谈论~，而另一个则没有。"},"children":[{"number":"5.441","texts":{"zh":"这些表面的逻辑常项的这种消失，也发生于“～（Ǝ x）・～fx”的情形，它与“（x）・fx”的所说是一样的；或者也发生于“（Ǝ x）・fx・x＝a”的情形，它与“fa”说的是一回事情。","en":"This vanishing of the apparent logical constants also occurs where ‘~(∃x).~fx’ says the same as ‘(x).fx’, or ‘(∃x). fx.x = a’ the same as ‘fa’.","de":"Dieses Verschwinden der scheinbaren logischen Konstanten tritt auch ein, wenn „∼(∃x). ∼fx“ dasselbe sagt wie „(x). fx“, oder „(∃x). fx. x = a“ dasselbe wie „fa“.","zh_wang":"如果“～（ョx ）.～ƒx ”与“（x ）.ƒx ”说的一样，或者“（ョx ）.ƒx .x =a ”与“ƒa ”说的一样，那么表面逻辑常项这种消失也会发生。","zh_huang":"表面上的逻辑常项的这种消失也出现在“~∃x~f(x)”的情况下，它所说的内容与“∀xf(x)”相同；还出现在“∃x[f(x)˄x=a]”的情况下，它所说的内容与“f(a)”相同。"},"children":[]},{"number":"5.442","texts":{"zh":"如果给定一个命题，那么以它为基础的一切真值运算的结果也随之 给定。","en":"If a proposition is given to us, then with it are also given the results of all truth-operations that have it as their base.","de":"Wenn uns ein Satz gegeben ist, so sind mit ihm auch schon die Resultate aller Wahrheitsoperationen, die ihn zur Basis haben, gegeben.","zh_wang":"如果给出一个命题，那么也就同时给出以它为基础的一切真值运算的结果。","zh_huang":"给我一个句子，那么以之为基础的所有真值操作的结果也就一起给出了。"},"children":[]}]},{"number":"5.45","texts":{"zh":"如果有了逻辑的初始记号，那么任何正确的逻辑就必须能够清楚地表明这些记号彼此之间的相对地位，并证明它们存在的合理性。以其初始记号为基础 的逻辑的构造，必须是清楚的。","en":"If there are primitive signs of logic, then a correct logic must make clear their relation to one another and justify their occurrence. The construction of logic out of its primitive signs must become clear.","de":"Gibt es logische Urzeichen, so muss eine richtige Logik ihre Stellung zueinander klar machen und ihr Dasein rechtfertigen. Der Bau der Logik aus ihren Urzeichen muss klar werden.","zh_wang":"如果有了逻辑的初始标记，那么正确的逻辑就必须将这些标记相互之间的地位清楚地表现出来，并证明它们的存在。以初始标记为基础的逻辑结构，必须是清楚的。","zh_huang":"如果有初始的逻辑记号，那么正确的逻辑一定要清楚地表明它们的相互位置，并为其存在提供依据。如何从初始记号出发建立逻辑，一定要弄清楚。"},"children":[{"number":"5.451","texts":{"zh":"如果逻辑有一些初始概念，它们就应该是互相独立的。如果引入了一个初始概念，那么在它出现的一切结合里，它都是应该是已经引入了的。因此，它不能先对一种结合引入，尔后又对另一种结合再次引入。例如，一旦引入了否定，我们就应该既在“～p”形式的命题中理解它，也在“～（p∨q）”、“（Ǝ x）・～fx”等等这样的命题中同样地理解它。我们不应先对一类情况引入它，然后又对另一类情况引入它，因为这样一来，它的指谓在两类情况中是否相同，就值得怀疑，而且没有理由在两类情况下应用同一种记号结合方式。 （简言之，弗雷格（在《算术的基本定律》中）关于通过定义引入记号的意见，经过适当的修改，也适用于初始记号的引入。）","en":"If logic has primitive ideas, then they must be independent of one another. If a primitive idea is introduced, then it must be introduced in all combinations in which it occurs whatsoever. It cannot be introduced, that is, first for one combination and then once more for another. For example, if negation is introduced, then it must now be the case that we understand it in propositions of the form ‘~p’ as well as in propositions such as ‘~(pvq)’, ‘(∃x).~fx’, among others. We must not introduce it first for one class of cases, then for another, for it would then be left in doubt whether its meaning is the same in the two cases and there would be no reason given for using the same kind of sign-combination in the two cases. (In short, what Frege said (in Basic Laws of Arithmetic) about the introduction of signs by means of definitions also holds, mutatis mutandis, for the introduction of primitive signs.)","de":"Hat die Logik Grundbegriffe, so müssen sie von einander unabhängig sein. Ist ein Grundbegriff eingeführt, so muss er in allen Verbindungen eingeführt sein, worin er überhaupt vorkommt. Man kann ihn also nicht zuerst für eine Verbindung, dann noch einmal für eine andere einführen. Z. B.: Ist die Verneinung eingeführt, so müssen wir sie jetzt in Sätzen von der Form „∼p“ ebenso verstehen, wie in Sätzen wie „∼(p ∨ q)“, „(∃x). ∼fx“ u. a. Wir dürfen sie nicht erst für die eine Klasse von Fällen, dann für die andere einführen, denn es bliebe dann zweifelhaft, ob ihre Bedeutung in beiden Fällen die gleiche wäre und es wäre kein Grund vorhanden, in beiden Fällen dieselbe Art der Zeichenverbindung zu benützen. (Kurz, für die Einführung der Urzeichen gilt, mutatis mutandis, dasselbe, was Frege („Grundgesetze der Arithmetik“) für die Einführung von Zeichen durch Definitionen gesagt hat.)","zh_wang":"如果逻辑有一些初始概念，它们必须是互相独立的。如果引进一个初始概念，那就必定引进到它出现的一切语境中。因此，不能将它引进到一种语境，然后又引进到另一种语境中。比如，引进了否定，我们就必须在“～p ”形式的命题中理解它，就如同在类似“～（pvq ）”、“（ョx ）.～ƒx ”等等命题中理解它一样。我们不可以在一种情况下先引进它，然后又在另一种情况下引进它，因为它的指谓在两种情况下是否相同，到那时就是一个疑问了，没有任何理由在两种情况下使用同一种符号标记。 （简单说，弗雷格（在《算术的基本定律》中）提到的，关于通过定义来引进符号的说法，经过适当的修改，也可以适用于引进初始符号。）","zh_huang":"如果逻辑中有初始概念，那么这些概念一定要彼此独立。一个初始概念被引入了，那么在其所出现的所有连接中一定都要引入。因此， 它不能先在一种连接中引入，后来又在另一种连接中重新引入。例如，否定一旦被引入，那么在“~p”这种形式以及“~(p˅q)”“∃x~f(x)”等其他形式中，我们都一定要按同样的方式理解它。一定不能先为一种情况引入，然后又为另外一种情况引入。因为这样就会有人问，在两种情况下引入的概念是否有同样的意义，与此同时却没有理由在两种情况下都按同样的方式使用记号。 （简言之，弗雷格在《算术的基本原则》中就通过定义的方式引入记号所说的东西，改变一下措辞，也适用于引入初始记号的情况。）"},"children":[]},{"number":"5.452","texts":{"zh":"在逻辑的符号系统中引入任何一种新的手段都必然是一个重大事件。在逻辑中，一种新的手段不能以所谓漫不经心的态度在括号或者脚注中引入。 （如在罗素和怀特海的《数学原理》中就出现了用文字表达的定义和初始命题。为什么这里忽然出现文字呢？这是需要说明理由的，但是没有提出理由，也必然提不出理由，因为这种程序事实上是非法的。） 但是，如果证明在某处引入一种新的手段是必要的，我们就应立即追问：这种手段在哪些地方是必须 用到的？必须弄清楚它在逻辑中的地位。","en":"The introduction of a new aid into the symbolism of logic must always be an event of consequence. No new aid may be introduced in logic—with a quite innocent face, so to speak—in brackets or in the margins. (This is how definitions and primitive propositions appear in words in Russell and Whitehead’s Principia Mathematica. Why suddenly words here? Justification is needed. This is missing and is bound to be missing, since the practice is in fact illegitimate.) If the introduction of a new aid has proved necessary at a certain point, however, then the question must immediately be asked: Where must this aid now always be applied? Its place in logic must now be explained.","de":"Die Einführung eines neuen Behelfes in den Symbolismus der Logik muss immer ein folgenschweres Ereignis sein. Kein neuer Behelf darf in die Logik – sozusagen, mit ganz unschuldiger Miene – in Klammern oder unter dem Striche eingeführt werden. (So kommen in den „Principia Mathematica“ von Russell und Whitehead Definitionen und Grundgesetze in Worten vor. Warum hier plötzlich Worte? Dies bedürfte einer Rechtfertigung. Sie fehlt und muss fehlen, da das Vorgehen tatsächlich unerlaubt ist.) Hat sich aber die Einführung eines neuen Behelfes an einer Stelle als nötig erwiesen, so muss man sich nun sofort fragen: Wo muss dieser Behelf nun immer angewandt werden? Seine Stellung in der Logik muss nun erklärt werden.","zh_wang":"在逻辑符号系统中引进一个新手段的必定是有重大后果的事件。在逻辑中没有任何一个新的符号可以用一种可谓漫不经意的态度，在括号或者旁注中引进。 （因此在罗素和怀特海的《数学原理》中，就出现了用文字来表达的定义和初始命题。为什么这里忽然出现文字呢？这是需要理由说明的，但是没有理由，也不会有理由，因为这个过程事实上是不允许的。） 但是，如果在某一处已经证明引进一种新的手段是有必要的，我们就必须立刻提问：在哪些地方这种手段总是必须用到的？它在逻辑中的地位必须弄清楚。","zh_huang":"在逻辑符号系统中引入新的工具，这必然是一件大事。在逻辑中，新工具不应该在括号或者脚注中，以一种不担责任的方式引入。 （比如，在罗素与怀特海的《数学原理》中，出现了用文字表达的定义与初始命题。为什么突然出现文字了呢？这需要理由。但没有理由，其实也不会有理由，因为这其实是不合法的。） 但如果一种新工具的引入被证明在某个地方是必要的，那么我们立即就要问：“这种工具在哪里总是必须用到的？”这种工具在逻辑上的位置一定要弄清楚。"},"children":[]},{"number":"5.453","texts":{"zh":"在逻辑中一切数都需要说明理由。 或者不如说，必须弄清楚，逻辑中是没有数的。 不存在特别的数。","en":"All numbers in logic have to be justified. Or rather: it must turn out that there are no numbers in logic. There are no pre-eminent numbers.","de":"Alle Zahlen der Logik müssen sich rechtfertigen lassen. Oder vielmehr: Es muss sich herausstellen, dass es in der Logik keine Zahlen gibt. Es gibt keine ausgezeichneten Zahlen.","zh_wang":"逻辑中一切数都必须能说明理由。 或者不如说必须弄清楚，逻辑中是没有数的。 不存在特别的数。","zh_huang":"在逻辑中出现的任何数都必须要有理由。 应该说，在逻辑中不会有数，这一点必须变得清楚起来。 逻辑中没有地位特殊的数。"},"children":[]},{"number":"5.454","texts":{"zh":"逻辑中没有并列，也不可能有分类。 逻辑中不可能有普遍和特殊的区分。","en":"In logic there is no juxtaposition, there can be no classification. In logic there cannot be degrees of generality and specificity.","de":"In der Logik gibt es kein Nebeneinander, kann es keine Klassifikation geben. In der Logik kann es nicht Allgemeineres und Spezielleres geben.","zh_wang":"逻辑中没有并列，也不可能有类别。 逻辑中不可能有更一般和更特殊的区别。","zh_huang":"逻辑中没有并列，也不可能有分类。 逻辑中不可能有普遍与特殊之别。"},"children":[{"number":"5.4541","texts":{"zh":"逻辑问题的解决必定是简单的，因为它们设立了简单性的标准。 人们一直猜想，必定有一个领域，其中对问题的回答对称地——先天地——结合着而构成一个自足的系统。 这个领域遵从如下规则：简单性是真理的标志。","en":"The solutions of the problems of logic must be simple, for they set the standard of simplicity.People have always suspected that there must be a realm of questions whose answers—a priori—lie symmetrically united in a self-contained, regular structure.A realm in which the proposition holds: simplex sigillum veri.","de":"Die Lösungen der logischen Probleme müssen einfach sein, denn sie setzen den Standard der Einfachheit. Die Menschen haben immer geahnt, dass es ein Gebiet von Fragen geben müsse, deren Antworten – a priori – symmetrisch, und zu einem abgeschlossenen, regelmässigen Gebilde vereint liegen. Ein Gebiet, in dem der Satz gilt: simplex sigillum veri.","zh_wang":"逻辑问题的解决必须是简单的，因为它们规定了简单的标准。 人们经常以为必定有一个领域，其中对问题的回答——先天地——是对称的并结合成一个封闭而有规则的系统。 这是一个遵守“简单是真理的标志”这个命题的领域。","zh_huang":"逻辑问题的解决必须是简单的，因为这些解决决定了什么算作简单。 人们总会猜想，一定存在某种研究领域，对其中的问题给出的回答先验地就是对称的，并连接成自成一体的系统。 在这个领域中，简单就是真理。"},"children":[]}]}]},{"number":"5.46","texts":{"zh":"如果我们恰当地引入逻辑记号，那么我们也就同时引入了它们的一切结合——不仅“p∨q”，也有“～（p∨～q）”等等——的意义。同时我们也就引入了括号的一切可能结合的效用；因此很清楚，真正一般的初始记号不是“p∨q”、“（Ǝ x）・fx”等等，而是它们的结合的最一般形式。","en":"If the logical signs were introduced correctly, then the sense of all their combinations would thereby also have been introduced; that is, not only ‘pvq’ but also ‘~(pv~q)’, etc. etc. The effect of all possible combinations of brackets would thereby also have been introduced. And it would then have become clear that the real general primitive signs are not ‘pvq’, ‘(∃x).fx’, etc., but the most general form of their combinations.","de":"Wenn man die logischen Zeichen richtig einführte, so hätte man damit auch schon den Sinn aller ihrer Kombinationen eingeführt; also nicht nur „p ∨ q“ sondern auch schon „∼(p ∨ ∼q)“ etc. etc. Man hätte damit auch schon die Wirkung aller nur möglichen Kombinationen von Klammern eingeführt. Und damit wäre es klar geworden, dass die eigentlichen allgemeinen Urzeichen nicht die „p ∨ q“, „(∃x). fx“, etc. sind, sondern die allgemeinste Form ihrer Kombinationen.","zh_wang":"当我们正确引进逻辑符号的时候，它们的一切结合也就同时被引进：因此不但“pvq ”，而且“～（pv ～q ）”等等均被引进。随之也就引进了括号的一切可能结合的结果；因此也就很清楚：真正一般的初始符号不是“pvq ”、“（ ョx ）.ƒx ”，等等，而是它们结合的最一般的形式。","zh_huang":"如果逻辑记号是以正确的方式引入的，那么记号的所有组合也就同时引入了。比如，不仅“p˅q”，而且“~(p˅~q)”等也一起引入了。与此同时，括号所有可能的组合所产生的效果，也应当已经确定下来了。这样也就很清楚，真正一般性的初始记号不是“p˅q”“∃xf(x)”之类，而是其最为一般性的组合形式。"},"children":[{"number":"5.461","texts":{"zh":"和真实的关系不同，像∨和⊃这种逻辑的伪关系是需要用到括号的，这一点看起来不太重要，事实上却具有重大意义。 的确，对这些表面上的初始记号使用括号，本身即已表它们不是真正的初始记号。当然没有人会认为，括号具独立的指谓。","en":"Of great significance is the apparently unimportant fact that pseudo-relations in logic, such as v und ⊃, need brackets, unlike real relations. For the use of brackets with these apparently primitive signs already indicates that they are not the real primitive signs. And no one could possibly believe that brackets have an independent meaning.","de":"Bedeutungsvoll ist die scheinbar unwichtige Tatsache, dass die logischen Scheinbeziehungen, wie ∨ und ⊃, der Klammern bedürfen – im Gegensatz zu den wirklichen Beziehungen. Die Benützung der Klammern mit jenen scheinbaren Urzeichen deutet ja schon darauf hin, dass diese nicht die wirklichen Urzeichen sind. Und es wird doch wohl niemand glauben, dass die Klammern eine selbständige Bedeutung haben.","zh_wang":"与真实关系不同，类似v和⊃这些表面关系需要括号；这在表面上看并不重要，但却十分重要。 在这些表面上的初始符号使用括号，表明它们不是真正的初始符号；当然没有人会相信括号具有独立的指谓。","zh_huang":"在逻辑中像˅、➛这些看似关系的东西却不像真正的关系，它们需要括号。这个不起眼的事实实际上是重要的。 其实，这些表面上的初始记号要和括号一起使用，这表明它们不是初始记号。肯定不会有人相信，括号本身会有指称。"},"children":[{"number":"5.4611","texts":{"zh":"逻辑运算的记号是标点符号。","en":"Signs for logical operations are punctuation marks.","de":"Die logischen Operationszeichen sind Interpunktionen.","zh_wang":"逻辑运算的符号就是标点符号。","zh_huang":"逻辑操作符是标点符号。"},"children":[]}]}]},{"number":"5.47","texts":{"zh":"很清楚，关于一切命题的形式，凡是我们事先 可以说的，我们必须能够一下子 都说出来。 实际上基本命题自身已经包含了全部逻辑运算。因为“fa”与“（Ǝ x）・fx・x＝a”所说的完全一样。 凡有组合的地方，就有主目和函项，而有了这些就已经有了全部的逻辑常项。 可以说，唯一的逻辑常项就是一切 命题根据它们的本性所彼此共有的东西。 而这就是一般的命题形式。","en":"It is clear that everything that can be said from the outset about the form of all propositions must be capable of being said all at once. For all logical operations are already contained in the elementary proposition. For ‘fa’ says the same as ‘(∃x).fx.x = a’. Where there is compositionality, there is argument and function, and where these are, there are already all logical constants. One could say: the one logical constant is what all propositions, by their nature, have in common with one another. But that is the general propositional form.","de":"Es ist klar, dass alles was sich überhaupt von vornherein über die Form aller Sätze sagen lässt, sich aufeinmal sagen lassen muss. Sind ja schon im Elementarsatze alle logischen Operationen enthalten. Denn „fa“ sagt dasselbe wie „(∃x). fx. x = a“. Wo Zusammengesetztheit ist, da ist Argument und Funktion, und wo diese sind, sind bereits alle logischen Konstanten. Man könnte sagen: Die Eine logische Konstante ist das, was alle Sätze, ihrer Natur nach, mit einander gemein haben. Das aber ist die allgemeine Satzform.","zh_wang":"显然，凡是对一切命题的形式能预先说出来的，都可以一下子说出来。 因为一切逻辑运算都已经包含在基本命题中。因为“ƒa ”与“（ョx ）.ƒx .x =a”所说的一样。 有组合的地方，就有主目和函项，而有了这些主目和函项，就有了一切逻辑常项。 可以说，唯一的逻辑常项就是一切命题根据它们的本性，彼此所共有的东西。 而这就是一般的命题形式。","zh_huang":"很清楚，关于所有句子的形式，只要是事先能够说出的东西，都一定能一次性地说出来。 基本命题本身确实就已经包含了所有的逻辑操作，因为，“f(a)”说了与“∃x[f(x)˄x=a]”同样的东西。 只要是组合而成的，就有主目与函项之分；只要有主目与函项，所有的逻辑常项也就都有了。 可以说，唯一的逻辑常项，就是所有句子就其本性来说彼此共有的东西。 而这就是句子的一般形式。"},"children":[{"number":"5.471","texts":{"zh":"一般的命题形式是命题的本质。","en":"The general propositional form is the essence of the proposition.","de":"Die allgemeine Satzform ist das Wesen des Satzes.","zh_wang":"命题的一般形式是命题的本质。","zh_huang":"句子的一般形式就是句子的本质。"},"children":[{"number":"5.4711","texts":{"zh":"给出命题的本质，意味着给出一切描述的本质，也即给出世界的本质。","en":"To specify the essence of the proposition is to specify the essence of all description, and thus the essence of the world.","de":"Das Wesen des Satzes angeben, heisst, das Wesen aller Beschreibung angeben, also das Wesen der Welt.","zh_wang":"给出命题的本质，就意味着给出一切描述的本质，因此也就给出世界的本质。","zh_huang":"确定了句子的本质，就意味着确定了所有描述的本质，进而也就确定了世界的本质。"},"children":[]}]},{"number":"5.472","texts":{"zh":"描述最一般的命题形式，就是描述逻辑中那个唯一的一般的初始记号。","en":"The description of the most general propositional form is the description of the one and only general primitive sign in logic.","de":"Die Beschreibung der allgemeinsten Satzform ist die Beschreibung des einen und einzigen allgemeinen Urzeichens der Logik.","zh_wang":"最一般的命题形式的描述，是对逻辑中唯一的一般的初始标记的描述。","zh_huang":"对句子最为一般的形式进行描述，也就是在描述逻辑中唯一的一般性的初始记号。"},"children":[]},{"number":"5.473","texts":{"zh":"逻辑必须照顾自己。 如果一个记号是可能的，它就应该能起标示作用。凡在逻辑中为可能的都是容许的。（“苏格拉底是同一的”之所以不意指什么，是因为没有称为“同一的”这种属性。这个命题所以无意义，是因为我们无法作出一种任意的规定来，而不是因为这符号本身是不容许的。） 在一定的意义上，我们不可能在逻辑上犯错误。","en":"Logic must take care of itself. A possible sign must also be able to signify. Everything that is possible in logic is also permitted. (‘Socrates is identical’ thus means nothing, because there is no property that is called ‘identical’. The proposition is nonsensical because we have failed to make some arbitrary determination, not because the symbol in itself is impermissible.) In a certain sense, we cannot make mistakes in logic.","de":"Die Logik muss für sich selber sorgen. Ein mögliches Zeichen muss auch bezeichnen können. Alles was in der Logik möglich ist, ist auch erlaubt. („Sokrates ist identisch“ heisst darum nichts, weil es keine Eigenschaft gibt, die „identisch“ heisst. Der Satz ist unsinnig, weil wir eine willkürliche Bestimmung nicht getroffen haben, aber nicht darum, weil das Symbol an und für sich unerlaubt wäre.) Wir können uns, in gewissem Sinne, nicht in der Logik irren.","zh_wang":"逻辑必须照顾自己。 一个可能的标记必须也能标示。凡是逻辑中可能的事情都是允许的。（“苏格拉底是同一的”没有意义，是因为没有称作“同一的”属性。这个命题是无意义的，是因为我们没有作出某种任意规定，而不是因为这个符号本身是不允许的。） 在某种意义上讲，在逻辑中我们是不可能犯错误的。","zh_huang":"逻辑必须自己照顾自己。 一个记号只要是可能的，就能够表示某个东西。在逻辑中只要是可能的，也就是允许的。（为什么“苏格拉底是相同的”什么也没有说，原因是没有一种性质被称为“相同的”。这个句子无意义，是因为我们没有做出某个本属任意的决定，而不是因为符号本身不合法。） 在某种意义上，在逻辑中我们不能犯错误。"},"children":[{"number":"5.4731","texts":{"zh":"由于语言本身能防止各种逻辑错误，所以罗素多次说到的自明性才会在逻辑中成为多余的。——逻辑之所以是先天的，就在于不可能 非逻辑地思考。","en":"Self-evidence, of which Russell spoke so much, can only become dispensable in logic by language itself preventing every logical mistake.—That logic is a priori consists in this: that we cannot think illogically.","de":"Das Einleuchten, von dem Russell so viel sprach, kann nur dadurch in der Logik entbehrlich werden, dass die Sprache selbst jeden logischen Fehler verhindert. – Dass die Logik a priori ist, besteht darin, dass nicht unlogisch gedacht werden kann.","zh_wang":"罗素讲过很多的自明性，只是因为语言本身能避免各种逻辑错误，才会在逻辑中被抛弃。逻辑之所以是先天的，就在于我们不能非逻辑地思考。","zh_huang":"罗素谈论颇多的自明性，在逻辑中可有可无，因为语言本身就防止了所有逻辑错误。——逻辑先验的，在于我们不能不合逻辑地思考。"},"children":[]},{"number":"5.4732","texts":{"zh":"我们不能给予一个记号以错误的意义。","en":"We cannot give a sign the wrong sense.","de":"Wir können einem Zeichen nicht den unrechten Sinn geben.","zh_wang":"我们不能给一个标记以错误的意义。","zh_huang":"我们不能赋予记号以错误的含义。"},"children":[{"number":"5.47321","texts":{"zh":"奥卡姆法则当然不是一条随意的规则，也不是一条因其在实践上的成功而获得了证明的规则：它表明，记号语言中非必要 的单位不指谓任何东西。 满足一个 目的的记号逻辑上是等价的；不 满足任何 目的的记号逻辑上是无指谓的。","en":"Occam’s razor is not, of course, an arbitrary rule, nor one justified by its practical success: it says that unnecessary sign-units mean nothing.Signs that serve one purpose are logically equivalent, signs that serve no purpose are logically meaningless.","de":"Occams Devise ist natürlich keine willkürliche, oder durch ihren praktischen Erfolg gerechtfertigte, Regel: Sie besagt, dass unnötige Zeicheneinheiten nichts bedeuten. Zeichen, die Einen Zweck erfüllen, sind logisch äquivalent, Zeichen, die keinen Zweck erfüllen, logisch bedeutungslos.","zh_wang":"奥卡姆法则当然不是一条任意的规则，也不是一条由于其在实践上的成功而被证明的规则。它只是说明，符号体系中的不必要的因素是毫无指谓的。 满足一个目的的标记，在逻辑上是等价的；没有满足任何目的的标记，在逻辑上是无指谓的。","zh_huang":"奥卡姆剃刀当然不是任意的规则，也不是为实践上的成功所验证的警句，它其实是说，没有必要用的记号单元是没有指称的。 为同一个目的服务的记号在逻辑上是等价的，没有目的的记号在逻辑上没有指称。"},"children":[]}]},{"number":"5.4733","texts":{"zh":"弗雷格说：每一个合法则地构造的命题都应当具有意义；而我说：每一个可能的命题都是合法则地构造的，而且，如果它没有意义，那只能是因为我们未能给予它的某些组成部分以指谓。 （尽管我们认为自己已经这样做了。） 因此，“苏格拉底是同一的”之所以什么也没有说，是由于我们没有给予“同一的”这个词以任何形容词的 指谓。而当它作为同一性记号出现时，它是以完全不同的方式——另外一种标示关系——来标示的，因而在这两种情况下的符号也是完全不同的：这两个符号不过偶然地具有共同的记号。","en":"Frege says: every legitimately constructed proposition must have a sense; and I say: every possible proposition is legitimately constructed, and if it has no sense, then this can only be because we have not given a meaning to some of its constituents.(Even if we think we have done so.)So that is why ‘Socrates is identical’ says nothing, because we have given no meaning to the word ‘identical’ as adjective. For when it occurs as the identity sign, it symbolizes in a quite different way—the signifying relation is a different one; that is, the symbol in the two cases is also quite different; the two symbols have only the sign in common with one another accidentally.","de":"Frege sagt: Jeder rechtmässig gebildete Satz muss einen Sinn haben; und ich sage: Jeder mögliche Satz ist rechtmässig gebildet, und wenn er keinen Sinn hat, so kann das nur daran liegen, dass wir einigen seiner Bestandteile keine Bedeutung gegeben haben. (Wenn wir auch glauben, es getan zu haben.) So sagt „Sokrates ist identisch“ darum nichts, weil wir dem Wort „identisch“ als Eigenschaftswort keine Bedeutung gegeben haben. Denn, wenn es als Gleichheitszeichen auftritt, so symbolisiert es auf ganz andere Art und Weise – die bezeichnende Beziehung ist eine andere, – also ist auch das Symbol in beiden Fällen ganz verschieden; die beiden Symbole haben nur das Zeichen zufällig miteinander gemein.","zh_wang":"弗雷格说：每一个符合法则构成的命题都必定具有一种意义；而我则说：每一个可能的命题都是合乎法则构成的，而且，假如它没有意义，那只能是因为我们对它的某些组成部分未给予指谓。 （甚至即使我们认为自己已经这样做了。） 因此，“苏格拉底是同一的”之所以什么也没有说，那是由于我们没有赋予“同一的”这个词作为形容词的任何指谓。因为当它作为同一性符号出现时，它是用一种完全不同的方式——另一种标示关系——来标示的，因此，在这两种情况下的符号也是完全不同的；这两个符号不过是偶然具有共同的标记。","zh_huang":"弗雷格说，所有合法构造出来的句子都有含义。而我则要说，所有可能的句子都是合法构造的，如果它没有含义，这只能是因为我们还没有为其某些成分赋予指称 （即使我们觉得自己已经赋予了）。 比如，“苏格拉底是相同的”什么都没有说，是因为“相同”这个词我们没有用来表示性质。若用来表示相同，那就是按一种完全不同的方式使用——表示和被表示关系是不同的。因此，在这两种情况下，符号是完全不同的。两个符号共用一个记号，这只是偶然。"},"children":[]}]},{"number":"5.474","texts":{"zh":"必要的基本运算的数目唯一地 取决于我们的记号系统。","en":"The number of basic operations that are required depends only on our notation.","de":"Die Anzahl der nötigen Grundoperationen hängt nu r von unserer Notation ab.","zh_wang":"必需的基本运算的数目仅仅取决于我们的符号系统。","zh_huang":"需要多少基本的操作，这仅仅取决于我们的记号系统。"},"children":[]},{"number":"5.475","texts":{"zh":"这只是构造一个具有一定度数，即一定的数学多样性的记号系统的问题。","en":"It is simply a matter of constructing a sign-system with a particular number of dimensions—with a particular mathematical multiplicity.","de":"Es kommt nur darauf an, ein Zeichensystem von einer bestimmten Anzahl von Dimensionen – von einer bestimmten mathematischen Mannigfaltigkeit – zu bilden.","zh_wang":"这仅仅是构造一个具有一定维度数目即一定的数学多样性的标记系统的问题。","zh_huang":"而这又都取决于我们要建立的记号系统要有多少个维度，即在数学上的复杂度。"},"children":[]},{"number":"5.476","texts":{"zh":"很清楚，这里涉及的不是必须给以标示的一定数目的初始概念，而是一项规则的表达式。","en":"It is clear that the concern here is not with a number of primitive ideas that have to be signified, but with the expression of a rule.","de":"Es ist klar, dass es sich hier nicht um eine Anzahl von Grundbegriffen handelt, die bezeichnet werden müssen, sondern um den Ausdruck einer Regel.","zh_wang":"显然，这里我们所涉及的不是必须被标示的一定数目的初始概念，而是一条规则的表达式。","zh_huang":"显然，我们在这里所关心的不是必须表示的哪些初始概念，而是怎么表达一种规则。"},"children":[]}]}]},{"number":"5.5","texts":{"zh":"每一个真值函项都是连续应用运算“（……W）（ξ，……）”于基本命题的结果。 这个运算否定右边一对括号里的全部命题，我称之为这些命题的否定。","en":"Every truth-function is a result of the successive application of the operation (– – – – – T)(ξ,….) to elementary propositions. This operation negates each and every proposition in the right-hand brackets and I call it the negation of these propositions.","de":"Jede Wahrheitsfunktion ist ein Resultat der successiven Anwendung der Operation (– – – – –W)(ξ,....) auf Elementarsätze. Diese Operation verneint sämtliche Sätze in der rechten Klammer und ich nenne sie die Negation dieser Sätze.","zh_wang":"每个真值函项都是把（……T）（ξ，....）这个运算连续应用于基本命题的结果。 这个运算否定右边括号中的一切命题，我将它称为这些命题的否定。","zh_huang":"所有真值函项都是对基本命题迭代使用操作(T0…T)(ξ0,…ξn)的结果。 这种操作否定右边括号中的所有句子，我称其为这些句子的否定。"},"children":[{"number":"5.501","texts":{"zh":"一个以命题作为项的括号表达式，如果括号里各项的次序是无关紧要的，我就用一个“（）”形式的记号来表示。“ξ”是一个变项，它的值是括号表达式的各个项。变项上画的横线表示，它代表括号里变项所有的值。 （例如，若ξ有三个值P、Q、R，则（）＝（P，Q，R）。）变项的值是规定了的。 这规定就是对变项所代表的命题的描述。 括号表达式中各项的描述是怎样产生的，这一点无关紧要。 我们可以 区分三种描述：1.直接列举，这时可以简单地用作为变项取值的常项来代换变项。2.给出一个函项fx，它对所有x值的取值即为要描述的命题。3.给出一个决定命题构成的形式规则，这时括号表达式中的各项就是一个形式系列的所有的项。","en":"I indicate a bracket-expression whose terms are propositions—where the order of the terms is irrelevant— by a sign of the form ‘()’. ‘ξ’ is a variable whose values are the terms of the bracket-expression, and the line over the variable indicates that it stands for all its values in the brackets. (If ξ thus has, say, the 3 values, P, Q, R, then () = (P, Q, R).) The values of the variables are fixed. The fixing is a description of the propositions that the variable stands for. How the description of the terms of the bracket-expression is given is inessential. We can distinguish three kinds of description: 1. Direct enumeration. In this case we can simply replace the variable by its constant values. 2. Specification of a function fx, whose values for all values of x are the propositions to be described. 3. Specification of a formal law according to which the propositions are constructed. In this case the terms of the bracket-expression are all the terms of a form-series.","de":"Einen Klammerausdruck, dessen Glieder Sätze sind, deute ich – wenn die Reihenfolge der Glieder in der Klammer gleichgültig ist – durch ein Zeichen von der Form „ “ an. „ξ“ ist eine Variable, deren Werte die Glieder des Klammerausdruckes sind; und der Strich über der Variablen deutet an, dass sie ihre sämtlichen Werte in der Klammer vertritt. (Hat also ξ etwa die 3 Werte P, Q, R, so ist = (P, Q, R).) Die Werte der Variablen werden festgesetzt. Die Festsetzung ist die Beschreibung der Sätze, welche die Variable vertritt. Wie die Beschreibung der Glieder des Klammerausdruckes geschieht, ist unwesentlich. Wir können drei Arten der Beschreibung unterscheiden: 1. Die direkte Aufzählung. In diesem Fall können wir statt der Variablen einfach ihre konstanten Werte setzen. 2. Die Angabe einer Funktion fx, deren Werte für alle Werte von x die zu beschreibenden Sätze sind. 3. Die Angabe eines formalen Gesetzes, nach welchem jene Sätze gebildet sind. In diesem Falle sind die Glieder des Klammerausdrucks sämtliche Glieder einer Formenreihe.","zh_wang":"一个以命题作为各项的括号中的表达式，我用一个“（ξ）”形式的标记来表示——如果括号里各项的次序是无关紧要的话。“ξ”是一个变项，它的值是括号内表达式的各项。在变项上面画的横线表示它代表其括号中所有的值。 （因此，假如ξ有三个值P、Q、R，则 变项的值必须确定。 这种确定是对变项所代表的命题的描述。 括号中表达式的各项的描述怎样产生，这是无关紧要的。 我们可以区分三种描述：1.直接列举，在这种情况下，我们可以只用常项代换变项。2.给出一个函项ƒx ，它的值对于x的一切值都是所要描述的命题。3.给出一个构成那些命题的形式规则，在这种情况下，括号中表达式的各项就是一个形式系列中所有的项。","zh_huang":"我用形如“(ξ)”的记号来表明，括号中的表达式以句子作为项，并且这些项的顺序并不重要。“ξ”是变元，其值就是括号内表达式中的项。变元记号上面的横线表示括号中的所有值。 （比如，如果ξ有三个值P、Q、R，那么(ξ)=(P, Q, R )） 变元要取什么值，这要规定好。 方法就是对变元所表示的句子进行描述。 如何对括号内表达式中的项进行描述，这并不重要。 可以区分三种描述： 1.直接列举，这时我们可以直接用充当变元之值的常项来代换变元； 2.确定一个函数f(x)，其中x的所有值就是要描述的句子； 3.给出一种用于构造句子的形式规则，在这种情况下，括号中的表达式也就包含了一个形式序列的所有项。"},"children":[]},{"number":"5.502","texts":{"zh":"因此，我写作“N（）”以代替“（……W）（ξ，……）”。 N（）是对命题变项ξ所有的值的否定。","en":"Instead of ‘(– – – – – T)(ξ,….)’ I thus write ‘(N()’. N() is the negation of all the values of the propositional variable ξ.","de":"Ich schreibe also statt „(– – – – –W)(ξ,....)“ „ “. ist die Negation sämtlicher Werte der Satzvariablen ξ.","zh_wang":"因此，我写“ ”，而不写“（……T）（ξ，……）”。 是对命题变项ξ的一切值的否定。","zh_huang":"这样就可以用“N(ξ)”来取代(T0…T)(ξ0,…ξn)。 N(ξ)是命题变元ξ的所有值的否定。"},"children":[]},{"number":"5.503","texts":{"zh":"显然，我们不难表达：命题如何可以用此运算来构成和如何不可以用它来构成；故而为此必可找到一个精确的表达式。","en":"Since it is obviously easy to express how propositions can be, or are not to be, constructed by this operation, this must also be capable of finding exact expression.","de":"Da sich offenbar leicht ausdrücken lässt, wie mit dieser Operation Sätze gebildet werden können und wie Sätze mit ihr nicht zu bilden sind, so muss dies auch einen exakten Ausdruck finden können.","zh_wang":"命题怎样可以用这种运算来构成和怎样不可以用它来构成，显然是很容易表述的，因此，这种情况也必定可以找到一个精确的表达式。","zh_huang":"显然，我们很容易就能说明句子怎样能用这种操作构造出来，又怎样构造不出来。应该能用严格的方式说明这一点。"},"children":[]},{"number":"5.51","texts":{"zh":"如果ξ只有一个值，则N（）＝～p（非p）；如果它有两个值，则N（）＝～p・～q（既非p也非q）。","en":"If ξ has only one value, then N() = ~p (not p); if it has two values, then N() = ~p.~q (neither p nor q).","de":"Hat ξ nur einen Wert, so ist = ∼p (nicht p), hat es zwei Werte, so ist = ∼p. ∼q (weder p noch q).","zh_wang":"如果ξ只有一个值，则 （非p）；如果它有两个值，则 （既非p 也非q ）","zh_huang":"如果ξ有一个值，那么N(ξ)=~p（并非p）；如果ξ有两个值，那么N(ξ)=~p˄~q（既非p也非q）"},"children":[{"number":"5.511","texts":{"zh":"包容一切而反映着世界的逻辑之所以能够运用这种特别的钩子和装置，是因为它们全都彼此结合着成为一张无比精细的网——一面巨大的镜子。","en":"How can logic, all-encompassing and mirroring the world, use such specific hooks and manipulations? Only by their all connecting into an infinitely fine network, to the great mirror.","de":"Wie kann die allumfassende, weltspiegelnde Logik so spezielle Haken und Manipulationen gebrauchen? Nur, indem sich alle diese zu einem unendlich feinen Netzwerk, zu dem grossen Spiegel, verknüpfen.","zh_wang":"包容一切和反映世界的逻辑，怎样会使用这类手段和操作呢？是因为它们全都结合在一起，形成一张无比精细的网，一面巨大的镜子。","zh_huang":"逻辑，无所不包的、能够反映世界的逻辑，怎能使用这样一些怪里怪气的装置呢？只是因为它们能够彼此勾连，形成无限细密的网，直至成为一面巨镜。"},"children":[]},{"number":"5.512","texts":{"zh":"若“p”为假，则“～p”为真。因而，在真命题“～p”中，“p”是一个假命题。那么波线“～”怎样能使“p”与实在相符合呢？ 但是在“～p”中起否定作用的并不是“～”，而是这个记号系统中所有否定p的记号共有的东西。 也就是说，是构成“～p”、“～～～p”、“～p∨～p”、“～p・～p”等等（以至无穷）所遵循的共同规则，这一共同的因素反映着否定。","en":"‘~p’ is true if ‘p’ is false. In the true proposition ‘~p’, then, ‘p’ is a false proposition. So how is it that the stroke ‘~’ brings it into agreement with reality? What negates in ‘~p’, however, is not the ‘~’ but what is in common to all signs of this notation that negate p. That is, the common rule according to which ‘~p’, ‘~~~p’. ‘~pv~p’. ‘~p.~p’, etc. etc. (ad infinitum) are constructed. And it is what is common here that mirrors negation.","de":"„∼p“ ist wahr, wenn „p“ falsch ist. Also in dem wahren Satz „∼p“ ist „p“ ein falscher Satz. Wie kann ihn nun der Strich „∼“ mit der Wirklichkeit zum Stimmen bringen? Das, was in „∼p“ verneint, ist aber nicht das „∼“, sondern dasjenige, was allen Zeichen dieser Notation, welche p verneinen, gemeinsam ist. Also die gemeinsame Regel, nach welcher „∼p“, „∼∼∼p“, „∼p ∨ ∼p“, „∼p. ∼p“, etc. etc. (ad inf.) gebildet werden. Und dies Gemeinsame spiegelt die Verneinung wider.","zh_wang":"如果“p ”是假的，那么“～p ”就是真的。因而，在真命题“～p ”中，“p ”是一个假命题。那么波线“～”如何能使“p ”与实在相符合呢？ 然而在“～p ”中起否定作用的并不是“～”，而是这个符号系统中否定p 的一切标记所共有的东西。 因此就有了构成“～p ”、“～～～p ”、“～pv ～p ”、“～p .～p ”等等（以至无穷）所根据的共同规则，这个共同的因素也反映否定。","zh_huang":"如果“p”是假的，“~p”就是真的。于是在真句子“~p”中，“p”就是个假句子。那么，波浪线“~”怎么就能够让句子与实在相一致了呢？ 但在“~p”中起否定作用的不是“~”，而是这种记号系统中所有否定p的记号所共同的东西。 由此也就有一种共同的规则，依据它可以得到“~p”“~~~p”“~p˅~p”“~p˄~q”，等等，以至无穷。所有这些东西的共同之处表现了什么是否定。"},"children":[]},{"number":"5.513","texts":{"zh":"可以说，肯定p和q两者的一切符号所共同的东西，就是命题“p・q”；而肯定p或者q的一切符号所共同的东西，就是命题“p∨q”。 同样可以说，两个命题如果彼此之间没有任何共同的东西，它们就是互相反对的，而且每个命题只有一个否定，因为只有一个命题完全在它之外。 因此在罗素的记号系统中也同样表明，“q∶p∨～p”和“q”说的是一回事情，“p∨～p”则什么也没有说。","en":"One could say: what is common to all symbols that affirm both p and q is the proposition ‘p.q’. What is common to all symbols that affirm either p or q is the proposition ‘p v q’. So, too, one can say: two propositions are opposed to one another if they have nothing in common with one another; and: every proposition has only one negative, since there is only one proposition that lies wholly outside it. This shows itself also in Russell’s notation: that ‘q: p v~ p’ says the same as ‘q’; that ‘p v ~p’ says nothing.","de":"Man könnte sagen: Das Gemeinsame aller Symbole, die sowohl p als q bejahen, ist der Satz „p. q“. Das Gemeinsame aller Symbole, die entweder p oder q bejahen, ist der Satz „p ∨ q“. Und so kann man sagen: Zwei Sätze sind einander entgegengesetzt, wenn sie nichts miteinander gemein haben, und: Jeder Satz hat nur ein Negativ, weil es nur einen Satz gibt, der ganz ausserhalb seiner liegt. Es zeigt sich so auch in Russells Notation, dass „q: p ∨ ∼p“ dasselbe sagt wie „q“; dass „p ∨ ∼p“ nichts sagt.","zh_wang":"我们可以说，一切既肯定p 又肯定q 的符号的共同的东西，就是命题“p .q ”；一切肯定或者q 的符号的共同的东西，就是命题“pvq ”。 同样我们可以说，当两个命题彼此之间没有任何共同的东西的时候，它们就是互相矛盾的，而且每个命题只有一个否定，因为只有一个命题完全在它之外。 因此在罗素的符号系统中也同样表明，“q：pv ～p ”和“q ”所说的是一样的，“pv ～p ”什么也没有说。","zh_huang":"可以说，所有既肯定p又肯定q的符号共同的东西，就是句子“p˄q”；所有断定p或者q的符号所共同的东西，就是句子“p˅q”。 同样也可以说，如果两个句子没有任何共同的东西，那么它们就彼此对立。并且所有句子都只有一个否定，因为只有一个句子完全位于它之外。 比如，在罗素的记号系统中也很明显，“q˄(p˅~p)”说了与“q”相同的东西，并且“p˅~p”什么都没有说。"},"children":[]},{"number":"5.514","texts":{"zh":"一个记号系统一旦建立起来，其中就有一条用以构造一切否定p的命题的规则，一条用以构造一切肯定p的命题的规则，一条用以构造一切肯定p或q的命题的规则，等等。这些规则等价于一些符号，它们的意义就反映在符号之中。","en":"If a notation is established, then there is in it a rule according to which all propositions negating p are constructed, a rule according to which all propositions affirming p are constructed, a rule according to which all propositions affirming p or q are constructed, and so on. These rules are equivalent to the symbols and in them their sense is mirrored.","de":"Ist eine Notation festgelegt, so gibt es in ihr eine Regel, nach der alle p verneinenden Sätze gebildet werden, eine Regel, nach der alle p bejahenden Sätze gebildet werden, eine Regel, nach der alle p oder q bejahenden Sätze gebildet werden, u. s. f. Diese Regeln sind den Symbolen äquivalent und in ihnen spiegelt sich ihr Sinn wider.","zh_wang":"如果一个符号系统固定了，其中就有一条据以构成一切否定p 的命题的规则，一条据以构成一切肯定p 的命题的规则，一条据以构成一切肯定P 或q 的命题的规则，等等。这些规则与一些符号是等价的，并且在符号当中反映它们的意义。","zh_huang":"记号系统一旦建立起来，其中就应该包含一种规则，用来确定如何构造否定p的所有句子，一种规则用来确定如何构造肯定p的所有句子，一种规则用来确定如何构造肯定p或者q的所有句子，如此等等。这些规则与符号是等价的，它们表现了符号的含义。"},"children":[]},{"number":"5.515","texts":{"zh":"在我们的符号中必须表明，只有命题才能相互之间用“∨”、“・”等等结合起来。 情况的确如此，因为“p”和“q”的符号本身已假定了“∨”、“～”等等。如果在“p∨q”中记号“p”不代表一个复合记号，那么它自身单独地就不能有意义：而在这种情况下，和“p”具有相同意义的记号“p∨p”、“p・p”等等也就不能有意义。而如果“p∨p”没有意义，“p∨q”也就不可能有任何意义。","en":"It must show itself in our symbols that what is combined with one another by ‘v’, ‘.’, etc., must be propositions. And this is indeed the case, since the symbol ‘p’ and ‘q’ itself presupposes ‘v’, ‘~’, etc. If the sign ‘p’ in ‘p v q’ does not stand for a complex sign, then it cannot have sense by itself; but then the signs ‘p v p’, ‘p.p’, etc., which have the same sense as ‘p’, can have no sense either. But if ‘p v p’ has no sense, then neither can ‘p v q’ have sense.","de":"Es muss sich an unseren Symbolen zeigen, dass das, was durch „∨“, „.“, etc. miteinander verbunden ist, Sätze sein müssen. Und dies ist auch der Fall, denn das Symbol „p“ und „q“ setzt ja selbst das „∨“, „∼“, etc. voraus. Wenn das Zeichen „p“ in „p∨ q“ nicht für ein komplexes Zeichen steht, dann kann es allein nicht Sinn haben; dann können aber auch die mit „p“ gleichsinnigen Zeichen „p ∨ p“, „p. p“, etc. keinen Sinn haben. Wenn aber „p ∨ p“ keinen Sinn hat, dann kann auch „p ∨ q“ keinen Sinn haben.","zh_wang":"必须认识到在我们的符号中，用“v”、“·”等结合起来的，只能是命题。 情况也确是如此，因为符号“p ”和符号“q ”本身就已经假定了“v”、“～”等等。如果在“pvq ”中符号“p ”并不代表一个复合符号，那么它自身就不能有意义；但这样一来和“p ”具有相同意义的符号“pvp ”、“p .p ”等等也都没有意义。然而，如果“pvp ”没有意义，“那么pvq ”也就不能有意义。","zh_huang":"我们的符号必须表明，用“˅”“~”等来连接的东西只能是句子。 的确如此，因为符号“p”和“q”本身已经预设了“˅”“~”等。如果“p˅q”中的记号“p”不代表复合记号，那么它本身也就不具备含义；但这样一来，记号“p˅p”“p˄p”等与“p”含义相同的记号，也就不具备含义了。而如果“p˅p”没有含义，“p˅q”也就不会有含义。"},"children":[{"number":"5.5151","texts":{"zh":"一个否定命题的记号必须要用肯定命题的记号来构成吗？为什么不能用一个否定的事实来表达一个否定命题呢？（例如，设“a”不处在对“b”的一定关系之中，就可以说为：aRb不是实情。） 但是即使在这里，否定命题其实也是间接地用肯定命题来构成的。 肯定命题 必须以否定命题 的存在为前提，反之亦然。","en":"Must the sign of a negative proposition be constructed with the sign of the positive? Why should one not be able to express a negative proposition by means of a negative fact? (For example, if ‘a’ does not stand in a particular relation to ‘b’, then this could express that aRb is not the case.)But even here the negative proposition is constructed indirectly by means of the positive.The positive proposition must presuppose the existence of the negative proposition, and conversely.","de":"Muss das Zeichen des negativen Satzes mit dem Zeichen des positiven gebildet werden? Warum sollte man den negativen Satz nicht durch eine negative Tatsache ausdrücken können. (Etwa: Wenn „a“ nicht in einer bestimmten Beziehung zu „b“ steht, könnte das ausdrücken, dass aRb nicht der Fall ist.) Aber auch hier ist ja der negative Satz indirekt durch den positiven gebildet. Der positive Satz muss die Existenz des negativen Satzes voraussetzen und umgekehrt.","zh_wang":"否定命题的标记必须要借助于肯定命题的标记来构成吗？为什么不能用一个否定的事实来表达否定命题呢？（例如，假如“a ”没有处在对“b ”的某种关系之中，那就可以表达为aRb 不是实情。） 但是在这里否定命题也是用肯定命题间接构成的。 肯定命题必须以否定命题的存在为前提，反之亦然。","zh_huang":"构造否定句的记号时一定要用到肯定句的记号吗？为什么不能用否定事实来表达否定句呢？（比如，假定“a”与“b”之间并没有某种关系，那么这就可以用来说，情况并不是aRb） 但即使在这种情况下，否定句的构成也间接地用到了肯定句。 肯定句必定预设了否定句的存在，反之亦然。"},"children":[]}]}]},{"number":"5.52","texts":{"zh":"若ξ的值是函项fx对于所有x值的全部取值，则N（）＝～（Ǝ x）・fx。","en":"If the values of ξ are all the values of a function fx for all values of x, then N() = ~(∃x).fx.","de":"Sind die Werte von ξ sämtliche Werte einer Funktion fx für alle Werte von x, so wird = ∼(∃x). fx.","zh_wang":"若ξ的值是函项ƒx 对于x的所有值的总值，则。","zh_huang":"如果ξ的值就是f(x)对x所取的所有值，那么N(ξ)=~∃xf(x)"},"children":[{"number":"5.521","texts":{"zh":"我把所有 这个概念同真值函项分离开来。 弗雷格和罗素是联系逻辑积或逻辑和而引入概括的。这样就难以理解隐含着这两个概念的命题“（Ǝ x）・fx”和“（x）・fx”。","en":"I separate the concept all from the truth-function. Frege and Russell introduced generality in connection with logical product or logical sum. It thus became hard to understand the propositions ‘(∃x).fx’ and ‘(x).fx’, in which both ideas are incorporated.","de":"Ich trenne den Begriff Alle von der Wahrheitsfunktion. Frege und Russell haben die Allgemeinheit in Verbindung mit dem logischen Produkt oder der logischen Summe eingeführt. So wurde es schwer, die Sätze „(∃x). fx“ und „(x). fx“, in welchen beide Ideen beschlossen liegen, zu verstehen.","zh_wang":"我把所有这个概念与真值函项区分开来。 弗雷格和罗素是结合逻辑积或者逻辑和来引入一般性的。这样就难以理解隐含这两种概念的命题“（ョx ）.ƒx ” 与“（x ）ƒx ”了。","zh_huang":"我把所有这个概念与真值函项分开。 弗雷格和罗素利用合取或析取来引入普遍性。这样就难以理解式子“∃xf(x)”和“∀xf(x)”，其中包含的这两个概念。"},"children":[]},{"number":"5.522","texts":{"zh":"概括记号的特点在于，第一，它指示一个逻辑原型；第二，它突出了常项。","en":"The peculiarity of the generality-sign is, first, that it points to a logical prototype, and second, that it highlights constants.","de":"Das Eigentümliche der Allgemeinheitsbezeichnung ist erstens, dass sie auf ein logisches Urbild hinweist, und zweitens, dass sie Konstante hervorhebt.","zh_wang":"一般性符号记法的特点在于，第一，它指示一种逻辑原型；第二，它突出了常项。","zh_huang":"普遍性记号的特殊之处在于：第一，它表示一种逻辑原型；第二，它突出了常项。"},"children":[]},{"number":"5.523","texts":{"zh":"概括记号是以主目的身份出现的。","en":"The generality-sign occurs as an argument.","de":"Die Allgemeinheitsbezeichnung tritt als Argument auf.","zh_wang":"一般性符号是作为主目而出现的。","zh_huang":"普遍性记号是作为主目出现的。"},"children":[]},{"number":"5.524","texts":{"zh":"如果给出了一些对象，那么同时也就给出了所有 对象。 如果给出了一些基本命题，那么同时也就给出了所有 基本命题。","en":"If objects are given, then all objects are thereby also given to us. If elementary propositions are given, then all elementary propositions are thereby also given.","de":"Wenn die Gegenstände gegeben sind, so sind uns damit auch schon alle Gegenstände gegeben. Wenn die Elementarsätze gegeben sind, so sind damit auch alle Elementarsätze gegeben.","zh_wang":"如果给定了一些对象，那么随之也就给定了一切对象。 如果给定了一些基本命题，那么随之也就给定了一切基本命题。","zh_huang":"给出了一个对象，所有对象也就给出了。 给出了基本命题，所有基本命题也就同时给出了。"},"children":[]},{"number":"5.525","texts":{"zh":"像罗素那样将命题“（Ǝ x）・fx”译述为“fx是可能的 ”，是不正确的。 一种情况的必然、可能或者不可能，不是用命题来表达，而是由表达式是一个重言式、一个有意义的命题或者一个矛盾式来表达。 我们常常要援引的惯例必须已经存在于符号本身之中。","en":"It is incorrect to paraphrase the proposition ‘(∃x).fx’ as ‘fx is possible’, as Russell does. The certainty, possibility, or impossibility of a state of affairs is not expressed by a proposition but by an expression’s being a tautology, a senseful proposition, or a contradiction. That precedent to which one invariably wants to appeal must already lie in the symbol itself.","de":"Es ist unrichtig, den Satz „(∃x). fx“ – wie Russell dies tut – in Worten durch „fx ist möglich“ wiederzugeben. Gewissheit, Möglichkeit oder Unmöglichkeit einer Sachlage wird nicht durch einen Satz ausgedrückt, sondern dadurch, dass ein Ausdruck eine Tautologie, ein sinnvoller Satz, oder eine Kontradiktion ist. Jener Präzedenzfall, auf den man sich immer berufen möchte, muss schon im Symbol selber liegen.","zh_wang":"像罗素那样把命题“（ョx ）.ƒx ”说成“ƒx 是可能的”，是不正确的。 一种事态的必然、可能或者不可能，不是由一个命题来表达，而是由一个表达式是一个重言式、一个有意义的命题或者一个矛盾式来表达的。 人们经常援引的先例，必须已经存在于符号本身之中。","zh_huang":"像罗素那样，用句式“f(x)是可能的”来解释式子“∃xf(x)”，这是不正确的。 一种情况是确定的、可能的，还是不可能的，这不是通过句子来表达的，而是通过重言式、有含义的句子，还是矛盾式的句子得以表达的。 人们一直想要参照的先例，肯定就在符号本身中。"},"children":[]},{"number":"5.526","texts":{"zh":"我们可以用完全概括的命题，即不必首先把每个名称对应于一个特定的对象，来完全地描述世界。 然后，为了达到习惯的表达方式，我们只需在“有一个而且只有一个x，使得……”这个表达式后面加上一句话：“而且x是a”。","en":"One can describe the world completely by fully generalized propositions, that is, without correlating from the outset any name with a particular object. To then arrive at the usual mode of expression, one simply has to say, after an expression ‘there is one and only one x that…’, and this x is a.","de":"Man kann die Welt vollständig durch vollkommen verallgemeinerte Sätze beschreiben, das heisst also, ohne irgend einen Namen von vornherein einem bestimmten Gegenstand zuzuordnen. Um dann auf die gewöhnliche Ausdrucksweise zu kommen, muss man einfach nach einem Ausdruck „es gibt ein und nur ein x, welches....“ sagen: Und dies x ist a.","zh_wang":"人们可以用完全一般化的命题，即开始不必把任何一个名称都对应于一个特定的对象，把世界完全描述出来。 然后，为了达到习惯的表达方式，我们只需要在“有一个而且只有一个x ，使得”这个表达方式后面补充一句话：“而且这个x 是a ”","zh_huang":"可以用完全概括句来描述世界。在这种句子中，不需要先把名称与特定对象对应起来。 要回到常规的表达方式，只需要加上诸如“有且仅有一个x，它……”这样的表达式就行了。这里的x就是a。"},"children":[{"number":"5.5261","texts":{"zh":"一个完全概括的命题，像每个其它命题一样，是组合的。（这一点为我们在“（Ǝ x，φ）・φx”中必须分开地提及“φ”和“x”这一事实所表明。两者都独立地处在对世界的标示关系中，就像非概括命题的情形一样。） 组合符号的标志是：它和别的 符号有某种共同的东西。","en":"A fully generalized proposition is composite like every other proposition. (This is shown in our having to mention ‘ϕ’ and ‘x’ separately in ‘(∃x, ϕ).ϕx’. Both stand independently in signifying relations to the world as in an ungeneralized proposition.) A mark of a composite symbol: it has something in common with other symbols.","de":"Ein vollkommen verallgemeinerter Satz ist, wie jeder andere Satz zusammengesetzt. (Dies zeigt sich daran, dass wir in „(∃x, ϕ).ϕx“ „ϕ“ und „x“ getrennt erwähnen müssen. Beide stehen unabhängig in bezeichnenden Beziehungen zur Welt, wie im unverallgemeinerten Satz.) Kennzeichen des zusammengesetzten Symbols: Es hat etwas mit anderen Symbolen gemeinsam.","zh_wang":"一个完全一般化的命题，就像每个其它命题一样，是组合成的。（这一点可以通过在“（ョx ，φ ）.φx ”中，我们必须分别提及“φ”和“x”这一事实来表明。两者在对世界的标示关系中，都是独立存在的，就像在非一般化的命题中的情形一样。） 组合符号的特点是：它和别的符号有某种共同的东西。","zh_huang":"完全概括句与所有其他句子一样，是复合的。（这表现在“∃x∃ϕ(ϕx)”式中，我们必须分别提到“ϕ”和“x”。像在非概括句中一样，它们单独与世界建立存在关系。） 复合性符号的一个典型特征是，它与其他符号共有部分。"},"children":[]},{"number":"5.5262","texts":{"zh":"每一个 命题的真或假都在世界的一般构造中引起某种改变。而且基本命题的总体为世界的构造所留下的可能范围，正好就是所有的概括命题所界定的范围。 （如果有一个基本命题为真，那就意味着无论如何有多于一个 的基本命题为真。）","en":"The truth or falsity of every proposition alters something in the general construction of the world. And the scope that is left open to its construction by the totality of elementary propositions is precisely that which the quite general propositions limit.(If an elementary proposition is true, then, at any rate, one more elementary proposition is thereby true.)","de":"Es verändert ja die Wahr- oder Falschheit jedes Satzes etwas am allgemeinen Bau der Welt. Und der Spielraum, welcher ihrem Bau durch die Gesamtheit der Elementarsätze gelassen wird, ist eben derjenige, welchen die ganz allgemeinen Sätze begrenzen. (Wenn ein Elementarsatz wahr ist, so ist damit doch jedenfalls Ein Elementarsatz mehr wahr.)","zh_wang":"每个命题的真或假对于世界的一般构造都有些改变。而基本命题的总和给世界的构造留下的范围，恰好与完全一般的命题界定的范围相同。 （如果有一个基本命题是真，那就意味着无论如何另外还有一个基本命题是真。）","zh_huang":"每个句子的真或假都会对世界的一般结构带来某种改变。基本命题的总体为这种结构留下的自由度，恰好为完全概括句所限定。 （如果一个基本命题为真，那么不管怎样，都会有不止一个基本命题为真。）"},"children":[]}]}]},{"number":"5.53","texts":{"zh":"我用记号的同一，而不是用等号，来表达对象的同一。对象的不同则用记号的不同来表达。","en":"Identity of object I express by identity of sign and not by means of an identity sign. Difference of objects by difference of signs.","de":"Gleichheit des Gegenstandes drücke ich durch Gleichheit des Zeichens aus, und nicht mit Hilfe eines Gleichheitszeichens. Verschiedenheit der Gegenstände durch Verschiedenheit der Zeichen.","zh_wang":"我用标记的同一，而不是用标记来表达对象的同一。对象的不同则用标记的不同来表达。","zh_huang":"对象的等同我用记号上的等同表达，而不是用表示等同的记号表达。对象上的不同，则用记号上的不同表达。"},"children":[{"number":"5.5301","texts":{"zh":"显然，同一不是对象之间的一种关系。例如，只要考察一下“（x）：fx・⊃・x＝a”这个命题，这一点就很清楚了。这个命题只是说，只有a满足函项f，而不是说，只有对a具有一定关系者满足函项f。 当然，也可以说，只有 a才对a具有这种关系；但是为了表达这点，就需要同一记号本身。","en":"That identity is not a relation between objects is self-evident. This becomes very clear if one considers, for example, the proposition ‘(x): fx. ⊃. x = a’. What this proposition says is simply that only a satisfies the function f, and not that only such things that have a certain relation to a satisfy the function f.Of course, one could say that it is only a that has this relation to a, but in order to express this, we would need the identity sign itself.","de":"Dass die Identität keine Relation zwischen Gegenständen ist, leuchtet ein. Dies wird sehr klar, wenn man z. B. den Satz „(x): fx. ⊃.x = a“ betrachtet. Was dieser Satz sagt, ist einfach, dass nur a der Funktion f genügt, und nicht, dass nur solche Dinge der Funktion f genügen, welche eine gewisse Beziehung zu a haben. Man könnte nun freilich sagen, dass eben nur a diese Beziehung zu a habe, aber um dies auszudrücken, brauchten wir das Gleichheitszeichen selber.","zh_wang":"同一不是对象之间的一种关系，这是很显然的。例如，只要考察一下“（X ）：ƒx .⊃.x =a ”这个命题，这一点就变得很清楚了。这个命题只是说，只有a 满足函项ƒ ，而不是说只有对a 具有某种关系的对象才满足函项ƒ 。 当然，人们也可以说，事实上只有a 对a 才具有这种关系；但是要想表达这一点，就需要标记本身了。","zh_huang":"等同明显不是对象之间的关系。考虑比如“∀x[f(x)➛x=a]”这样的句子，这一点就会清楚起来。这个句子所说的只是，只有a满足函项f，而不是说，只有与a有某种关系的对象满足函项f。 当然有人会说，只有x与a有这种关系。但是，为了表达这一点，我们又要用到等同记号本身了。"},"children":[]},{"number":"5.5302","texts":{"zh":"罗素的“＝”的定义是不充分的，因为我们不能根据它说两个对象共有它们的一切属性。（即使这个命题绝非正确的，它也仍然具有意义。）","en":"Russell’s definition of ‘=’ doesn’t work, because according to it one cannot say that two objects have all their properties in common. (Even if this proposition is never correct, it still has sense.)","de":"Russells Definition von „=“ genügt nicht; weil man nach ihr nicht sagen kann, dass zwei Gegenstände alle Eigenschaften gemeinsam haben. (Selbst wenn dieser Satz nie richtig ist, hat er doch Sinn.)","zh_wang":"罗素对“=”的定义是不充分的，因为根据它我们不能说两个对象所有的一切属性都是共有的。（即使这个命题决不是正确的，它依然具有意义。）","zh_huang":"罗素对“=”的定义是不恰当的，因为按照那个定义我们不能说两个对象共享所有性质。（即使这个句子从来不是真的，它也还是有含义的。）"},"children":[]},{"number":"5.5303","texts":{"zh":"大致说来：说两个 东西是同一的，这是无意义的，而说一个 东西和它自身同一，就是根本什么也没有说。","en":"Roughly speaking: to say of two things that they are identical is nonsense, and to say of one thing that it is identical with itself says nothing at all.","de":"Beiläufig gesprochen: Von zwei Dingen zu sagen, sie seien identisch, ist ein Unsinn, und von Einem zu sagen, es sei identisch mit sich selbst, sagt gar nichts.","zh_wang":"一般说来：说两个事物是同一的，这是无意义的，而说一个事物与它自身是同一的，则是什么也没有说。","zh_huang":"粗略地说，说两个东西等同，这无意义，而说一个东西与自身等同，则什么都没有说。"},"children":[]},{"number":"5.531","texts":{"zh":"因此我不写“f（a，b）・a＝b”，而写“f（a，a）”或者“f（b，b）”。不写“f（a，b）・～a＝b”，而写“f（a，b）”。","en":"I thus write not ‘f (a,b). a = b’ but ‘f (a,a)’ (or ‘f (b,b)’). And not ‘f (a,b). ~a = b’ but ‘f (a,b)’.","de":"Ich schreibe also nicht „f (a, b). a = b“, sondern „f (a, a)“ (oder „f (b, b)“). Und nicht „f (a, b). ∼a = b“, sondern „f (a, b)“.","zh_wang":"因此，我不写“ƒ （a ，b ）.a =b ”，而写“ƒ （a ，a ）”（或者“ƒ （b ，b ）”。不写“ƒ （a ，b ）.～a =b ”，而写“ƒ （a ，b ）”","zh_huang":"因此我不写“f(a, b)˄a=b”，而是写“f(a, a)”（或者“f(b, b)”）。不写“f(a, b)˄~a=b”，而写“f(a, b)”"},"children":[]},{"number":"5.532","texts":{"zh":"以此类推：我不写“（Ǝ x，y）・f（x，y）・x＝y”，而写“（Ǝ x）・f（x，x）”；不写“（Ǝ x，y）・f（x，y）・～x＝y”，而写“（Ǝ x，y）・f（x，y）”。 （这样，罗素的“（Ǝx，y）・fxy”就成为：“（Ǝx，y）・f（x，y）・∨・（Ǝx）・f（x，x）”。），","en":"And analogously: Not ‘(∃x,y). f (x,y). x = y’, but ‘(∃x). f (x,x)’; and not ‘(∃x,y). f (x,y). ~x = y’, but ‘(∃x,y). f (x,y)’. (So instead of Russell’s ‘(∃x,y). f (x,y)’: ‘(∃x,y). f (x,y). v. (∃x). f (x,x)’.)","de":"Und analog: Nicht „(∃x, y). f (x, y). x = y“, sondern „(∃x). f (x, x)“; und nicht „(∃x, y). f (x, y). ∼x = y“, sondern „(∃x, y). f (x, y)“. (Also statt des Russell’schen „(∃x, y). f (x, y)“: „(∃x, y). f (x, y). ∨. (∃x). f (x, x)“.)","zh_wang":"并且以此类推：我不写“（ョx ，y ）.ƒ （x ，y ）.x =y ”而写“（ョx ）.ƒ （x ，x ）”；不写“（ョx ，y ）.ƒ（x ，y ）.～x =y ”，而写“（ョx ，y ）.ƒ（x ，y ）”。 （因此，代替罗素的“（ョx ，r）.ƒ（x ，y ）”.就是：“（ョx ，y ）.ƒ（x ，y ）.v.（ョx ，y ）.ƒ（x ，x ）”）","zh_huang":"同理，我也不写“∃x∃y(f(x, y)˄x=y)”，而是写“∃xf(x, x)”；不写“∃x∃y[f(x, y)˄~x=y]”，而是写“∃x∃yf(x, y)”。 （于是，罗素的“∃x∃yf(x, y)”就变成“∃x∃y[f(x, y)˅∃xf(x, y]”）"},"children":[{"number":"5.5321","texts":{"zh":"因此，例如，我们不写“（x）：fx⊃x＝a”，而写“（Ǝ x）・fx⊃・fa：～（Ǝ x，y）・fx・fy”。 因而，命题“只有一个x满足f（）”将读作“（Ǝ x）・fx：～（Ǝ x，y）・fx・fy”。","en":"Instead of ‘(x): fx. ⊃. x = a’ we thus write, for example, ‘(∃x). fx. ⊃. fa: ~(∃x,y). fx. fy’.And the proposition ‘only one x satisfies f ()’ reads: ‘(∃x). fx: ~(∃x,y). fx. fy’.","de":"Statt „(x): fx ⊃ x = a“ schreiben wir also z. B. „(∃x). fx. ⊃.fa: ∼(∃x, y). fx. fy“. Und der Satz „nur Ein x befriedigt f ()“ lautet: „(∃x). fx: ∼(∃x, y). fx. fy“.","zh_wang":"因此，例如，我们不写“（x）：ƒx ⊃x =a ”，而写“（ョx ）.ƒx .⊃.ƒa ：～（ョx ，y ）.ƒx .ƒy ”。 因而，“只有一个x满足f（）”这个命题将读作“（ョx ）.ƒx ：～（ョx ，y ）.ƒx .ƒy ”","zh_huang":"进而，比如不写“∀x[f(x)➛x=a]”，而是“∀x[f(x)➛f(a)]˄~∃x∃y[f(x)˄f(y)]”。 句子“只有一个x满足f(x)”则应当读作“∃xf(x)˄~∃x∃y[f(x)˄f(y)]”"},"children":[]}]},{"number":"5.533","texts":{"zh":"所以，同一记号不是概念记号系统的必要组成部分。","en":"The identity sign is thus not an essential constituent of a concept-script.","de":"Das Gleichheitszeichen ist also kein wesentlicher Bestandteil der Begriffsschrift.","zh_wang":"因此，标记不是逻辑符号系统的一个必要的组成部分。","zh_huang":"这样，等号就不是逻辑记号系统中有实质性意义的部分了。"},"children":[]},{"number":"5.534","texts":{"zh":"现在我们看到，在一个正确的概念记号系统中，像“a＝a”，“a＝b・b＝c・⊃a＝c”，“（x）・x＝x”，“（Ǝ x）・x＝a”等等伪似命题是根本不能写的。","en":"And now we see that pseudo-propositions such as ‘a = a’, ‘a = b. b = c. ⊃. a = c’, ‘(x). x = x’, ‘(∃x). x = a’, etc., cannot even be written down in a correct concept-script.","de":"Und nun sehen wir, dass Scheinsätze wie: „a = a“, „a = b. b = c. ⊃ a = c“, „(x). x = x“, „(∃x). x = a“, etc. sich in einer richtigen Begriffsschrift gar nicht hinschreiben lassen.","zh_wang":"现在我们看到的伪命题如“a =a ”，“a =b .b =c .⊃a =c ”，“（x ）.x =x ”，“（ョx .x =a ）”，等等，在一个正确的逻辑符号系统中，是完全不能写的。","zh_huang":"于是就可以明白，在正确的记号系统中，像“a=a”“(a=b˄b=c)➛(a=c)”“∀x(x=x)”“∃x(x=a)”这样的伪命题根本就写不出来了。"},"children":[]},{"number":"5.535","texts":{"zh":"这也就消解了所有和这类伪似命题联系在一起的问题。 至此，罗素的“无穷公理”所带来的一切问题都已获致解决。 无穷公理所要说的，可以通过存在无限多个具有不同指谓的名称，在语言中自行表达出来。","en":"This also resolves all the problems that were connected with such pseudo-propositions. All the problems that Russell’s ‘axiom of infinity’ raises can already be solved here. What the axiom of infinity tries to say would express itself in language by there being infinitely many names with a different meaning.","de":"Damit erledigen sich auch alle Probleme, die an solche Scheinsätze geknüpft waren. Alle Probleme, die Russells „Axiom of infinity“ mit sich bringt, sind schon hier zu lösen. Das, was das Axiom of infinity sagen soll, würde sich in der Sprache dadurch ausdrücken, dass es unendlich viele Namen mit verschiedener Bedeutung gäbe.","zh_wang":"因此，所有与这类伪命题有关的问题也就消失了。 罗素的“无穷公理”所带来的一切问题在这里也就获得解决了。 无穷公理所要说的，可以通过存在无穷多个具有不同指谓的名称，在语言中表达出来。","zh_huang":"所有与这类伪命题联系在一起的问题，于是也就都消失了。 这里也就可以解决罗素的“无穷公理”带来的所有问题。 无穷公理想要说的东西，都可以通过在语言中存在不同指称的无穷多名称体现出来。"},"children":[{"number":"5.5351","texts":{"zh":"在某些情形下，人们情不自禁地要使用“a＝a”或者“p⊃p”之类形式的表达式。当人们想要谈论原型，即命题、事物等等时，就出现这种情形。所以，在罗素的《数学原则》中，“p是命题”——这是无意义的——被翻译为符号“p⊃p”，而且把它作为假设置于某些命题前面，以保证处在这些命题主目位置上的只能是命题。 （把假设p⊃p置于一个命题前面，以保证它的主目具有正确形式，这是无意义的，因为对于以非命题为主目这个假设不是假的而是无意义的，而且因为错误种类的主目也使得这个命题本身成为无意义的，所以在防止错误的主目这一点上，命题本身和为此目的而附加的无意义的假设是同样地有用，或者说，是同样地无用。）","en":"There are certain cases in which one is tempted to use expressions of the form ‘a = a’ or ‘p⊃p’ and the like. And indeed this happens when one wants to talk of a prototype—of proposition, thing, etc. Thus Russell, in The Principles of Mathematics, had rendered the nonsense ‘p is a proposition’ in symbols as ‘p⊃p’ and placed it as hypothesis before certain propositions so that their argument-places could only be filled by propositions.(It is nonsense, from the start, to place the hypothesis p⊃p before a proposition to ensure that its arguments have the correct form, because the hypothesis for a non-proposition as argument becomes not false but nonsensical, and because the proposition itself becomes nonsensical by the incorrect kind of argument—in other words, it protects itself from incorrect arguments just as well, or poorly, as attaching a senseless hypothesis for this purpose.)","de":"Es gibt gewisse Fälle, wo man in Versuchung gerät, Ausdrücke von der Form „a = a“ oder „p ⊃ p“ u. dgl. zu benützen. Und zwar geschieht dies, wenn man von dem Urbild: Satz, Ding, etc. reden möchte. So hat Russell in den „Principles of Mathematics“ den Unsinn „p ist ein Satz“ in Symbolen durch „p ⊃ p“ wiedergegeben und als Hypothese vor gewisse Sätze gestellt, damit deren Argumentstellen nur von Sätzen besetzt werden könnten. (Es ist schon darum Unsinn, die Hypothese p ⊃ p vor einen Satz zu stellen, um ihm Argumente der richtigen Form zu sichern, weil die Hypothese für einen Nicht-Satz als Argument nicht falsch, sondern unsinnig wird, und weil der Satz selbst durch die unrichtige Gattung von Argumenten unsinnig wird, also sich selbst ebenso gut, oder so schlecht, vor den unrechten Argumenten bewahrt, wie die zu diesem Zweck angehängte sinnlose Hypothese.)","zh_wang":"在某些情况下，人们情不自禁地要用“a =a ”或者“p ⊃p ”形式的表达式。这也恰恰是在当人们想要谈论原型，即命题、事物等等的时候会出现的。例如，在罗素的《数学原则》中，就曾经把无意义“p是一个命题”表述为符号“p ⊃p ”，并且把它作为假设放到了某些命题的前面，以表示处在它们的命题主目位置上的只能是命题。 （把假设“p ⊃p ”放到一个命题前面，以保证它的主目具有正确的形式，这是无意义的，因为这个假设对于一个作为主目的非命题来说，不是假的，而是无意义的，而且因为这个命题本身对于错误种类的主目来说，也是无意义的，所以在防止错误的主目这一点上，命题本身和以此目的而附加的无意义的假设，并无优劣之分。）","zh_huang":"有些情况会引诱我们使用像“a=a”“p➛p”这类形式的表达式。其实这会在我们谈论原型、句子以及事物等时发生的。比如在罗素的《数学的原则》中，“p是句子”（这样说并无意义）就被写成符号形式“p➛p”，并作为一个前提被置于某些句子前面，以防止其主目位置为句子以外的东西所占据。 （为确保主目有正确的形式，把前提“p➛p”置于句子前面，这样做是无意义的。这只是因为，当句子以外的东西成为主目，这个前提就不是假的，而是无意义的，而句子本身也会因为主目种类不对而变得无意义。因此，这与一个空洞的前提一样，不能用来排除错误的主目。）"},"children":[]},{"number":"5.5352","texts":{"zh":"同样地人们想用“～（Ǝ x）・x＝x”来表达“没有事物 ”。但是，即使这是一个命题，如果确实“有一些事物”，但这些事物与自身不是同一的，这个命题不也同样为真吗？","en":"Likewise one has tried to express ‘There are no things’ by ‘~(∃x). x = x’. But even if this were a proposition, would it not be true as well if indeed ‘there were things’ but these were not identical with themselves?","de":"Ebenso wollte man „Es gibt keine Dinge“ ausdrücken durch „∼(∃x). x = x“. Aber selbst wenn dies ein Satz wäre, – wäre er nicht auch wahr, wenn es zwar „Dinge gäbe“, aber diese nicht mit sich selbst identisch wären?","zh_wang":"同样，人们想用“～（ョx ）.x =x ”来表达“没有任何东西”。但是，即使这是一个命题——如果确实“有一些东西”，但这些东西与它们自身又不是同一的，难道它就不是真的吗？","zh_huang":"同样，也有人希望用“~∃x(x=x)”来表达“不存在事物”。但即便这是一个句子，如果实际上“存在事物”，但这些事物都不与自身等同，那么这个句子不也是真的吗？"},"children":[]}]}]},{"number":"5.54","texts":{"zh":"在一般的命题形式中，命题只是作为真值运算基础而出现于别的命题之中。","en":"In the general propositional form a proposition occurs in a proposition only as the base of truth-operations.","de":"In der allgemeinen Satzform kommt der Satz im Satze nur als Basis der Wahrheitsoperationen vor.","zh_wang":"在一般的命题形式中，命题只是作为真值运算的基础才出现在其他命题之中。","zh_huang":"就一般形式来说，句子只有作为真值操作的基础，才会出现在其他句子中。"},"children":[{"number":"5.541","texts":{"zh":"初看起来，一个命题也可能以别种方式在另一个命题中出现。 特别是在某些心理学的命题形式中，如“A相信p是真的”，或者“A思考p”等等。 这里如果只是肤浅地考察，就好像命题p同对象A处在某种关系之中。 （在当今的知识论中（罗素、摩尔等），正是这样来理解这些命题的。）","en":"At first sight it looks as if a proposition could occur in another in a different way as well. Especially in certain propositional forms in psychology, such as ‘A believes that p is the case’ or ‘A thinks p’, etc. That is, superficially, it looks here as if the proposition p stood in a kind of relation to an object A. (And in modern epistemology (Russell, Moore, etc.) these propositions have been construed in just this way.)","de":"Auf den ersten Blick scheint es, als könne ein Satz in einem anderen auch auf andere Weise vorkommen. Besonders in gewissen Satzformen der Psychologie, wie „A glaubt, dass p der Fall ist“, oder „A denkt p“, etc. Hier scheint es nämlich oberflächlich, als stünde der Satz p zu einem Gegenstand A in einer Art von Relation. (Und in der modernen Erkenntnistheorie (Russell, Moore, etc.) sind jene Sätze auch so aufgefasst worden.)","zh_wang":"初看起来，一个命题也能以别种方式出现在另一个命题之中。 特别是在某些心理学的命题形式中，比如“A相信p 是实情”，或者“A思考p ”等等。 与此，似乎在表面上，命题p 与对象A处在某种关系之中。 [在当今的认识论中（罗素、摩尔等），这些命题都是这样来理解的。]。","zh_huang":"初看起来，好像还有其他方式让一个句子出现在另一个句子中。 尤其是在心理学中，会有像“A相信实际情况是p”“A设想p”等这样的句子形式。 表面上看，这就像一个句子p与一个对象A之间有种关系。 （在现代知识论（罗素、摩尔等）中，这些命题实际上就是这么解释的。）"},"children":[]},{"number":"5.542","texts":{"zh":"但是很清楚，“A相信p”，“A思考p”，“A说p”都是“‘p’说p”的形式：这里涉及到的不是一个事实和一个对象的相关，而是借助于其对象相关的诸事实的相关。","en":"It is clear, however, that ‘A believes that p’, ‘A thinks p’, ‘A says p’ are of the form ‘“p” says p’: and this does not concern a correlation of a fact with an object, but the correlation of facts by means of a correlation of their objects.","de":"Es ist aber klar, dass „A glaubt, dass p“, „A denkt p“, „A sagt p“ von der Form „‚p‘ sagt p“ sind: Und hier handelt es sich nicht um eine Zuordnung von einer Tatsache und einem Gegenstand, sondern um die Zuordnung von Tatsachen durch Zuordnung ihrer Gegenstände.","zh_wang":"但是显然，“A相信p ”，“A思考p ”，“A说p ”都是“‘p ’说p ”的形式：这里我们并没有涉及到一个事实和一个对象的配合，而是由其对象的配合而成的事实的配合。","zh_huang":"然而很清楚，“A相信p”“A设想p”“A说p”，这些都具有“‘p’说p”的形式。这里我们看到的不是一个事实和一个对象的关系，而是事实之间的关系。这种关系是通过它们在对象上的关联建立的。"},"children":[{"number":"5.5421","texts":{"zh":"这也表明，没有像当今肤浅的心理学中所设想的心灵——主体等等——这类东西。 的确，一个组合的心灵就已经不再是心灵了。","en":"This also shows that there is no such thing as the soul—the subject, etc.—as construed in the superficial psychology of today.A composite soul, that is, would no longer be a soul.","de":"Dies zeigt auch, dass die Seele – das Subjekt, etc. – wie sie in der heutigen oberflächlichen Psychologie aufgefasst wird, ein Unding ist. Eine zusammengesetzte Seele wäre nämlich keine Seele mehr.","zh_wang":"这也表明，没有当今肤浅的心理学所设想的心灵——主体等等——之类的东西。 一个复合的心灵就不再是一个心灵。","zh_huang":"这表明没有在当今肤浅的心理学中所设想的像灵魂（主体等）之类的东西。 复合的灵魂其实不算灵魂。"},"children":[]},{"number":"5.5422","texts":{"zh":"对命题形式“A判断p”的正确解释必须表明：使判断成为一种无意义是不可能的。（罗素的理论不满足这个条件。）","en":"The correct explanation of the form of the proposition ‘A judges p’ must show that it is impossible to judge nonsense. (Russell’s theory does not satisfy this condition.)","de":"Die richtige Erklärung der Form des Satzes „A urteilt p“ muss zeigen, dass es unmöglich ist, einen Unsinn zu urteilen. (Russells Theorie genügt dieser Bedingung nicht.)","zh_wang":"对命题“A判断p ”的形式的正确解释必须表明：对无意义的话作出判断是不可能的。（罗素的理论没有满足这个条件。）","zh_huang":"对“A判断p”这种句子形式的正确解释，应当表明判断不可能是无意义的（罗素的理论不满足这个要求）"},"children":[]},{"number":"5.5423","texts":{"zh":"感知一个复合物的意思就是感知到它的各组成部分以如此这般的方式互相关联着。 这也能很好地解释，为何有两种可能的方式把如下图形看成为立方体；以及所有类似的现象。因为我们确实看到两个不同的事实。 （如果我先看定诸a角，对诸b角只是瞥及，于是诸a角显得在前；反之则诸b角显得在前。）","en":"To perceive a complex is to perceive that its constituents stand to one another in such and such a way.This may also explain how the figurecan be seen as a cube in two ways, and all similar appearances. For we really do see two different facts.(If I look first at the a corners and only fleetingly at the b ones, then the a corners appear in front, and conversely.)","de":"Einen Komplex wahrnehmen, heisst, wahrnehmen, dass sich seine Bestandteile so und so zu einander verhalten. Dies erklärt wohl auch, dass man die Figur auf zweierlei Art als Würfel sehen kann; und alle ähnlichen Erscheinungen. Denn wir sehen eben wirklich zwei verschiedene Tatsachen. (Sehe ich erst auf die Ecken a und nur flüchtig auf b, so erscheint a vorne; und umgekehrt.)","zh_wang":"感知一个复合物的意思就是感知它的组成部分是以如此这般的方式结合的。 这也许可以解释如下这个图形 可以有两种方式被看成是立方体；这也可以解释所有类似的现象。因为我们确实看到了两个不同的事实。 （如果我先看定诸a角，而只是瞥及诸b角，于是诸a角似乎在前；诸b角在后，反之亦然。）","zh_huang":"设想一个复合物，就是要设想它的构成部分以如此这般的方式结合在一起。 这很好地解释了，对下列图形为何会有两种方式把它看作立方体（所有类似现象也都可以解释）。因为我们的确看到了两个不同的事实。 （如果我先看标了a的各个角，而只用余光看标了b的那些角，那么标了a的角就显出是在前面，反过来就显出在后面。）"},"children":[]}]}]},{"number":"5.55","texts":{"zh":"现在我们必须先天地回答关于基本命题的一切可能形式的问题。 基本命题由名称组成。可是我们既然不能给出具有不同指谓的名称的数目，我们也就不能给出基本命题的组成。","en":"We must now answer a priori the question as to all possible forms of elementary propositions. An elementary proposition consists of names. Since we cannot specify the number of names with different meaning, however, we cannot specify the composition of the elementary proposition either.","de":"Wir müssen nun die Frage nach allen möglichen Formen der Elementarsätze a priori beantworten. Der Elementarsatz besteht aus Namen. Da wir aber die Anzahl der Namen von verschiedener Bedeutung nicht angeben können, so können wir auch nicht die Zusammensetzung des Elementarsatzes angeben.","zh_wang":"现在我们对基本命题的一切可能的形式问题应当给以先天的回答。 基本命题由名称组成。因为我们不能给出具有不同指谓的名称的数目，我们也就不能给出基本命题的组成。","zh_huang":"我们现在必须先验地回答关于基本命题的所有可能形式的问题。 基本命题是由名称构成的。如果不能确定有多少指称不同的名称，我们也就不能确定基本命题是如何构成的。"},"children":[{"number":"5.551","texts":{"zh":"我们的基本原则是：凡一般地可以由逻辑决定的问题，必须能够当即决定。 （如果我们处在必须通过观察世界来回答这类问题的境地，那就表明我们已经陷入了完全错误的思路。）","en":"Our basic principle is that every question that can be decided at all by logic must be capable of being decided straightaway. (And if we find ourselves having to answer such a problem by looking at the world, then this shows that we are on the wrong track altogether.)","de":"Unser Grundsatz ist, dass jede Frage, die sich überhaupt durch die Logik entscheiden lässt, sich ohne weiteres entscheiden lassen muss. (Und wenn wir in die Lage kommen, ein solches Problem durch Ansehen der Welt beantworten zu müssen, so zeigt dies, dass wir auf grundfalscher Fährte sind.)","zh_wang":"我们的基本原则是：每个可以由逻辑决定的问题，必定可以立即决定。 （如果我们处在一种必须通过观察世界来回答这样一个问题的境地，这就表明我们走上了根本错误的道路上。）","zh_huang":"我们的基本原则是，任何问题，只要终究可以在逻辑上决定，那就一定无须多费神，立即就能决定。 （如果到了不得不查看一下世界才能回答这种问题的地步，那就表明我们的方向完全错了。）"},"children":[]},{"number":"5.552","texts":{"zh":"我们为了理解逻辑所需要的“经验”，不是某物是如何如何的，而是某物存在：但这恰恰不是 经验。 逻辑先于 任何经验——某物是如此这般的。 逻辑先于关于“如何”的问题，而不先于关于“什么”的问题。","en":"The ‘experience’ that we need to understand logic is not that such and such is the case, but that something is; that, however, is precisely not an experience. Logic is prior to every experience—that something is so. It is prior to the how, not prior to the what.","de":"Die „Erfahrung“, die wir zum Verstehen der Logik brauchen, ist nicht die, dass sich etwas so und so verhält, sondern, dass etwas ist: aber das ist eben keine Erfahrung. Die Logik ist vor jeder Erfahrung – dass etwas so ist. Sie ist vor dem Wie, nicht vor dem Was.","zh_wang":"我们为了理解逻辑而需要的“经验”并不是某事是如何如何，而是某事存在；但这恰恰不是经验。 逻辑是先于一切经验的——某物是如此这般的。 逻辑是先于“如何”，而不是先于“什么”的。","zh_huang":"为了理解逻辑所需要的“经验”不是某些情况是怎样的，而是某种东西存在。但这不是一种经验。 逻辑先于任何经验，那些经验是说某个东西是这样的。 它先于“如何”，而并不先于“什么”"},"children":[{"number":"5.5521","texts":{"zh":"如果不是这样，我们怎么能够应用逻辑呢？也可以这样说：假如即使没有世界也有一个逻辑，那么，为何有了一个世界就有一个逻辑呢？","en":"And if this were not so, then how could we apply logic? One could say: if there were a logic even if there were no world, then how could there be a logic given that there is a world?","de":"Und wenn dies nicht so wäre, wie könnten wir die Logik anwenden? Man könnte sagen: Wenn es eine Logik gäbe, auch wenn es keine Welt gäbe, wie könnte es dann eine Logik geben, da es eine Welt gibt.","zh_wang":"而且，如果实际情况不是这样的话，我们怎样能够运用逻辑？我们可以这么说：即使在没有世界的时候，就有逻辑的存在，那么在有了世界的情况下怎么会有逻辑的存在？","zh_huang":"如果不是这样，那逻辑又能如何使用呢？可以这么看，如果说，即便没有世界也会有逻辑，那么，何以可能会因为有了世界才会有一种逻辑呢？"},"children":[]}]},{"number":"5.553","texts":{"zh":"罗素说，在事物（个体）的不同数目之间存在着简单的关系。但是，在什么数目之间？又如何断定这种关系？——依靠经验吗？ （没有地位特殊的数。）","en":"Russell said that there were simple relations between different numbers of things (individuals). But between what numbers? And how is that to be decided?—By experience? (There is no pre-eminent number.)","de":"Russell sagte, es gäbe einfache Relationen zwischen verschiedenen Anzahlen von Dingen (Individuals). Aber zwischen welchen Anzahlen? Und wie soll sich das entscheiden? – Durch die Erfahrung? (Eine ausgezeichnete Zahl gibt es nicht.)","zh_wang":"罗素说：在事物（个体）的不同数目之间存在着简单的关系，那么是在什么数目之间？应该怎样确定这一点——通过经验的方式？ （没有特珠的数目。）","zh_huang":"罗素说过，在各种数目的事物（个体）之间存在着简单的关系。但是，在什么数目之间呢？怎么能够确定这一点呢？通过经验吗？ （并没有地位特殊的数。）"},"children":[]},{"number":"5.554","texts":{"zh":"任何特殊形式的提出都是完全任意的。","en":"The specification of any particular form would be completely arbitrary.","de":"Die Angabe jeder speziellen Form wäre vollkommen willkürlich.","zh_wang":"列举任何特定的形式都会是完全任意的。","zh_huang":"确定一种特定的形式，这是一件纯属任意的事情。"},"children":[{"number":"5.5541","texts":{"zh":"例如，我能否处于一种需要27位关系的记号来标示某种事物的状况，应该可以先天地回答这个问题。","en":"It is supposed to be specifiable a priori whether, for example, I can get into a position where I have to signify something with a sign for a 27-place relation.","de":"Es soll sich a priori angeben lassen, ob ich z. B. in die Lage kommen kann, etwas mit dem Zeichen einer 27-stelligen Relation bezeichnen zu müssen.","zh_wang":"我们怎样能够先天地确定：比如说我是否能处在一种需要用27位关系的符号来标示的状况？","zh_huang":"应该可以先验地回答，比如说，我是否需要一个二十七元的关系记号来表示某个东西。"},"children":[]},{"number":"5.5542","texts":{"zh":"但是，我们真的可以这样来提问吗？我们能够建立一种记号形式而不知道是否有任何东西与之对应吗？ 能否有意义地提问：为有某事发生，必须存在 什么东西？","en":"But may we even ask this? Can we establish a sign form and not know whether something can correspond to it?Does the question have a sense: what must there be in order that something can be-the-case?","de":"Dürfen wir denn aber überhaupt so fragen? Können wir eine Zeichenform aufstellen und nicht wissen, ob ihr etwas entsprechen könne? Hat die Frage einen Sinn: Was muss sein, damit etwas der-Fall-sein kann?","zh_wang":"我们可以这么提问吗？我们能提供一个标记的形式，而不知道是否有什么东西跟它对应吗？ 这个问题有意义吗？即为了使事情发生，必须有什么存在？","zh_huang":"但是，连这样的问题也是合法的吗？我们有可能弄出一种记号形式，却又不知道有没有东西与之对应吗？ 为了让某件事发生，必须有什么东西存在，这个问题有意义吗？"},"children":[]}]},{"number":"5.555","texts":{"zh":"显然，关于基本命题，我们具有某种与其特定的逻辑形式无关的概念。 但是，当有一个系统使我们得以建造符号时，那么这个系统，而非单个的符号，才是逻辑上重要的东西。 不管在逻辑中我是否要处理我所创造的形式，我都必须处理那使我能够创造这些形式的东西。","en":"It is clear that we have a concept of an elementary proposition irrespective of its particular logical form. Where one can construct symbols according to a system, however, there the system is what is logically important and not the individual symbols. And how would it even be possible for me, in logic, to deal with forms that I can invent; rather, I must deal with whatever makes it possible for me to invent them.","de":"Es ist klar, wir haben vom Elementarsatz einen Begriff, abgesehen von seiner besonderen logischen Form. Wo man aber Symbole nach einem System bilden kann, dort ist dieses System das logisch wichtige und nicht die einzelnen Symbole. Und wie wäre es auch möglich, dass ich es in der Logik mit Formen zu tun hätte, die ich erfinden kann; sondern mit dem muss ich es zu tun haben, was es mir möglich macht, sie zu erfinden.","zh_wang":"很明显的是：除了基本命题的特殊形式之外，我们还有关于基本命题的概念。 但是，凡是能依照系统的形式来建立符号的地方，在逻辑上起重要作用的总是这个系统而不是单个的符号。 而且怎么可能既要处理我能够创造的逻辑形式，又要处理使我能够创造它们的条件。","zh_huang":"显然，我们拥有关于基本命题的概念，而不牵涉其特定的逻辑形式。 只要有逻辑系统可以让我们建立符号，那么对逻辑来说重要的就是系统，而不是个别符号。 在逻辑中我的任务怎么可能是对付那些我可以自己制定的形式呢？我必须对付的肯定是让我的制定成为可能的东西。"},"children":[]},{"number":"5.556","texts":{"zh":"不可能有基本命题形式的等级系列。我们只能预见我们自己构造的东西。","en":"There cannot be a hierarchy of the forms of elementary propositions. Only what we ourselves construct can we foresee.","de":"Eine Hierarchie der Formen der Elementarsätze kann es nicht geben. Nur was wir selbst konstruieren, können wir voraussehen.","zh_wang":"基本命题的形式不可能有高低的等级关系。只有我们自己构建的东西才能为我们所预见到。","zh_huang":"对基本命题的形式来说，是不可能存在等级系统的。我们所能预见的只是我们自己构建的东西。"},"children":[{"number":"5.5561","texts":{"zh":"经验的实在受到对象总体的限制。这种限制也在基本命题的总体中表现出来。 等级系列是独立于实在的，而且必须独立于实在。","en":"Empirical reality is limited by the totality of objects. The limit shows itself again in the totality of elementary propositions.The hierarchies are and must be independent of reality.","de":"Die empirische Realität ist begrenzt durch die Gesamtheit der Gegenstände. Die Grenze zeigt sich wieder in der Gesamtheit der Elementarsätze. Die Hierarchien sind, und müssen unabhängig von der Realität sein.","zh_wang":"经验上的实在受限于对象的总和。这种限制也出现在基本命题的总和上。 等级关系独立于实在，而且必然独立于实在。","zh_huang":"经验实在为对象的总体所限定。这种界限也通过基本命题的总体体现出来。 等级系统独立于并且必须独立于实在。"},"children":[]},{"number":"5.5562","texts":{"zh":"如果我们根据纯粹逻辑的理由知道必须有基本命题，那么，凡是理解具有未分析形式的命题的人也必定知道这一点。","en":"If we know on purely logical grounds that there must be elementary propositions, then everyone who understands propositions in their unanalysed form must know it.","de":"Wissen wir aus rein logischen Gründen, dass es Elementarsätze geben muss, dann muss es jeder wissen, der die Sätze in ihrer unanalysierten Form versteht.","zh_wang":"如果我们只根据纯粹逻辑的理由知道必须有基本命题，那么，凡是理解未分析形式的命题的人都必定知道这一点。","zh_huang":"如果纯粹在逻辑的基础上知道必须有基本命题，那么任何人，只要理解了句子未加分析的形式，也就应该知道这一点。"},"children":[]},{"number":"5.5563","texts":{"zh":"事实上，我们日常语言中的所有命题，正如它们本来的那样，在逻辑上是完全有条理的。——我们必须在这里提及的最简单的东西，不是类似于真，而是完整的真本身。 （我们的问题不是抽象的，而且也许是所有问题中最为具体的。）","en":"All propositions of our everyday language are in fact, just as they are, in perfect logical order.—That most simple idea that we have to get across here is not a likeness of the truth but the whole truth itself.(Our problems are not abstract but perhaps the most concrete that there are.)","de":"Alle Sätze unserer Umgangssprache sind tatsächlich, so wie sie sind, logisch vollkommen geordnet. – Jenes Einfachste, was wir hier angeben sollen, ist nicht ein Gleichnis der Wahrheit, sondern die volle Wahrheit selbst. (Unsere Probleme sind nicht abstrakt, sondern vielleicht die konkretesten, die es gibt.)","zh_wang":"我们日常语言中所有命题实际上本来在逻辑上是完全有秩序的。我们在这里应该提供的简单事物不是真实的一个模型而应该完全是真实本身。 （我们的问题并不抽象，而也许就是所有问题中最具体的。）","zh_huang":"我们的日常语言在逻辑上实际上是完全有序的。——我们这里所要表述的极简单的东西，不是真理的一种仿品，而完完全全是真理本身。 （我们的问题不是抽象的，而或许是所有可能的问题中最为具体的）"},"children":[]}]},{"number":"5.557","texts":{"zh":"逻辑的应用 决定有什么样的基本命题。 逻辑不能预期属于其应用的东西。 显然，逻辑不能与其应用冲突。 但是逻辑必须同其应用接触。 因此，逻辑不能和其应用互相重叠。","en":"The application of logic decides what elementary propositions there are. What lies in its application logic cannot anticipate. This is clear: logic must not conflict with its application. Yet logic has to be in contact with its application. Thus logic and its application must not overlap one another.","de":"Die Anwendung der Logik entscheidet darüber, welche Elementarsätze es gibt. Was in der Anwendung liegt, kann die Logik nicht vorausnehmen. Das ist klar: Die Logik darf mit ihrer Anwendung nicht kollidieren. Aber die Logik muss sich mit ihrer Anwendung berühren. Also dürfen die Logik und ihre Anwendung einander nicht übergreifen.","zh_wang":"逻辑的应用决定有什么样的基本命题。 应用的结果是什么，对此逻辑不能预料。 很明显的是逻辑不能跟它的应用冲突。 但是逻辑必须跟它的应用相联系。 所以逻辑和逻辑应用不能彼此重迭。","zh_huang":"逻辑的使用决定了有什么基本命题。 逻辑不能预先决定自己会被如何使用。 逻辑显然不能与其使用相冲突。 但逻辑必须与其使用相接触。 因此，逻辑与其使用不应该彼此重叠。"},"children":[{"number":"5.5571","texts":{"zh":"如果我不能先天地举出有一些什么基本命题，那么要举出它们就必定会导致明显的无意义。","en":"If I cannot specify a priori the elementary propositions, then trying to specify them must lead to obvious nonsense.","de":"Wenn ich die Elementarsätze nicht a priori angeben kann, dann muss es zu offenbarem Unsinn führen, sie angeben zu wollen.","zh_wang":"如果我不能先天地给出基本命题，那么要给出它们就必定导致明显的无意义。","zh_huang":"如果不能先验地给出基本命题，那么试图给出它们就会导致显然的无意义。"},"children":[]}]}]}]},{"number":"5.6","texts":{"zh":"我的语言的界限 意味我的世界的界限。","en":"The limits of my language mean the limits of my world.","de":"Die Grenzen meiner Sprache bedeuten die Grenzen meiner Welt.","zh_wang":"我的语言的界限意谓我的世界的界限。","zh_huang":"我的语言的界限意味着我的世界的界限。"},"children":[{"number":"5.61","texts":{"zh":"逻辑充满世界：世界的界限也就是逻辑的界限。 所以在逻辑上我们不能说：世界上有这个和这个，而没有那个。 因为这看来就假定了我们会排除某些可能性，而这是不可能的事情，不然逻辑就必须超出世界的界限；因为只有超出世界的界限它才也能从另外一边来察看这些界限。 我们不能思考我们所不能思考的东西；因此我们也不能说我们所不能思考的东西。","en":"Logic pervades the world; the limits of the world are also its limits. So we cannot say in logic: there is this and this in the world, but not that. For this would apparently presuppose that we are excluding certain possibilities, and this cannot be the case since otherwise logic would have to go beyond the limits of the world—for it would have to view these limits from the other side as well. What we cannot think, we cannot think; so we cannot say what we cannot think either.","de":"Die Logik erfüllt die Welt; die Grenzen der Welt sind auch ihre Grenzen. Wir können also in der Logik nicht sagen: Das und das gibt es in der Welt, jenes nicht. Das würde nämlich scheinbar voraussetzen, dass wir gewisse Möglichkeiten ausschliessen und dies kann nicht der Fall sein, da sonst die Logik über die Grenzen der Welt hinaus müsste; wenn sie nämlich diese Grenzen auch von der anderen Seite betrachten könnte. Was wir nicht denken können, das können wir nicht denken; wir können also auch nicht sagen, was wir nicht denken können.","zh_wang":"逻辑充满世界：世界的界限也是逻辑的界限。 因此在逻辑上我们不能说：世界上有这个和这个，而没有那个。 因为那就明显地假定：我们排除了某些可能性，而这不是实际情况，因为否则逻辑就必定超出了世界的界限：那就是，如果它也能从另外一面考察这些界限的话。 我们不能思考我们不能思考的东西，因此也就不能说我们不能思考的东西。","zh_huang":"逻辑遍布世界。世界的界限也就是逻辑的界限。 因此在逻辑中我们不能说：“世界中有这个，有这个，但没有那个。” 因为这看起来就预设某些可能性被排除了，而这不可能。因为这就要求逻辑超出世界的界限，只有那样才能从另一边来看界限。 我们不能想我们不能想的东西，因此不能想的我们也不能说。"},"children":[]},{"number":"5.62","texts":{"zh":"这一段话为解决唯我论中有多少真理的问题提供了钥匙。 唯我论者意味 的东西是完全正确的，不过它不能说，而只能自己显示出来。 世界是我的 世界：这表现在语言 （我所唯一理解的语言）的界限就意味我的 世界的界限。","en":"This remark provides the key to deciding the question to what extent solipsism is a truth. For what solipsism means is quite correct; it is just that it cannot be said but only shows itself. That the world is my world shows itself in that the limits of language (of that language I understand) mean the limits of my world.","de":"Diese Bemerkung gibt den Schlüssel zur Entscheidung der Frage, inwieweit der Solipsismus eine Wahrheit ist. Was der Solipsismus nämlich meint, ist ganz richtig, nur lässt es sich nicht sagen, sondern es zeigt sich. Dass die Welt meine Welt ist, das zeigt sich darin, dass die Grenzen der Sprache (der Sprache, die allein ich verstehe) die Grenzen meiner Welt bedeuten.","zh_wang":"这个评论给如下的问题提供了一把钥匙，即唯我论在多大程度上是个真理。 事实上，唯我论所指谓的是非常正确的，只是它不能说出来，而只能显示出来。 世界是我的世界，这显示在语言（我能理解的那种语言）的界限意谓我的世界的局限。","zh_huang":"这样说就在“唯我论在多大程度上是真的”这个问题上启发了我们。 唯我论想说的其实很对，只是不能说出来，而是自己显示出来。 世界是我的世界，这体现在，这种语言（我所理解的唯一语言）的界限意味着我的世界的界限。"},"children":[{"number":"5.621","texts":{"zh":"世界和人生是一回事。","en":"World and life are one.","de":"Die Welt und das Leben sind Eins.","zh_wang":"世界和生活是一回事。","zh_huang":"世界和生命是同一个东西。"},"children":[]}]},{"number":"5.63","texts":{"
