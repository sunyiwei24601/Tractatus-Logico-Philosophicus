      function isFineComment(parent, child) {
        const parentParts = parent.number.split('.');
        const childParts = child.number.split('.');
        if (childParts.length < 2) return false;
        const [parentHead, parentDigits] = parentParts;
        const [childHead, childDigits] = childParts;
        if (parentParts.length === 1) {
          return parentHead === childHead && childDigits.startsWith('0');
        }
        return parentHead === childHead && childDigits.startsWith(`${parentDigits}0`);
      }

      function highlight(text, query) {
        const safe = escapeHtml(text || '');
        if (!query) return safe;
        const pattern = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return safe.replace(new RegExp(pattern, 'ig'), m => `<mark>${m}</mark>`);
      }

      function glossChinese(text) {
        const seen = new Set();
        return String(text || '').replace(zhGlossPattern, (term, offset, source) => {
          const suffix = source.slice(offset + term.length);
          if (/^[（(]\s*[A-Za-z]/.test(suffix)) return term;
          if (seen.has(term)) return term;
          seen.add(term);
          return `${term}（${zhGlossMap.get(term)}）`;
        });
      }

      function formatText(text, query, code) {
        return highlight(code.startsWith('zh') ? glossChinese(text) : text, query);
      }

      function languageOptions() {
        return [...langPicker.querySelectorAll('.lang-option')];
      }

      function languageInputs() {
        return languageOptions().map(option => option.querySelector('input[name="lang"]')).filter(Boolean);
      }

      function normalizeLanguageOrder(codes) {
        const known = new Set(languageOrder);
        const seen = new Set();
        const saved = (Array.isArray(codes) ? codes : []).filter(code => {
          if (!known.has(code) || seen.has(code)) return false;
          seen.add(code);
          return true;
        });
        return [...saved, ...languageOrder.filter(code => !seen.has(code))];
      }

      function prepareLanguageOptions() {
        languageOptions().forEach(option => {
          const input = option.querySelector('input[name="lang"]');
          if (!input) return;
          option.dataset.lang = input.value;
          option.draggable = true;
          option.title = '拖动调整译本显示顺序';
        });
      }

      function applySavedLanguageOrder() {
        try {
          const saved = JSON.parse(localStorage.getItem(languageOrderStorageKey) || '[]');
          const byCode = new Map(languageOptions().map(option => [option.dataset.lang, option]));
          normalizeLanguageOrder(saved).forEach(code => {
            const option = byCode.get(code);
            if (option) langPicker.appendChild(option);
          });
        } catch {
          // Ignore invalid local ordering data and keep the default order.
        }
      }

      function saveLanguageOrder() {
        try {
          localStorage.setItem(languageOrderStorageKey, JSON.stringify(languageInputs().map(input => input.value)));
        } catch {
          // Reordering is a convenience feature; the page should still work without localStorage.
        }
      }

      function applySavedLanguageSelection() {
        try {
          const raw = localStorage.getItem(selectedLanguagesStorageKey);
          if (raw === null) return;
          const saved = JSON.parse(raw);
          if (!Array.isArray(saved)) return;
          const valid = new Set(saved.filter(code => languageOrder.includes(code)));
          if (!valid.size) return;
          languageInputs().forEach(input => { input.checked = valid.has(input.value); });
        } catch {
          // Ignore invalid saved selections and keep the HTML defaults.
        }
      }

      function saveLanguageSelection() {
        try {
          localStorage.setItem(selectedLanguagesStorageKey, JSON.stringify(checkedLanguages()));
        } catch {
          // Selection still works for this session when storage is unavailable.
        }
      }

      function checkedLanguages() {
        return languageInputs().filter(input => input.checked).map(input => input.value);
      }

      function selectedLanguages() {
        const selected = checkedLanguages();
        return selected.length ? selected : ['zh'];
      }

      function displayEntry(node) {
        const code = selectedLanguages().find(langCode => node.texts[langCode])
          || languageOrder.find(langCode => node.texts[langCode])
          || 'zh';
        return { code, text: node.texts[code] || '' };
      }

      function versions(node, query) {
        return selectedLanguages().map(code => {
          const label = payload.labels[code];
          const text = node.texts[code];
          const body = text ? formatText(text, query, code) : '<span class="empty">未匹配到该编号</span>';
          return `<article class="version lang-${code}" data-lang="${code}"><h3>${label}</h3><p>${body}</p></article>`;
        }).join('');
      }

      function selectedSourceNotes(node) {
        if (!showSourceNotes) return [];
        return selectedLanguages()
          .map(code => ({ code, label: payload.labels[code], notes: sourceNotes[code]?.[node.number] || [] }))
          .filter(group => group.notes.length);
      }

      function sourceNotesPanel(node, query) {
        const groups = selectedSourceNotes(node);
        if (!groups.length) return '';
        return `<section class="source-notes">
          <h3 class="source-notes-title">原书注释</h3>
          ${groups.map(group => `<article class="source-note-group lang-${group.code}">
            <h4>${escapeHtml(group.label)} · ${group.notes.length} 条</h4>
            <ol>${group.notes.map(item => `<li>${highlight(item, query)}</li>`).join('')}</ol>
          </article>`).join('')}
        </section>`;
      }

      function hasSelectedSourceNotes(node) {
        return showSourceNotes && selectedLanguages().some(code => sourceNotes[code]?.[node.number]?.length);
      }

      function renderAnnotationInline(text) {
        const codes = [];
        let safe = escapeHtml(text || '').replace(/`([^`]+)`/g, (_, code) => {
          const token = `@@CODE${codes.length}@@`;
          codes.push(`<code>${code}</code>`);
          return token;
        });
        safe = safe.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
        safe = safe.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        safe = safe.replace(/__([^_]+)__/g, '<strong>$1</strong>');
        safe = safe.replace(/~~([^~]+)~~/g, '<del>$1</del>');
        safe = safe.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
        safe = safe.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1<em>$2</em>');
        codes.forEach((code, index) => {
          safe = safe.replace(`@@CODE${index}@@`, code);
        });
        return safe;
      }

      function renderAnnotationMarkdown(text) {
        const source = String(text || '').trim();
        if (!source) return '<span class="empty">预览会显示在这里。支持 Markdown 快捷键。</span>';
        return source.split(/\n{2,}/).map(block => {
          const trimmed = block.trim();
          const lines = trimmed.split('\n').map(line => line.trim()).filter(Boolean);
          const heading = trimmed.match(/^(#{1,3})\s+(.+)$/);
          if (heading && !trimmed.includes('\n')) {
            const level = heading[1].length + 3;
            return `<h${level}>${renderAnnotationInline(heading[2])}</h${level}>`;
          }
          if (lines.length && lines.every(line => /^[-*]\s+/.test(line))) {
            return `<ul>${lines.map(line => `<li>${renderAnnotationInline(line.replace(/^[-*]\s+/, ''))}</li>`).join('')}</ul>`;
          }
          if (lines.length && lines.every(line => /^\d+\.\s+/.test(line))) {
            return `<ol>${lines.map(line => `<li>${renderAnnotationInline(line.replace(/^\d+\.\s+/, ''))}</li>`).join('')}</ol>`;
          }
          return `<p>${renderAnnotationInline(trimmed).replace(/\n/g, '<br>')}</p>`;
        }).join('');
      }

      function wrapSelection(editor, before, after = before, placeholder = '文本') {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const selected = editor.value.slice(start, end);
        const inner = selected || placeholder;
        editor.setRangeText(`${before}${inner}${after}`, start, end, 'end');
        if (!selected) editor.setSelectionRange(start + before.length, start + before.length + placeholder.length);
        editor.dispatchEvent(new Event('input', { bubbles: true }));
      }

      function handleAnnotationShortcut(event) {
        const editor = event.target.closest('.annotation-editor');
        if (!editor) return;
        if (event.key === 'Escape') {
          event.preventDefault();
          editor.blur();
          return;
        }
        if (!(event.metaKey || event.ctrlKey) || event.altKey) return;
        const key = event.key.toLowerCase();
        if (key === 'b') {
          event.preventDefault();
          wrapSelection(editor, '**', '**', '加粗文字');
        } else if (key === 'i') {
          event.preventDefault();
          wrapSelection(editor, '_', '_', '斜体文字');
        } else if (key === 'k') {
          event.preventDefault();
          wrapSelection(editor, '[', '](https://)', '链接文字');
        } else if (key === 'e') {
          event.preventDefault();
          wrapSelection(editor, '`', '`', '代码');
        }
      }

      function enterAnnotationEdit(panel) {
        const editor = panel.querySelector('.annotation-editor');
        if (!editor) return;
        panel.classList.add('editing');
        requestAnimationFrame(() => {
          editor.focus();
          const end = editor.value.length;
          editor.setSelectionRange(end, end);
        });
      }

      function annotationPanel(node) {
        const value = annotations[node.number] || '';
        return `<section class="annotation-panel" data-number="${node.number}">
          <div class="annotation-title">
            <span>我的批注</span>
            <span class="annotation-save-state" data-state-for="${node.number}"></span>
          </div>
          <div class="annotation-hint">双击批注正文编辑。支持 Markdown：⌘/Ctrl+B 加粗，⌘/Ctrl+I 斜体，⌘/Ctrl+K 链接，⌘/Ctrl+E 行内代码，Esc 退出编辑。</div>
          <div class="annotation-preview" data-preview-for="${node.number}" title="双击编辑批注">${renderAnnotationMarkdown(value)}</div>
          <textarea class="annotation-editor" data-number="${node.number}" placeholder="在这里写你的阅读笔记、疑问或交叉引用。">${escapeHtml(value)}</textarea>
          <div class="annotation-actions">
            <button class="annotation-delete" type="button" data-number="${node.number}" ${value.trim() ? '' : 'disabled'}>删除批注</button>
          </div>
        </section>`;
      }

      function renderNode(node, query, isFine = false) {
        if (!branchMatches(node, query)) return '';
        const visibleChildren = node.children.filter(child => branchMatches(child, query));
        const renderedChildren = visibleChildren
          .map(child => renderNode(child, query, isFineComment(node, child)));
        let children = renderedChildren.join('');
        let childrenMarkup = children ? `<ul>${children}</ul>` : '';
        if (/^\d+$/.test(node.number) && visibleChildren.length) {
          const groups = new Map();
          visibleChildren.forEach((child, index) => {
            const precision = child.number.split('.')[1]?.length || 0;
            if (!groups.has(precision)) groups.set(precision, []);
            groups.get(precision).push(renderedChildren[index]);
          });
          if (groups.size > 1) {
            childrenMarkup = `<div class="child-levels">${[...groups.entries()]
              .sort(([left], [right]) => right - left)
              .map(([precision, items]) => `<ul class="child-level-group" data-precision="${precision}">${items.join('')}</ul>`)
              .join('')}</div>`;
          }
        }
        const open = query || expandedNodes.has(node.number) ? ' open' : '';
        const childCount = flatten(node.children).length;
        const translationOpen = expandedTranslations.has(node.number);
        const bubbleClass = translationOpen ? 'bubble expanded-bubble' : 'bubble';
        const liClass = isFine ? ' class="fine-branch"' : '';
        const detailClass = isFine ? 'node fine-node' : 'node';
        const kindLabel = isFine ? '<span class="node-kind">低权重细注</span>' : '';
        const annotationLabel = annotations[node.number]?.trim() ? '<span class="annotation-badge">有批注</span>' : '';
        const sourceNoteLabel = hasSelectedSourceNotes(node) ? '<span class="annotation-badge source-note-badge">有注释</span>' : '';
        const display = displayEntry(node);
        const snippet = translationOpen ? '' : `<span class="snippet">${formatText(display.text, query, display.code)}</span>`;
        return `<li${liClass}>
          <details class="${detailClass}" data-number="${node.number}"${open}>
            <summary>
              <button class="expand-btn" type="button" aria-label="展开或收起 ${node.number}" ${node.children.length ? '' : 'disabled'}></button>
              <span class="${bubbleClass}">
                <span class="num-line">
                  <span class="num">${node.number}${childCount ? ` · ${childCount}` : ''}${kindLabel}${sourceNoteLabel}${annotationLabel}</span>
                  <button class="detail-toggle" type="button" data-number="${node.number}" aria-label="${translationOpen ? '收起' : '展开'} ${node.number} 详情" title="${translationOpen ? '收起详情' : '查看详情'}" aria-expanded="${translationOpen}">
                    <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
                      <path d="M2.4 10s2.7-4.6 7.6-4.6 7.6 4.6 7.6 4.6-2.7 4.6-7.6 4.6S2.4 10 2.4 10Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
                      <circle cx="10" cy="10" r="2.25" fill="currentColor" />
                    </svg>
                  </button>
                </span>
                ${snippet}
                ${translationOpen ? `<div class="inline-translation">${versions(node, query)}${sourceNotesPanel(node, query)}${annotationPanel(node)}</div>` : ''}
              </span>
            </summary>
          </details>
          ${childrenMarkup}
        </li>`;
      }

      function applyFontMode() {
        document.body.classList.remove('font-serif', 'font-songti', 'font-kaiti', 'font-sans');
        document.body.classList.add(`font-${font.value}`);
      }

      function loadZoom() {
        try {
          const value = Number(localStorage.getItem(zoomStorageKey));
          return Number.isFinite(value) && value >= zoomMin && value <= zoomMax ? value : 100;
        } catch {
          return 100;
        }
      }

      function applyZoom(nextZoom, preserveCenter = true) {
        const clamped = Math.round(Math.min(zoomMax, Math.max(zoomMin, nextZoom)));
        const previousScale = treeZoom / 100;
        const centerX = (canvas.scrollLeft + canvas.clientWidth / 2) / previousScale;
        const centerY = (canvas.scrollTop + canvas.clientHeight / 2) / previousScale;
        treeZoom = clamped;
        tree.style.zoom = String(treeZoom / 100);
        zoomValue.value = `${treeZoom}%`;
        zoomValue.textContent = `${treeZoom}%`;
        zoomOut.disabled = treeZoom <= zoomMin;
        zoomIn.disabled = treeZoom >= zoomMax;
        zoomReset.disabled = treeZoom === 100;
        try {
          localStorage.setItem(zoomStorageKey, String(treeZoom));
        } catch {
          // Zoom still works when browser storage is unavailable.
        }
        if (!preserveCenter) return;
        const nextScale = treeZoom / 100;
        canvas.scrollLeft = centerX * nextScale - canvas.clientWidth / 2;
        canvas.scrollTop = centerY * nextScale - canvas.clientHeight / 2;
      }

      function applyZoomAt(nextZoom, clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const localX = Math.min(canvas.clientWidth, Math.max(0, clientX - rect.left));
        const localY = Math.min(canvas.clientHeight, Math.max(0, clientY - rect.top));
        const previousScale = treeZoom / 100;
        const contentX = (canvas.scrollLeft + localX) / previousScale;
        const contentY = (canvas.scrollTop + localY) / previousScale;
        applyZoom(nextZoom, false);
        const nextScale = treeZoom / 100;
        canvas.scrollLeft = contentX * nextScale - localX;
        canvas.scrollTop = contentY * nextScale - localY;
      }

      function touchDistance(first, second) {
        return Math.hypot(second.clientX - first.clientX, second.clientY - first.clientY);
      }

      let pinchStart = null;

      canvas.addEventListener('touchstart', event => {
        if (event.touches.length !== 2) return;
        event.preventDefault();
        pinchStart = {
          distance: touchDistance(event.touches[0], event.touches[1]),
          zoom: treeZoom,
        };
      }, { passive: false });

      canvas.addEventListener('touchmove', event => {
        if (event.touches.length !== 2 || !pinchStart?.distance) return;
        event.preventDefault();
        const first = event.touches[0];
        const second = event.touches[1];
        const ratio = touchDistance(first, second) / pinchStart.distance;
        const centerX = (first.clientX + second.clientX) / 2;
        const centerY = (first.clientY + second.clientY) / 2;
        applyZoomAt(pinchStart.zoom * ratio, centerX, centerY);
      }, { passive: false });

      const finishPinch = () => { pinchStart = null; };
      canvas.addEventListener('touchend', finishPinch, { passive: true });
      canvas.addEventListener('touchcancel', finishPinch, { passive: true });

      canvas.addEventListener('wheel', event => {
        // Desktop browsers expose trackpad pinch gestures as Ctrl+wheel.
        if (!event.ctrlKey) return;
        event.preventDefault();
        const factor = Math.exp(-event.deltaY * 0.01);
        applyZoomAt(treeZoom * factor, event.clientX, event.clientY);
      }, { passive: false });

      function canvasCenter() {
        const rect = canvas.getBoundingClientRect();
        return {
          x: rect.left + canvas.clientLeft + canvas.clientWidth / 2,
          y: rect.top + canvas.clientTop + canvas.clientHeight / 2,
        };
      }

      function visibleBubble(number) {
        if (!number) return null;
        const detail = [...tree.querySelectorAll('details.node')]
          .find(node => node.dataset.number === number);
        const bubble = detail?.querySelector(':scope > summary .bubble');
        const rect = bubble?.getBoundingClientRect();
        return rect?.width && rect?.height ? bubble : null;
      }

      function centerCardNumber() {
        const center = canvasCenter();
        let nearest = null;
        let nearestDistance = Number.POSITIVE_INFINITY;
        tree.querySelectorAll('details.node > summary .bubble').forEach(bubble => {
          const rect = bubble.getBoundingClientRect();
          if (!rect.width || !rect.height) return;
          const distance = Math.hypot(
            rect.left + rect.width / 2 - center.x,
            rect.top + rect.height / 2 - center.y,
          );
          if (distance >= nearestDistance) return;
          nearestDistance = distance;
          nearest = bubble.closest('details.node')?.dataset.number || null;
        });
        return nearest;
      }

      function centerBubble(bubble) {
        if (!bubble) return;
        const center = canvasCenter();
        const rect = bubble.getBoundingClientRect();
        canvas.scrollLeft += rect.left + rect.width / 2 - center.x;
        canvas.scrollTop += rect.top + rect.height / 2 - center.y;
      }

      function saveCenterCardState() {
        if (restoringCenterCard) return;
        const number = centerCardNumber();
        if (!number) return;
        try {
          localStorage.setItem(centerCardStorageKey, number);
        } catch {
          // The reader remains usable when browser storage is unavailable.
        }
      }

      function scheduleCenterCardSave() {
        if (restoringCenterCard) return;
        clearTimeout(centerSaveTimer);
        centerSaveTimer = setTimeout(saveCenterCardState, 120);
      }

      function restoreCenterCardState() {
        let number = null;
        try {
          number = localStorage.getItem(centerCardStorageKey);
        } catch {
          return;
        }
        const bubble = visibleBubble(number);
        if (!bubble) return;
        restoringCenterCard = true;
        requestAnimationFrame(() => {
          centerBubble(bubble);
          requestAnimationFrame(() => { restoringCenterCard = false; });
        });
      }

      canvas.addEventListener('scroll', scheduleCenterCardSave, { passive: true });
      window.addEventListener('pagehide', saveCenterCardState);

      function toggleTranslation(number, anchor) {
        const currentNode = anchor?.closest('details.node');
        const previousRect = currentNode?.getBoundingClientRect();
        if (expandedTranslations.has(number)) {
          expandedTranslations.delete(number);
        } else {
          expandedTranslations.add(number);
        }
        saveExpandedState();
        render();
        if (!previousRect) return;
        const nextNode = [...tree.querySelectorAll('details.node')]
          .find(detail => detail.dataset.number === number);
        const nextRect = nextNode?.getBoundingClientRect();
        if (!nextRect) return;
        canvas.scrollLeft += nextRect.left - previousRect.left;
        canvas.scrollTop += nextRect.top - previousRect.top;
      }

      function render() {
        const query = search.value.trim();
        const children = payload.tree.map(node => renderNode(node, query)).join('');
        const rootOpen = query || expandedNodes.has('root') ? ' open' : '';
        tree.innerHTML = `<li>
          <details class="node root" data-number="root"${rootOpen}>
            <summary><button class="expand-btn" type="button" aria-label="展开或收起逻辑哲学论"></button><span class="bubble"><span class="root-title">逻辑哲学论</span></span></summary>
          </details>
          <ul>${children}</ul>
        </li>`;
        updateNote();
      }

      search.addEventListener('input', render);
      langPicker.addEventListener('change', event => {
        if (!checkedLanguages().length && event.target.matches('input[name="lang"]')) {
          event.target.checked = true;
        }
        saveLanguageSelection();
        render();
      });
      langPicker.addEventListener('dragstart', event => {
        const option = event.target.closest('.lang-option');
        if (!option) return;
        draggedLangOption = option;
        event.dataTransfer.effectAllowed = 'move';
        event.dataTransfer.setData('text/plain', option.dataset.lang || '');
        requestAnimationFrame(() => option.classList.add('dragging'));
      });
      langPicker.addEventListener('dragover', event => {
        if (!draggedLangOption) return;
        const target = event.target.closest('.lang-option');
        if (!target || target === draggedLangOption) return;
        event.preventDefault();
        const rect = target.getBoundingClientRect();
        const afterTarget = event.clientX > rect.left + rect.width / 2;
        langPicker.insertBefore(draggedLangOption, afterTarget ? target.nextSibling : target);
      });
      langPicker.addEventListener('drop', event => {
        if (!draggedLangOption) return;
        event.preventDefault();
        saveLanguageOrder();
        render();
      });
      langPicker.addEventListener('dragend', () => {
        if (draggedLangOption) draggedLangOption.classList.remove('dragging');
        draggedLangOption = null;
        saveLanguageOrder();
        render();
      });
      font.addEventListener('change', applyFontMode);
      zoomOut.addEventListener('click', () => applyZoom(treeZoom - zoomStep));
      zoomIn.addEventListener('click', () => applyZoom(treeZoom + zoomStep));
      zoomReset.addEventListener('click', () => applyZoom(100));
      tree.addEventListener('click', event => {
        const detailButton = event.target.closest('.detail-toggle');
        if (detailButton) {
          event.preventDefault();
          event.stopPropagation();
          const number = detailButton.dataset.number;
          toggleTranslation(number, detailButton);
          return;
        }
        const deleteButton = event.target.closest('.annotation-delete');
        if (deleteButton) {
          event.preventDefault();
          event.stopPropagation();
          delete annotations[deleteButton.dataset.number];
          saveAnnotations();
          render();
          return;
        }
        if (event.target.closest('.annotation-panel')) return;
        const summary = event.target.closest('summary');
        if (!summary) return;
        event.preventDefault();
        const detail = summary.closest('details.node');
        const button = event.target.closest('.expand-btn');
        if (!button) return;
        event.stopPropagation();
        if (button.disabled || !detail) return;
        const collapsing = detail.open;
        const previousCenterNumber = collapsing ? centerCardNumber() : null;
        detail.open = !detail.open;
        if (detail.open) {
          expandedNodes.add(detail.dataset.number);
        } else {
          expandedNodes.delete(detail.dataset.number);
        }
        saveExpandedState();
        syncExpandAllButton();
        if (collapsing) {
          requestAnimationFrame(() => {
            centerBubble(visibleBubble(previousCenterNumber) || visibleBubble(detail.dataset.number));
          });
        }
      });
      tree.addEventListener('dblclick', event => {
        const annotationPreview = event.target.closest('.annotation-preview');
        if (annotationPreview) {
          event.preventDefault();
          event.stopPropagation();
          enterAnnotationEdit(annotationPreview.closest('.annotation-panel'));
          return;
        }
        if (event.target.closest('.annotation-panel')) return;
      });
      tree.addEventListener('input', event => {
        const editor = event.target.closest('.annotation-editor');
        if (!editor) return;
        const number = editor.dataset.number;
        if (editor.value.trim()) {
          annotations[number] = editor.value;
        } else {
          delete annotations[number];
        }
        const saved = saveAnnotations();
        const state = document.querySelector(`[data-state-for="${number}"]`);
        if (state) state.textContent = saved ? '已保存' : '保存失败';
        const preview = document.querySelector(`[data-preview-for="${number}"]`);
        if (preview) preview.innerHTML = renderAnnotationMarkdown(editor.value);
        const deleteButton = document.querySelector(`.annotation-delete[data-number="${number}"]`);
        if (deleteButton) deleteButton.disabled = !editor.value.trim();
      });
      tree.addEventListener('keydown', handleAnnotationShortcut);
      tree.addEventListener('focusout', event => {
        if (!event.target.closest('.annotation-editor')) return;
        setTimeout(() => {
          if (!document.activeElement?.closest('.annotation-panel')) render();
        }, 0);
      });
      toggle.addEventListener('click', () => {
        const expandAll = !allBranchesExpanded();
        if (expandAll) {
          expandedNodes.add('root');
          expandableNodeNumbers.forEach(number => expandedNodes.add(number));
        } else {
          expandedNodes.clear();
        }
        saveExpandedState();
        document.querySelectorAll('details.node').forEach(detail => {
          detail.open = expandAll && (detail.dataset.number === 'root' || expandableNodeNumbers.includes(detail.dataset.number));
        });
        syncExpandAllButton();
      });
      sourceNotesToggle.addEventListener('click', () => {
        showSourceNotes = !showSourceNotes;
        sourceNotesToggle.textContent = showSourceNotes ? '隐藏注释' : '显示注释';
        render();
      });
      exportNotes.addEventListener('click', () => {
        const payload = {
          exportedAt: new Date().toISOString(),
          source: 'tractatus-tree-reader',
          annotations,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'tractatus-annotations.json';
        link.click();
        URL.revokeObjectURL(url);
      });
      importNotes.addEventListener('click', () => importFile.click());
      importFile.addEventListener('change', async () => {
        const [file] = importFile.files || [];
        if (!file) return;
        try {
          const parsed = JSON.parse(await file.text());
          const imported = parsed.annotations && typeof parsed.annotations === 'object' ? parsed.annotations : parsed;
          let changed = 0;
          for (const [number, value] of Object.entries(imported)) {
            if (!nodeByNumber.has(number) || typeof value !== 'string') continue;
            if (value.trim()) {
              annotations[number] = value;
              changed += 1;
            }
          }
          saveAnnotations();
          render();
          note.textContent = `已导入 ${changed} 条批注。${payload.note} 共 ${payload.counts.total} 个命题节点。已保存 ${annotationCount()} 条批注。`;
        } catch {
          note.textContent = '导入失败：请选择有效的批注 JSON 文件。';
        } finally {
          importFile.value = '';
        }
      });
      prepareLanguageOptions();
      applySavedLanguageOrder();
      applySavedLanguageSelection();
      applyFontMode();
      syncExpandAllButton();
      render();
      applyZoom(treeZoom, false);
      restoreCenterCardState();
    </script>
  </body>
</html>
