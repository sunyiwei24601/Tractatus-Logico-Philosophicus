for example, introduce as primitive ideas the concept of a function as well as specific functions (as Russell does), or the concept of number and particular numbers.","de":"Der formale Begriff ist mit einem Gegenstand, der unter ihn fällt, bereits gegeben. Man kann also nicht Gegenstände eines formalen Begriffes und den formalen Begriff selbst als Grundbegriffe einführen. Man kann also z. B. nicht den Begriff der Funktion, und auch spezielle Funktionen (wie Russell) als Grundbegriffe einführen; oder den Begriff der Zahl und bestimmte Zahlen.","zh_wang":"形式概念已经随着属于它的一个对象而确立。因此，不能把属于一个形式概念的对象和与该形式概念本身一起作为初始概念引入。因此，不能（像罗素那样）把函项概念和特定函项一起作为初始概念引进；或者，把数的概念和确定的数一起作为初始概念引进。","zh_huang":"随着给出落于其下的一个对象，形式概念也就已经给出了。因此，人们不能把落于形式概念之下的对象连同形式概念本身一起当作初始概念。比如，人们不能（像罗素那样）在引入函项概念时，还引入特殊的函项充当初始概念；也不能把数的概念和特定的数都当作初始概念。"},"children":[]}]},{"number":"4.1273","texts":{"zh":"如果我们要在概念记号系统中表达一般命题“b是a的一个后继”，就需要有一个形式系列的一般项的表达式： aRb， （Ǝ x）：aRx.xRb， （Ǝ x，y）：aRx.xRy.yRb， …… 一个形式系列的一般项必须用变项来表达，因为“该形式系列的项”这个概念是一个形式概念。（这一点为弗雷格和罗素所忽略：因此他们用以表达上述那种一般命题的方式是不正确的，其中包含着一种恶性循环。） 我们可以通过给出第一项和由前一命题产生下一项的运算的一般形式来规定形式系列的一般项。","en":"If we want to express the general proposition ‘b is a successor of a’ in a concept-script, then we need for this an expression for the general term of the form-series: The general term of a form-series can only be expressed by a variable, since the concept ‘term of this form-series’ is a formal concept. (Frege and Russell overlooked this: the way in which they want to express general propositions such as the above is therefore false; it contains a vicious circle.) We can determine the general term of a form-series by giving its first term and the general form of the operation that generates the next term from the preceding term.","de":"Wollen wir den allgemeinen Satz: „b ist ein Nachfolger von a“ in der Begriffsschrift ausdrücken, so brauchen wir hierzu einen Ausdruck für das allgemeine Glied der Formenreihe: aRb, (∃x): aRx.xRb, (∃x, y): aRx.xRy.yRb,... Das allgemeine Glied einer Formenreihe kann man nur durch eine Variable ausdrücken, denn der Begriff: Glied dieser Formenreihe, ist ein formaler Begriff. (Dies haben Frege und Russell übersehen; die Art und Weise wie sie allgemeine Sätze, wie den obigen ausdrücken wollen ist daher falsch; sie enthält einen circulus vitiosus.) Wir können das allgemeine Glied der Formenreihe bestimmen, indem wir ihr erstes Glied angeben und die allgemeine Form der Operation, welche das folgende Glied aus dem vorhergehenden Satz erzeugt.","zh_wang":"如果我们想在逻辑符号系统中表达“b是a的一个后继”这个一般命题，我们便需要有一个表达式来表示形式系列的一般项：aRb，（ョx ）：aRx .xRb ，（ョx ，y ）：aRx .xRy .yRb …。一个形式系列的一般项只能用一个变项来表达，因为“这个形式系列的项”这个概念是一个形式概念。（这一点，弗雷格和罗素都忽略了；所以他们用以表述上边那种的一般命题的方式是不对的，其中包含着一种恶性循环。） 我们可以通过给出首项和由前一命题产生次项的运算的一般形式来规定形式系列的一般项。","zh_huang":"要在逻辑记法中表达概括命题“b是a的后继”，我们需要表达这样一个形式序列的通项： aRb， ∃x(aRx˄xRb)， ∃x∃y(aRx˄xRy˄yRb)， …。 形式序列的通项只能用变元来表达，因为用“这个形式序列中的项”表示的是形式概念。（弗雷格和罗素忽略了这一点，他们用来表达像上面那种概括命题的方式因而是错误的，其中包含了恶性循环） 对于形式序列，我们可以通过给出其第一个项，然后给出从前一个句子生成后一个句子的操作的一般形式，以此来确定其通项。"},"children":[]},{"number":"4.1274","texts":{"zh":"问一个形式概念是否存在是无意义的，因为不可能有一个命题是对这个问题的回答。 （因此，例如，不能提问“是否存在不可分析的主谓式命题？”这种问题。）","en":"The question as to the existence of a formal concept is nonsensical. For no proposition can answer such a question. (So, for example, one cannot ask: ‘Are there unanalysable subject–predicate propositions?’)","de":"Die Frage nach der Existenz eines formalen Begriffes ist unsinnig. Denn kein Satz kann eine solche Frage beantworten. (Man kann also z. B. nicht fragen: „Gibt es unanalysierbare Subjekt-Prädikatsätze?“)","zh_wang":"问一个形式概念是否存在是无意义的，因为没有一个命题可以回答这类问题。 （例如，不能提问“有没有不可分析的主谓式命题？”）","zh_huang":"问一个形式概念是否存在，这是无意义的，因为没有句子可以回答这个问题。 （例如，就不能问“有不可分析的主谓句子吗”？）"},"children":[]}]},{"number":"4.128","texts":{"zh":"逻辑形式是无 数的。 因此在逻辑中没有特殊的数，因此也没有哲学的一元论和二元论的可能性。等等。","en":"Logical forms are numberless. That is why there are no pre-eminent numbers in logic and why there is no philosophical monism or dualism, etc.","de":"Die logischen Formen sind zahllos. Darum gibt es in der Logik keine ausgezeichneten Zahlen und darum gibt es keinen philosophischen Monismus oder Dualismus, etc.","zh_wang":"逻辑形式是没有数目的。 因此在逻辑中没有特殊的数，因此也没有哲学的一元论和二元论，等等。","zh_huang":"数不适用于逻辑形式。 因此在逻辑中没有特殊的数，比如不可能有哲学上的一元论或多元论。"},"children":[]}]}]},{"number":"4.2","texts":{"zh":"命题的意义是它与事态的存在和不存在的可能性符合和不符合。","en":"The sense of a proposition is its agreement and disagreement with the possibilities of the obtaining and non-obtaining of states-of-things.","de":"Der Sinn des Satzes ist seine Übereinstimmung, und Nichtübereinstimmung mit den Möglichkeiten des Bestehens und Nichtbestehens der Sachverhalte.","zh_wang":"命题的意义是它与原子事实的存在和不存在的可能性符合和不符合。","zh_huang":"句子的含义就是句子与事态存在或不存在的可能性一致或不一致。"},"children":[{"number":"4.21","texts":{"zh":"最简单的命题，即基本命题，断言一个事态的存在。","en":"The simplest proposition, an elementary proposition, asserts the obtaining of a state-of-things.","de":"Der einfachste Satz, der Elementarsatz, behauptet das Bestehen eines Sachverhaltes.","zh_wang":"最简单的命题，即基本命题，断定一个原子事实的存在。","zh_huang":"最简单的句子，即基本命题，断定事态的存在。"},"children":[{"number":"4.211","texts":{"zh":"不可能有基本命题同它相矛盾，这是一个基本命题的标志。","en":"A sign of an elementary proposition is that no elementary proposition can contradict it.","de":"Ein Zeichen des Elementarsatzes ist es, dass kein Elementarsatz mit ihm in Widerspruch stehen kann.","zh_wang":"不可能有基本命题同它相矛盾，这是一个基本命题的标志。","zh_huang":"没有基本命题与之相矛盾，这是基本命题的标志。"},"children":[]}]},{"number":"4.22","texts":{"zh":"基本命题由名称组成。它是名称的一种关联，一种联结。","en":"An elementary proposition consists of names. It is a connection, a concatenation, of names.","de":"Der Elementarsatz besteht aus Namen. Er ist ein Zusammenhang, eine Verkettung, von Namen.","zh_wang":"基本命题由名称组成。它是名称的一种关联，一种连结。","zh_huang":"基本命题由名称构成，它是名称之间的联合、接续。"},"children":[{"number":"4.221","texts":{"zh":"显然，对命题的分析必须达到由名称的直接结合而组成的基本命题。 这就发生了一个问题：命题的结合是怎样产生的？","en":"It is obvious that, in the analysis of propositions, we must arrive at elementary propositions, which consist of names in immediate combination. This raises the question as to how the propositional unity comes about.","de":"Es ist offenbar, dass wir bei der Analyse der Sätze auf Elementarsätze kommen müssen, die aus Namen in unmittelbarer Verbindung bestehen. Es frägt sich hier, wie kommt der Satzverband zustande.","zh_wang":"显然，对命题的分析必须达到由名称直接结合而组成的基本命题。 此时，问题也就产生了：名称结合为命题是怎样产生的？","zh_huang":"显然，在对句子做出分析时，我们肯定会遇到基本命题，这些命题是由名称直接连接构成的。 这样也就产生了一个问题，构建命题的这种连接是如何产生的。"},"children":[{"number":"4.2211","texts":{"zh":"即使世界无限复杂，因此每个事实都是由无限多个事态组成，而且每个事态又都是由无限多个对象组合起来，那也仍然必须有诸对象和事态。","en":"Even if the world is infinitely complex, so that every fact consists of infinitely many states-of-things and every state-of-things is composed of infinitely many objects, there must still be objects and states-of-things.","de":"Auch wenn die Welt unendlich komplex ist, so dass jede Tatsache aus unendlich vielen Sachverhalten besteht und jeder Sachverhalt aus unendlich vielen Gegenständen zusammengesetzt ist, auch dann müsste es Gegenstände und Sachverhalte geben.","zh_wang":"即使世界是无限复杂的，以致每个事实都是由无限个原子事实组成，而且每个原子事实都由无限个对象组合起来，也仍然必须有对象和原子事实。","zh_huang":"即使世界无限复杂，每个事实都由无穷多的事态构成，每个事态都包含无穷多个对象，即使如此，也必须有对象和事态。"},"children":[]}]}]},{"number":"4.23","texts":{"zh":"名称只有同基本命题发生关联才能在命题中出现。","en":"A name occurs in a proposition only in the context of an elementary proposition.","de":"Der Name kommt im Satz nur im Zusammenhange des Elementarsatzes vor.","zh_wang":"名称只有在基本命题的语境内，才在命题中出现。","zh_huang":"只有通过基本命题的连接，名称才会出现于句子之中。"},"children":[]},{"number":"4.24","texts":{"zh":"名称是简单符号，我用单个的字母（“x”、“y”、“z”）来表示。 我把基本命题写作名称的函项，所以它们具有“fx”，“φ（x，y）”的形式，等等。 或者我用字母p，q，r来表示它们。","en":"Names are the simple symbols; I indicate them by single letters (‘x’, ‘y’, ‘z’). I write an elementary proposition as a function of names in the form: ‘fx’, ‘ϕ(x, y)’, etc. Or I indicate it by the letters p, q, r.","de":"Die Namen sind die einfachen Symbole, ich deute sie durch einzelne Buchstaben („x“, „y“, „z“) an. Den Elementarsatz schreibe ich als Funktion der Namen in der Form: „fx“, „ϕ(x, y)“, etc. Oder ich deute ihn durch die Buchstaben p, q, r an.","zh_wang":"名称是简单符号，我用单个的字母（x 、y、z） 来表示。 我用“ƒx ”，“φ（x ，y ）”等形式，把基本命题写作名称的函项。 或者，我用字母p ，q，r 来表示。","zh_huang":"名称是简单符号，我用单个字母（“x”“y”“z”）来表示它们。 我把基本命题写成名称的函项，于是其形式就是“f(x)”“ϕ(x,y)”，等等。 我也会用“p”“q”“R”这样的字母来表示它们。"},"children":[{"number":"4.241","texts":{"zh":"当我使用的两个记号具有同一指谓时，我就在它们之间放入记号“＝”来表达这一点。 因此“a＝b”就意味着记号“b”可以替换记号“a”。 （如果我用等式引进一个新记号“b”，规定它可用以替换已知记号“a”，那么，像罗素那样，我把这个等式（定义）写成“a＝bDef. ”的形式。定义就是一条记号规则。）","en":"If I use two signs with one and the same meaning, then I express this by placing the sign ‘=’ between them. ‘a = b’ thus means: the sign ‘a’ is replaceable by the sign ‘b’. (If I introduce a new sign ‘b’ by an equation, by stipulating that it may replace an already known sign ‘a’, then (like Russell) I write the equation —definition—in the form ‘a = b Def.’. A definition is a rule for signs.)","de":"Gebrauche ich zwei Zeichen in ein und derselben Bedeutung, so drücke ich dies aus, indem ich zwischen beide das Zeichen „=“ setze. „a = b“ heisst also: das Zeichen „a“ ist durch das Zeichen „b“ ersetzbar. (Führe ich durch eine Gleichung ein neues Zeichen „b“ ein, indem ich bestimme, es solle ein bereits bekanntes Zeichen „a“ ersetzen, so schreibe ich die Gleichung – Definition – (wie Russell) in der Form „a = b Def.“. Die Definition ist eine Zeichenregel.)","zh_wang":"如果我使用的两个标记具有同一指谓，我就在它们之间加入标记“=”来表达这一点。 因此，“a=b” 就意味着标记“a ”可以被标记“b” 所替代。 （如果我用等式引进了一个新标记“b ”，规定它来替换一个已知标记“a ”，那么我就（像罗素那样）把这个等式——定义——写成“a =b Def. ”的形式。定义就是一条符号规则。）","zh_huang":"如果两个记号被用于同一个意思，我就用在它们之间使用记号“=”的方式来表达这一点。 “a=b”的意思是，记号“a”可以用“b”来替换。 （要用等式来引入新的记号“b”，规定它可以被用来替换已经知道的记号“a”，那我就用罗素的方式把等式写成“a=b Def.”。定义是针对记号的规则）"},"children":[]},{"number":"4.242","texts":{"zh":"因此，“a＝b”形式的表达式不过是一种表述的辅助手段。关于记号“a”和“b”的指谓，它们并没有陈述什么东西。","en":"Expressions of the form ‘a = b’ are thus only representational aids; they state nothing about the meaning of the signs ‘a’, ‘b’.","de":"Ausdrücke von der Form „a = b“ sind also nur Behelfe der Darstellung; sie sagen nichts über die Bedeutung der Zeichen „a“, „b“ aus.","zh_wang":"因此，“a =b ”形式的表达式只不过是一种方便的表述手段：对于标记“a ”和“b ”的指谓，它们什么也没有说。","zh_huang":"因此，形如“a=b”的表达式只不过是辅助性的描述手段，它并没有说记号“a”和“b”的意义是什么。"},"children":[]},{"number":"4.243","texts":{"zh":"如果不知道两个名称是标示同一个事物还是标示两个不同事物，我们能够理解这两个名称吗？——如果不知道在一个命题中出现的两个名称的指谓是相同还是不同，我们能够理解这个命题吗？ 假如我知道一个英文词和一个具有相同指谓的德文词的指谓：那么我就不可能不知道二者是具有相同指谓的；我必定能把其中一个翻译为另一个。 像“a＝a”这样的表达式以及从中推得的那些表达式，既不是基本命题，也不是另一类有意义的记号。（下面将会表明这一点。）","en":"Can we understand two names without knowing whether they signify the same thing or two different things?—Can we understand a proposition in which two names occur without knowing whether they mean the same or different things? If I know, say, the meaning of an English word and a German word that means the same, then it is impossible for me not to know that they mean the same; it is impossible that I cannot translate one into the other. Expressions such as ‘a = a’, or ones derived from them, are neither elementary propositions nor any other kind of senseful signs. (This will be shown later.)","de":"Können wir zwei Namen verstehen, ohne zu wissen, ob sie dasselbe Ding oder zwei verschiedene Dinge bezeichnen? – Können wir einen Satz, worin zwei Namen vorkommen, verstehen, ohne zu wissen, ob sie Dasselbe oder Verschiedenes bedeuten? Kenne ich etwa die Bedeutung eines englischen und eines gleichbedeutenden deutschen Wortes, so ist es unmöglich, dass ich nicht weiss, dass die beiden gleichbedeutend sind; es ist unmöglich, dass ich sie nicht ineinander übersetzen kann. Ausdrücke wie „a = a“, oder von diesen abgeleitete, sind weder Elementarsätze, noch sonst sinnvolle Zeichen. (Dies wird sich später zeigen.)","zh_wang":"如果不知道两个名称标示同一个事物还是两个不同事物，我们能理解它们吗？对于含有两个名称的一个命题，如果不知道两个名称指谓相同的还是不同的事物，我们能理解它吗？ 如果我知道一个英文词和一个具有同样指谓的德文词：那么我就不可能不知道二者是同义词；我就不可能不会将二者互译。 像“a =a ”的表达式，或者由此演绎而成的表达式，既不是基本命题，也不是有其他意义的标记。（下面将指明这一点。）","zh_huang":"不知道两个名称表示的是同一个东西还是两个不同的东西，这能算理解了这两个名称吗？——如果不知道两个名称的意义是否相同，我们能算理解了包含这两个名称的句子吗？ 如果我知道一个英文词的意义，也理解一个与之同义的德文词，那么我就不可能不知道它们的意义相同，也不可能做不到把一个翻译成另一个。 像“a=a”这样的表达式以及由此导出的东西，都既非基本命题，也非其他有意义的表达式（这一点到后面就会慢慢清楚）"},"children":[]}]},{"number":"4.25","texts":{"zh":"若一个基本命题为真，事态就存在；若一个基本命题为假，事态就不存在。","en":"If an elementary proposition is true, then the state-of-things obtains; if an elementary proposition is false, then the state-of-things does not obtain.","de":"Ist der Elementarsatz wahr, so besteht der Sachverhalt; ist der Elementarsatz falsch, so besteht der Sachverhalt nicht.","zh_wang":"如果基本命题是真的，那么原子事实就存在；如果基本命题是假的，那么原子事实就不存在。","zh_huang":"基本命题为真，则事态存在；基本命题为假，则事态不存在。"},"children":[]},{"number":"4.26","texts":{"zh":"若列举出所有为真的基本命题，就完全地描述了世界。世界通过列举所有的基本命题加上列举其中哪些为真哪些为假而被完全地描述。","en":"The specification of all true elementary propositions describes the world completely. The world is completely described by the specification of all elementary propositions plus the specification as to which of them are true and which false.","de":"Die Angabe aller wahren Elementarsätze beschreibt die Welt vollständig. Die Welt ist vollständig beschrieben durch die Angaben aller Elementarsätze plus der Angabe, welche von ihnen wahr und welche falsch sind.","zh_wang":"列举出一切为真的基本命题，就完全描述了世界。世界通过列举所有的基本命题并指明其中哪些是真的，哪些是假的而被完全描述的。","zh_huang":"确定了所有真的基本命题，也就完全描述了整个世界。对世界的完全描述可以通过给出所有基本命题，然后说明哪些为真哪些为假得到。"},"children":[]},{"number":"4.27","texts":{"zh":"关于n个事态的存在和不存在，有 种可能性。 这些事态的任何一种组合都可存在而同时别的组合不存在。","en":"With regard to the obtaining and non-obtaining of n states-of-things there are possibilities. Any combination of states-of-things can obtain and the others not obtain.","de":"Bezüglich des Bestehens und Nichtbestehens von n Sachverhalten gibt es Möglichkeiten. Es können alle Kombinationen der Sachverhalte bestehen, die andern nicht bestehen.","zh_wang":"关于n个原子事实的存在和不存在，有 种可能性。 这些原子事实的任何组合都可能存在，而其他组合不存在。","zh_huang":"对于n个事态来说，就有种存在和不存在的可能性。 对于这些事态，其中任何一个组合存在，而其他组合不存在，这都是可能的。"},"children":[]},{"number":"4.28","texts":{"zh":"和这些组合相应的即是同等数目的关于这n个基本命题的真（和假）的可能性。","en":"To these combinations correspond just as many possibilities of the truth—and falsity—of n elementary propositions.","de":"Diesen Kombinationen entsprechen ebenso viele Möglichkeiten der Wahrheit – und Falschheit – von n Elementarsätzen.","zh_wang":"和这些组合相对应的是有同样多的关于n 个基本命题的真和假的可能性。","zh_huang":"与这些组合对应的，是n个基本命题的同样数目的为真（和假）的可能性。"},"children":[]}]},{"number":"4.3","texts":{"zh":"基本命题的真值可能性意指事态存在和不存在的可能性。","en":"The truth-possibilities of the elementary propositions mean the possibilities of the obtaining and non-obtaining of states-of-things.","de":"Die Wahrheitsmöglichkeiten der Elementarsätze bedeuten die Möglichkeiten des Bestehens und Nichtbestehens der Sachverhalte.","zh_wang":"基本命题的真值可能性意指原子事实的存在和不存在的可能性。","zh_huang":"基本命题的真值可能性就是事态存在和不存在的可能性。"},"children":[{"number":"4.31","texts":{"zh":"我们可用如下这种图式（见第57页）来表述真值可能性。（“W”指“真”，“F”指“假”；在基本命题行下面的“W”和“F”的各行，以易于理解的方式标明各种真值可能性。）","en":"We can represent the truth-possibilities by schemata of the following kind (‘T’ means ‘true’, ‘F’ ‘false’; the rows of ‘T’ and ‘F’ under the row of the elementary propositions mean their truth-possibilities, in easily understood symbolism): p q r T T T F T T T F T T T F F F T F T F T F F F F F p q T T F T T F F F p T F","de":"Die Wahrheitsmöglichkeiten können wir durch Schemata folgender Art darstellen („W“ bedeutet „wahr“, „F“, „falsch“. Die Reihen der „W“ und „F“ unter der Reihe der Elementarsätze bedeuten in leichtverständlicher Symbolik deren Wahrheitsmöglichkeiten): p q r W W W F W W W F W W W F F F W F W F W F F F F F p q W W F W W F F F p W F","zh_wang":"真值可能性可以用以下这样的图式表现（“T”代表“真”，“F”代表“假”；在基本命题下所列的“T”和“F”的各行，是以易于理解的符号指出各种真值可能）","zh_huang":"真值可能性可以用下面这种表格来表示（“T”表示“真”，“F”表示“假”。基本命题下面那些列有“T”和“F”的各行就表示真值可能性，这很容易理解）： p T F p q T T F T T F F F p q r T T T F T T T F T T T F F F T F T F T F F F F F。"},"children":[]}]},{"number":"4.4","texts":{"zh":"命题是与基本命题的真值可能性符合和不符合的表达式。","en":"A proposition is the expression of agreement and disagreement with the truth-possibilities of the elementary propositions.","de":"Der Satz ist der Ausdruck der Übereinstimmung und Nichtübereinstimmung mit den Wahrheitsmöglichkeiten der Elementarsätze.","zh_wang":"命题是与基本命题的真值可能性符合和不符合的表达式。","zh_huang":"句子所表达的是与基本命题的真值可能性一致或不一致。"},"children":[{"number":"4.41","texts":{"zh":"基本命题的真值可能性是命题真和假的条件。","en":"The truth-possibilities of elementary propositions are the conditions of the truth and falsity of propositions.","de":"Die Wahrheitsmöglichkeiten der Elementarsätze sind die Bedingungen der Wahrheit und Falschheit der Sätze.","zh_wang":"基本命题的真值可能性是命题真假的条件。","zh_huang":"基本命题的真值可能性就是句子为真和为假的条件。"},"children":[{"number":"4.411","texts":{"zh":"这也许立即使人想到，引入基本命题乃是理解所有其它命题的基础。的确，对一般命题的理解显然 是依赖于对基本命题的理解的。","en":"From the outset it is likely that the introduction of elementary propositions is fundamental to the understanding of all other kinds of proposition. Indeed, the understanding of general propositions depends palpably on that of elementary propositions.","de":"Es ist von vornherein wahrscheinlich, dass die Einführung der Elementarsätze für das Verständnis aller anderen Satzarten grundlegend ist. Ja, das Verständnis der allgemeinen Sätze hängt fühlbar von dem der Elementarsätze ab.","zh_wang":"这很可能初看就会让人想到，引入基本命题是理解所有其他命题的基础。的确，对于一般命题的理解，很显然是依赖对基本命题的理解。","zh_huang":"一开始就可以看到，基本命题的引入应该为理解其他种类的句子提供了基础。其实，对概括命题的理解显然依赖于对基本命题的理解。"},"children":[]}]},{"number":"4.42","texts":{"zh":"关于一个命题与n个基本命题的真值可能性符合和不符合，有 种可能情况。","en":"With regard to the agreement and disagreement of a proposition with the truth-possibilities of n elementary propositions there are possibilities.","de":"Bezüglich der Übereinstimmung und Nichtübereinstimmung eines Satzes mit den Wahrheitsmöglichkeiten von n Elementarsätzen gibt es Möglichkeiten.","zh_wang":"关于一个命题与n个基本命题的真值可能性的符合和不符合有 种可能性。","zh_huang":"对于n个基本命题，存在式中种与其真值可能性一致和不一致的方式。"},"children":[]},{"number":"4.43","texts":{"zh":"在图式中我们可用与真值可能性相关的标记“W”（为真）来表达与真值可能性的符合。 没有这个标记就意指不符合。","en":"We can express agreement with the truth-possibilities by correlating, say, the letter ‘T’ (‘true’) with them in the schema. Absence of this letter means disagreement.","de":"Die Übereinstimmung mit den Wahrheitsmöglichkeiten können wir dadurch ausdrücken, indem wir ihnen im Schema etwa das Abzeichen „W“ (wahr) zuordnen. Das Fehlen dieses Abzeichens bedeutet die Nichtübereinstimmung.","zh_wang":"与真值可能性的符合可以通过在图式中配上“T”（真的）这个标记来表示。 没有这个标记就表示不符合。","zh_huang":"在表格中，与真值可能性间的一致，就用与之对应的标记“T”（真）来表示。 没有这个标记，就表示不一致。"},"children":[{"number":"4.431","texts":{"zh":"与基本命题的真值可能性符合和不符合的表达式，表达命题的真值条件。 命题即是其真值条件的表达式。 （因此，弗雷格在解释他的概念记号系统的记号时以真值条件为出发点，是完全正确的。但是弗雷格对真值概念的解释是错误的：如果“真”和“假”真的是对象，而且是～p等等中的主目，那么依照弗雷格的方法，～p的意义就根本是未确定的。）","en":"The expression of the agreement and disagreement with the truth-possibilities of elementary propositions expresses the truth-conditions of a proposition. A proposition is the expression of its truth-conditions. (Frege was thus quite right in beginning with these in explaining the signs of his concept-script. It is just that Frege’s explanation of the concept of truth is incorrect: If ‘the True’ and ‘the False’ were really objects and the arguments in ~p etc., then on Frege’s account, the sense of ‘~p’ would in no way be determined.)","de":"Der Ausdruck der Übereinstimmung und Nichtübereinstimmung mit den Wahrheitsmöglichkeiten der Elementarsätze drückt die Wahrheitsbedingungen des Satzes aus. Der Satz ist der Ausdruck seiner Wahrheitsbedingungen. (Frege hat sie daher ganz richtig als Erklärung der Zeichen seiner Begriffsschrift vorausgeschickt. Nur ist die Erklärung des Wahrheitsbegriffes bei Frege falsch: Wären „das Wahre“ und „das Falsche“ wirklich Gegenstände und die Argumente in ∼p etc. dann wäre nach Frege’s Bestimmung der Sinn von „∼p“ keineswegs bestimmt.)","zh_wang":"与基本命题的真值可能性一致和不一致的表达式，表达命题的真值条件。 命题是真值条件的表达式。 （所以，弗雷格在解释他的逻辑符号系统的标记时，把真值条件作为出发点，这是完全正确的。只是弗雷格对真值概念的解释是错误的：如果“真”和“假”是实在的对象，而且是～p等等中的主目，那么按照弗雷格的方法，～p的意义就根本无法被确定。）","zh_huang":"与基本命题的真值可能性一致和不一致的表达式，所表达的就是句子的真值条件。 句子就是其真值条件的表达式。 （因此，在解释其概念文字中的记号时，弗雷格把真值条件当作起点，这样做是对的。但他对真这个概念的解释是错的。如果“真”和“假”真的是对象，是像~p之类的函项的主目，那么弗雷格的方法也就绝对不能确定~p的含义。）"},"children":[]}]},{"number":"4.44","texts":{"zh":"由标记“W”与真值可能性相关而产生的记号，就是一个题记号。","en":"The sign that arises from correlating the letter ‘T’ with the truth-possibilities is a propositional sign.","de":"Das Zeichen, welches durch die Zuordnung jener Abzeichen „W“ und der Wahrheitsmöglichkeiten entsteht, ist ein Satzzeichen.","zh_wang":"由标号“T”与真值可能性的相配合而得到的符号是一个命题符号。","zh_huang":"标记“T”与真值可能性搭配起来，就构成一种句子记号。"},"children":[{"number":"4.441","texts":{"zh":"很清楚，关于记号“F”和“W”的复合物，并没有对象（或对象的复合物）与之相对应；正好就像没有任何对象与横线、竖线或括号相对应一样。——不存在“逻辑对象”。 当然，这也同样适用于所有和“W”与“F”的图式表达的东西相同的记号。","en":"It is clear that no object (or complex of objects) corresponds to the complex of the signs ‘F’ and ‘T’, any more than to the horizontal and vertical lines or to brackets.—There are no ‘logical objects’. This holds similarly, of course, for all signs that express the same as the schemata of ‘T’ and ‘F’.","de":"Es ist klar, dass dem Komplex der Zeichen „F“ und „W“ kein Gegenstand (oder Komplex von Gegenständen) entspricht; so wenig, wie den horizontalen und vertikalen Strichen oder den Klammern. – „Logische Gegenstände“ gibt es nicht. Analoges gilt natürlich für alle Zeichen, die dasselbe ausdrücken wie die Schemata der „W“ und „F“.","zh_wang":"显然，对于符号“F”和符号“T”的复合，并没有对象（或者对象的复合物）和它相对应；正如同没有任何对象和横线、竖线或者括号相对应一样。“逻辑的对象”是不存在的。 当然，这对于与“T”和“F”的图式表达同样内容的一切符号，也同样适用。","zh_huang":"显然，并没有对象（或由对象构成的复合物），与横线、竖线或括号相对应，同样，也没有对象与由“F”和“T”这样的记号构成的复合物相对应。——不存在“逻辑对象”。 当然，对所有那些与“T”“F”表格内容相同的记号来说，情况也是一样的。"},"children":[]},{"number":"4.442","texts":{"zh":"例如，以下就是一个命题记号： （弗雷格的“断定号”“├”逻辑上是完全无指谓的：在弗雷格（和罗素）的著作中，它不过表示作者主张用这个记号标记的命题是真的。因此，“├”不是命题的组成部分，就像命题的编号不是命题的组成部分一样。一个命题不可能宣称自己为真。） 如果一个图式中真值可能性的排列次序是由组合规则一次性地固定好的，那么最后一列本身就是一个真值条件的表达式。将这一列写成为一行，上述命题记号就成为： “（WW—W）（p，q）” 或者，更清楚一点： “（WWFW）（p，q）”。 （左边括号中的位数由右边括号中的项数决定。）","en":"This, for example, is a propositional sign: p q T T T F T T T F F F T (Frege’s ‘judgement stroke’ ‘⊢’ is logically quite meaningless; it only indicates for Frege (and Russell) that they hold the propositions so signified to be true. ‘⊢’ thus forms no part of propositional structure any more than does, say, a proposition’s number. It is impossible for a proposition to state of itself that it is true.) If the sequence of truth-possibilities in a schema is fixed once and for all by a rule of combination, then the last column by itself is an expression of the truth-conditions. If we write this column down as a row, then the propositional sign becomes: ‘(TT_T)(p,q)’ or better ‘(TTFT)(p,q)’. (The number of places in the left-hand brackets is determined by the number of terms in the right-hand.)","de":"Es ist z. B.: „ p q W W W F W W W F F F W “ ein Satzzeichen. Frege’s „Urteilsstrich“ „ “ ist logisch ganz bedeutungslos; er zeigt bei Frege (und Russell) nur an, dass diese Autoren die so bezeichneten Sätze für wahr halten. „ “ gehört daher ebenso wenig zum Satzgefüge, wie etwa die Nummer des Satzes. Ein Satz kann unmöglich von sich selbst aussagen, dass er wahr ist.) Ist die Reihenfolge der Wahrheitsmöglichkeiten im Schema durch eine Kombinationsregel ein für allemal festgesetzt, dann ist die letzte Kolonne allein schon ein Ausdruck der Wahrheitsbedingungen. Schreiben wir diese Kolonne als Reihe hin, so wird das Satzzeichen zu: „(WW–W)(p, q)“ oder deutlicher „(WWFW)(p, q)“. (Die Anzahl der Stellen in der linken Klammer ist durch die Anzahl der Glieder in der rechten bestimmt.)","zh_wang":"例如 就是一个命题符号。 （弗雷格的断定符号“├”，在逻辑上是完全没有指谓的；这个符号在弗雷格（和罗素）那里，只不过表示作者认为用这个符号所标记的命题是真的。 因此，“├”如同命题的编号一样不属于命题的组成部分。一个命题不能肯定自己是真的。） 如果图式中真值可能性的顺序是由组合规则一次性确定好的，那么最后一列本身便是一个真值条件的表达式。把这一列写成行，则上述命题符号就成为：“（TT—T）（p ，q ）”’或者更清楚地写作：“（TTFT）（p ，q ）。” （左边括号中的位数由右边括号中的项数规定。）","zh_huang":"比如，下面就是一个句子记号： p q T T T F T T T F F F T （弗雷格的断定符“⊦”在逻辑上是完全无所指的。在弗雷格（以及罗素）的著作中，它仅仅表明作者把加了这个记号的句子当作真的。因此，“⊦”和比如命题的编号一样，并非句子的一部分。一个句子不可能说它自己是真的。） 如果表格中的真值可能性按照某种组合规则从一开始就固定下来，那么最后一列本身就表达了真值条件。把列改成行的形式，句子记号就变成了： (TT—T) (p, q)。 也可以直接写成： (TTFT) (p, q)。 （左边括号中位置的数目是由右边括号中的项数决定的。）"},"children":[]}]},{"number":"4.45","texts":{"zh":"对于n个基本命题有Ln 组可能的真值条件。 从一定数目基本命题的真值可能性得来的真值条件组，可以排成一个系列。","en":"For n elementary propositions there are Ln possible groups of truth-conditions. The groups of truth-conditions that pertain to the truth-possibilities of a number of elementary propositions can be ordered in a series.","de":"Für n Elementarsätze gibt es Ln mögliche Gruppen von Wahrheitsbedingungen. Die Gruppen von Wahrheitsbedingungen, welche zu den Wahrheitsmöglichkeiten einer Anzahl von Elementarsätzen gehören, lassen sich in eine Reihe ordnen.","zh_wang":"对于n 个基本命题，都有L n 组可能的真值条件。 由一定数目的基本命题的真值可能性得来的真值条件组，可以排成一个系列。","zh_huang":"对于n个基本命题，可以有Ln组真值条件。 对于特定数目的基本命题来说，在其真值可能性的基础上得到的真值条件组可以排成序列。"},"children":[]},{"number":"4.46","texts":{"zh":"在可能的真值条件组中有两种极端情况。一种情况是，一个命题对于所有基本命题的真值可能性都为真。我们称该真值条件是重言式的。 第二种情况是，一个命题对于所有真值可能性都为假：该真值条件是矛盾的。 在第一种情况下，我们称这命题为重言式，在第二种情况下，称这命题为矛盾式。","en":"Among the possible groups of truth-conditions there are two extreme cases. In one case the proposition is true for all the truth-possibilities of the elementary propositions. We say that the truth-conditions are tautologous. In the second case the proposition is false for all the truth-possibilities: the truth-conditions are contradictory. In the first case we call the proposition a tautology, in the second a contradiction.","de":"Unter den möglichen Gruppen von Wahrheitsbedingungen gibt es zwei extreme Fälle. In dem einen Fall ist der Satz für sämtliche Wahrheitsmöglichkeiten der Elementarsätze wahr. Wir sagen, die Wahrheitsbedingungen sind tautologisch. Im zweiten Fall ist der Satz für sämtliche Wahrheitsmöglichkeiten falsch: Die Wahrheitsbedingungen sind kontradiktorisch. Im ersten Fall nennen wir den Satz eine Tautologie, im zweiten Fall eine Kontradiktion.","zh_wang":"在可能的真值条件组中，有两种极端的情况。 一种情况是，命题对于基本命题的一切真值可能性都是真的。我们说这种真值条件是重言式的。 第二种情况是，命题对于基本命题的一切真值可能性都是假的。真值条件是自相矛盾的。 在第一种情况下，我们将这命题称为重言式，在第二种情况下，我们将这命题称为矛盾式。","zh_huang":"在可能的真值条件组中，有两种极端情况。 在其中一种情况下，对基本命题的所有真值可能性来说，句子都是真的。我们说这种真值条件是同语反复的。 在第二种情况下，对于基本命题的所有真值可能性，句子都是假的。这种真值条件就是矛盾的。 我们称第一种情况的句子为重言式，第二种情况的句子为矛盾式。"},"children":[{"number":"4.461","texts":{"zh":"命题显示它们所说的东西，重言式和矛盾式则显示它们什么也没有说。 重言式没有真值条件，因为它无条件地为真；而矛盾式则不在任何条件下为真。 重言式和矛盾式是缺少意义的。 （就像两个箭头由此指向相反方向的一个点。） （例如，当我知道或者下着雨或者没有下雨时，关于天气我就什么也不知道。）","en":"A proposition shows what it says, a tautology and a contradiction show that they say nothing. A tautology has no truth-conditions, since it is true unconditionally; and a contradiction is true on no condition. Tautology and contradiction are senseless. (Like a point from which two arrows diverge in opposite directions.) (I know nothing about the weather, for example, when I know that it is raining or not raining.)","de":"Der Satz zeigt was er sagt, die Tautologie und die Kontradiktion, dass sie nichts sagen. Die Tautologie hat keine Wahrheitsbedingungen, denn sie ist bedingungslos wahr; und die Kontradiktion ist unter keiner Bedingung wahr. Tautologie und Kontradiktion sind sinnlos. (Wie der Punkt von dem zwei Pfeile in entgegengesetzter Richtung auseinandergehen.) (Ich weiss z. B. nichts über das Wetter, wenn ich weiss, dass es regnet oder nicht regnet.)","zh_wang":"命题显示它们所说的东西，重言式和矛盾式显示它们什么也没有说。 重言式没有真值条件，因为它是无条件地真的；然而矛盾式在任何条件下都不是真的。 重言式和矛盾式是缺乏意义的。 （就像两支箭头从一个点朝相反方向射出一样。） （例如，当我知道或者天在下雨或者不下雨的时候，关于天气，我就是毫无所知。）","zh_huang":"句子显示它在说什么，重言式和矛盾式则显示出它们什么都没有说。 重言式没有真值条件，因其无条件为真；矛盾式则没有令其为真的条件。 重言式和矛盾式是空洞的（sinnlos）。 （这就像一个点，两支箭从这个点向相反方向射出。） （比如，如果我知道天下雨或者不下雨，那么对天气我还是一无所知。）"},"children":[{"number":"4.4611","texts":{"zh":"但是，重言式和矛盾式不是无意义的。它们是符号系统的一部分，正如“0”是算术符号系统的一部分。","en":"Tautology and contradiction, however, are not nonsensical; they are part of the symbolism, just like ‘0’ is part of the symbolism of arithmetic.","de":"Tautologie und Kontradiktion sind aber nicht unsinnig; sie gehören zum Symbolismus, und zwar ähnlich wie die „0“ zum Symbolismus der Arithmetik.","zh_wang":"但是，重言式和矛盾式不是没有意义的，它们是符号系统，就如同“0”属于算术符号系统的一部分一样。","zh_huang":"但重言式和矛盾式不是无意义的。它们是符号系统的一部分。同样，“0”也是算术符号系统的一部分。"},"children":[]}]},{"number":"4.462","texts":{"zh":"重言式和矛盾式不是实在的图像。它们不表述任何可能情况。因为前者容许每一种 可能情况，后者则排除任何一种 可能情况。 在重言式中，与世界符合的条件——表现关系——互相抵消，以致它与实在没有任何表现关系。","en":"Tautology and contradiction are not pictures of reality. They do not represent any possible state of affairs. For the former allows every possible state of affairs, the latter none. In a tautology the conditions of agreement with the world—the representational relations—cancel one another out, so that it stands in no representational relation to reality.","de":"Tautologie und Kontradiktion sind nicht Bilder der Wirklichkeit. Sie stellen keine mögliche Sachlage dar. Denn jene lässt jede mögliche Sachlage zu, diese keine. In der Tautologie heben die Bedingungen der Übereinstimmung mit der Welt – die darstellenden Beziehungen – einander auf, so dass sie in keiner darstellenden Beziehung zur Wirklichkeit steht.","zh_wang":"重言式和矛盾式不是实在的图像。它们没有表述任何可能的事态。因为前者容许任何可能的事态，后者则不允许任何可能的事态。 在重言式中，与世界符合的条件——表述关系——互相抵消，以致它与实在没有任何表述关系。","zh_huang":"重言式与矛盾式不是实在的图像。它们并不描述可能的情况，因为前者承认所有情况，后者则不承认任何情况。 在重言式中，与世界形成一致（即建立描述关系）的条件相互解除，最终丢掉了与实在的描述关系。"},"children":[]},{"number":"4.463","texts":{"zh":"命题的真值条件规定它给事实留出的范围。 （一个命题，一个图像或者一个模型，在否定的意义上就像一个固体，限制着其它物体的活动自由；在肯定的意义上就像用固体物质围住的一片空间，其中有一个物体活动的场所。） 重言式为实在留出了全部——整个无限的——逻辑空间；矛盾式则占满了全部逻辑空间，一点也没有留给实在。因而二者都不以任何方式规定实在。","en":"The truth-conditions determine the room that a proposition leaves to the facts. (A proposition, a picture, a model are, in a negative sense, like a solid body that restricts the freedom of movement of another; in a positive sense, like the space limited by solid substance in which a body finds a place.) A tautology leaves open to reality the whole of—infinite—logical space; a contradiction fills the whole of logical space and leaves no point open to reality. Neither of them can therefore determine reality in any way.","de":"Die Wahrheitsbedingungen bestimmen den Spielraum, der den Tatsachen durch den Satz gelassen wird. (Der Satz, das Bild, das Modell, sind im negativen Sinne wie ein fester Körper, der die Bewegungsfreiheit der anderen beschränkt; im positiven Sinne, wie der von fester Substanz begrenzte Raum, worin ein Körper Platz hat.) Die Tautologie lässt der Wirklichkeit den ganzen – unendlichen – logischen Raum; die Kontradiktion erfüllt den ganzen logischen Raum und lässt der Wirklichkeit keinen Punkt. Keine von beiden kann daher die Wirklichkeit irgendwie bestimmen.","zh_wang":"真值条件规定了命题留给事实的范围。 （命题、图像或者模型，在消极的意义上，就好似一个固体，是可以限制别的物体的自由运动；在积极的意义上，就像用固体物质所限定的空间，在其中有一个物体的位置。） 重言式给实在留下了全部无限的逻辑空间；矛盾式则占满全部逻辑的空间，一点也没有留给实在。因此，它们二者之中没有一个可以用任何方法规定实在。","zh_huang":"真值条件决定了句子留给事实的自由度。 （从否定的方面讲，句子、图像，或者模型，就像刚体一样限制了其他东西的自由移动；而从肯定的角度说，则类似于被刚性物质所包围的空间，可供物体存身。） 重言式把整个无限的逻辑空间留给了实在；矛盾式则填满了整个逻辑空间，而没有为实在留下任何余地。这样，它们都不能确定实在是怎样的。"},"children":[]},{"number":"4.464","texts":{"zh":"重言式的真是确定的，命题的真是可能的，矛盾式的真是不可能的。 （确定的，可能的，不可能的：这里就有了我们在概率论中所需要的最重要的分度标志。）","en":"The truth of tautology is certain, of propositions possible, of contradiction impossible. (Certain, possible, impossible: here we have an indication of the gradation that we need in probability theory.)","de":"Die Wahrheit der Tautologie ist gewiss, des Satzes möglich, der Kontradiktion unmöglich. (Gewiss, möglich, unmöglich: Hier haben wir das Anzeichen jener Gradation, die wir in der Wahrscheinlichkeitslehre brauchen.)","zh_wang":"重言式的真是确定的，命题的真是可能的，矛盾式的真是不可能的。 （确定、可能、不可能：这就有了在概率论中我们所需要的那些分度标志。）","zh_huang":"重言式为真，这是确定的；句子为真，这是可能的；矛盾式为真，则是不可能的。 （确定、可能、不可能，这样就标出了概率论所需要的分级系统。）"},"children":[]},{"number":"4.465","texts":{"zh":"一个重言式和一个命题的逻辑积，与这个命题说的是同一回事情。因此，这积与这命题是同一的。因为没有改变一个符号的意义就不能改变它的本质。","en":"The logical product of a tautology and a proposition says the same as the proposition. This product is thus identical to the proposition. For the essence of a symbol cannot be altered without altering its sense.","de":"Das logische Produkt einer Tautologie und eines Satzes sagt dasselbe, wie der Satz. Also ist jenes Produkt identisch mit dem Satz. Denn man kann das Wesentliche des Symbols nicht ändern, ohne seinen Sinn zu ändern.","zh_wang":"一个重言式和一个命题的逻辑积所说的与这个命题所说的是相同的。因此，这个逻辑积和这个命题是同一的。因为只有改变符号的意义才能改变它的本质。","zh_huang":"重言式和一个句子的合取所说的内容与这个句子相同。因此，这一合取就等于这个句子。因为改变符号中本质性的东西，而不让其含义一同改变，这是不可能的。"},"children":[]},{"number":"4.466","texts":{"zh":"记号的一定的合乎逻辑的结合，对应着其指谓的一定的合乎逻辑的结合。能与每一种任意的 结合对应的只能是非结合的记号。 换句话说，对于每一种情况都为真的命题，根本不可能是记号的结合；因为，如果它们是记号的结合，就只能有对象的一定的结合与它们相对应。 （而不合乎逻辑的结合是没有 一种对象的结合与之相对应的。） 重言式和矛盾式是记号结合的极限情形：即记号结合的解体。","en":"To a determinate logical combination of signs corresponds a determinate logical combination of their meanings; every arbitrary combination only corresponds to uncombined signs. That is, propositions that are true for every state of affairs cannot be combinations of signs at all, since, if they were, only determinate combinations of objects could correspond to them. (And where there is no logical combination there is no corresponding combination of objects.) Tautology and contradiction are the limiting cases of the combination of symbols, namely, their dissolution.","de":"Einer bestimmten logischen Verbindung von Zeichen entspricht eine bestimmte logische Verbindung ihrer Bedeutungen; jede beliebige Verbindung entspricht nur den unverbundenen Zeichen. Das heisst, Sätze die für jede Sachlage wahr sind, können überhaupt keine Zeichenverbindungen sein, denn sonst könnten ihnen nur bestimmte Verbindungen von Gegenständen entsprechen. (Und keiner logischen Verbindung entspricht keine Verbindung der Gegenstände.) Tautologie und Kontradiktion sind die Grenzfälle der Zeichenverbindung, nämlich ihre Auflösung.","zh_wang":"对于标记的一定的合乎逻辑的结合，对应着其指谓的一定的合乎逻辑的结合。任何一种任意的结合只能与未结合的标记相对应。 那就是说，对于每个事态都是真的命题，绝对不可能是符号的结合；因为，否则只有对象的一定的结合与它们相对应。 （与没有逻辑的结合相对应的是没有对象的结合。） 重言式和矛盾式是符号结合的极限情况：即符号结合的解体。","zh_huang":"记号在逻辑上如何连接，指称在逻辑上也就会相应地连接起来。若要与任何一种连接都对应，那就只能是没有连接在一起的记号。 换句话说，在所有情况下都为真的句子，不可能是连接在一起的记号。因为，如果是连在一起的记号，那就只有对象特定的连接才与之对应。 （在没有逻辑连接的情况下，就不会有对象的连接。） 重言式与矛盾式是记号连接的极限状态，即这种连接的解体。"},"children":[{"number":"4.4661","texts":{"zh":"当然，在重言式和矛盾式中，记号也是互相结合着的，即它们彼此之间有一定的关系；但是这些关系是无指谓的，对├而言它们不是本质的东西。","en":"Admittedly, signs are combined with one another in tautology and contradiction as well, i.e. they stand in relations to one another, but these relations are meaningless, inessential to the symbol.","de":"Freilich sind auch in der Tautologie und Kontradiktion die Zeichen noch mit einander verbunden, d. h. sie stehen in Beziehungen zu einander, aber diese Beziehungen sind bedeutungslos, dem Symbol unwesentlich.","zh_wang":"当然，在重言式和矛盾式中符号也是互相结合的，即它们彼此之间有一定的关系；但是这些关系是无指谓的，对于符号来说它们不是本质的东西。","zh_huang":"诚然，在重言式和矛盾式中记号是连在一起的，它们相互之间有特定的关系，但这种关系并不表示什么，对符号来说这种关系并不重要。"},"children":[]}]}]}]},{"number":"4.5","texts":{"zh":"看来现在可以给出最一般的命题形式：即给出一个关于任何一种 记号语言的命题的描述，使得每一种可能的意义都能够用适合这种描述的符号来表达，而且，在适当地选择名称指谓的前提下，每一个适合这种描述的符号都能表达一种意义。 显然，在这种描述中只能 包含对于最一般的命题形式为本质的东西，否则，它就不会是最一般的形式。 一般的命题形式的存在，为以下事实所证明：即没有任何一个命题，其形式是不能预知（即构造）的。命题的一般形式是：事情是如此这般的。","en":"It now appears possible to specify the most general propositional form: that is, to give a description of the propositions of any sign-language, so that every possible sense can be expressed by a symbol that fits the description, and that every symbol that fits the description can express a sense, if the meanings of the names are chosen accordingly. It is clear that in the description of the most general propositional form only what is essential to it may be described—since otherwise it would not be the most general. That there is a general propositional form is demonstrated by this: that there cannot be a proposition whose form could not have been foreseen (i.e. constructed). The general form of a proposition is: such and such is the case.","de":"Nun scheint es möglich zu sein, die allgemeinste Satzform anzugeben: das heisst, eine Beschreibung der Sätze irgendeiner Zeichensprache zu geben, so dass jeder mögliche Sinn durch ein Symbol, auf welches die Beschreibung passt, ausgedrückt werden kann, und dass jedes Symbol, worauf die Beschreibung passt, einen Sinn ausdrücken kann, wenn die Bedeutungen der Namen entsprechend gewählt werden. Es ist klar, dass bei der Beschreibung der allgemeinsten Satzform nur ihr Wesentliches beschrieben werden darf, – sonst wäre sie nämlich nicht die allgemeinste. Dass es eine allgemeine Satzform gibt, wird dadurch bewiesen, dass es keinen Satz geben darf, dessen Form man nicht hätte voraussehen (d. h. konstruieren) können. Die allgemeine Form des Satzes ist: Es verhält sich so und so.","zh_wang":"现在看来似乎可以给出最一般的命题形式：即给出一个关于某一种符号语言的命题的描述，使得每一种可能的意义都能够用适合这种描述的符号来表达，而且，在适当地选择名称指谓的前提下，每一个适合这种描述的符号都能表达一种意义。 显然，在对最一般的命题形式的这种描述中，仅仅能描述其本质的东西，否则它就不是最一般的形式了。 有一种一般命题形式的存在，是由以下事实证明的：即不会有任何一个命题的形式是不可预知（即构造）的。命题的一般形式是：事情是如此这般的。","zh_huang":"现在应该有可能为句子给出最为一般的形式，就是说，为任何一种记号语言中的句子给出一种描述，所有可能的含义都能够为满足这种描述的符号所表达，而所有满足这种描述的符号，只要其中名称的指称相应地确定下来，这些符号就能表达含义。 显然，这种描述中只包含对于最为一般的句子形式来说不可或缺的东西，否则那就不是最一般的形式了。 不可能存在一种句子，其形式为我们所不能预知（构造）。这就证明了句子的一般形式是存在的。句子的一般形式是：事情就是这样的。"},"children":[{"number":"4.51","texts":{"zh":"假如向我给出了所有的 基本命题：那么问题就只在于我能用它们构造出一些什么命题。这样我就有了全部 命题，而且这 就确定了这全部命题的界限。","en":"Suppose that I am given all elementary propositions; then the question arises as to what propositions I can form from them. And the answer is all propositions and this is how they are limited.","de":"Angenommen, mir wären alle Elementarsätze gegeben: Dann lässt sich einfach fragen: welche Sätze kann ich aus ihnen bilden. Und das sind alle Sätze und so sind sie begrenzt.","zh_wang":"假如，一切的基本命题都已经给了我：那么我们就可以简单地问：我能用它们构造出一些什么命题。这些就是全部命题，因而它们是受限制的。","zh_huang":"假设所有基本命题都已给出，然后就只需要问，由此可以得到什么句子。这就是所有句子，这样也就限定了能有哪些句子。"},"children":[]},{"number":"4.52","texts":{"zh":"命题包括从所有基本命题的总体（自然，也从其确实是所有 基本命题的总体）中所能得出的一切。（因此，在一定的意义上可以说，一切 命题都是基本命题的概括。）","en":"Propositions are everything that follows from the totality of all elementary propositions (and also, of course, from its being the totality of all). (So, in a certain sense, one could say that all propositions are generalizations of elementary propositions.)","de":"Die Sätze sind Alles, was aus der Gesamtheit aller Elementarsätze folgt (natürlich auch daraus, dass es die Gesamtheit aller ist). (So könnte man in gewissem Sinne sagen, dass alle Sätze Verallgemeinerungen der Elementarsätze sind.)","zh_wang":"命题就是从所有基本命题的总和（自然也从其确实是所有它们的总和）中所得出的一切。（所以，在某种意义上可以说，一切命题都是基本命题的概括。）","zh_huang":"句子就是从所有基本命题的总体（当然，其中也包括这样一个事实就是所有基本命题的总体）推出的所有东西。（因此可以说，所有句子在某种意义上都是基本命题的概括。）"},"children":[]},{"number":"4.53","texts":{"zh":"一般的命题形式是变项。","en":"The general propositional form is a variable.","de":"Die allgemeine Satzform ist eine Variable.","zh_wang":"一般命题形式是变项。","zh_huang":"句子的一般形式就是变元。"},"children":[]}]}]},{"number":"5","texts":{"zh":"命题是基本命题的真值函项。 （基本命题是自身的真值函项。）","en":"A proposition is a truth-function of elementary propositions. (An elementary proposition is a truth-function of itself.)","de":"Der Satz ist eine Wahrheitsfunktion der Elementarsätze. (Der Elementarsatz ist eine Wahrheitsfunktion seiner selbst.)","zh_wang":"命题是基本命题的真值函项。 （基本命题是其自身的真值函项。）","zh_huang":"句子是基本命题的真值函项。 （基本命题是自己的真值函项。）"},"children":[{"number":"5.01","texts":{"zh":"基本命题是命题的真值主目。","en":"Elementary propositions are the truth-arguments of propositions.","de":"Die Elementarsätze sind die Wahrheitsargumente des Satzes.","zh_wang":"基本命题是命题的真值主目。","zh_huang":"基本命题是句子的真值主目。"},"children":[]},{"number":"5.02","texts":{"zh":"函项的主目很容易和名称的附标相混淆。因为从主目和附标我都能看出包含它们的那些记号的指谓。 例如，当罗素写“＋c ”时，其中“c”就是一个附标，它指明整个记号是用于基数的加号。但是这种标记法是一种任意约定的结果，因而完全可能选择一个简单的记号来代替“＋c”；可是，在“～p”中，“p”不是附标而是主目：除非已经先理解了“p”的意义，“～p”的意义就不可能 理解。（在名称尤利乌斯・恺撒中，“尤利乌斯”是一个附标。附标总是对对象的描述的一部分，我们把它附加到对象的名称上面：例如尤利乌斯家族中的这位 恺撒。） 如果我没有弄错，弗雷格关于命题和函项的指谓理论，就是建立在混淆主目和附标的基础之上的。弗雷格认为逻辑命题是名称，而它们的主目则是这些名称的附标。","en":"It is easy to confuse the arguments of functions with the indices of names. For I recognize from both an argument and an index the meaning of the sign that contains them. In Russell’s ‘+c’, for example, ‘c’ is an index that indicates that the whole sign is the addition sign for cardinal numbers. But this designation rests on arbitrary convention and instead of ‘+c’ a simple sign could be chosen; in ‘~p’, however, ‘p’ is not an index but an argument: the sense of ‘~p’ cannot be understood without prior understanding of the sense of ‘p’. (In the name ‘Julius Caesar’ ‘Julius’ is an index. The index is always part of a description of the object to whose name we attach it. For example, the Caesar of the gens Julia.) The confusion of argument and index underlies, if I am not mistaken, Frege’s theory of the meaning of propositions and functions. For Frege the propositions of logic were names and their arguments the indices of these names.","de":"Es liegt nahe, die Argumente von Funktionen mit den Indices von Namen zu verwechseln. Ich erkenne nämlich sowohl am Argument wie am Index die Bedeutung des sie enthaltenden Zeichens. In Russell’s „+c“ ist z. B. „c“ ein Index, der darauf hinweist, dass das ganze Zeichen das Additionszeichen für Kardinalzahlen ist. Aber diese Bezeichnung beruht auf willkürlicher Übereinkunft und man könnte statt „+c“ auch ein einfaches Zeichen wählen; in „∼p“ aber ist „p“ kein Index, sondern ein Argument: der Sinn von „∼p“ kann nicht verstanden werden, ohne dass vorher der Sinn von „p“ verstanden worden wäre. (Im Namen Julius Cäsar ist „Julius“ ein Index. Der Index ist immer ein Teil einer Beschreibung des Gegenstandes, dessen Namen wir ihn anhängen. Z. B. Der Cäsar aus dem Geschlechte der Julier.) Die Verwechslung von Argument und Index liegt, wenn ich mich nicht irre, der Theorie Frege’s von der Bedeutung der Sätze und Funktionen zugrunde. Für Frege waren die Sätze der Logik Namen, und deren Argumente die Indices dieser Namen.","zh_wang":"人们很自然地就会把函项的主目与名字的标号相混淆。因为从主目和标号上，我都能看到包含主目的标记的指谓。 例如，在罗素的“+c ”中，“c ”就是一个标号，它指明整个标记是用于基数的加号。但是这种标记法是依赖于任意的约定，因而人们可以选择一个简单的标记来替代“+c ”；可是，在“～p ”中，“p ”不是一个标号而是一个主目；只有已经理解了“p ”的意义，才可能理解“～p ”的意义。（在尤利乌斯·恺撒这个名字中，“尤利乌斯”是一个标号。标号经常都是对象描述的一部分，我们把它附加到对象的名字上。比如尤利乌斯家族的恺撒。） 如果我没有弄错的话，主目和标号的混淆就是弗雷格关于命题和函项的指谓理论的根源。对于弗雷格来说，逻辑命题就是名字，它们的主目就是这些名字的标号。","zh_huang":"很容易把函项的主目与名称的词缀混淆起来，因为主目和词缀一样，都可以用来辨别由其构成的记号的意义。 例如，罗素的记号“+c”中的“c”表示整个记号是用于基数的加号。但记号的这种用法是任意约定的结果，完全可以不用“+c”，而是用一个简单的记号。然而，在“~p”中，“p”不是词缀，而是主目。只有先理解了“p”的含义，人们才能理解“~p”的含义。（在尤里乌斯·恺撒这个名字中，“尤里乌斯”是词缀。词缀总是对象的摹状词的一部分，我们会把词缀与对象的名称连在一起用，比如尤里乌斯家的那位恺撒。） 如果我没有弄错的话，弗雷格关于句子和函项意义的理论就建立在对主目和词缀的混淆上。弗雷格把逻辑命题当作名称，而其主目则当作名称的词缀。"},"children":[]},{"number":"5.1","texts":{"zh":"真值函项可以排成系列。 这是概率论的基础。","en":"The truth-functions can be ordered in series. This is the foundation of probability theory.","de":"Die Wahrheitsfunktionen lassen sich in Reihen ordnen. Das ist die Grundlage der Wahrscheinlichkeitslehre.","zh_wang":"真值函项可以排成系列。 这是概率论的基础。","zh_huang":"真值函项可以排列成序列。 而这就是概率论的基础。"},"children":[{"number":"5.101","texts":{"zh":"一定数目的基本命题的真值函项，可以按以下这种图式 列出： （WWWW）（p，q） 重言式（如果p则p，且如果q则q。） （p⊃p・q⊃q） （FWWW）（p，q） 用话来说：非p且q两者。（～（p・q）） （WFWW）（p，q） 用话来说：如果q则p。（q⊃p） （WWFW）（p，q） 用话来说：如果p则q。（p⊃q） （WWWF）（p，q） 用话来说：p或q。（p∨q） （FFWW）（p，q） 用话来说：非q。（～q） （FWFW）（p，q） 用话来说：非p。（～p） （FWWF）（p，q） 用话来说：p或q，但非p且q。（p・～q：∨：q・～p） （WFFW）（p，q） 用话来说：如果p则q，且如果q则p。（p≡q） （WFWF）（p，q） 用话来说：p。 （WWFF）（p，q） 用话来说：q。 （FFFW）（p，q） 用话来说：既非p亦非q。（～p・～q或p︳q） （FFWF）（p，q） 用话来说：p且非q。（p・～q） （FWFF）（p，q） 用话来说：q且非p。（q・～p） （WFFF）（p，q） 用话来说：p且q。（p・q） （FFFF）（p，q） 矛盾式。（p且非p，和q且非q）（p・～p・q・～q） 我将用命题的真值基础 这个名称来称呼其真值主目使该命题为真的那些真值可能性。","en":"The truth-functions of any number of elementary propositions can be written down in a schema of the following kind: (TTTT) (p,q) Tautology (If p, then p; and if q, then q.) [p⊃p. q⊃q] (FTTT) (p,q) in words: Not both p and q. [~(p.q)] (TFTT) (p,q) „ „ If q, then p. [q⊃p] (TTFT) (p,q) „ „ If p, then q. [p⊃q] (TTTF) (p,q) „ „ p or q. [pvq] (FFTT) (p,q) „ „ Not q.[~ q] (FTFT) (p,q) „ „ Not p. [~p] (FTTF) (p,q) „ „ p or q, but not both. [p.~q: v: q.~p] (TFFT) (p,q) „ „ If p, then q; and if q, then p. [p≡q] (TFTF) (p,q) „ „ p (TTFF) (p,q) „ „ q (FFFT) (p,q) „ „ Neither p nor q. [~p.~q or p|q] (FFTF) (p,q) „ „ p and not q. [p.~q] (FTFF) (p,q) „ „ q and not p. [q.~p] (TFFF) (p,q) „ „ p and q. [p.q] (FFFF) (p,q) Contradiction (p and not p; and q and not q.) [p.~p. q.~q] Those truth-possibilities of its truth-arguments that make a proposition true I will call its truth-grounds.","de":"Die Wahrheitsfunktionen jeder Anzahl von Elementarsätzen lassen sich in einem Schema folgender Art hinschreiben: (WWWW)(p, q) Tautologie (Wenn p, so p; und wenn q, so q.) (p ⊃ p. q ⊃ q) (FWWW)(p, q) in Worten: Nicht beides p und q. (∼(p. q)) (WFWW)(p, q) „ „ Wenn q, so p. (q ⊃ p) (WWFW)(p, q) „ „ Wenn p, so q. (p ⊃ q) (WWWF)(p, q) „ „ p oder q. (p ∨ q) (FFWW)(p, q) „ „ Nicht q. ∼q (FWFW)(p, q) „ „ Nicht p. ∼p (FWWF)(p, q) „ „ p oder q, aber nicht beide. (p. ∼q: ∨: q. ∼p) (WFFW)(p, q) „ „ Wenn p, so q; und wenn q, so p. (p ≡ q) (WFWF)(p, q) „ „ p (WWFF)(p, q) „ „ q (FFFW)(p, q) „ „ Weder p noch q. (∼p. ∼q) oder (p | q) (FFWF)(p, q) „ „ p und nicht q. (p. ∼q) (FWFF)(p, q) „ „ q und nicht p. (q. ∼p) (WFFF)(p, q) „ „ q und p. (q. p) (FFFF)(p, q) Kontradiktion (p und nicht p; und q und nicht q.) (p. ∼p. q. ∼q) Diejenigen Wahrheitsmöglichkeiten seiner Wahrheitsargumente, welche den Satz bewahrheiten, will ich seine Wahrheitsgründe nennen.","zh_wang":"每种一定数目的基本命题的真值函项，都可以按照以下这种图式罗列出来： （TTTT）（p ，q ）重言式（如果p 则p ，且如果q 则q ）[p ⊃p .q⊃q ] （FTTT）（p ，q ）用话来说；非p 且q .[～（p .q ）] （TFTT）（p ，q ）用话来说：如果q 则p .[q ⊃p ] （TTFT）（p ，q ）用话来说：如果p 则q .[p ⊃q ] （TTTF）（p ，q ）用话来说：p 或q .[p vq ] （FFTT）（p ，q ）用话来说：非q .[～q ] （FTFT）（p ，q ）用话来说：非p .[～p ] （FTTF）（p ，q ）用话来说；p 或q ，但非p 且q .[p .～q ：v：q .～p ] （TFFT）（p ，q ）用话来说：如果p 则q 且如果q 则p .[p ≡q ] （TFTF）（p ，q ）用话来说：p （TTFF）（p ，q ）用话来说：q （FFFT）（p ，q ）用话来说：既非p 亦非q .[～p .～q 或p ｜q ] （FFTF）（p ，q） 用话来说：p 且非q .[p .～q ] （FTFF）（p ，q） 用话来说：q 且非p .[q. ～p ] （TFFF）（p ，q） 用话来说：p 且q .[p .q ] （FFFF）（p ，q） 矛盾式（p 且非p ，和q 且非q ）[p .～p .q.～q ] 那些使得命题为真的真值主目的真值可能性，我称之为真值基础。","zh_huang":"特定数目的基本命题构成的真值函项都可以写成如下表格： (TTTT)(p, q) 文字形式：重言式：如果p，那么p，并且，如果q，那么q。 符号形式：((p➛p)˄(q➛q)) (FTTT)(p, q) 文字形式：并非p且q。 符号形式：~(p˄q) (TFTT)(p, q) 文字形式：如果q，那么p。 符号形式：q➛p (TTFT)(p, q) 文字形式：如果p，那么q。 符号形式：p➛q (TTTF)(p, q) 文字形式：p或q。 符号形式：p˅q (FFTT)(p, q) 文字形式：并非q。 符号形式：~q (FTFT)(p, q) 文字形式：并非p。 符号形式：~p (FTTF)(p, q) 文字形式：p或者q，但并非p且q。 符号形式：(p˄~q)˅(q˄~p) (TFFT)(p, q) 文字形式：如果p那么q，并且如果q那么p。 符号形式：p ≡ q (TFTF)(p, q) 文字形式：p (TTFF)(p, q) 文字形式：q (FFFT)(p, q) 文字形式：既非p也非q。 符号形式：~p˄~q 或者 p|q1 (FFTF)(p, q) 文字形式：p并且并非q。 符号形式：p˄~q (FTFF)(p, q) 文字形式：q并且并非p。 符号形式：q˄~p (TFFF)(p, q) 文字形式：q并且p。 符号形式：q˄p (FFFF)(p, q) 文字形式：矛盾式：p并且并非p，并且，q并且并非q。 符号形式：(p˄~p)˄(q˄~q) 对于一个句子的真值主目来说，我称那些使句子为真的真值可能性为句子的真值基础。"},"children":[]},{"number":"5.11","texts":{"zh":"如果为一定数目的命题所共有的真值基础，同时也是某个命题的真值基础，那么我们就说，这个命题的真是从另外那些命题的真得来的。","en":"If the truth-grounds that are common to a number of propositions are all also truth-grounds of a particular proposition, then we say that the truth of this proposition follows from the truth of those propositions.","de":"Sind die Wahrheitsgründe, die einer Anzahl von Sätzen gemeinsam sind, sämtlich auch Wahrheitsgründe eines bestimmten Satzes, so sagen wir, die Wahrheit dieses Satzes folge aus der Wahrheit jener Sätze.","zh_wang":"如果一定数目的命题所共有的真值基础，同样也是某个命题的真值基础，那么我们就说，这个命题的真是从那些命题的真而来的。","zh_huang":"如果一组句子共同的真值基础也是另外某个句子的真值基础，那么我们就说，那个句子之为真，是从那一组句子推出来的。"},"children":[]},{"number":"5.12","texts":{"zh":"特别是，如果命题“q”的所有真值基础也是命题“p”的真值基础，那么命题“p”的真就是从“q”的真得来的。","en":"In particular, the truth of a proposition ‘p’ follows from the truth of another proposition ‘q’ if all truth-grounds of the second are truth-grounds of the first.","de":"Insbesondere folgt die Wahrheit eines Satzes „p“ aus der Wahrheit eines anderen „q“, wenn alle Wahrheitsgründe des zweiten Wahrheitsgründe des ersten sind.","zh_wang":"特别是，如果命题“q ”的真值基础是命题“p” 的真值基础，那么命题“p” 的真就是由命题“q” 的真得来的。","zh_huang":"特别是，如果句子“q”的所有真值基础也是句子“p”的真值基础，那么“p”为真，就是从“q”为真推出来的。"},"children":[{"number":"5.121","texts":{"zh":"一个命题的真值基础包含在另一个命题的真值基础之中：p从q得出来。","en":"The truth-grounds of the one are contained in those of the other; p follows from q.","de":"Die Wahrheitsgründe des einen sind in denen des anderen enthalten; p folgt aus q.","zh_wang":"一个命题q 的真值基础包含在另一个命题p 的真值基础之中：p 是从q 得来的。","zh_huang":"q的真值基础包含在p的真值基础中，p从q推出。"},"children":[]},{"number":"5.122","texts":{"zh":"如果p从q得出来，则“p”的意义包含在“q”的意义之中。","en":"If p follows from q, then the sense of ‘p’ is contained in the sense of ‘q’.","de":"Folgt p aus q, so ist der Sinn von „p“ im Sinne von „q“ enthalten.","zh_wang":"如果p 是从q 得来的，则“p ”的意义包含于“q ”的意义之中。","zh_huang":"如果p从q推出，那么“p”的含义也就包含在“q”的含义中。"},"children":[]},{"number":"5.123","texts":{"zh":"如果上帝创造一个世界，其中某些命题为真，那么由此它也就创造了一个世界，其中所有从这些命题得出来的命题也同样为真。同样，它也不可能在创造出一个命题“p”为真的世界的同时，而不创造出这个命题的所有对象。","en":"If a god creates a world in which certain propositions are true, then he thereby creates a world in which all their consequences are true as well. And similarly he could not create a world in which a proposition ‘p’ is true without creating all its objects.","de":"Wenn ein Gott eine Welt erschafft, worin gewisse Sätze wahr sind, so schafft er damit auch schon eine Welt, in welcher alle ihre Folgesätze stimmen. Und ähnlich könnte er keine Welt schaffen, worin der Satz „p“ wahr ist, ohne seine sämtlichen Gegenstände zu schaffen.","zh_wang":"如果上帝创造了一个世界，其中某些命题是真的，从而他也创造了一个世界，其中所有从这些命题得出来的命题也同样是真的。同样，他不可能创造一个命题“p ”在其中为真的世界，而不创造该命题的所有对象。","zh_huang":"如果上帝创造了一个世界，让某个句子为真，那么他也就创造了一个让所有从中推出的句子也为真的世界。同理，上帝无法创造一个世界让句子“p”为真，而不创造出这个句子的所有对象来。"},"children":[]},{"number":"5.124","texts":{"zh":"一个命题肯定每一个从它得出来的命题。","en":"A proposition affirms every proposition that follows from it.","de":"Der Satz bejaht jeden Satz der aus ihm folgt.","zh_wang":"一个命题肯定每个从它得来的命题。","zh_huang":"一个句子断定从中推出的所有句子。"},"children":[{"number":"5.1241","texts":{"zh":"“p・q”既是肯定“p”的命题之一，也是肯定“q”的命题之一。 两个命题，如果没有一个有意义的命题肯定它们两者，它们就是彼此反对的。 凡与另一个命题矛盾的命题，都否定这个命题。","en":"‘p.q’ is one of the propositions that affirm ‘p’ and at the same time one of the propositions that affirm ‘q’.Two propositions are opposed to one another if there is no senseful proposition that affirms them both.Every proposition that contradicts another negates it.","de":"„p. q“ ist einer der Sätze, welche „p“ bejahen und zugleich einer der Sätze, welche „q“ bejahen. Zwei Sätze sind einander entgegengesetzt, wenn es keinen sinnvollen Satz gibt, der sie beide bejaht. Jeder Satz der einem anderen widerspricht, verneint ihn.","zh_wang":"“p .q ”是肯定“p ”的命题之一，同时也是肯定“q ”的命题之一。 如果没有一个有意义的命题肯定两个命题的话，那么它们就是彼此对立的。 每个与另外一个命题相矛盾的命题，都是在否定这个命题。","zh_huang":"“p˄q”是在断定“p”的同时还断定“q”的句子之一。 对两个句子来说，如果没有一个有意义的句子同时断定它们，那么它们就彼此对立。 对于一个句子来说，所有与之矛盾的句子都是在否定它。"},"children":[]}]}]},{"number":"5.13","texts":{"zh":"一个命题的真从另一些命题的真得出来，这一点我们可以从这些命题的结构看出来。","en":"That the truth of one proposition follows from the truth of other propositions can be seen from the structure of the propositions.","de":"Dass die Wahrheit eines Satzes aus der Wahrheit anderer Sätze folgt, ersehen wir aus der Struktur der Sätze.","zh_wang":"一个命题的真从另一些命题的真得出来，我们从这些命题的结构就能看出来。","zh_huang":"一个句子为真可以从另一个句子为真推出时，我们是可以从句子结构看出这一点的。"},"children":[{"number":"5.131","texts":{"zh":"如果一个命题的真从另一些命题的真得出来，这一点为这些命题的形式相互之间的关系所表达：我们无须通过把这些命题结合成为一个单独的命题，来建立起它们之间的这些关系；相反地，这些关系是内在的，它们的存在是这些命题存在的一个直接结果。","en":"If the truth of one proposition follows from the truth of others, then this expresses itself through relations in which the forms of these propositions stand to one another; that is to say, we do not need to first put them in these relations by combining them with one another in one proposition; rather, these relations are internal and obtain as soon as, and in virtue of, these propositions obtaining.","de":"Folgt die Wahrheit eines Satzes aus der Wahrheit anderer, so drückt sich dies durch Beziehungen aus, in welchen die Formen jener Sätze zu einander stehen; und zwar brauchen wir sie nicht erst in jene Beziehungen zu setzen, indem wir sie in einem Satze miteinander verbinden, sondern diese Beziehungen sind intern und bestehen, sobald, und dadurch dass, jene Sätze bestehen.","zh_wang":"如果一个命题的真从另一些命题的真得出来，这是由这些命题形式相互之间的关系来表达的：我们不需要首先把它们相互结合在一个命题中，以此来建立起它们之间的关系；因为这些关系都是内在的，只要命题存在，这些关系就存在，而且就是由于命题的存在而存在。","zh_huang":"一个句子从另一个句子推出，这一点会体现在句子形式之间的关系中。我们没有必要将两个句子合并成一个，来建立这种关系。相反，这种关系是内在的，只要句子存在，这种关系也就存在。"},"children":[{"number":"5.1311","texts":{"zh":"当我们从p∨q和～p推出q时，命题形式“p∨q”和“～p”之间的关系在这里被我们的标示方式所掩盖。但是，例如，若将“p∨q”写为“p︳q・︳・p︳q”，将“～p”写为“p︳p”（p︳q＝既非p也非q），其内在联系就显而易见了。 （从（x）・fx可以推出fa，这表明符号（x）・fx本身也包含着概括。）","en":"If we infer q from p v q and ~p, then the relation between the propositional forms of ‘p v q’ and ‘~p’ is here concealed by the mode of signification. But if we write, for example, ‘p|q.|.p|q’ instead of ‘p v q’ and ‘p|p’ instead of ‘~p’ (p|q =neither p nor q), then the inner connection becomes manifest.(That fa can be inferred from (x).fx shows that the generality is present also in the symbol ‘(x).fx’.)","de":"Wenn wir von p ∨ q und ∼p auf q schliessen, so ist hier durch die Bezeichnungsweise die Beziehung der Satzformen von „p ∨ q“ und „∼p“ verhüllt. Schreiben wir aber z. B. statt „p ∨ q“ „p | q. |. p | q“ und statt „∼p“ „p | p“ (p | q = weder p, noch q), so wird der innere Zusammenhang offenbar. (Dass man aus (x). fx auf fa schliessen kann, das zeigt, dass die Allgemeinheit auch im Symbol „(x). fx“ vorhanden ist.)","zh_wang":"当我们从和～p 推出q 时，命题形式“pvq ”和“～p ”之间的关系在这里就被标记法掩盖起来。但是，如果我们比如将“pvq ”写为“p ｜q .｜.p ｜q ”，将“～p ”写为“p ｜p ”（p ｜q =既非p 也非q ，那么其内部的关联就变得明显了。 （我们可以从（x ）·ƒx 推出ƒa ，这个事实表明符号（x ）·ƒx 本身也存在着一般性。）","zh_huang":"当我们从p˅q以及~p中推出q，句子“p˅q”与“~p”之间的关系在这种情况下被记号的形式所掩盖。如果不写成“p˅q”，而是写成比如“(p | q) | (p | q) ”，而“~p”改成“p | p”（p | q=既非p也非q），那么内在联系也就清楚了。 （从∀(x)f(x)可以推出f(a)，这表明符号“∀(x)f(x)”本身就包含了普遍性。）"},"children":[]}]},{"number":"5.132","texts":{"zh":"如果p从q得出来，则我能作出从q到p的推论，即从q推出p来。 单从这两个命题即可了解推论的特性。 只有这两个命题本身才能证明此推论的正确。 如弗雷格和罗素著作中用以证明推论为正确的“推演律”是缺少意义的，因而是多余的。","en":"If p follows from q, then I can take q to infer p, deduce p from q. The kind of inference is to be gathered from the two propositions alone. Only they themselves can justify the inference. ‘Laws of inference’, which are supposed—e.g. by Frege and Russell—to justify inferences, are senseless, and would be superfluous.","de":"Folgt p aus q, so kann ich von q auf p schliessen; p aus q folgern. Die Art des Schlusses ist allein aus den beiden Sätzen zu entnehmen. Nur sie selbst können den Schluss rechtfertigen. „Schlussgesetze“, welche – wie bei Frege und Russell – die Schlüsse rechtfertigen sollen, sind sinnlos, und wären überflüssig.","zh_wang":"如果p 是从q 得来的，那么我能作出从q 到p 的推论，从q 推出p 来。 推论的方式只需要从这两个命题中便可了解。 只有这两个命题自身才能证明此推论的正确。 如同弗雷格和罗素著作中用以证明推论为正确的“推演律”是没有意义的，是多余的。","zh_huang":"如果p从q推出，那么我就可以从q得出结论p，从q演绎出p。 推理的本质只能从两个句子中看出来。 这两个句子本身就是推理唯一可能的依据。 “推理规则”在弗雷格和罗素的著作中被用来充当推理的依据，但这些规则是空洞的、流于表面的。"},"children":[]},{"number":"5.133","texts":{"zh":"一切演绎推理都是先天形成的。","en":"All deduction proceeds a priori.","de":"Alles Folgern geschieht a priori.","zh_wang":"一切演绎推理都是先天成立的。","zh_huang":"所有推理都应先验地做出。"},"children":[]},{"number":"5.134","texts":{"zh":"一个基本命题不能从另一个基本命题推演出来。","en":"From an elementary proposition no other can be deduced.","de":"Aus einem Elementarsatz lässt sich kein anderer folgern.","zh_wang":"从一个基本命题不能推出任何其他的基本命题。","zh_huang":"从基本命题中推不出基本命题。"},"children":[]},{"number":"5.135","texts":{"zh":"从一种情况的存在无法推论出另一种完全不同的情况的存在。","en":"In no way can an inference be drawn from the obtaining of any one state of affairs to the obtaining of another, completely different state of affairs.","de":"Auf keine Weise kann aus dem Bestehen irgend einer Sachlage auf das Bestehen einer, von ihr gänzlich verschiedenen Sachlage geschlossen werden.","zh_wang":"没有任何办法可以从一种事态的存在推论出另一种完全不同的事态的存在。","zh_huang":"从一种情况的存在，不可能推出另一种完全不同的情况是否存在。"},"children":[]},{"number":"5.136","texts":{"zh":"没有证明这样一种推论为正确的因果联系。","en":"There is no causal nexus that would justify such an inference.","de":"Einen Kausalnexus, der einen solchen Schluss rechtfertigte, gibt es nicht.","zh_wang":"没有因果联系证明这样一种推论是正确的。","zh_huang":"没有一种因果联系能充当这种推理的依据。"},"children":[{"number":"5.1361","texts":{"zh":"我们不能 从现在的事件推出将来的事件。相信因果联系是迷信。","en":"We cannot infer future events from present ones.Superstition is the belief in the causal nexus.","de":"Die Ereignisse der Zukunft können wir nicht aus den gegenwärtigen erschliessen. Der Glaube an den Kausalnexus ist der Aberglaube.","zh_wang":"未来的事情不能从现在的事情推论出来。 相信因果联系就是迷信。","zh_huang":"我们不可能从现在的事情推出未来的事情。 相信因果关系，那是迷信。"},"children":[]},{"number":"5.1362","texts":{"zh":"意志自由在于不可能知道尚属未来的行为。仅当因果性像逻辑推论一样是一种内在的 必然性，我们才能知道这些行为。——知与所知的联系是逻辑必然性的联系。 （如果p是重言式，则“A知道p是发生的事情”便是缺乏意义的。）","en":"Freedom of the will consists in not yet being able to know future actions. We could only know them if causality were an inner necessity, like that of logical inference.—The connection between knowledge and what is known is that of logical necessity.(‘A knows that p is the case’ is senseless if p is a tautology.)","de":"Die Willensfreiheit besteht darin, dass zukünftige Handlungen jetzt nicht gewusst werden können. Nur dann könnten wir sie wissen, wenn die Kausalität eine innere Notwendigkeit wäre, wie die des logischen Schlusses. – Der Zusammenhang von Wissen und Gewusstem, ist der der logischen Notwendigkeit. („A weiss, dass p der Fall ist“ ist sinnlos, wenn p eine Tautologie ist.)","zh_wang":"意志自由在于现在不可能知道未来的行为。只有在因果性同逻辑演绎一样是一种内在必然性时，我们才能知道这些行为。——知与所知的联系是逻辑必然性的联系。 （如果p 是重言式，那么”A知道p 是发生的事情”便是没有意义的。）","zh_huang":"意志的自由在于现在不能知道未来的行为。只有当因果关系像逻辑推理那样是一种内在必然性时，我们才可能知道。——知识与所知道的东西之间的联系，是一种逻辑必然性。 （在p是重言式时，“A知道事情是p”是空洞的。）"},"children":[]},{"number":"5.1363","texts":{"zh":"如果不能从一个命题对于我们是自明的而推出 它为真，则它的自明性就不能保证我们相信它为真是正确的。","en":"If it does not follow from a proposition’s being self-evident that it is true, then its self-evidence is no justification, either, for our belief in its truth.","de":"Wenn daraus, dass ein Satz uns einleuchtet, nicht folgt, dass er wahr ist, so ist das Einleuchten auch keine Rechtfertigung für unseren Glauben an seine Wahrheit.","zh_wang":"如果一个命题对于我们是明显的而不能推出它是真的，那么它的明显性便不是让我们相信它为真的保障。","zh_huang":"从句子对我们来说是自明的，如果推不出句子是真的，那么自明性不足以成为我们相信句子为真的依据。"},"children":[]}]}]},{"number":"5.14","texts":{"zh":"如果一个命题是从另一个命题得出来的，那么后者所说较前者为多，前者所说较后者为少。","en":"If a proposition follows from another, then the latter says more than the former, the former less than the latter.","de":"Folgt ein Satz aus einem anderen, so sagt dieser mehr als jener, jener weniger als dieser.","zh_wang":"如果一个命题是从另一个命题得来的，那么后者所说的就要比前者多，前者所说比后者少。","zh_huang":"一个句子如果是从另一个句子推出来的，那么它就比另外那个句子说得少，另外那个句子说得多些。"},"children":[{"number":"5.141","texts":{"zh":"如果p从q得出来且q从p得出来，则二者为同一个命题。","en":"If p follows from q and q from p, then they are one and the same proposition.","de":"Folgt p aus q und q aus p, so sind sie ein und derselbe Satz.","zh_wang":"如果p 是从q 得来的，并且q 是从p 得来的，那么它们就是同一个命题。","zh_huang":"如果p从q推出、q从p推出，那么它们是同一个句子。"},"children":[]},{"number":"5.142","texts":{"zh":"重言式从一切命题得出来：它什么也没有说。","en":"A tautology follows from all propositions: it says nothing.","de":"Die Tautologie folgt aus allen Sätzen: sie sagt Nichts.","zh_wang":"重言式是从一切命题得来的：它什么都没有说。","zh_huang":"重言式可以从所有句子推出来，它什么都没有说。"},"children":[]},{"number":"5.143","texts":{"zh":"矛盾式是没有一个命题与其它命题共有的命题共性，重言式是彼此间没有任何共同东西的所有命题的共性。 可以说，矛盾式隐迹于一切命题之外；重言式则隐迹于一切命题之内。 矛盾式是命题的外部界限；重言式则是居于诸命题中心的非实在的点。","en":"Contradiction is what is common to propositions that no proposition has in common with another. Tautology is what is common to all propositions which have nothing in common with one another. Contradiction vanishes, so to speak, outside, tautology inside all propositions. Contradiction is the outer limit of propositions, tautology the empty point at their centre.","de":"Die Kontradiktion ist das Gemeinsame der Sätze, was kein Satz mit einem anderen gemein hat. Die Tautologie ist das Gemeinsame aller Sätze, welche nichts miteinander gemein haben. Die Kontradiktion verschwindet sozusagen ausserhalb, die Tautologie innerhalb aller Sätze. Die Kontradiktion ist die äussere Grenze der Sätze, die Tautologie ihr substanzloser Mittelpunkt.","zh_wang":"矛盾式是没有任何命题与其它命题共有的命题共性，重言式是一切相互之间没有任何共同东西的所有命题的共性。 矛盾式可以说是消失在一切命题之外的；重言式则消失在一切命题之内。 矛盾式是命题的外部界限；重言式是它们的无实质的中心。","zh_huang":"矛盾式作为句子共同的东西，是没有任何句子与其他句子共享的。重言式作为句子共同的东西，则为所有彼此没有共同内容的句子所共有。 这就像说，矛盾式消失在所有句子之外，而重言式则消失在所有句子之中。 矛盾式构成了句子的外部界限，重言式则构成了句子非实质性的核心。"},"children":[]}]},{"number":"5.15","texts":{"zh":"如wr 是命题“r”的真值基础数，wrs 是同属命题“s”和“r”的真值基础数，则我们称比值wrs ∶wr为命题“r”给予命题“s”的概率 度。","en":"If Tr is the number of the truth-grounds of a proposition ‘r’, Trs the number of the truth-grounds of a proposition ‘s’ that are also truth-grounds of ‘r’, then we call the ratio Trs:Tr the measure of probability that the proposition ‘r’ gives to the proposition ‘s’.","de":"Ist Wr die Anzahl der Wahrheitsgründe des Satzes „r“, Wrs die Anzahl derjenigen Wahrheitsgründe des Satzes „s“, die zugleich Wahrheitsgründe von „r“ sind, dann nennen wir das Verhältnis: Wrs: Wr das Mass der Wahrscheinlichkeit, welche der Satz „r“ dem Satz „s“ gibt.","zh_wang":"如果7；是命题“r ”的真值基础的数目，Trs 是命题“s ”的真值基础的数目，同时也是命题“r ”的真值基础的数目，那么我们就将比值T rs ：T r 称为命题“r ”给予命题“s ”的概率度。","zh_huang":"如果Tr是句子“r”真值基础的数目，Trs同时为句子“r”和“s”的真值基础的数目，那么我就称比例Trs:Tr为句子“r”给予句子“s”的概率的量。"},"children":[{"number":"5.151","texts":{"zh":"在如上述5.101那样的图式中，设wr 是命题r的“w”数，wrs 是和命题r的那些“w”同列的命题s的“w”数。则命题r给命题s以概率wrs ∶wr。","en":"In a schema like that above in 5.101, let Tr be the number of the ‘T’s in the proposition r, Trs the number of the ‘T’s in the proposition s that are in the same columns as ‘T’s of the proposition r. The proposition r then gives to the proposition s the probability: Trs:Tr.","de":"Sei in einem Schema wie dem obigen in No. 5.101 Wr die Anzahl der „W “ im Satze r; Wrs die Anzahl derjenigen „W “ im Satze s, die in gleichen Kolonnen mit „W “ des Satzes r stehen. Der Satz r gibt dann dem Satze s die Wahrscheinlichkeit: Wrs: Wr.","zh_wang":"假设在上述5.101那样的图式中，T r 是在命题r中T的数目。Trs 是与命题s 命题r 中的“T”处于同等位置的“T”的数目。那么命题r 给予命题s 的概率为T rs ：T r。","zh_huang":"在像前面5.101中那样的表中，设Tr属于句子r的“T”的个数，Trs为属于句子s、同时在句子r那一行也对应“T”的个数。这样，句子r给予句子s的概率就为Trs:Tr。"},"children":[{"number":"5.1511","texts":{"zh":"没有概率命题特有的特殊对象。","en":"There is no special object that is peculiar to probability propositions.","de":"Es gibt keinen besonderen Gegenstand, der den Wahrscheinlichkeitssätzen eigen wäre.","zh_wang":"概率命题没有特有的特殊对象。","zh_huang":"不存在专属概率命题的对象。"},"children":[]}]},{"number":"5.152","texts":{"zh":"彼此之间没有共同的真值主目的命题，我们称它们是相互独立的。 两个基本命题彼此给予概率。 如果p从q得出来，则命题“q”给与命题“p”概率1。逻辑推论的确实性是概率的一种极限情况。 （应用于重言式和矛盾式。）","en":"Propositions that have no truth-arguments in common with one another we call independent of one another. Two elementary propositions give one another the probability ½. If p follows from q, then the proposition ‘q’ gives to the proposition ‘p’ the probability 1. The certainty of logical inference is a limiting case of probability. (Application to tautology and contradiction.)","de":"Sätze, welche keine Wahrheitsargumente mit einander gemein haben, nennen wir von einander unabhängig. Von einander unabhängige Sätze (z. B. irgend zwei Elementarsätze) geben einander die Wahrscheinlichkeit ½. Folgt p aus q, so gibt der Satz „q“ dem Satz „p“ die Wahrscheinlichkeit 1. Die Gewissheit des logischen Schlusses ist ein Grenzfall der Wahrscheinlichkeit. (Anwendung auf Tautologie und Kontradiktion.)","zh_wang":"我们将彼此之间没有共同的真值主目的命题称为相互独立的。 两个基本命题互相给予概率 。 如果p 是从q 得来的，那么命题“q ”给予命题“p ”的概率为1。逻辑推论的确实性是概率的一种极限情况。 （应用于重言式和矛盾式。）","zh_huang":"没有共同真值主目的句子，我们说是彼此独立的。 两个基本命题彼此给予的概率是。 如果p从q推出，那么句子“q”给予句子“p”的概率是1。逻辑推理的确定性是概率的极限情形。 （这也适用于重言式和矛盾式。）"},"children":[]},{"number":"5.153","texts":{"zh":"就其自身而言，一个命题既不是概率的也不是非概率的。一个事件或者发生，或者不发生：没有中间状况。","en":"A proposition is in itself neither probable nor improbable. An event occurs or it does not occur; there is no middle case.","de":"Ein Satz ist an sich weder wahrscheinlich noch unwahrscheinlich. Ein Ereignis trifft ein, oder es trifft nicht ein, ein Mittelding gibt es nicht.","zh_wang":"一个命题就其自身而言，既没有可能的概率，也没有不可能的概率。一个事件发生或者不发生，是没有中间道路的。","zh_huang":"就其本身而言，句子谈不上什么概率。一件事要么发生，要么不发生，没有第三种情况。"},"children":[]},{"number":"5.154","texts":{"zh":"设在一个罐子里有相等数量的白球和黑球（且没有任何别种颜色的球）。我一个一个地取出球来，又将它放回罐里。用这种试验我能够确定，随着不断地这样做下去，取出来的黑球数和白球数是彼此接近的。 所以这 不是一个数学的真实。 如果我说：“我取到一个白球的概率和取到一个黑球的概率是相等的”，这就意味着，我所知道的全部情况（包括作为假设的自然律）给予一个事件发生的概率不大于 另一个事件发生的概率。也就是说，正如从以上的说明所不难理解的，给予每个事件以概率。 通过试验我能够确认的是：这两个事件的发生是独立于我并不详细知道的种种情况的。","en":"Suppose that in an urn there are just as many white as black balls (and no others). I draw one ball after another and put them back again in the urn. I can then establish by experiment that the numbers of drawn black and white balls converge as the draw continues. This is therefore not a mathematical factum. If I now say, ‘It is equally probable that I will draw a white as a black ball’, then this is to say, ‘All the circumstances known to me (including the laws of nature hypothetically assumed) give to the occurrence of the one event no more probability than to the occurrence of the other’. That is, they give to each—as is easily gathered from the explanations above—the probability ½. What I confirm by the experiment is that the occurrence of the two events is independent of the circumstances of which I know nothing further.","de":"In einer Urne seien gleichviel weisse und schwarze Kugeln (und keine anderen). Ich ziehe eine Kugel nach der anderen und lege sie wieder in die Urne zurück. Dann kann ich durch den Versuch feststellen, dass sich die Zahlen der gezogenen schwarzen und weissen Kugeln bei fortgesetztem Ziehen einander nähern. Das ist also kein mathematisches Faktum. Wenn ich nun sage: Es ist gleich wahrscheinlich, dass ich eine weisse Kugel wie eine schwarze ziehen werde, so heisst das: Alle mir bekannten Umstände (die hypothetisch angenommenen Naturgesetze mitinbegriffen) geben dem Eintreffen des einen Ereignisses nicht mehr Wahrscheinlichkeit als dem Eintreffen des anderen. Das heisst, sie geben – wie aus den obigen Erklärungen leicht zu entnehmen ist – jedem die Wahrscheinlichkeit ½. Was ich durch den Versuch bestätige ist, dass das Eintreffen der beiden Ereignisse von den Umständen, die ich nicht näher kenne, unabhängig ist.","zh_wang":"假设在一个罐子里有同等数目的白球和黑球（没有任何其他颜色的球）。我把球一个一个地取出来，又将它放回罐里。通过这种试验我就可以确定，不断地做下去，取出来的黑球和白球的数目是彼此接近的。 所以这不是一个数学的事实。 如果我说：“我取出一个白球的概率与取出一个黑球的概率是相等的”，这就意味着，我所知道的一切情况（包括作为假设的自然律）给一个事件发生的概率并不比给另一个事件发生的概率大。这也就是说——正如通过以上的解释所不难理解的——为每个事件给予的概率为 。 通过试验我可以确认的是：这两件事件的发生是独立于我知道的并不详细的情况的。","zh_huang":"假设在罐子里装入相等数量的黑色和白色小球，并且里面没有其他东西了。我一个一个取出小球然后放回去。通过这种实验我可以确定，当继续下去时，取出的黑球和白球的数量会趋于相等。 所以这不是数学事实。 现在，如果我说，“取出白球的概率等于取出黑球的概率”，其意思就是，所有我所知道的条件（包括作为假说被接受的自然律）给予其中一种情况的概率都不会多于另一种情况。按照前面的解释很容易看出，这等于说它们彼此给予的概率。 通过实验就确证了两件事的发生是独立于相应条件的，而对这种条件我无须进一步了解。"},"children":[]},{"number":"5.155","texts":{"zh":"概率命题的最小单元是：诸情况——我对它们别无所知——对一特定事件的发生给予某一概率度。","en":"The unit of a probability proposition is this: the circumstances—of which I know nothing more—give to the occurrence of a definite event such and such a degree of probability.","de":"Die Einheit des Wahrscheinlichkeitssatzes ist: Die Umstände – die ich sonst nicht weiter kenne – geben dem Eintreffen eines bestimmten Ereignisses den und den Grad der Wahrscheinlichkeit.","zh_wang":"概率命题的单位是：情况——对于它们，我知道的不多——对于一定事件的发生给予某种概率度。","zh_huang":"概率命题的最小单元是，某种条件（我对其没有进一步了解）给予特定事件的发生以如此这般的概率。"},"children":[]},{"number":"5.156","texts":{"zh":"由此可见，概率是一种概括。 它包含着对一种命题形式的一般的描述。 仅当缺少确定性时我们才使用概率——虽然我们关于一个事实的知识是不完全的，但是关于它的形式我们确实知道某种东西。 （一个命题也许是一定情况的不完全的图像，但它总归是某种东西 的完全的图像。） 一个概率命题是另外一些命题的一种摘要。","en":"Probability is thus a generalization. It involves a general description of a propositional form. Only when certainty is lacking do we use probability.—That is, when we do not fully know a fact, but do know something about its form. (A proposition can indeed be an incomplete picture of a certain state of affairs, but it is always a complete picture.) A probability proposition is, as it were, an extract from other propositions.","de":"So ist die Wahrscheinlichkeit eine Verallgemeinerung. Sie involviert eine allgemeine Beschreibung einer Satzform. Nur in Ermanglung der Gewissheit gebrauchen wir die Wahrscheinlichkeit. – Wenn wir zwar eine Tatsache nicht vollkommen kennen, wohl aber etwas über ihre Form wissen. (Ein Satz kann zwar ein unvollständiges Bild einer gewissen Sachlage sein, aber er ist immer ein vollständiges Bild.) Der Wahrscheinlichkeitssatz ist gleichsam ein Auszug aus anderen Sätzen.","zh_wang":"概率是一种概括。 它包含对一种命题形式的一般的描述。仅仅因为缺少确实性，我们才需要概率。 即对于一个事实，我们不是完全知晓，但是对于它的形式，我们却知道一些的。 （一个命题也许确实是某个事态的一个不完全的图像，但它总归一个完全的图像。） 概率命题可以说是另外一些命题的一个摘要。","zh_huang":"这样，概率就是一种概括。 它包含了对句子形式的概括性描述。 只有在缺乏确定性的时候我们才使用概率。此时我们对事实的知识其实并不完整，而只是在某种意义上知道其形式。 （一个句子完全可以是特定情况不完整的图像，但它总是完整地描述了某种东西。） 概率命题是其他命题的一种摘要。"},"children":[]}]}]},{"number":"5.2","texts":{"zh":"命题的结构之间具有内在的关系。","en":"The structures of propositions stand in internal relations to one another.","de":"Die Strukturen der Sätze stehen in internen Beziehungen zu einander.","zh_wang":"诸命题结构之间有内在的关系。","zh_huang":"句子结构之间有内在关系。"},"children":[{"number":"5.21","texts":{"zh":"为了在我们的表达方式中突出这些内在关系，可以把一个命题表现为一个运算的结果，这个运算通过另外一些命题（即该运算的基础）而产生出这个命题来。","en":"We can bring out these internal relations in our mode of expression, by representing a proposition as the result of an operation that generates it from other propositions (the bases of the operation).","de":"Wir können diese internen Beziehungen dadurch in unserer Ausdrucksweise hervorheben, dass wir einen Satz als Resultat einer Operation darstellen, die ihn aus anderen Sätzen (den Basen der Operation) hervorbringt.","zh_wang":"我们可以在我们的表达方式中把这些内在关系凸显出来，通过把一个命题表现为一个运算的结果，这个运算通过其他的命题（即该运算的基础）产生出这个命题。","zh_huang":"为了突出这种内在关系，我们可以把一个句子表现为在其他一些句子基础上进行操作得到的结果，而其他那些句子是操作的基础。"},"children":[]},{"number":"5.22","texts":{"zh":"运算就是其结果和基础两者结构之间关系的表达式。","en":"An operation is the expression of a relation between the structures of its result and its bases.","de":"Die Operation ist der Ausdruck einer Beziehung zwischen den Strukturen ihres Resultats und ihrer Basen.","zh_wang":"运算就是其结果的结构和基础的结构两者之间的一种关系的表达式。","zh_huang":"操作表达了其基础与结果在结构上的关系。"},"children":[]},{"number":"5.23","texts":{"zh":"必须对一个命题施以运算才能产生出别的命题来。","en":"An operation is what must happen to a proposition to make another out of it.","de":"Die Operation ist das, was mit dem einen Satz geschehen muss, um aus ihm den anderen zu machen.","zh_wang":"一个命题必须经过运算才能产生别的命题。","zh_huang":"要从一个句子得到另一个句子，就必须通过操作。"},"children":[{"number":"5.231","texts":{"zh":"当然，这要依赖于它们形式的属性，依赖于它们形式的内在相似性。","en":"And that will depend, of course, on their formal properties, on the internal similarity of their forms.","de":"Und das wird natürlich von ihren formalen Eigenschaften, von der internen Ähnlichkeit ihrer Formen abhängen.","zh_wang":"而这自然要依赖于它们形式的属性，依赖于它们形式的内在相似性。","zh_huang":"而这当然取决于句子的形式特征，取决于它们在形式上的内在相似性。"},"children":[]},{"number":"5.232","texts":{"zh":"整编成一个系列所依赖的内在关系，等价于一个从一项产生出另一项来的运算。","en":"The internal relation that orders a series is equivalent to the operation that generates one term from another.","de":"Die interne Relation, die eine Reihe ordnet, ist äquivalent mit der Operation, durch welche ein Glied aus dem anderen entsteht.","zh_wang":"整理好一个系列的内在关系，等价于由一项产生出另外一项来的运算。","zh_huang":"用来对序列进行排序的内在关系，也就等价于从一项得到另一项的操作。"},"children":[]},{"number":"5.233","texts":{"zh":"运算只能出现在一个命题以逻辑上有意义的方式产生于其它命题的地方，也即命题的逻辑构造开始的地方。","en":"An operation can only arise where a proposition is generated from another in a logically significant way; that is, where the logical construction of the proposition begins.","de":"Die Operation kann erst dort auftreten, wo ein Satz auf logisch bedeutungsvolle Weise aus einem anderen entsteht. Also dort, wo die logische Konstruktion des Satzes anfängt.","zh_wang":"运算可能首先发生在一个命题以逻辑上有意义的方式产生自其它命题的地方，也就是说发生在命题的逻辑构造开始的地方。","zh_huang":"只有在句子能够在逻辑上有意义地产生于另一个句子时，也就是说，只有在句子的逻辑结构起作用时，才能进行操作。"},"children":[]},{"number":"5.234","texts":{"zh":"基本命题的真值函项是以基本命题为基础的运算的结果（我称这些运算为真值运算。）","en":"Truth-functions of elementary propositions are results of operations that have the elementary propositions as bases. (I call these operations truth-operations.)","de":"Die Wahrheitsfunktionen der Elementarsätze sind Resultate von Operationen, die die Elementarsätze als Basen haben. (Ich nenne diese Operationen Wahrheitsoperationen.)","zh_wang":"基本命题的真值函项是以基本命题为基础的运算的结果（我称这些运算为真值运算）","zh_huang":"基本命题的真值函项，就是以基本命题作为基础进行操作得到的结果（这种操作我称为真值操作）"},"children":[{"number":"5.2341","texts":{"zh":"p的真值函项的意义是p的意义的真值函项。否定、逻辑加、逻辑乘等等都是运算。（否定将命题的意义反转。）","en":"The sense of a truth-function of p is a function of the sense of p.Negation, logical addition, logical multiplication, etc., etc., are operations.(Negation reverses the sense of a proposition.)","de":"Der Sinn einer Wahrheitsfunktion von p ist eine Funktion des Sinnes von p. Verneinung, logische Addition, logische Multiplikation, etc., etc. sind Operationen. (Die Verneinung verkehrt den Sinn des Satzes.)","zh_wang":"p 的一个真值函项的意义是p 的意义的一个函项。 否定、逻辑加、逻辑乘等等都是运算。 （否定把命题的意义反转过来。）","zh_huang":"p的真值函项的含义，就是p的含义的函项。 否定、析取、合取，等等，这些都是操作。 （否定就是对句子的含义进行颠倒。）"},"children":[]}]}]},{"number":"5.24","texts":{"zh":"运算显示于变项中，它显示我们怎样可以从命题的一种形式得到另一种形式。 运算表达形式之间的差异。 （运算的基础与其结果之间所共有的恰为这些基础本身。）","en":"An operation shows itself in a variable; it shows how one can get from one form of proposition to another. It gives expression to the difference between the forms. (And what is common to the bases and the result of the operation is precisely the bases.)","de":"Die Operation zeigt sich in einer Variablen; sie zeigt, wie man von einer Form von Sätzen zu einer anderen gelangen kann. Sie bringt den Unterschied der Formen zum Ausdruck. (Und das Gemeinsame zwischen den Basen und dem Resultat der Operation sind eben die Basen.)","zh_wang":"运算在变项中显示出来，它显示我们怎样可以从一种形式的命题得到另一种形式的命题。 它表述出形式之间的差异。 （运算的基础与其结果之间所共有的就是这些基础本身。）","zh_huang":"操作本身会在变元中体现出来，它表明我们怎样从句子的一种形式推进到另一种形式。 它让形式之间的区别得以表达。 （而操作基础与操作结果所共同的东西，就是操作基础本身。）"},"children":[{"number":"5.241","texts":{"zh":"运算标志的不是一种形式，而是一种形式之间的差异。","en":"An operation does not mark a form but only the difference between forms.","de":"Die Operation kennzeichnet keine Form, sondern nur den Unterschied der Formen.","zh_wang":"运算标志的不是一种形式，而仅仅是一种形式之间的差异。","zh_huang":"操作并不表明形式是什么，而只表现形式之间的区别。"},"children":[]},{"number":"5.242","texts":{"zh":"从“p”产生“q”的运算，同样也从“q”产生“r”，如此等等。表达这一点的唯一方式是：“p”、“q”、“r”等等必须是为一定的形式关系给出一般表达式的变项。","en":"The same operation that generates ‘q’ from ‘p’ also generates ‘r’ from ‘q’, and so forth. This can only be expressed by ‘p’, ‘q’, ‘r’, etc. being variables that give expression in a general way to certain formal relations.","de":"Dieselbe Operation, die „q“ aus „p“ macht, macht aus „q“ „r“ u. s. f. Dies kann nur darin ausgedrückt sein, dass „p“, „q“, „r“, etc. Variable sind, die gewisse formale Relationen allgemein zum Ausdruck bringen.","zh_wang":"从“p ”得到“q ”的运算，和从“q ”得到“r ”等等的运算是相同的。这只能用如下的事实来表达：“p ”、“q ”、“r ”等等都是为某些形式关系给出一般表达式的变项。","zh_huang":"从“p”得到“q”的那种操作，也让我们从“q”得到“r”，如此等等。这一点只能这样表达出来：“p”“q”“r”等是变元，它们以一种一般的方式表现了特定的形式关系。"},"children":[]}]},{"number":"5.25","texts":{"zh":"运算的出现并不表征命题的意义。 的确，运算是无所陈述的，只有它的结果才有所陈述，而这又依赖于运算的基础。 （运算和函项决不能互相混淆。）","en":"The occurrence of an operation does not characterize the sense of a proposition. For nothing is stated by the operation, only by its result, and this depends on the bases of the operation. (Operation and function must not be confused with one another.)","de":"Das Vorkommen der Operation charakterisiert den Sinn des Satzes nicht. Die Operation sagt ja nichts aus, nur ihr Resultat, und dies hängt von den Basen der Operation ab. (Operation und Funktion dürfen nicht miteinander verwechselt werden.)","zh_wang":"运算的出现并不表明命题的意义。 因为运算并没有断言任何事情；只有它的结果才可以，而这又依赖于运算的基础。 （运算和函项决不能相互混淆。）","zh_huang":"操作的出现并不说明句子的含义如何。 因为操作并不断定任何东西。只有操作的结果做这种断定，而这取决于操作的基础。 （操作与函项一定不能混为一谈。）"},"children":[{"number":"5.251","texts":{"zh":"一个函项不可能是它自身的主目，然而一个运算的结果可以成为该运算自身的基础。","en":"A function cannot be its own argument, but the result of an operation can certainly become its own base.","de":"Eine Funktion kann nicht ihr eigenes Argument sein, wohl aber kann das Resultat einer Operation ihre eigene Basis werden.","zh_wang":"一个函项不能是它自己的主目，但是一个运算的结果可以是它自身的基础。","zh_huang":"函项不能成为自身的主目，但操作的结果可以充当操作的基础。"},"children":[]},{"number":"5.252","texts":{"zh":"只有这样，从一个形式系列中的一项到另一项（在罗素和怀特海的等级系统中是从一个类型到另一个类型）的推移才是可能的。（罗素和怀特海不承认这种推移的可能性，但是他们自己却一再地利用这种可能性。）","en":"Only in this way is the progression possible from term to term in a form-series (from type to type in Russell and Whitehead’s hierarchies). (Russell and Whitehead did not admit the possibility of this progression, but made use of it again and again.)","de":"Nur so ist das Fortschreiten von Glied zu Glied in einer Formenreihe (von Type zu Type in den Hierarchien Russells und Whiteheads) möglich. (Russell und Whitehead haben die Möglichkeit dieses Fortschreitens nicht zugegeben, aber immer wieder von ihr Gebrauch gemacht.)","zh_wang":"只有这样，在一个形式系列中，从一项到另一项（在罗素和怀特海的等级系统中是从一个类型到另一个类型）的推移才是可能的。（罗素和怀特海没有承认这种推移的可能性，但却一直在使用它。）","zh_huang":"只有以这种方式，从形式序列中的一个项到另一个项（在罗素和怀特海的阶次系统中，就是从一个类型到另一个类型）的过渡才是可能的。（罗素和怀特海不承认这种过渡是可能的，但他们仍旧一再利用这种过渡。）"},"children":[{"number":"5.2521","texts":{"zh":"一个运算重复地应用于其自身的结果，我称之为运算的连续应用（“o’o’o’a”是三次连续应用运算“o’ξ”于“a”的结果。） 我也在同样的意义上谈到连续应用几个 运算于若干个命题。","en":"The repeated application of an operation to its own result I call its successive application (‘O’O’O’a’ is the result of three successive applications of ‘O’ξ’ to ‘a’).In a similar sense I talk of the successive application of several operations to a number of propositions.","de":"Die fortgesetzte Anwendung einer Operation auf ihr eigenes Resultat nenne ich ihre successive Anwendung („O’O’O’a“ ist das Resultat der dreimaligen successiven Anwendung von „O’ξ“ auf „a“). In einem ähnlichen Sinne rede ich von der successiven Anwendung mehrerer Operationen auf eine Anzahl von Sätzen.","zh_wang":"一个运算反复应用于其自身的结果，我将它称为运算的连续应用（“O ，O ’O ’A ”就是“O ，ξ”对于“a”三次连续应用的结果。） 在同样的意义上，我也讲到连续应用几次运算于一定数目的命题。","zh_huang":"对一种操作的结果本身重复运用操作，我称其为迭代（“O'O'O'a”是对操作“O'ξ”进行三次迭代的结果）。 同样，对于对若干句子进行的若干操作，我也会说迭代。"},"children":[]},{"number":"5.2522","texts":{"zh":"因此我把形式系列a，o’a，o’o’a，……的通项记为“［a，x，o’x］”。这个括起来的表达式是一个变项：其中第一项是形式系列的首项，第二项是系列中任意选取的项x的形式，第三项是系列中紧接x之后的那一项的形式。","en":"The general term of a form-series a, O’a, O’O’a,…I thus write as follows: ‘[a, x, O’x]’. This bracketed expression is a variable. The first term of the bracketed expression is the beginning of the form-series, the second the form of an arbitrary term x of the series, and the third the form of the term of the series that immediately follows x.","de":"Das allgemeine Glied einer Formenreihe a, O’a, O’O’a,.... schreibe ich daher so: „[a, x, O’x]“. Dieser Klammerausdruck ist eine Variable. Das erste Glied des Klammerausdruckes ist der Anfang der Formenreihe, das zweite die Form eines beliebigen Gliedes x der Reihe und das dritte die Form desjenigen Gliedes der Reihe, welches auf x unmittelbar folgt.","zh_wang":"因此，我将a，O ’a，O ’O ’a，…这个形式系列的一般项写作：“[a，x ，O ’x ]”这个括号里边的表达式是一个变项：表达式的第一项是形式系列的开端，第二项是这个系列中任意项x 的形式，第三项是这个系列中紧接在x 之后的那个项的形式。","zh_huang":"进而，我用记号“[a, x, O'x]”来作为形式序列a，O'a，O'O'a，……的通项。括号中的表达式是变元，其中第一项是形式序列的起点，第二项是序列中任意一项x的形式，第三项则是序列中紧接着x的那一项的形式。"},"children":[]},{"number":"5.2523","texts":{"zh":"连续应用一个运算的概念和“如此等等”这个概念是等价的。","en":"The concept of the successive application of an operation is equivalent to the concept ‘and so on’.","de":"Der Begriff der successiven Anwendung der Operation ist äquivalent mit dem Begriff „und so weiter“.","zh_wang":"连续应用运算的概念与“如此等等“这个概念是等价的。","zh_huang":"对操作进行迭代，这在概念上就等于说“诸如此类”"},"children":[]}]},{"number":"5.253","texts":{"zh":"一个运算可以取消另一个运算的作用，运算可以互相抵消。","en":"An operation can reverse the effect of another. Operations can cancel one another.","de":"Eine Operation kann die Wirkung einer anderen rückgängig machen. Operationen können einander aufheben.","zh_wang":"一个运算可以取消另一个运算的结果，运算可以互相抵消。","zh_huang":"一次操作会颠倒另一次操作的效果。操作之间可以彼此取消。"},"children":[]},{"number":"5.254","texts":{"zh":"运算可以消失（如在“～～p”中的否定：～～p＝p）。","en":"An operation can vanish (for example, negation in ‘~~p’; ~~p = p).","de":"Die Operation kann verschwinden (z. B. die Verneinung in „∼∼p“, ∼∼p = p).","zh_wang":"运算可以消失（比如，“～～p ”中的否定：～p =p ）","zh_huang":"运算可以消失（比如“~~p”中的否定：~~p=p）"},"children":[]}]}]},{"number":"5.3","texts":{"zh":"所有命题都是基本命题的真值运算结果。 真值运算是从基本命题产生出真值函项的方法。 依据真值运算的本性，就如从基本命题产生出它们的真值函项一样，以同样的方法也可以从真值函项产生出新的真值函项。当一个真值运算施用于基本命题的真值函项，总是产生出基本命题的另一个真值函项，即另一个命题。对基本命题真值运算的结果再作一次真值运算，其结果总可等同于对基本命题施用某一单独的 真值运算。 每个命题都是对基本命题作真值运算的结果。","en":"All propositions are results of truth-operations on elementary propositions. A truth-operation is the way in which a truth-function arises from elementary propositions. It is of the essence of a t
