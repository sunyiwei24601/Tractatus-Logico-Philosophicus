<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>逻辑哲学论树图</title>
    <style>
      :root {
        --bg: #f7f3ea;
        --paper: #fffdf7;
        --ink: #1f1c18;
        --muted: #7b7064;
        --line: #d8cdbd;
        --branch: #b7a894;
        --accent: #80523d;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: var(--bg);
      }

      body.font-serif { font-family: Georgia, "Times New Roman", "Songti SC", "Noto Serif CJK SC", serif; }
      body.font-sans { font-family: ui-sans-serif, system-ui, "PingFang SC", "Noto Sans CJK SC", sans-serif; }
      body.font-songti { font-family: "Songti SC", "Noto Serif CJK SC", SimSun, serif; }
      body.font-kaiti { font-family: "Kaiti SC", KaiTi, "STKaiti", serif; }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(247, 243, 234, 0.92);
        backdrop-filter: blur(14px);
      }

      .brand {
        margin-right: auto;
        font: 700 18px/1.1 Georgia, "Songti SC", serif;
      }

      input[type="search"], select, button {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--paper);
        color: var(--ink);
        padding: 9px 13px;
        font: 700 13px/1 ui-sans-serif, system-ui, sans-serif;
      }

      input[type="search"] { width: min(360px, 58vw); }
      button { cursor: pointer; }
      button:disabled { cursor: default; opacity: 0.55; }

      .lang-picker {
        display: inline-flex;
        gap: 4px;
        align-items: center;
        margin: 0;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--paper);
      }

      .lang-option {
        display: inline-flex;
        gap: 5px;
        align-items: center;
        padding: 6px 9px;
        border-radius: 999px;
        color: var(--muted);
        cursor: grab;
        font: 800 12px/1 ui-sans-serif, system-ui, sans-serif;
        user-select: none;
      }

      .lang-option:active { cursor: grabbing; }

      .lang-option.dragging {
        opacity: 0.42;
        outline: 1px dashed var(--accent);
      }

      .lang-option::after {
        content: "⋮⋮";
        color: #b7a492;
        font-size: 10px;
        letter-spacing: -2px;
      }

      .lang-option:has(input:checked) {
        color: var(--ink);
        background: #efe5d5;
      }

      .lang-option input {
        width: auto;
        margin: 0;
        accent-color: var(--accent);
      }

      .importer { display: none; }

      .zoom-controls {
        display: inline-flex;
        align-items: center;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--paper);
      }

      .zoom-controls button {
        width: 30px;
        height: 30px;
        padding: 0;
        border: 0;
        background: transparent;
        font-size: 17px;
      }

      .zoom-controls button:hover { background: #efe5d5; }

      .zoom-value {
        min-width: 48px;
        color: var(--muted);
        font: 800 12px/1 ui-sans-serif, system-ui, sans-serif;
        text-align: center;
      }

      .note {
        padding: 10px 18px 0;
        color: var(--muted);
        font: 13px/1.45 ui-sans-serif, system-ui, sans-serif;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        padding: 10px 18px 0;
        color: var(--muted);
        font: 12px/1.4 ui-sans-serif, system-ui, sans-serif;
      }

      .legend-item {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 6px 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 253, 247, 0.72);
      }

      .legend-swatch {
        width: 22px;
        height: 12px;
        border-top: 2px solid var(--branch);
      }

      .legend-swatch.fine {
        border-top-style: dashed;
        border-top-color: #d59b56;
      }

      .workspace {
        height: calc(100vh - 92px);
        padding: 18px;
      }

      .canvas {
        min-width: 0;
        height: 100%;
        overflow: auto;
        touch-action: pan-x pan-y;
        overscroll-behavior: contain;
        padding: 34px 42px 88px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255, 253, 247, 0.42);
      }

      .tree, .tree ul {
        position: relative;
        display: flex;
        justify-content: center;
        margin: 0;
        padding: 34px 0 0;
        list-style: none;
      }

      .tree { min-width: max-content; padding-top: 0; }

      .tree ul::before {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        width: 0;
        height: 34px;
        border-left: 1px solid var(--branch);
      }

      .tree li {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 18px 0;
        text-align: center;
      }

      .tree > li { padding-top: 0; }

      .tree li::before,
      .tree li::after {
        content: "";
        position: absolute;
        top: 0;
        width: 50%;
        height: 30px;
        border-top: 1px solid var(--branch);
      }

      .tree li::before { right: 50%; }
      .tree li::after { left: 50%; border-left: 1px solid var(--branch); }
      .tree li:first-child::before { border-top: 0; }
      .tree li:last-child::after { border-top: 0; border-left: 1px solid var(--branch); }
      .tree li:only-child::before,
      .tree li:only-child::after { display: none; }

      .tree li.fine-branch { padding-left: 12px; padding-right: 12px; }
      .tree li.fine-branch::before,
      .tree li.fine-branch::after {
        border-top-style: dashed;
        border-top-color: #d7c9b8;
      }
      .tree li.fine-branch::after {
        border-left-style: dashed;
        border-left-color: #d7c9b8;
      }
      .tree li.fine-branch > ul::before {
        border-left-style: dashed;
        border-left-color: #d7c9b8;
      }

      details.node:not([open]) + ul,
      details.node:not([open]) + .child-levels { display: none; }

      .child-levels {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 34px;
      }

      .child-levels::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        border-left: 1px solid var(--branch);
      }

      .child-levels > .child-level-group {
        z-index: 1;
        margin: 0 0 34px;
        padding: 46px 22px 22px;
        border: 1px solid #d7c9b8;
        border-radius: 24px;
        background: rgba(250, 244, 233, 0.94);
        box-shadow: 0 10px 28px rgba(55, 42, 29, 0.06);
      }

      .child-levels > .child-level-group:last-child { margin-bottom: 0; }
      .child-levels > .child-level-group::before { height: 46px; }

      .node { position: relative; z-index: 2; }
      .node summary { list-style: none; cursor: pointer; }
      .node summary::-webkit-details-marker { display: none; }

      .bubble {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 6px;
        align-items: center;
        min-width: 138px;
        max-width: 240px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--paper);
        box-shadow: 0 8px 24px rgba(55, 42, 29, 0.08);
      }

      .bubble.expanded-bubble {
        min-width: 360px;
        max-width: 620px;
        text-align: left;
      }

      .root .bubble {
        min-width: 180px;
        padding: 18px 22px;
        border-color: #b9997d;
        background: #fff8eb;
        font-size: 22px;
      }

      .root-title {
        font-weight: 700;
      }

      .fine-node .bubble {
        max-width: 220px;
        border-style: dashed;
        border-color: #d59b56;
        background: #fff7e5;
        box-shadow: 0 5px 14px rgba(167, 101, 29, 0.1);
      }

      .fine-node .num { color: #a7651d; }

      .node-kind {
        display: inline-block;
        margin-left: 7px;
        padding: 2px 6px;
        border: 1px solid #d7c9b8;
        border-radius: 999px;
        color: #8b5417;
        background: #ffeac4;
        font: 800 10px/1 ui-sans-serif, system-ui, sans-serif;
        vertical-align: 1px;
      }

      .annotation-badge {
        display: inline-block;
        margin-left: 7px;
        padding: 2px 6px;
        border: 1px solid #b9c6a1;
        border-radius: 999px;
        color: #48631f;
        background: #eef6df;
        font: 800 10px/1 ui-sans-serif, system-ui, sans-serif;
        vertical-align: 1px;
      }

      .expand-btn {
        position: absolute;
        left: 50%;
        bottom: -13px;
        transform: translateX(-50%);
        z-index: 3;
        display: inline-grid;
        place-items: center;
        width: 24px;
        height: 24px;
        padding: 0;
        border-radius: 50%;
        border-color: #cbb9a4;
        color: var(--accent);
        background: #fff8eb;
        font: 900 15px/1 ui-sans-serif, system-ui, sans-serif;
        text-align: center;
        appearance: none;
      }

      .expand-btn::before { content: "+"; }
      .node[open] > summary .expand-btn::before { content: "−"; }
      .expand-btn:disabled {
        visibility: hidden;
        cursor: default;
      }

      .num {
        color: var(--accent);
        font: 900 14px/1 ui-sans-serif, system-ui, sans-serif;
        letter-spacing: 0.03em;
      }

      .num-line {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        align-items: center;
      }

      .detail-toggle {
        display: inline-grid;
        flex: 0 0 auto;
        place-items: center;
        width: 24px;
        height: 24px;
        padding: 0;
        border-color: var(--accent);
        color: var(--accent);
        background: #fff8eb;
        box-shadow: none;
      }

      .detail-toggle svg {
        width: 14px;
        height: 14px;
        pointer-events: none;
      }

      .detail-toggle:hover {
        background: #f4e6d5;
      }

      .detail-toggle[aria-expanded="true"] {
        color: #fffdf8;
        background: var(--accent);
      }

      .snippet {
        display: block;
        font-size: 14px;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .inline-translation {
        margin-top: 8px;
        padding-top: 10px;
        border-top: 1px solid var(--line);
      }

      .version + .version { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
      .version h3 {
        margin: 0 0 6px;
        color: var(--muted);
        font: 800 11px/1 ui-sans-serif, system-ui, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }
      .version p { margin: 0; font-size: 15px; line-height: 1.58; }

      .source-notes {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px dashed #c9b99f;
        text-align: left;
      }

      .source-notes-title {
        margin: 0 0 8px;
        color: var(--accent);
        font: 900 12px/1 ui-sans-serif, system-ui, sans-serif;
        letter-spacing: 0.12em;
      }

      .source-note-group + .source-note-group {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid rgba(216, 205, 189, 0.7);
      }

      .source-note-group h4 {
        margin: 0 0 6px;
        color: var(--muted);
        font: 800 11px/1 ui-sans-serif, system-ui, sans-serif;
      }

      .source-note-group ol {
        margin: 0;
        padding-left: 20px;
      }

      .source-note-group li {
        margin: 0 0 6px;
        padding: 0;
        font-size: 13px;
        line-height: 1.55;
        text-align: left;
      }

      .source-note-badge {
        background: #edf2dd;
        color: #5f6f31;
      }

      .annotation-panel {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px dashed #c9b99f;
      }

      .annotation-title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
        color: var(--muted);
        font: 800 11px/1 ui-sans-serif, system-ui, sans-serif;
        letter-spacing: 0.1em;
      }

      .annotation-save-state {
        font-weight: 700;
        letter-spacing: 0;
      }

      .annotation-hint {
        display: none;
        margin: -2px 0 8px;
        color: var(--muted);
        font: 12px/1.45 ui-sans-serif, system-ui, sans-serif;
      }

      .annotation-panel.editing .annotation-hint { display: block; }

      .annotation-editor {
        display: none;
        width: 100%;
        min-height: 96px;
        resize: vertical;
        margin-top: 8px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        color: var(--ink);
        background: #fbf6ec;
        font: 14px/1.5 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
      }

      .annotation-panel.editing .annotation-editor { display: block; }

      .annotation-editor:focus {
        outline: 2px solid rgba(128, 82, 61, 0.18);
        border-color: #b9997d;
      }

      .annotation-preview {
        min-height: 74px;
        margin-top: 8px;
        padding: 12px 14px;
        border: 1px solid #e1d6c8;
        border-radius: 14px;
        background: #fbf6ec;
        cursor: text;
        font: 14px/1.58 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
      }

      .annotation-panel.editing .annotation-preview { display: none; }

      .annotation-preview:empty { display: none; }
      .annotation-preview h4,
      .annotation-preview h5,
      .annotation-preview h6 { margin: 0 0 8px; font-size: 1em; }
      .annotation-preview p { margin: 0 0 8px; }
      .annotation-preview p:last-child { margin-bottom: 0; }
      .annotation-preview ul,
      .annotation-preview ol { margin: 0 0 8px 18px; padding: 0; }
      .annotation-preview code {
        padding: 1px 5px;
        border-radius: 6px;
        background: #efe5d5;
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 0.92em;
      }
      .annotation-preview a { color: #6f432f; font-weight: 800; }

      .annotation-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 8px;
      }

      .annotation-actions button {
        padding: 7px 10px;
        font-size: 12px;
      }

      mark { border-radius: 4px; background: #f0d88f; color: inherit; }
      .empty { color: var(--muted); font-style: italic; }

      @media (max-width: 720px) {
        header { align-items: stretch; }
        .brand { width: 100%; }
        input[type="search"], select, button, .lang-picker { width: 100%; }
        .detail-toggle, .expand-btn, .zoom-controls button { width: auto; }
        .zoom-controls { justify-content: center; width: 100%; }
        .zoom-controls button { width: 36px; }
        .lang-picker { justify-content: space-between; }
        .workspace { height: auto; padding: 14px; }
        .canvas { height: calc(100vh - 360px); min-height: 360px; padding: 28px 22px 70px; }
      }
    </style>
  </head>
  <body class="font-serif">
    <header>
      <div class="brand">Tractatus Tree</div>
      <input id="search" type="search" placeholder="搜索编号或正文，比如 6.54 / ladder / Welt" />
      <fieldset class="lang-picker" id="langPicker" aria-label="选择展示语言">
        <label class="lang-option"><input type="checkbox" name="lang" value="zh" checked /> 中文（贺绍甲）</label>
        <label class="lang-option"><input type="checkbox" name="lang" value="zh_wang" checked /> 中文（王平复/张金言）</label>
        <label class="lang-option"><input type="checkbox" name="lang" value="zh_huang" checked /> 中文（黄敏）</label>
        <label class="lang-option"><input type="checkbox" name="lang" value="en" checked /> English</label>
        <label class="lang-option"><input type="checkbox" name="lang" value="de" checked /> Deutsch</label>
      </fieldset>
      <select id="font">
        <option value="serif">Serif</option>
        <option value="songti">宋体</option>
        <option value="kaiti">楷体</option>
        <option value="sans">Sans</option>
      </select>
      <div class="zoom-controls" role="group" aria-label="树图缩放">
        <button id="zoomOut" type="button" aria-label="缩小树图" title="缩小">−</button>
        <output class="zoom-value" id="zoomValue" aria-live="polite">100%</output>
        <button id="zoomIn" type="button" aria-label="放大树图" title="放大">+</button>
        <button id="zoomReset" type="button" aria-label="重置树图缩放" title="重置缩放">↺</button>
      </div>
      <button id="toggle" type="button">展开全部</button>
      <button id="sourceNotesToggle" type="button">隐藏注释</button>
      <button id="exportNotes" type="button">导出批注</button>
      <button id="importNotes" type="button">导入批注</button>
      <input class="importer" id="importFile" type="file" accept="application/json,.json" />
    </header>
    <div class="note" id="note"></div>
    <div class="legend" aria-label="编号视觉说明">
      <span class="legend-item"><span class="legend-swatch"></span>主分支：如 2.21</span>
      <span class="legend-item"><span class="legend-swatch fine"></span>低权重细注：如 2.201，会带「低权重细注」标签</span>
    </div>
    <div class="workspace">
      <main class="canvas">
        <ul class="tree" id="tree"></ul>
      </main>
    </div>

    <script id="data" type="application/json">{"note":"点击节点上的 + / − 按钮展开或收起子节点；双击节点气泡显示多译本正文和原书注释。浅色虚线节点表示带 0 的低权重细注。已加入两个非重复中文译本。","labels":{"zh":"中文（贺绍甲）","en":"English","de":"Deutsch","zh_wang":"中文（王平复/张金言）","zh_huang":"中文（黄敏）"},"counts":{"zh":526,"en":526,"de":526,"total":526,"zh_wang":526,"zh_huang":526},"tree":[{"number":"1","texts":{"zh":"世界是一切发生的事情。","en":"The world is everything that is the case.","de":"Die Welt ist alles, was der Fall ist.","zh_wang":"世界是一切发生的事情。","zh_huang":"世界就是一切，即所有实际情况。"},"children":[{"number":"1.1","texts":{"zh":"世界是事实的总体，而不是事物的总体。","en":"The world is the totality of facts, not of things.","de":"Die Welt ist die Gesamtheit der Tatsachen, nicht der Dinge.","zh_wang":"世界是所有事实的总和，而非事物的总和。","zh_huang":"世界是事实的总体，而不是物的总体。"},"children":[{"number":"1.11","texts":{"zh":"世界为诸事实所规定，为它们即是全部 事实所规定。","en":"The world is determined by the facts and by their being all the facts.","de":"Die Welt ist durch die Tatsachen bestimmt und dadurch, dass es alle Tatsachen sind.","zh_wang":"世界是由事实所决定的，并且是由全部事实所决定。","zh_huang":"确定了这些事实，并确定了这就是所有事实，世界也就确定了。"},"children":[]},{"number":"1.12","texts":{"zh":"因为事实的总体规定那发生的事情，也规定那所有未发生的事情。","en":"For the totality of facts determines what is the case as well as everything that is not the case.","de":"Denn, die Gesamtheit der Tatsachen bestimmt, was der Fall ist und auch, was alles nicht der Fall ist.","zh_wang":"因为事实的总和既规定了发生的事情，也规定了一切未发生的事情。","zh_huang":"而这是因为，事实的总体既决定哪些情况存在，也决定哪些情况不存在。"},"children":[]},{"number":"1.13","texts":{"zh":"在逻辑空间中的诸事实就是世界。","en":"The facts in logical space are the world.","de":"Die Tatsachen im logischen Raum sind die Welt.","zh_wang":"逻辑空间中的事实就是世界。","zh_huang":"逻辑空间中的事实就是世界。"},"children":[]}]},{"number":"1.2","texts":{"zh":"世界分解为诸事实。","en":"The world divides into facts.","de":"Die Welt zerfällt in Tatsachen.","zh_wang":"世界分解为事实。","zh_huang":"世界分解成事实。"},"children":[{"number":"1.21","texts":{"zh":"每项事情可以发生或者不发生，其余的一切则仍保持原样。","en":"Something can be the case or not the case and everything else remain the same.","de":"Eines kann der Fall sein oder nicht der Fall sein und alles übrige gleich bleiben.","zh_wang":"任何一件事情或者发生，或者不发生，其他一切则保持原样。","zh_huang":"分解出的任何一个事实都可能存在或不存在，其余一切不变。"},"children":[]}]}]},{"number":"2","texts":{"zh":"发生的事情，即事实，就是诸事态 的存在。","en":"What is the case, a fact, is the obtaining of states-of-things.","de":"Was der Fall ist, die Tatsache, ist das Bestehen von Sachverhalten.","zh_wang":"发生的事情即事实，是原子事实的存在。","zh_huang":"存在的东西，事实，就是事态的存在。"},"children":[{"number":"2.01","texts":{"zh":"事态是对象（事物）的结合。","en":"A state-of-things is a combination of objects (entities, things).","de":"Der Sachverhalt ist eine Verbindung von Gegenständen. (Sachen, Dingen.)","zh_wang":"一个原子事实是多个对象（实体、事物）的结合。","zh_huang":"事态（物的状态）就是对象（物）的连接。"},"children":[{"number":"2.011","texts":{"zh":"事物的本质在于能够成为事态的组成部分。","en":"It is essential to a thing that it can be a constituent of a state-of-things.","de":"Es ist dem Ding wesentlich, der Bestandteil eines Sachverhaltes sein zu können.","zh_wang":"事物的本质就是，它可以成为某个原子事实的一个组成部分。","zh_huang":"物的本质在于可能充当事态的成分。"},"children":[]},{"number":"2.012","texts":{"zh":"逻辑中没有偶然的东西：如果一个事物能够 出现在一个事态中，那么该事态的可能性必定已经预含于该事物之中。","en":"In logic nothing is accidental: if a thing can occur in a state-of-things, then the possibility of the state-of-things must already be prefigured in the thing.","de":"In der Logik ist nichts zufällig: Wenn das Ding im Sachverhalt vorkommen kann, so muss die Möglichkeit des Sachverhaltes im Ding bereits präjudiziert sein.","zh_wang":"在逻辑中没有偶然的事情：如果一个事物能够出现在原子事实中，那么这个原子事实的可能性必定早已包含于该事物之中。","zh_huang":"逻辑中没有什么是偶然的——如果一个物可能出现在一个事态中，那么这种事态的可能性肯定在物本身中预先就决定了。"},"children":[{"number":"2.0121","texts":{"zh":"如果一个事物本身能够独立存在，那么后来的适合于它的状况看来就是一种偶然的事情。 如果事物能够出现于事态之中，那么这一可能性必定一开始就已经存在于事物之中。 （在逻辑中没有纯粹是可能的事情。逻辑涉及每一种可能性，而一切可能性都是逻辑的事实。） 正如我们根本不能在空间之外思想空间对象，或者在时间之外思想时间对象一样，离开同其他对象结合的可能性，我们也不能 思想一个对象。 如果我能够思想在事态中结合的对象，我就不能离开这种结合的可能性 来思想对象。","en":"It would appear as an accident, as it were, if a state of affairs were subsequently to fit a thing that could exist in and by itself. If things can occur in states-of-things, then this possibility must already lie in them. (What is logical cannot be merely possible. Logic deals with every possibility and all possibilities are its facts.) Just as we cannot think of spatial objects at all outside space, or temporal objects outside time, so we cannot think of any object outside the possibility of its combination with other objects. If I can think of an object in the context of a state-of-things, then I cannot think of it outside the possibility of this context.","de":"Es erschiene gleichsam als Zufall, wenn dem Ding, das allein für sich bestehen könnte, nachträglich eine Sachlage passen würde. Wenn die Dinge in Sachverhalten vorkommen können, so muss dies schon in ihnen liegen. (Etwas Logisches kann nicht nur-möglich sein. Die Logik handelt von jeder Möglichkeit und alle Möglichkeiten sind ihre Tatsachen.) Wie wir uns räumliche Gegenstände überhaupt nicht ausserhalb des Raumes, zeitliche nicht ausserhalb der Zeit denken können, so können wir uns keinen Gegenstand ausserhalb der Möglichkeit seiner Verbindung mit anderen denken. Wenn ich mir den Gegenstand im Verbande des Sachverhalts denken kann, so kann ich ihn nicht ausserhalb der Möglichkeit dieses Verbandes denken.","zh_wang":"如果一个事物本身就可以独立存在，那么后来可适用于它本身的事态看来就可以说是一种偶然。 如果事物出现在原子事实之中，那么这种可能性必定是早就存在于事物之中的。 （在逻辑中没有仅仅是可能的事情。逻辑涉及每一种可能性，而一切可能性都是逻辑的事实。） 正如我们不能在空间以外来思考空间对象，或者是在时间以外来思考时间对象一样，我们也不可能脱离和其他对象相结合的可能性来思考任何对象。 如果我能够思考在原子事实背景下的对象，我就不能离开这种背景的可能性来思考它。","zh_huang":"要是一物凭自身就已经可以单独存在，后来才有一种情况与之相适应，那才称得上一种偶然。 如果物能够出现于事态中，那么这种可能性必定从一开始就已经在物中了。 （逻辑的东西不可能只是一种可能性。逻辑处理所有可能性，所有可能性都是其事实） 正如根本不能在空间之外设想空间之物，不能在时间之外设想时间之物，我们也不能脱离与其他对象的连接来设想任何对象。 如果能在事态的连接中设想对象，那么我就不能在这种连接的可能性之外设想它。"},"children":[]},{"number":"2.0122","texts":{"zh":"事物就其能够出现在一切可能的 状况中而言是独立的，但是这种独立性的形式是一种与事态相联系的形式，即一种依赖的形式。（词以两种不同的方式——单独地和在命题中——出现是不可能的。）","en":"A thing is independent insofar as it can occur in all possible states of affairs, but this form of independence is a form of connection with a state-of-things, a form of dependence. (It is impossible for words to appear in two different ways, on their own and in a proposition.)","de":"Das Ding ist selbständig, insofern es in allen möglichen Sachlagen vorkommen kann, aber diese Form der Selbständigkeit ist eine Form des Zusammenhangs mit dem Sachverhalt, eine Form der Unselbständigkeit. (Es ist unmöglich, dass Worte in zwei verschiedenen Weisen auftreten, allein und im Satz.)","zh_wang":"在所有可能出现的情况中，事物都是独立存在的。但是这种独立的形式，是一种与原子事实相结合的形式，是一种依赖的形式。（词语不可能以两种不同的形式出现，即单独出现，或是在命题中出现。）","zh_huang":"物可以在所有可能的情况下出现，在这种意义上物是独立的；但这种意义上的独立是与事态的一种联系，即另一种意义的依赖。（词不可能以两种不同的方式出现，一种是单独出现，一种是在句子中出现。）"},"children":[]},{"number":"2.0123","texts":{"zh":"假如我知道一个对象，我也就知道它出现于诸事态中的所有可能性。 （每一个这种可能性必定在该对象的本性中。） 之后不可能发现新的可能性。","en":"If I know an object, then I also know all the possibilities of its occurrence in states-of-things. (Every such possibility must lie in the nature of the object.) A new possibility cannot be found subsequently.","de":"Wenn ich den Gegenstand kenne, so kenne ich auch sämtliche Möglichkeiten seines Vorkommens in Sachverhalten. (Jede solche Möglichkeit muss in der Natur des Gegenstandes liegen.) Es kann nicht nachträglich eine neue Möglichkeit gefunden werden.","zh_wang":"如果我了解一个对象，那么我也就知道它出现在原子事实中所有的可能性。 （所有这些可能性必定存在于对象的自然属性中。） 之后便不能再发现一种新的可能性。","zh_huang":"知道一个对象，也就知道它出现于事态中的所有可能性。 （所有这样的可能性必定已经存在于对象的本质中。） 不可能在后来又发现新的可能性。"},"children":[{"number":"2.01231","texts":{"zh":"如果我要知道一个对象，虽然我不一定要知道它的外在性质，但是我必须知道它的一切内在性质。","en":"To know an object, I do not need to know its external properties—but I must know all its internal properties.","de":"Um einen Gegenstand zu kennen, muss ich zwar nicht seine externen – aber ich muss alle seine internen Eigenschaften kennen.","zh_wang":"为了了解一个对象，我必须了解它的所有内在性质，而并非其外在性质。","zh_huang":"要知道一个对象，就必须知道它所有的内在性质，而不必知道其外在性质。"},"children":[]}]},{"number":"2.0124","texts":{"zh":"如果给出所有的对象，那么同时也就给出了所有可能的 事态。","en":"If all objects are given, then all possible states-of-things are thereby also given.","de":"Sind alle Gegenstände gegeben, so sind damit auch alle möglichen Sachverhalte gegeben.","zh_wang":"如果给出所有的对象，那么因此也就给出了所有可能的原子事实。","zh_huang":"如果所有对象都给出了，那么所有可能的事态也就给出了。"},"children":[]}]},{"number":"2.013","texts":{"zh":"每个事物都像是在一个可能事态的空间里。我可以设想这个空间是空的，但是我不能设想没有这空间的事物。","en":"Every thing is, as it were, in a space of possible states-of-things. I can think of this space as empty, but not of the thing without the space.","de":"Jedes Ding ist, gleichsam, in einem Raume möglicher Sachverhalte. Diesen Raum kann ich mir leer denken, nicht aber das Ding ohne den Raum.","zh_wang":"每个事物可以说都是处于一个可能的原子事实空间之中；我可以想象这样的空间为空，我却无法想象一个无空间可依的事物。","zh_huang":"每一物都好像在可能事态的空间中一样。我可以想象这空间是空的，但不能脱离空间来想象物。"},"children":[{"number":"2.0131","texts":{"zh":"空间对象必须处在无限的空间之中。（一个空间点就是一个主目位置。） 视域里的一个斑块，虽然不一定是红的，但它必须有某种颜色：所以说它被颜色空间［Farbenraum］所包围。音调必须具有某种 高度，触觉对象必须具有某种 硬度，等等。","en":"A spatial object must lie in infinite space. (A spatial point is an argument-place.) A spot in the visual field need not be red, but it must have some colour: it has, so to speak, a colour space around it. A sound must have some pitch, an object of touch some hardness, and so on.","de":"Der räumliche Gegenstand muss im unendlichen Raume liegen. (Der Raumpunkt ist eine Argumentstelle.) Der Fleck im Gesichtsfeld muss zwar nicht rot sein, aber eine Farbe muss er haben: er hat sozusagen den Farbenraum um sich. Der Ton muss eine Höhe haben, der Gegenstand des Tastsinnes eine Härte u. s. w.","zh_wang":"一个空间的对象必定存在于无限的空间中。（一个空间点就是一个主目位置。） 视域里的一个斑块，不一定是红的，但是它必定有某种颜色：可以说，它周围有一个颜色空间。音调必须具有一种高度，触觉对象必须具有一种硬度，等等。","zh_huang":"空间对象必定处于无限的空间中（空间中的一个点就是一个主目位置）。 视野中的一个斑点不必是红的，但必定有一种颜色；它必定被所谓的颜色空间所包围。音调必定有特定音高，触觉对象必定有特定硬度，等等。"},"children":[]}]},{"number":"2.014","texts":{"zh":"对象包含着一切状况的可能性。","en":"Objects contain the possibility of all states of affairs.","de":"Die Gegenstände enthalten die Möglichkeit aller Sachlagen.","zh_wang":"对象包含了一切事态的可能性。","zh_huang":"对象包含了所有情况的可能性。"},"children":[{"number":"2.0141","texts":{"zh":"对象出现在诸事态中的可能性就是对象的形式。","en":"The possibility of its occurrence in states-of-things is the form of an object.","de":"Die Möglichkeit seines Vorkommens in Sachverhalten, ist die Form des Gegenstandes.","zh_wang":"对象出现在原子事实中的可能性，就是对象的形式。","zh_huang":"对象出现于事态中的那种可能性就是对象的形式。"},"children":[]}]}]},{"number":"2.02","texts":{"zh":"对象是简单的。","en":"An object is simple.","de":"Der Gegenstand ist einfach.","zh_wang":"对象是简单的。","zh_huang":"对象是简单的。"},"children":[{"number":"2.0201","texts":{"zh":"每一个关于复合物的陈述可以分解为关于其各组成部分的陈述，分解为完全地描述该复合物的一些命题。","en":"Every statement about complexes can be analysed into a statement about their constituents and into those propositions that describe the complexes completely.","de":"Jede Aussage über Komplexe lässt sich in eine Aussage über deren Bestandteile und in diejenigen Sätze zerlegen, welche die Komplexe vollständig beschreiben.","zh_wang":"每个关于复合物的陈述都可以分解为对其组成部分的陈述，而且能被分解成可以完全描述这些复合物的陈述。","zh_huang":"任何关于复合物的陈述都可以分析成一个关于其构成成分的陈述，进而分析成充分描述复合物的那些陈述。"},"children":[]},{"number":"2.021","texts":{"zh":"对象构成世界的实体。因此它们不能是复合的。","en":"Objects form the substance of the world. That is why they cannot be composite.","de":"Die Gegenstände bilden die Substanz der Welt. Darum können sie nicht zusammengesetzt sein.","zh_wang":"对象构成世界的实体。因而它们不可能是复合物。","zh_huang":"对象构成了世界的基体（Substanz/substance），因此它们不能是复合的。"},"children":[{"number":"2.0211","texts":{"zh":"假如世界没有实体，那么一个命题是否有意义就依赖于另一个命题是否为真。","en":"If the world had no substance, then whether a proposition had sense would depend on whether another proposition was true.","de":"Hätte die Welt keine Substanz, so würde, ob ein Satz Sinn hat, davon abhängen, ob ein anderer Satz wahr ist.","zh_wang":"如果世界没有任何实体，那么一个命题是否有意义就依赖于另外一个命题是否为真。","zh_huang":"如果世界没有基体，那么一个句子是否具有含义，就要依赖于另一个句子是否为真。"},"children":[]},{"number":"2.0212","texts":{"zh":"在这种情况下就不可能勾画出世界的任何图像（真的或假的）。","en":"It would then be impossible to draw up a picture of the world (true or false).","de":"Es wäre dann unmöglich, ein Bild der Welt (wahr oder falsch) zu entwerfen.","zh_wang":"这样就不可能勾画出世界的图像（真的或者假的）","zh_huang":"这样的话就得不到关于世界的图像了，不管要得到的图像是真是假。"},"children":[]}]},{"number":"2.022","texts":{"zh":"显然，一个想象的世界，无论它怎样不同于实在的世界，必有某种东西——一种形式——为它与实在的世界所共有。","en":"It is obvious that an imagined world, however different from the real world it may be, must have something—a form—in common with the real world.","de":"Es ist offenbar, dass auch eine von der wirklichen noch so verschieden gedachte Welt Etwas – eine Form – mit der wirklichen gemein haben muss.","zh_wang":"显然，不管与现实世界有多大不同的想象的世界必然与实在的世界有某种共同的东西，即一种形成。","zh_huang":"很清楚，无论想象的世界与真实世界有多不同，它必定与真实世界共有某种东西——形式。"},"children":[]},{"number":"2.023","texts":{"zh":"正是诸对象构成这种不变的形式。","en":"This fixed form consists simply of the objects.","de":"Diese feste Form besteht eben aus den Gegenständen.","zh_wang":"这种固定不变的形式是由众多对象组成。","zh_huang":"对象正是构成这种牢固形式的东西。"},"children":[{"number":"2.0231","texts":{"zh":"世界的实体只能 规定一种形式，而不能规定任何物质的属性。因为物质的属性只有通过命题来表述——只有通过对象的配置来构成。","en":"The substance of the world can only determine a form and not any material properties. For these are only represented by propositions—only formed by the configuration of objects.","de":"Die Substanz der Welt kann nur eine Form und keine materiellen Eigenschaften bestimmen. Denn diese werden erst durch die Sätze dargestellt – erst durch die Konfiguration der Gegenstände gebildet.","zh_wang":"世界的实体只能规定一种形式，而不能规定物质的属性。因为这些属性首先通过命题来表述——通过对象的配置来呈现。","zh_huang":"世界的基体只能决定形式，而不能决定任何实质的性质。因为要表现实质性质就只能用句子，而要得到实质性质，也只能通过对象的配置。"},"children":[]},{"number":"2.0232","texts":{"zh":"顺便说一下，对象是无色的。","en":"Roughly speaking: objects are colourless.","de":"Beiläufig gesprochen: Die Gegenstände sind farblos.","zh_wang":"一般来说，对象是没有颜色的。","zh_huang":"可以这么说，对象是无色的。"},"children":[]},{"number":"2.0233","texts":{"zh":"如果两个对象具有相同的逻辑形式，除了它们外在性质的差异之外，它们之间唯一的区别就是：它们是不同的。","en":"Two objects of the same logical form—aside from their external properties—are only distinguished from one another in that they are different.","de":"Zwei Gegenstände von der gleichen logischen Form sind – abgesehen von ihren externen Eigenschaften – von einander nur dadurch unterschieden, dass sie verschieden sind.","zh_wang":"两个具有相同的逻辑形式的对象——除了外在性质不同——唯一使它们相互区分开的就是：它们是不同的。","zh_huang":"若不借助外在性质，要把两个具有同样逻辑形式的对象区别开，那就只能说它们不是一个对象。"},"children":[{"number":"2.02331","texts":{"zh":"或者一个事物具有别的任何事物都没有的属性，这时我们可以直接用一个描述使它同别的事物区分开来并指谓它；或者另一种情形，有好几个事物，它们的全部属性都是共有的，这时就完全不可能从它们之中指出某一个来。 因为如果没有任何东西来区分一个事物，我就不能区分它，不然的话它总是会被区分开来的。","en":"Either a thing has properties that nothing else has, in which case one can single it out from others straightaway by a description and refer to it; or, instead, there are several things that have all their properties in common, in which case it is quite impossible to point to one of them. For if a thing is not distinguished by anything, then I cannot distinguish it, for otherwise it would be distinguished.","de":"Entweder ein Ding hat Eigenschaften, die kein anderes hat, dann kann man es ohneweiteres durch eine Beschreibung aus den anderen herausheben, und darauf hinweisen; oder aber, es gibt mehrere Dinge, die ihre sämtlichen Eigenschaften gemeinsam haben, dann ist es überhaupt unmöglich auf eines von ihnen zu zeigen. Denn, ist das Ding durch nichts hervorgehoben, so kann ich es nicht hervorheben, denn sonst ist es eben hervorgehoben.","zh_wang":"或者一个事物具有别的事物没有的属性，那么我们就可以直接通过一个表述使它同其他别的事物区别开来，并且指出它来。或者另一方面，有几个事物的全部属性是共有的，这时候就完全不可能指出它们中的任何一个。 如果没有任何东西可以用来区别一个事物，那么我就不能区别出它来——因为否则它就会被区别出来。","zh_huang":"要么一物具有其他东西所没有的性质，那就可以直接通过描述来把它与其他东西区别开，并指出它；要么相反，有若干物与其共有所有性质，于是不可能挑出其中任何一个。 因为如果没有任何东西来区分它，那么我就不能区分它，否则它就已经被区分出来了。"},"children":[]}]}]},{"number":"2.024","texts":{"zh":"实体是独立于发生的事情而存在的。","en":"Substance is what subsists independently of what is the case.","de":"Die Substanz ist das, was unabhängig von dem was der Fall ist, besteht.","zh_wang":"实体是独立于发生的事情而存在的。","zh_huang":"基体的存在不依赖于实际情况如何。"},"children":[]},{"number":"2.025","texts":{"zh":"它是形式和内容。","en":"It is form and content.","de":"Sie ist Form und Inhalt.","zh_wang":"它是形式和内容。","zh_huang":"它本身就是形式与内容。"},"children":[{"number":"2.0251","texts":{"zh":"空间、时间和颜色（有色性）是对象的形式。","en":"Space, time and colour (colouration) are forms of objects.","de":"Raum, Zeit und Farbe (Färbigkeit) sind Formen der Gegenstände.","zh_wang":"空间、时间和颜色（有色性）是对象的形式。","zh_huang":"空间、时间和颜色（有色性），这些是对象的形式。"},"children":[]}]},{"number":"2.026","texts":{"zh":"如果世界要有一个不变的形式，就必须要有对象。","en":"Only if there are objects can there be a fixed form of the world.","de":"Nur wenn es Gegenstände gibt, kann es eine feste Form der Welt geben.","zh_wang":"只有对象的存在，才能有一个固定形式的世界的存在。","zh_huang":"只有对象存在，世界才能有牢固的形式。"},"children":[]},{"number":"2.027","texts":{"zh":"不变者、实存者和对象是一个东西。","en":"The fixed, the subsistent and the object are one.","de":"Das Feste, das Bestehende und der Gegenstand sind Eins.","zh_wang":"固定不变的东西，存在的东西和对象是一个东西。","zh_huang":"牢固的东西，持续的东西，对象，这些都是一回事。"},"children":[{"number":"2.0271","texts":{"zh":"对象是不变的和实存的；它们的配置则是可变的和不定的。","en":"The object is the fixed, the subsistent; the configuration is the changing, the inconstant.","de":"Der Gegenstand ist das Feste, Bestehende; die Konfiguration ist das Wechselnde, Unbeständige.","zh_wang":"对象是固定不变的，存在的，而它们的配置是多变而不定的。","zh_huang":"对象是牢固的、持续的，配置则是变动的、可变的。"},"children":[]},{"number":"2.0272","texts":{"zh":"对象的配置构成事态。","en":"The configuration of objects forms the state-of-things.","de":"Die Konfiguration der Gegenstände bildet den Sachverhalt.","zh_wang":"对象的配置构成了原子事实。","zh_huang":"对象配置起来就形成事态。"},"children":[]}]}]},{"number":"2.03","texts":{"zh":"在事态中对象就像链条的环节那样互相勾连。","en":"In a state-of-things the objects hang in one another, like the links of a chain.","de":"Im Sachverhalt hängen die Gegenstände ineinander, wie die Glieder einer Kette.","zh_wang":"在原子事实中，对象如同一条锁链一样相互连接。","zh_huang":"在事态中对象衔接起来，就像链条中的环节那样彼此嵌合。"},"children":[{"number":"2.031","texts":{"zh":"在事态中对象之间以一定的方式相互关联。","en":"In a state-of-things the objects stand to one another in a determinate way.","de":"Im Sachverhalt verhalten sich die Gegenstände in bestimmter Art und Weise zueinander.","zh_wang":"在原子事实中，对象之间以某种确定的方式相连。","zh_huang":"在事态中对象以特定方式相互连接。"},"children":[]},{"number":"2.032","texts":{"zh":"对象在事态中发生联系的一定的方式，即是事态的结构。","en":"The way in which the objects connect in a state-of-things is the structure of the state-of-things.","de":"Die Art und Weise, wie die Gegenstände im Sachverhalt zusammenhängen, ist die Struktur des Sachverhaltes.","zh_wang":"在原子事实中，对象之间相互连接的方式，即是原子事实的结构。","zh_huang":"对象在事态中连接的特定方式就是事态的结构。"},"children":[]},{"number":"2.033","texts":{"zh":"形式是结构的可能性。","en":"The form is the possibility of the structure.","de":"Die Form ist die Möglichkeit der Struktur.","zh_wang":"形式是结构的可能性。","zh_huang":"结构的可能性就是形式。"},"children":[]},{"number":"2.034","texts":{"zh":"事实的结构由诸事态的结构组成。","en":"The structure of the fact consists of the structures of the states-of-things.","de":"Die Struktur der Tatsache besteht aus den Strukturen der Sachverhalte.","zh_wang":"事实的结构由原子事实的结构组成。","zh_huang":"事态的结构就构成事实的结构。"},"children":[]}]},{"number":"2.04","texts":{"zh":"存在的事态的总体即是世界。","en":"The totality of the obtaining states-of-things is the world.","de":"Die Gesamtheit der bestehenden Sachverhalte ist die Welt.","zh_wang":"存在的原子事实的总和即是世界。","zh_huang":"存在的事态的总体就是世界。"},"children":[]},{"number":"2.05","texts":{"zh":"存在的事态的总体也规定哪些事态不存在。","en":"The totality of the obtaining states-of-things also determines which states-of-things do not obtain.","de":"Die Gesamtheit der bestehenden Sachverhalte bestimmt auch, welche Sachverhalte nicht bestehen.","zh_wang":"存在的原子事实的总和也规定了哪些原子事实不存在。","zh_huang":"存在的事态的总体也决定了哪些事态不存在。"},"children":[]},{"number":"2.06","texts":{"zh":"事态的存在和不存在即是实在。（我们还把事态的存在称为肯定的事实，把事态的不存在称为否定的事实。）","en":"The obtaining and non-obtaining of states-of-things is reality. (The obtaining of states-of-things we also call a positive, the non-obtaining a negative fact.)","de":"Das Bestehen und Nichtbestehen von Sachverhalten ist die Wirklichkeit. (Das Bestehen von Sachverhalten nennen wir auch eine positive, das Nichtbestehen eine negative Tatsache.)","zh_wang":"原子事实的存在和不存在即是实在。 （我们还把原子事实的存在称为肯定的事实，把原子事实的不存在称为否定的事实。）","zh_huang":"事态的存在和不存在就是实在。 （事态的存在我们称为肯定事实，事态的不存在则为否定事实）"},"children":[{"number":"2.061","texts":{"zh":"事态相互间是独立的。","en":"States-of-things are independent of one another.","de":"Die Sachverhalte sind von einander unabhängig.","zh_wang":"原子事实之间是相互独立的。","zh_huang":"事态彼此独立。"},"children":[]},{"number":"2.062","texts":{"zh":"从一个事态的存在或不存在不能推出另一个事态的存在或不存在。","en":"From the obtaining or non-obtaining of a state-of-things, the obtaining or non-obtaining of another cannot be inferred.","de":"Aus dem Bestehen oder Nichtbestehen eines Sachverhaltes kann nicht auf das Bestehen oder Nichtbestehen eines anderen geschlossen werden.","zh_wang":"从一个原子事实的存在或不存在中，我们不能推断出另一个原子事实的存在或不存在。","zh_huang":"你不能从一个事态的存在或不存在推知另一事态存在还是不存在。"},"children":[]},{"number":"2.063","texts":{"zh":"全部实在即是世界。","en":"The totality of reality is the world.","de":"Die gesamte Wirklichkeit ist die Welt.","zh_wang":"全部的实在即是世界。","zh_huang":"实在的整体就是世界。"},"children":[]}]},{"number":"2.1","texts":{"zh":"我们给我们自己建造事实的图像。","en":"We picture facts.","de":"Wir machen uns Bilder der Tatsachen.","zh_wang":"我们为自己构造事实的图像。","zh_huang":"我们为自己制作事实的图像。"},"children":[{"number":"2.11","texts":{"zh":"图像描述逻辑空间中的情况，即事态的存在或不存在。","en":"A picture presents a state of affairs in logical space, the obtaining and non-obtaining of states-of-things.","de":"Das Bild stellt die Sachlage im logischen Raume, das Bestehen und Nichtbestehen von Sachverhalten vor.","zh_wang":"图像描绘了逻辑空间的事态，既原子事实的存在和不存在。","zh_huang":"图像表现逻辑空间中的情况，表现事态的存在与不存在。"},"children":[]},{"number":"2.12","texts":{"zh":"图像是实在的一种模型。","en":"A picture is a model of reality.","de":"Das Bild ist ein Modell der Wirklichkeit.","zh_wang":"图像是在实在的一个模型。","zh_huang":"图像是实在的模型。"},"children":[]},{"number":"2.13","texts":{"zh":"在图像中图像的要素与对象相对应。","en":"In a picture, the elements of the picture correspond to the objects.","de":"Den Gegenständen entsprechen im Bilde die Elemente des Bildes.","zh_wang":"在图像中图像的成分与对象相对应。","zh_huang":"图像中的要素与对象相对应。"},"children":[{"number":"2.131","texts":{"zh":"在图像中图像的要素代表对象。","en":"In a picture, the elements of the picture stand for the objects.","de":"Die Elemente des Bildes vertreten im Bild die Gegenstände.","zh_wang":"图像中，图像的各要素代表对象。","zh_huang":"在图像中，图像要素表示对象。"},"children":[]}]},{"number":"2.14","texts":{"zh":"图像的要素以一定的方式相互关联而构成为图像。","en":"A picture consists in its elements standing to one another in a determinate way.","de":"Das Bild besteht darin, dass sich seine Elemente in bestimmter Art und Weise zu einander verhalten.","zh_wang":"图像是由图像中各要素之间以某种特定的方式相关联构成的。","zh_huang":"图像不外乎其要素以特定方式彼此联系。"},"children":[{"number":"2.141","texts":{"zh":"图像是一种事实。","en":"A picture is a fact.","de":"Das Bild ist eine Tatsache.","zh_wang":"图像即是一个事实。","zh_huang":"一个图像，就是一个事实。"},"children":[]}]},{"number":"2.15","texts":{"zh":"图像的要素以一定的方式相互关联，这表明事物也是以同样方式相互关联的。 图像要素的这种关联称为图像的结构，而这种结构的可能性则称为图像的图示形式。","en":"That the elements of a picture stand to one another in a determinate way presents that things stand to one another in this way. This connection of the elements of a picture may be called its structure, and the possibility of this structure its form of depiction.","de":"Dass sich die Elemente des Bildes in bestimmter Art und Weise zu einander verhalten stellt vor, dass sich die Sachen so zu einander verhalten. Dieser Zusammenhang der Elemente des Bildes heisse seine Struktur und ihre Möglichkeit seine Form der Abbildung.","zh_wang":"图像中的各要素以一定的方式相关联，这也代表着事物之间也是如此相关联的。 图像的各要素的结合方式称为图像的结构，该结构的可能性也称为该图像的表现形式。","zh_huang":"图像要素以特定方式彼此联系，这表示物也是这样彼此联系的。 不妨把图像中要素间的这种联系称为结构，称这种结构的可能性为描绘形式。"},"children":[{"number":"2.151","texts":{"zh":"图示形式是这种可能性，即事物之间的联系方式和图像要素之间的联系方式是相同的。","en":"The form of depiction is the possibility that things stand to one another in the same way as the elements of the picture do.","de":"Die Form der Abbildung ist die Möglichkeit, dass sich die Dinge so zu einander verhalten, wie die Elemente des Bildes.","zh_wang":"表现形式是这种可能性：即事物之间的联系方式和图像要素之间的联系方式是一样的。","zh_huang":"有了描绘形式，物之间才可能以图像要素之间彼此联系的那种方式彼此联系。"},"children":[{"number":"2.1511","texts":{"zh":"图像就是这样 依附于实在的；它直接触及实在。","en":"It is in this way that a picture is connected to reality; it reaches up to it.","de":"Das Bild ist so mit der Wirklichkeit verknüpft; es reicht bis zu ihr.","zh_wang":"图像就是这样与实在结合起来。图像伸展到实在。","zh_huang":"图像就这样与实在相联系——它伸出去够实在。"},"children":[]},{"number":"2.1512","texts":{"zh":"它就像一把衡量实在的标尺。","en":"It is laid against reality like a measure.","de":"Es ist wie ein Massstab an die Wirklichkeit angelegt.","zh_wang":"它就像是一把测量实在的尺子。","zh_huang":"这就像在对实在进行测量。"},"children":[{"number":"2.15121","texts":{"zh":"只有分度线的端点才真正接触到 被测量的对象。","en":"Only the outermost points of the dividing lines touch the object to be measured.","de":"Nur die äussersten Punkte der Teilstriche berühren den zu messenden Gegenstand.","zh_wang":"只有分界线的端点才能触及那些测量的对象。","zh_huang":"只有分度线最外沿的那些点才会碰到要测的东西。"},"children":[]}]},{"number":"2.1513","texts":{"zh":"按照这种理解，图像也应包含使之成为图像的图示关系。","en":"On this conception, the depicting relation that makes it a picture thus also belongs to the picture.","de":"Nach dieser Auffassung gehört also zum Bilde auch noch die abbildende Beziehung, die es zum Bild macht.","zh_wang":"按照这个观点，那些组成图像的图示关系，同样也属于图像本身。","zh_huang":"照这样看，让图像成其为图像的那种描绘关系，也就包含在图像中。"},"children":[]},{"number":"2.1514","texts":{"zh":"图示关系是由图像要素和事物之间的相关构成的。","en":"The depicting relation consists of the correlations of the elements of the picture and the things.","de":"Die abbildende Beziehung besteht aus den Zuordnungen der Elemente des Bildes und der Sachen.","zh_wang":"图示关系是由图像要素和事物之间的配合构成的。","zh_huang":"描绘关系是由图像要素与物之间的对应关系构成的。"},"children":[]},{"number":"2.1515","texts":{"zh":"这些相关像是图像要素的触角，图像通过这些触角而接触实在。","en":"These correlations are, as it were, the feelers of the picture’s elements with which the picture touches reality.","de":"Diese Zuordnungen sind gleichsam die Fühler der Bildelemente, mit denen das Bild die Wirklichkeit berührt.","zh_wang":"这些相互配合的关系就好像是图像要素的触角一样，是图像用来触摸现实在的触角。","zh_huang":"这些对应关系就好像图像要素的触角一样，让图像得以触碰实在。"},"children":[]}]}]},{"number":"2.16","texts":{"zh":"事实要成为图像，它和被图示者必须有某种共同的东西。","en":"To be a picture, a fact must have something in common with what is depicted.","de":"Die Tatsache muss um Bild zu sein, etwas mit dem Abgebildeten gemeinsam haben.","zh_wang":"为了表达为图像，事实本身与该图像必须有某种共同的东西。","zh_huang":"一个事实要能成为图像，它必须与要描绘的东西共有什么。"},"children":[{"number":"2.161","texts":{"zh":"在图像和被图示者中必须有某种同一的东西，因此前者才能是后者的图像。","en":"There must be something identical in picture and depicted if the one is to be capable of being a picture of the other at all.","de":"In Bild und Abgebildetem muss etwas identisch sein, damit das eine überhaupt ein Bild des anderen sein kann.","zh_wang":"在图像和被图示对象之间必须有某种相同一的东西，只有这样前者才能称为后者的图像。","zh_huang":"图像和被描绘对象中必须有同一个东西，才能让一个成为另一个的图像。"},"children":[]}]},{"number":"2.17","texts":{"zh":"图像为了能以自己的方式——正确地或错误地——图示实在而必须和实在共有的东西，就是它的图示形式。","en":"What a picture must have in common with reality to be able to depict it in the way it does—correctly or incorrectly—is its form of depiction.","de":"Was das Bild mit der Wirklichkeit gemein haben muss, um sie auf seine Art und Weise – richtig oder falsch – abbilden zu können, ist seine Form der Abbildung.","zh_wang":"图像为了能够以自己的方式正确地或错误地表现实在——图像与实在必须有共同的东西即它的表现形成。","zh_huang":"为了能够按该有的那种方式描绘实在，不管描绘得正确与否，图像都必须与之共有的东西，就是图像的描绘形式。"},"children":[{"number":"2.171","texts":{"zh":"图像能够图示其形式为图像所具有的一切实在。空间图像能够图示一切空间的东西，颜色图像能够图示一切有色的东西，等等。","en":"A picture can depict any reality whose form it has. A spatial picture anything spatial, a coloured anything coloured, etc.","de":"Das Bild kann jede Wirklichkeit abbilden, deren Form es hat. Das räumliche Bild alles Räumliche, das farbige alles Farbige, etc.","zh_wang":"图像能够代表其形式为图像所具有的一切实在。 空间图像能够代表一切空间的东西，颜色图像能够代表一切有颜色的东西，等等。","zh_huang":"对任何实在，只要图像拥有其形式，它都能描绘。 空间图像能描绘一切空间的东西，颜色图像能描绘一切有颜色的东西，等等。"},"children":[]},{"number":"2.172","texts":{"zh":"然而图像不能图示它的图示形式；图像显示它的图示形式。","en":"A picture cannot depict, however, its form of depiction; it features it.","de":"Seine Form der Abbildung aber, kann das Bild nicht abbilden; es weist sie auf.","zh_wang":"然而图像却无法表现它自己的表现形式。它只是将其显出来。","zh_huang":"然而，图像不能描绘其描绘形式，而只能展示它。"},"children":[]},{"number":"2.173","texts":{"zh":"图像从外部表现它的对象。（它的观点就是它的表现形式。）因此图像会正确地或错误地表现它的对象。","en":"A picture represents its object from outside (its standpoint is its form of representation); this is why a picture represents its object correctly or incorrectly.","de":"Das Bild stellt sein Objekt von ausserhalb dar (sein Standpunkt ist seine Form der Darstellung), darum stellt das Bild sein Objekt richtig oder falsch dar.","zh_wang":"图像从外部来表现它的对象。（它的观点就是它的表现形式。）因此图像会正确地或者错误地表现它的对象。","zh_huang":"图像从外面表现事物（它的视角就是用来表现的形式）。这就是为什么图像对于事物的表现有对有错。"},"children":[]},{"number":"2.174","texts":{"zh":"然而图像本身不能处在它的表现形式之外。","en":"A picture cannot, however, place itself outside its form of representation.","de":"Das Bild kann sich aber nicht ausserhalb seiner Form der Darstellung stellen.","zh_wang":"但是图像不能将自身置于其表现形式之外。","zh_huang":"但图像不能置身于它用来表现的形式之外。"},"children":[]}]},{"number":"2.18","texts":{"zh":"任何图像，无论具有什么形式，为了能够一般地以某种方式正确或错误地图示实在而必须和实在共有的东西，就是逻辑形式，即实在的形式。","en":"What any picture, of whatever form, must have in common with reality to be able to depict it at all—correctly or incorrectly—is logical form, that is, the form of reality.","de":"Was jedes Bild, welcher Form immer, mit der Wirklichkeit gemein haben muss, um sie überhaupt – richtig oder falsch – abbilden zu können, ist die logische Form, das ist, die Form der Wirklichkeit.","zh_wang":"无论何种形式的图像，为了能够完全地表达现实在——正确地或错误地——它必须与实在有共同的东西，就是逻辑结构，即实在的形式。","zh_huang":"不管图像具有何种形式，也不管描绘得是对还是错，只要它终究能够描绘实在，图像都必须与实在共有一种东西，即逻辑形式，或者说实在的形式。"},"children":[{"number":"2.181","texts":{"zh":"若图示形式为逻辑形式，图像即称为逻辑图像。","en":"If the form of depiction is logical form, then the picture is a logical picture.","de":"Ist die Form der Abbildung die logische Form, so heisst das Bild das logische Bild.","zh_wang":"如果这种表现形式是逻辑的形式，那么图像也可以称为一幅逻辑图像。","zh_huang":"在图像的描绘形式就是逻辑形式时，图像就被称为逻辑图像。"},"children":[]},{"number":"2.182","texts":{"zh":"每一个图像同时也 是一个逻辑图像。（另一方面，例如，并非每一个图像都是一个空间图像。）","en":"Every picture is also a logical picture. (On the other hand, not every picture is a spatial picture, for example.)","de":"Jedes Bild ist auch ein logisches. (Dagegen ist z. B. nicht jedes Bild ein räumliches.)","zh_wang":"同样，每一幅图像也是一幅逻辑图像。（从另一方面来说，举个例子，并非每一幅图像都是空间图像。）","zh_huang":"任何图像同时就是逻辑图像（相反，比如说，不是所有图像都是空间图像）"},"children":[]}]},{"number":"2.19","texts":{"zh":"逻辑图像可以图示世界。","en":"A logical picture can depict the world.","de":"Das logische Bild kann die Welt abbilden.","zh_wang":"逻辑图像可以描绘世界。","zh_huang":"逻辑图像可以描绘世界。"},"children":[]}]},{"number":"2.2","texts":{"zh":"图像和被图示者共有逻辑图示形式。","en":"A picture has the logical form of depiction in common with what is depicted.","de":"Das Bild hat mit dem Abgebildeten die logische Form der Abbildung gemein.","zh_wang":"图像与它所描述的对象具有相同的逻辑表现形式。","zh_huang":"图像与其所描绘的东西共有描绘的逻辑形式。"},"children":[{"number":"2.201","texts":{"zh":"图像用表现事态存在和不存在的可能性来图示实在。","en":"A picture depicts reality by representing a possibility of the obtaining and non-obtaining of states-of things.","de":"Das Bild bildet die Wirklichkeit ab, indem es eine Möglichkeit des Bestehens und Nichtbestehens von Sachverhalten darstellt.","zh_wang":"图像通过表现原子事实存在和不存在的可能性来描绘实在。","zh_huang":"图像描绘实在，是通过表现事态存在和不存在的可能性进行的。"},"children":[]},{"number":"2.202","texts":{"zh":"图像表现逻辑空间中的一种可能状况。","en":"A picture represents a possible state of affairs in logical space.","de":"Das Bild stellt eine mögliche Sachlage im logischen Raume dar.","zh_wang":"图像表现逻辑空间中的一种可能事态。","zh_huang":"图像表现逻辑空间中可能的情况。"},"children":[]},{"number":"2.203","texts":{"zh":"图像包含它所表现的状况的可能性。","en":"A picture contains the possibility of the state of affairs that it represents.","de":"Das Bild enthält die Möglichkeit der Sachlage, die es darstellt.","zh_wang":"图像包含了它所要表现的事态的可能性。","zh_huang":"图像包含了其所表现的情况的可能性。"},"children":[]},{"number":"2.21","texts":{"zh":"图像与实在符合或者不符合；它是正确的或者错误的，真的或者假的。","en":"A picture agrees with reality or not; it is correct or incorrect, true or false.","de":"Das Bild stimmt mit der Wirklichkeit überein oder nicht; es ist richtig oder unrichtig, wahr oder falsch.","zh_wang":"图像与实在一致或不一致；它是正确的或错误的；真的或假的。","zh_huang":"图像可与实在一致或不一致；图像可以是对的或错的，也可以是真的或假的。"},"children":[]},{"number":"2.22","texts":{"zh":"图像通过图示形式表现它所表现的东西，而与图像本身为真或为假无关。","en":"A picture represents what it represents, independently of its truth or falsity, through its form of depiction.","de":"Das Bild stellt dar, was es darstellt, unabhängig von seiner Wahr- oder Falschheit, durch die Form der Abbildung.","zh_wang":"图像通过表现形式来描述它所要描述的事物，这与它的真假无关。","zh_huang":"图像无论是真是假，它都是通过描绘形式来表现其所表现的东西。"},"children":[{"number":"2.221","texts":{"zh":"图像所表现的东西是图像的意义。","en":"What a picture represents is its sense.","de":"Was das Bild darstellt, ist sein Sinn.","zh_wang":"图像所表达的就是它的意义。","zh_huang":"图像所表现的是其含义（Sinn）"},"children":[]},{"number":"2.222","texts":{"zh":"图像的真或假就在于它的意义与实在符合或者不符合。","en":"Its truth or falsity consists in the agreement or disagreement of its sense with reality.","de":"In der Übereinstimmung oder Nichtübereinstimmung seines Sinnes mit der Wirklichkeit, besteht seine Wahrheit oder Falschheit.","zh_wang":"图像的真或假就在于它的意义与实在相符或者不相符。","zh_huang":"其含义与实在一致或不一致，就构成图像的真与假。"},"children":[]},{"number":"2.223","texts":{"zh":"要能看出图像的真假，必须将它同实在比较。","en":"To tell whether a picture is true or false, we must compare it with reality.","de":"Um zu erkennen, ob das Bild wahr oder falsch ist, müssen wir es mit der Wirklichkeit vergleichen.","zh_wang":"要想知道图像是真还是假，我们必须将其与实在进行比较。","zh_huang":"为了弄清图像是真的还是假的，我们必须将其与实在相比较。"},"children":[]},{"number":"2.224","texts":{"zh":"单从图像自身不能看出它的真假。","en":"It is impossible to tell from the picture alone whether it is true or false.","de":"Aus dem Bild allein ist nicht zu erkennen, ob es wahr oder falsch ist.","zh_wang":"单从图像本身不能发现它的真假。","zh_huang":"单从图像不可能分出真假。"},"children":[]},{"number":"2.225","texts":{"zh":"没有先天为真的图像。","en":"No picture is true a priori.","de":"Ein a priori wahres Bild gibt es nicht.","zh_wang":"没有先天为真的图像。","zh_huang":"没有先验为真的图像。"},"children":[]}]}]}]},{"number":"3","texts":{"zh":"事实的逻辑图像是思想。","en":"A logical picture of facts is a thought.","de":"Das logische Bild der Tatsachen ist der Gedanke.","zh_wang":"事实的逻辑图像就是思想。","zh_huang":"事实的逻辑图像就是思想。"},"children":[{"number":"3.001","texts":{"zh":"“事态是可以思想的”，意思是说，我们自己可以构造事态的图像。","en":"‘A state-of-things is thinkable’ means: we can picture it.","de":"„Ein Sachverhalt ist denkbar“ heisst: Wir können uns ein Bild von ihm machen.","zh_wang":"“原子事实是可以想象的”——这句话的意思是：我们可以想象它的图像。","zh_huang":"“事态是可以思考的”意思就是，我们可以向自己描绘它。"},"children":[]},{"number":"3.01","texts":{"zh":"真的思想的总体就是一幅世界的图像。","en":"The totality of true thoughts is a picture of the world.","de":"Die Gesamtheit der wahren Gedanken sind ein Bild der Welt.","zh_wang":"所有为真的思想的总和就是世界的图像。","zh_huang":"真思想构成的整体就是世界的图像。"},"children":[]},{"number":"3.02","texts":{"zh":"思想包含它所思想的情况的可能性。可以思想的东西也就是可能的东西。","en":"A thought contains the possibility of the state of affairs that is thought. What is thinkable is also possible.","de":"Der Gedanke enthält die Möglichkeit der Sachlage die er denkt. Was denkbar ist, ist auch möglich.","zh_wang":"思想包含了它所想的事态的可能性。 可想的也就是可能的。","zh_huang":"思想包含了其所思考的情况的可能性。能够思考的也就是可能的。"},"children":[]},{"number":"3.03","texts":{"zh":"我们不能思想非逻辑的东西，否则我们就必须非逻辑地思想。","en":"We cannot think anything illogical, since otherwise we would have to think illogically.","de":"Wir können nichts Unlogisches denken, weil wir sonst unlogisch denken müssten.","zh_wang":"我们不能想不合逻辑的东西，因为那样的话，我们就必然要不合逻辑地去想。","zh_huang":"我们不可能思考任何不合逻辑的东西，因为，如果可以思考它，那就得不合逻辑地思考了。"},"children":[{"number":"3.031","texts":{"zh":"常言道，上帝能够创造一切，只是不能创造违反逻辑规律的东西。这就是说，我们不能说 一个“非逻辑的”世界会是什么样子。","en":"It was once said that God could create anything except what was contrary to the laws of logic.—In truth, we could not say of an ‘illogical’ world how it would look.","de":"Man sagte einmal, dass Gott alles schaffen könne, nur nichts, was den logischen Gesetzen zuwider wäre. – Wir könnten nämlich von einer „unlogischen“ Welt nicht sagen, wie sie aussähe.","zh_wang":"通常说，上帝能够创造一切，除了那些违反逻辑规律的东西。也就是说，我们不能说一个“非逻辑的”世界会是什么样子。","zh_huang":"人们常说，上帝能够创造一切，但不能创造违背逻辑律的东西。真正说来，我们是不能说一个“不合逻辑的”世界是什么样的。"},"children":[]},{"number":"3.032","texts":{"zh":"在语言中不能表现任何“违反逻辑”的东西，就像在几何学中不能用坐标来表现违反空间规律的图形，或者给出一个并不存在的点的坐标一样。","en":"Something that ‘contradicts logic’ cannot be represented in language any more than, in geometry, a figure that contradicts the laws of space can be represented by its coordinates, or the coordinates can be specified of a point that does not exist.","de":"Etwas „der Logik widersprechendes“ in der Sprache darstellen, kann man ebensowenig, wie in der Geometrie eine den Gesetzen des Raumes widersprechende Figur durch ihre Koordinaten darstellen; oder die Koordinaten eines Punktes angeben, welcher nicht existiert.","zh_wang":"在语言中表现任何“违反逻辑”的东西，都是不可能的，这就好比在几何学中不能用坐标来表现违反空间规律的图形，或者给出一个并不存在的点的坐标一样。","zh_huang":"要在语言中表现任何“与逻辑相矛盾的”东西，这就与在几何中利用坐标来表现与空间定律相矛盾的图形，或者为一个并不存在的点给出的坐标一样，都是不可能的。"},"children":[{"number":"3.0321","texts":{"zh":"虽然我们能在空间上表现一个违反物理规律的事态，但是我们不能在空间上表现一个违反几何规律的事态。","en":"We can certainly represent a state-of-things spatially that contravenes the laws of physics but not one that contravenes the laws of geometry.","de":"Wohl können wir einen Sachverhalt räumlich darstellen, welcher den Gesetzen der Physik, aber keinen, der den Gesetzen der Geometrie zuwiderliefe.","zh_wang":"我们能在空间上表现一个违反物理规律的原子事实，但是我们不能在空间上表现一个违反几何规律的原子事实。","zh_huang":"违背物理定律的事态可以用空间手段加以表现，而违背几何定律的情况却不能。"},"children":[]}]}]},{"number":"3.04","texts":{"zh":"如果一个思想是先天地正确的，那么它就是一个其可能性即保证了其真理性的思想。","en":"An a priori correct thought would be one whose possibility ensured its truth.","de":"Ein a priori richtiger Gedanke wäre ein solcher, dessen Möglichkeit seine Wahrheit bedingte.","zh_wang":"一个先天就正确的思想，应该是一个自身的可能性就保证了其真理性。","zh_huang":"一个思想要能够先验为真，那它的真就要由它的可能性来加以保证。"},"children":[]},{"number":"3.05","texts":{"zh":"仅当一个思想的真从它自身（无须同任何东西比较）就能看出时，我们才有关于一个思想为真的先天的知识。","en":"We could only know a priori that a thought is true if its truth could be recognized from the thought itself (without an object of comparison).","de":"Nur so könnten wir a priori wissen, dass ein Gedanke wahr ist, wenn aus dem Gedanken selbst (ohne Vergleichsobjekt) seine Wahrheit zu erkennen wäre.","zh_wang":"只有当一个思想的真从它自身就能看出时（不需要同任何东西比较），我们才能先天地就知道这个思想是真的。","zh_huang":"只有在从思想本身（而无须任何东西与之比较）就能确认其为真时，我们才能先验地知道它是真的。"},"children":[]},{"number":"3.1","texts":{"zh":"思想在命题中得到了一种可由感官感知到的表达。","en":"In a proposition a thought is expressed perceptibly.","de":"Im Satz drückt sich der Gedanke sinnlich wahrnehmbar aus.","zh_wang":"在命题中，思想通过一种可由感官感觉到的方式来表达。","zh_huang":"通过句子，思想获得了感官可以知觉的表达。"},"children":[{"number":"3.11","texts":{"zh":"我们用命题中的可由感官感知的记号（声音的或书写的记号等等）作为可能情况的投影。 投影的方法就是思考命题的意义。","en":"We use the perceptible sign (sound or written sign, etc.) of the proposition as a projection of a possible state of affairs. The method of projection is the thinking of the proposition’s sense.","de":"Wir benützen das sinnlich wahrnehmbare Zeichen (Laut- oder Schriftzeichen etc.) des Satzes als Projektion der möglichen Sachlage. Die Projektionsmethode ist das Denken des Satz-Sinnes.","zh_wang":"我们用命题中可由感官感知的符号（声音的或书写的符号，等等）来作为可能出现的事态的投影。 投影的方法就是对命题意义的思考。","zh_huang":"我们把可感的句子记号（Zeichen）（说出的、写下来的，等等）用作可能情况的投影。 投影的方法就是去思考句子的含义。"},"children":[]},{"number":"3.12","texts":{"zh":"我们用以表达思想的记号我称为命题记号。一个命题就是一个处在对世界的投影关系中的命题记号。","en":"I call the sign by means of which we express a thought a propositional sign. And a proposition is a propositional sign in its projective relation to the world.","de":"Das Zeichen, durch welches wir den Gedanken ausdrücken, nenne ich das Satzzeichen. Und der Satz ist das Satzzeichen in seiner projektiven Beziehung zur Welt.","zh_wang":"我将那些用来表达思想的符号称为命题符号。一个命题就是一个处在对世界的投影关系中的命题符号。","zh_huang":"用来表达思想的记号我称为句子记号。句子就是身处与世界的投影关系中的句子记号。"},"children":[]},{"number":"3.13","texts":{"zh":"命题包括投影所包括的一切，而不包括被投影者。因此命题包括的是被投影者的可能性，而不是被投影者本身。 因此命题中也不包含命题的意义，而只包含表达其意义的可能性。 （“命题的内容”是指有意义的命题的内容。）命题中包含命题意义的形式而非其内容。","en":"To the proposition belongs everything that belongs to the projection, but not what is projected. Thus the possibility of what is projected, but not what is projected itself. In a proposition its sense is thus not yet contained, but it does contain the possibility of expressing it. (‘The content of a proposition’ means the content of a senseful proposition.) In a proposition the form of its sense is contained, but not its content.","de":"Zum Satz gehört alles, was zur Projektion gehört; aber nicht das Projizierte. Also die Möglichkeit des Projizierten, aber nicht dieses selbst. Im Satz ist also sein Sinn noch nicht enthalten, wohl aber die Möglichkeit ihn auszudrücken. („Der Inhalt des Satzes“ heisst der Inhalt des sinnvollen Satzes.) Im Satz ist die Form seines Sinnes enthalten, aber nicht dessen Inhalt.","zh_wang":"一切属于投影的东西都属于命题，而不包含被投影者。 因此，命题包括的是被投影者的可能性，而不是被投影者本身。 因此，在命题中就不包含其自身的意义，而仅仅包含表达它的可能性。 （“命题的内容”是指有意义的命题的内容。） 命题中包含命题意义的形式，但非其内容。","zh_huang":"句子包含属于投影的所有东西，除了被投影的东西。 这样，虽然被投影的东西本身没有包含其中，其可能性却被包含了。 因此，句子实际上没有包含其含义，但还是包含了表达含义的可能性。 （“句子内容”是指有含义的句子的内容。） 句子所包含的是其含义的形式，但不是句子内容。"},"children":[]},{"number":"3.14","texts":{"zh":"命题记号的构成，在于其中的要素（语词）是以一定方式相互关联的。 命题记号即是事实。","en":"A propositional sign consists in this, that its elements, the words, stand to one another in it in a determinate way. A propositional sign is a fact.","de":"Das Satzzeichen besteht darin, dass sich seine Elemente, die Wörter, in ihm auf bestimmte Art und Weise zu einander verhalten. Das Satzzeichen ist eine Tatsache.","zh_wang":"命题标记的存在乃是由于其要素即字词，都是以一定方式相互关联的。 命题标记是一件事实。","zh_huang":"句子成分，即若干词语，通过特定关系联系，就构成句子记号。 一个句子记号就是一个事实。"},"children":[{"number":"3.141","texts":{"zh":"命题不是词的混合。——（就像音乐的主旋律不是音调的混合一样。） 命题是可以有节奏地说出的［artikuliert］。","en":"A proposition is not a mixture of words.—(Just as a musical theme is not a mixture of notes.) A proposition is articulate.","de":"Der Satz ist kein Wörtergemisch. – (Wie das musikalische Thema kein Gemisch von Tönen.) Der Satz ist artikuliert.","zh_wang":"命题不是字词的混合物（就好像主题音乐不是音调的混合物一样）。 命题清楚表达思想。","zh_huang":"句子不是词语的混合。——（同理，一个音乐主题也不是声音的混合。） 句子可以用清楚的发音说出来。"},"children":[]},{"number":"3.142","texts":{"zh":"只有事实才能表达意义，一组名称不能表达意义。","en":"Only facts can express a sense, a set of names cannot.","de":"Nur Tatsachen können einen Sinn ausdrücken, eine Klasse von Namen kann es nicht.","zh_wang":"只有事实才能表达意义，一组名称是不能表达意义的。","zh_huang":"只有事实能够表达含义，一组名称就不能了。"},"children":[]},{"number":"3.143","texts":{"zh":"虽然命题记号即是事实，但是这一点却被通常的书写和印刷的表达形式所掩盖。 因为，例如在一个印刷出来的命题中，命题记号和词之间看起来并没有重大差别。 （这可能就是使弗雷格把命题称为复合名称的原因。）","en":"That a propositional sign is a fact is disguised by the ordinary—written or printed—form of expression. For in a printed proposition, for example, a propositional sign does not look essentially different from a word. (Thus it was possible for Frege to call a proposition a composite name.)","de":"Dass das Satzzeichen eine Tatsache ist, wird durch die gewöhnliche Ausdrucksform der Schrift oder des Druckes verschleiert. Denn im gedruckten Satz z. B. sieht das Satzzeichen nicht wesentlich verschieden aus vom Wort. (So war es möglich, dass Frege den Satz einen zusammengesetzten Namen nannte.)","zh_wang":"关于命题标记是一件事实这一点，通常会被普通的表现形式所掩盖，比如书写和印刷。 （因为，比如在一个印刷出来的命题中，命题标记和词之间并没有十分明显的区别。因此，这可能就是使弗雷格把命题称为复合名称的原因。）","zh_huang":"句子记号是事实，这一点被惯常的手写或印刷的表达形式所掩盖。 比如，在打印出的句子中，句子与词语在记号上并没有表现出本质的区别。 （这就让弗雷格得以把句子称为复合名称。）"},"children":[{"number":"3.1431","texts":{"zh":"如果我们设想一个命题记号是由一些空间对象（例如桌子、椅子和书本）组成，而不是由一些书写记号组成，它的本质就会看得很清楚。 于是这些东西的空间分布就表达出这个命题的意义。","en":"The essence of a propositional sign becomes very clear if we think of it as composed of spatial objects (such as tables, chairs, books) instead of written signs.The relative spatial position of these things then expresses the sense of the proposition.","de":"Sehr klar wird das Wesen des Satzzeichens, wenn wir es uns, statt aus Schriftzeichen, aus räumlichen Gegenständen (etwa Tischen, Stühlen, Büchern) zusammengesetzt denken. Die gegenseitige räumliche Lage dieser Dinge drückt dann den Sinn des Satzes aus.","zh_wang":"当我们设想命题标记并非由一些书写标记组成的，而是由一些空间对象（例如桌子、椅子和书本）组成的时候，它的本质就会变得很清楚。 这时这些东西的空间位置就表达出这个命题的意义。","zh_huang":"只要想象一下，由空间物体而不是书写的记号来构成句子，就可以清楚地看到句子记号的本质。 这样，这些物体的空间关系就表达了句子含义。"},"children":[]},{"number":"3.1432","texts":{"zh":"我们必不可说：“复合记号‘aRb’说的是a和b处在关系R中”，而必须说：“‘a’和‘b’处于某种关系中这一事实 说的是，aRb这一事实。”","en":"Not: “The complex sign ‘aRb’ says that a stands in the relation R to b”; but: That ‘a’ stands in a certain relation to ‘b’ says that aRb.","de":"Nicht: „Das komplexe Zeichen ‚aRb‘ sagt, dass a in der Beziehung R zu b steht“, sondern: Dass „a“ in einer gewissen Beziehung zu „b“ steht, sagt, dass aRb.","zh_wang":"我们绝对不能说：“复合标记‘aRb， 表示‘a 处在对b 的关系中’”；而必须说：“‘a ’处于和‘b ’的某种关系中，表示为aRb 。”","zh_huang":"不要说，“复合记号‘aRb’说a与b之间有关系R”，而应该说，“说aRb这一事实的，是‘a’与‘b’处在特定关系中这样一个事实”"},"children":[]}]},{"number":"3.144","texts":{"zh":"情况可以描述，但是不能命名。 （名称像是一些点；命题像是一些箭头——它们具有意义。）","en":"States of affairs can be described, not named. (Names are like points, propositions are like arrows, they have sense.)","de":"Sachlagen kann man beschreiben, nicht benennen. (Namen gleichen Punkten, Sätze Pfeilen, sie haben Sinn.)","zh_wang":"事态可以被描述出来，但是不能被命名。 （名称好像是一些点；命题好像是一些箭头，它们是有意义的。）","zh_huang":"对于情况，可以给予描述，但不能命名。 （名称就像点，而句子则类似于箭——句子是有含义的。）"},"children":[]}]}]},{"number":"3.2","texts":{"zh":"在命题中思想可以这样来表达，使得命题记号的要素与思想的对象相对应。","en":"In a proposition a thought can be so expressed that to the objects of the thought correspond elements of the propositional sign.","de":"Im Satze kann der Gedanke so ausgedrückt sein, dass den Gegenständen des Gedankens Elemente des Satzzeichens entsprechen.","zh_wang":"命题当中的思想可以这样来表达，即使得命题标记的要素与思想的对象相对应。","zh_huang":"通过让句子记号中的元素对应于思想的对象，句子得以表达思想。"},"children":[{"number":"3.201","texts":{"zh":"我称这些要素为“简单记号”，称这命题为“完全分析了的”命题。","en":"I call these elements ‘simple signs’ and the proposition ‘completely analysed’.","de":"Diese Elemente nenne ich „einfache Zeichen“ und den Satz „vollständig analysiert“.","zh_wang":"我将这些要素称之为“简单标记”，将这命题称为“完全分析性”命题。","zh_huang":"这样的元素我称为“简单记号”，这样的句子则称为“完全的分析”"},"children":[]},{"number":"3.202","texts":{"zh":"命题中使用的简单记号称为名称。","en":"The simple signs applied in the proposition are called names.","de":"Die im Satze angewandten einfachen Zeichen heissen Namen.","zh_wang":"在命题中使用的简单标记叫做名称。","zh_huang":"句子中所使用的简单记号就叫作名称。"},"children":[]},{"number":"3.203","texts":{"zh":"名称意指对象。对象是名称的指谓。(“A”和“A”是同一个记号。)","en":"A name means an object. The object is its meaning. (‘A’ is the same sign as ‘A’.)","de":"Der Name bedeutet den Gegenstand. Der Gegenstand ist seine Bedeutung. („A“ ist dasselbe Zeichen wie „A“.)","zh_wang":"名称指谓对象。对象是名称的指谓。（“A ”和“A ”是同一个符号。）","zh_huang":"名称指称对象，对象是名称的指称（Bedeutung）（“A”和“A”是同一个记号）"},"children":[]},{"number":"3.21","texts":{"zh":"简单记号在命题记号中的配置，对应于对象在情况中的配置。","en":"The configuration of simple signs in a propositional sign corresponds to the configuration of objects in a state of affairs.","de":"Der Konfiguration der einfachen Zeichen im Satzzeichen entspricht die Konfiguration der Gegenstände in der Sachlage.","zh_wang":"简单标记在命题符号中的配置，与对象在事态中的配置相对应。","zh_huang":"与简单记号在句子记号中的配置相对应的，是对象在情况中的配置。"},"children":[]},{"number":"3.22","texts":{"zh":"名称在命题中代表对象。","en":"A name in a proposition stands for an object.","de":"Der Name vertritt im Satz den Gegenstand.","zh_wang":"在命题中，名称代表对象.。","zh_huang":"在句子中名称代表对象。"},"children":[{"number":"3.221","texts":{"zh":"对象只能被命名。记号是对象的代表。我只能谈到对象，而不能用语词说出它们来。命题只能说事物是怎样的，而不能说它们是什么。","en":"Objects I can only name. Signs stand for them. I can only speak of them, I cannot state them. A proposition can only say how a thing is, not what it is.","de":"Die Gegenstände kann ich nur nennen. Zeichen vertreten sie. Ich kann nur von ihnen sprechen, sie aussprechen kann ich nicht. Ein Satz kann nur sagen, wie ein Ding ist, nicht was es ist.","zh_wang":"我只能命名对象。标记代表对象。我只能谈到对象，而不能论断它们。一个命题只能描述事物是怎样的，而不能说它们是什么。","zh_huang":"对象只能命名。记号代表这些对象。我只能谈到它们，但不能断定它们。句子只能说一个东西是怎样的，而不能说它是什么。"},"children":[]}]},{"number":"3.23","texts":{"zh":"要求简单记号的可能性，就是要求意义的确定性。","en":"The demand that simple signs be possible is the demand that sense be determinate.","de":"Die Forderung der Möglichkeit der einfachen Zeichen ist die Forderung der Bestimmtheit des Sinnes.","zh_wang":"要求简单标记的可能性，就是要求意义的确定性。","zh_huang":"要让句子拥有确定的含义，就得让简单记号成为可能。"},"children":[]},{"number":"3.24","texts":{"zh":"关于复合物的命题与关于其组成部分的命题有一种内在的关系。 复合物只能通过对它的描述而给出，这描述可以是正确的或错误的。说到一个复合物的命题，如果这个复合物不存在，那么这个命题不是无意义的，而只是假的。 当一个命题要素标示一个复合物时，可以从它在其中出现的命题的不确定性看出来。我们知道，这种情形下这个命题有些东西是没有规定的。（概括性记号总是包含 一种原型。） 把复合物的符号压缩为简单符号，可以用定义来表达。","en":"A proposition about a complex stands in an internal relation to a proposition about one of its constituents. A complex can only be given by its description, and this will be right or not right. A proposition that mentions a complex will not be nonsensical but simply false if the complex does not exist. That a propositional element signifies a complex can be seen from an indeterminateness in the propositions in which it occurs. We know that not everything is determined by any such proposition. (The generality-sign contains a prototype.) The contraction of a symbol for a complex into a simple symbol can be expressed by a definition.","de":"Der Satz, welcher vom Komplex handelt, steht in interner Beziehung zum Satze, der von dessen Bestandteil handelt. Der Komplex kann nur durch seine Beschreibung gegeben sein, und diese wird stimmen oder nicht stimmen. Der Satz, in welchem von einem Komplex die Rede ist, wird, wenn dieser nicht existiert, nicht unsinnig, sondern einfach falsch sein. Dass ein Satzelement einen Komplex bezeichnet, kann man aus einer Unbestimmtheit in den Sätzen sehen, worin es vorkommt. Wir wissen, durch diesen Satz ist noch nicht alles bestimmt. (Die Allgemeinheitsbezeichnung enthält ja ein Urbild.) Die Zusammenfassung des Symbols eines Komplexes in ein einfaches Symbol kann durch eine Definition ausgedrückt werden.","zh_wang":"关于复合物的命题与关于其组成部分的命题有一种内在的关系。 复合物只能通过对其描述才能呈现出来，而这种描述或者是正确的或者是错误的。提到一个复合物的命题，如果这个复合物不存在，那么这个命题就变得并非毫无意义，而只是错误的。 当一个命题要素表示一个复合物时，可以从它在其中出现的命题的不确定性看出来。我们知道，在这个命题中有些东西尚未确定。（一般性符号记法总是包含一种原型。） 把复合物的符号压缩为简单符号可以由定义来表示。","zh_huang":"谈论复合物的句子内在地关联于谈论其构成部分的句子。 复合物只能通过描述给出，而这种描述要么正确，要么不正确。如果复合物不存在，那么提到复合物的句子不是无意义（unsinnig），而只是为假。 一个命题元素表示的是不是复合物，这可以从包含这个元素的句子是否具有不确定性看出来。我们知道句子此时没有把一切都确定下来。（表示普遍性的符号中其实包含了原型。） 把复合物的符号转化为简单符号的那种简并，是通过定义来表达的。"},"children":[]},{"number":"3.25","texts":{"zh":"命题有一个而且只有一个完全的分析。","en":"There is one and only one complete analysis of a proposition.","de":"Es gibt eine und nur eine vollständige Analyse des Satzes.","zh_wang":"命题有一个并且只有一个彻底的分析。","zh_huang":"句子有且只有一种完全的分析。"},"children":[{"number":"3.251","texts":{"zh":"命题以确定的可以清楚陈述的方式表达它所表达的东西：命题是可以有节奏地说出的。","en":"A proposition expresses what it expresses in a determinate, clearly specifiable way: a proposition is articulate.","de":"Der Satz drückt auf bestimmte, klar angebbare Weise aus, was er ausdrückt: Der Satz ist artikuliert.","zh_wang":"命题把它所要表达的内容按照一个特定的，可以清晰陈述的方式表达出来：命题清楚表达思想。","zh_huang":"句子所要表达的总能得到确定的、清晰的表达——句子可以用清楚的发音说出来。"},"children":[]}]},{"number":"3.26","texts":{"zh":"名称不可用定义来作任何进一步的分析：名称是一种初始记号。","en":"A name cannot be dissected further by any definition: it is a primitive sign.","de":"Der Name ist durch keine Definition weiter zu zergliedern: er ist ein Urzeichen.","zh_wang":"名称不能用任何定义来做进一步的分析。名称是一种初始标记。","zh_huang":"名称不能通过定义来进一步分解，它是初始记号。"},"children":[{"number":"3.261","texts":{"zh":"每个被定义的记号通过 那些定义它的记号而起标示作用；定义则指明这一途径。 两个记号，如果一个是初始记号，而另一个是用一些初始记号定义的记号，则二者不能以相同的方式起标示作用。名称不能 用定义来分解。（任何一个自身独立地具有指谓的记号也是如此。）","en":"Every defined sign signifies via those signs by which it is defined; and the definitions point the way. Two signs, one primitive sign and one defined by primitive signs, cannot signify in the same way. Names cannot be unpacked by definitions. (Nor any sign that has a meaning by itself, independently.)","de":"Jedes definierte Zeichen bezeichnet über jene Zeichen, durch welche es definiert wurde; und die Definitionen weisen den Weg. Zwei Zeichen, ein Urzeichen, und ein durch Urzeichen definiertes, können nicht auf dieselbe Art und Weise bezeichnen. Namen kann man nicht durch Definitionen auseinanderlegen. (Kein Zeichen, welches allein, selbständig eine Bedeutung hat.)","zh_wang":"每个被定义的标记都通过那些定义它的标记来标示，而定义则指明了这一途径。 两个标记，一个是初始标记，另一个是用一些初始标记定义的标记，它们不能以同一方式来标示。名称不能用定义来分解。（任何一个独立地具有一种指谓的标记都是这样。）","zh_huang":"所有被定义的记号都是通过用来定义它们的记号来表示事物的，而定义则表明怎样通过它们来表示。 两个记号，如果一个是初始记号，另一个是用初始记号定义的记号，那么它们不可能以同样的方式表示事物。名称不可能通过定义来加以分解（任何独立地拥有指称的记号都不能分解）"},"children":[]},{"number":"3.262","texts":{"zh":"记号不能表达的东西，其应用显示之。记号隐略了的东西，其应用清楚地说出之。","en":"What does not get expressed in the signs, their application shows. What the signs hold back, their application spells out.","de":"Was in den Zeichen nicht zum Ausdruck kommt, das zeigt ihre Anwendung. Was die Zeichen verschlucken, das spricht ihre Anwendung aus.","zh_wang":"在标记中不能被表达出来的东西，通过它的应用得以显示。符号隐藏的东西，通过它的应用得以说出。","zh_huang":"不能由记号来表达的，可以通过记号的使用加以展示。被记号掩盖的东西，会在记号的使用中得到揭示。"},"children":[]},{"number":"3.263","texts":{"zh":"初始记号的指谓可以通过解释来说明。解释就是包含初始记号的命题。所以只有已经知道这些记号的指谓，才能理解它们。","en":"The meanings of primitive signs can be explained by elucidations. Elucidations are propositions that contain the primitive signs. They can therefore only be understood if the meanings of these signs are already known.","de":"Die Bedeutungen von Urzeichen können durch Erläuterungen erklärt werden. Erläuterungen sind Sätze, welche die Urzeichen enthalten. Sie können also nur verstanden werden, wenn die Bedeutungen dieser Zeichen bereits bekannt sind.","zh_wang":"初始标记的指谓可以通过解释来说明。解释就是包含初始标记的命题。因此，只有已经了解了这些标记的指谓，才能理解它们。","zh_huang":"初始记号的指称可以通过阐明来加以解释。阐明是由把初始记号包含在内的句子构成的。你只有在已知记号指称的前提下才能理解这些用来阐明的句子。"},"children":[]}]}]},{"number":"3.3","texts":{"zh":"只有命题才有意义；只有在命题的联系关系中名称才有指谓。","en":"Only a proposition has sense; only in the context of a proposition does a name have meaning.","de":"Nur der Satz hat Sinn; nur im Zusammenhange des Satzes hat ein Name Bedeutung.","zh_wang":"只有命题才有意义；只有在命题的语境中，名称才有指谓。","zh_huang":"只有句子才有含义；只有在句子所体现的连接关系中，名称才有指称。"},"children":[{"number":"3.31","texts":{"zh":"命题中表征其意义的每个部分我都称为表达式（或符号）。 （命题本身是一个表达式。） 凡是能够为诸命题所共有、对于命题的意义具有本质重要性的，都是表达式。 一个表达式标志一个形式和一个内容。","en":"Every part of a proposition that characterizes its sense I call an expression (a symbol). (The proposition itself is an expression.) Expression is everything essential to the sense of a proposition that propositions can have in common with one another. An expression marks a form and a content.","de":"Jeden Teil des Satzes, der seinen Sinn charakterisiert, nenne ich einen Ausdruck (ein Symbol). (Der Satz selbst ist ein Ausdruck.) Ausdruck ist alles, für den Sinn des Satzes wesentliche, was Sätze miteinander gemein haben können. Der Ausdruck kennzeichnet eine Form und einen Inhalt.","zh_wang":"我把那些在命题当中表征其意义的每个部分称为表达式（或符号）。 （命题本身就是一个表达式。） 凡是能为各命题所共有，对于命题的意义必不可少的，都是表达式。 一个表达式表征一个形式和一个内容。","zh_huang":"句子中表明句子含义的任一部分，我都称为表达式（或者符号）。 （句子本身就是表达式。） 能够为不同句子所共有、对句子含义起实质作用的所有东西，都是表达式。 表达式标出了形式和内容。"},"children":[{"number":"3.311","texts":{"zh":"表达式以它能够在其中出现的所有命题的形式为前提。它是一类命题的共同特征的标记。","en":"An expression presupposes the forms of all propositions in which it can occur. It is the common characteristic mark of a class of propositions.","de":"Der Ausdruck setzt die Formen aller Sätze voraus, in welchen er vorkommen kann. Er ist das gemeinsame charakteristische Merkmal einer Klasse von Sätzen.","zh_wang":"表达式以一切能够包含它的命题的形式为前提。它是一类命题的共同特征的标记。","zh_huang":"表达式预先确定了所有包含它的句子的形式。它是一组句子共同的特征性标志。"},"children":[]},{"number":"3.312","texts":{"zh":"因此表达式表现为它所表征的那些命题的一般形式。事实上，在这一形式中表达式为常项，而其余的一切都是变项。","en":"It is thus represented by the general form of the propositions that it characterizes. That is to say, in this form the expression will be constant and everything else variable.","de":"Er wird also dargestellt durch die allgemeine Form der Sätze, die er charakterisiert. Und zwar wird in dieser Form der Ausdruck konstant und alles übrige variabel sein.","zh_wang":"因此，表达式表现为它所表征的那些命题的一般形式。 在这一形式中表达式是常项，而其余的一切都是变项。","zh_huang":"因此表达式就表现为它所标出的那些句子的一般形式。 事实上，在这种形式中，表达式是常项，而其余的东西则都是变元。"},"children":[]},{"number":"3.313","texts":{"zh":"因此表达式为一变项所表现，这变项的值就是那些包含该表达式的命题。 （在极限情况下，变项成为常项，表达式成为命题。） 我称这样一种变项为“命题变项”。","en":"An expression is thus represented by a variable whose values are the propositions that contain the expression. (In the limiting case the variable becomes a constant, the expression a proposition.) I call such a variable a ‘propositional variable’.","de":"Der Ausdruck wird also durch eine Variable dargestellt, deren Werte die Sätze sind, die den Ausdruck enthalten. (Im Grenzfall wird die Variable zur Konstanten, der Ausdruck zum Satz.) Ich nenne eine solche Variable „Satzvariable“.","zh_wang":"因此，表达式通过一个变项来表现，这个变项的值就是包含该表达式的命题。 （在极限情况下，变项变为常项，表达式变为命题。） 我将这样一种变项称为“命题变项”","zh_huang":"于是，一个表达式就可以以变元形式出现，变元的值就是包含该表达式的句子。 （在极限的情况下，常项也是变元，句子也是表达式。） 这样的变元我称为“命题变元”"},"children":[]},{"number":"3.314","texts":{"zh":"表达式只有在命题中才有指谓。所有变项都可理解为命题变项。 （连变名也一样。）","en":"An expression only has meaning in a proposition. Every variable can be construed as a propositional variable. (Even a variable name.)","de":"Der Ausdruck hat nur im Satz Bedeutung. Jede Variable lässt sich als Satzvariable auffassen. (Auch der variable Name.)","zh_wang":"只有在命题中表达式才有指谓。每个变项都可看做命题变项。 （也包括变名。）","zh_huang":"只有在句子中，表达式才有意义。所有变元都可以看成命题变元。 （名称变元也可以这么看）"},"children":[]},{"number":"3.315","texts":{"zh":"如果我们把命题的一个组成部分改为变项，就有了一类命题，它们全都是由此得来的变项命题的值。这个类一般还依赖于我们按任意约定所给予的原来命题各组成部分的指谓。但是，如果把其中已任意规定了指谓的所有记号都改为变项，仍然会得到一个这样的类。这个类不再依赖于任何约定，而仅仅依赖于命题的本性。它相应于一种逻辑形式——一种逻辑原型。","en":"If we change a constituent of a proposition into a variable, then there is a class of propositions that are all the values of the resulting variable proposition. This class still depends in general on what we mean, according to our arbitrary conventions, by parts of the original proposition. However, if we change into variables all those signs whose meaning was arbitrarily determined, then there is still such a class. But this is not now dependent on any convention, only on the nature of the proposition. It corresponds to a logical form—a logical prototype.","de":"Verwandeln wir einen Bestandteil eines Satzes in eine Variable, so gibt es eine Klasse von Sätzen, welche sämtlich Werte des so entstandenen variablen Satzes sind. Diese Klasse hängt im allgemeinen noch davon ab, was wir, nach willkürlicher Übereinkunft, mit Teilen jenes Satzes meinen. Verwandeln wir aber alle jene Zeichen, deren Bedeutung willkürlich bestimmt wurde, in Variable, so gibt es nun noch immer eine solche Klasse. Diese aber ist nun von keiner Übereinkunft abhängig, sondern nur noch von der Natur des Satzes. Sie entspricht einer logischen Form – einem logischen Urbild.","zh_wang":"如果我们把命题的一个组成部分改为变项，就有了这样一类命题，这些命题全都是由此得来的变项命题的值。这一类命题一般还依赖我们按任意约定的那个原来命题的各组成部分的指谓。但是，如果我们把所有那些已任意规定了指谓的所有标记都变成变项，仍然会得到一个这样的类。但是现在这个类不再依赖任何约定，而仅仅依赖命题的本性。它相当于一种逻辑形式，一种逻辑原型。","zh_huang":"如果把一个句子的一个构成部分换成变元，就得到一组句子，它们都是由此得到的命题变元的值。总的来说，这组句子还是取决于我们按照任意的约定赋予原来那个句子的成分以什么意义。但是，若把其意义被任意确定的所有记号都换成变元，这组句子还是会保留下来。这时它就不再受制于任何约定，而仅仅受制于句子的本性。它对应于一个逻辑形式——一个逻辑原型。"},"children":[]},{"number":"3.316","texts":{"zh":"一个命题变项可以取一些什么值是某种被规定了的东西。 值的规定即是 变项。","en":"What values a propositional variable may take is fixed. The fixing of the values is the variable.","de":"Welche Werte die Satzvariable annehmen darf, wird festgesetzt. Die Festsetzung der Werte ist die Variable.","zh_wang":"命题变项可以取什么值是规定了的。 这些值的规定就是变项。","zh_huang":"一个命题变元可以取什么值，这是规定好了的。 变元本身就规定了这些值。"},"children":[]},{"number":"3.317","texts":{"zh":"规定命题变项的值就是给出 以这变项为共同特征的那些命题。 规定就是描述这些命题。 因此规定只涉及符号，而不涉及它们的指谓。 对于规定来说唯一 重要的事情在于，它仅仅是对符号的描述，而对符号所标示的东西不作任何陈述。 命题的描述如何产生，那是不重要的。","en":"The fixing of the values of propositional variables is the specification of the propositions whose common mark is the variable. The fixing is a description of these propositions. The fixing will thus be a matter only of symbols, not of their meaning. And only this is essential to the fixing, that it is only a description of symbols and states nothing about what is signified. The way in which the propositions are described is inessential.","de":"Die Festsetzung der Werte der Satzvariablen ist die Angabe der Sätze, deren gemeinsames Merkmal die Variable ist. Die Festsetzung ist eine Beschreibung dieser Sätze. Die Festsetzung wird also nur von Symbolen, nicht von deren Bedeutung handeln. Und nur dies ist der Festsetzung wesentlich, dass sie nur eine Beschreibung von Symbolen ist und nichts über das Bezeichnete aussagt. Wie die Beschreibung der Sätze geschieht, ist unwesentlich.","zh_wang":"规定命题变项的值就是给出以这变项为共同特征的那些命题。 规定就是关于这些命题的描述。 因此规定只涉及符号，而不涉及它们的指谓。 对于规定来说只有这个才是最重要的，即它仅仅是对于符号的一种描述，而对符号所标示的东西不作任何断言。 我们如何来描述命题，这并不重要。","zh_huang":"这种规定就是明确哪些句子以命题变元为其共同特征。 这就等于描述这些句子。 这个过程因此只关系到符号，而与符号的意义没有关系。 对此，纯粹描述符号，而对符号表示的东西不置一词，这才是唯一重要的。 至于对句子的描述是如何得到的，则不重要。"},"children":[]},{"number":"3.318","texts":{"zh":"像弗雷格和罗素一样，我把命题看成是其中包含的表达式的函项。","en":"I construe a proposition—like Frege and Russell—as a function of the expressions contained in it.","de":"Den Satz fasse ich – wie Frege und Russell – als Funktion der in ihm enthaltenen Ausdrücke auf.","zh_wang":"像弗雷格和罗素一样，我也把命题视为它所包含的表达式的函项。","zh_huang":"与弗雷格和罗素一样，我也把句子看作其所包含表达式的函项。"},"children":[]}]},{"number":"3.32","texts":{"zh":"记号是一个符号中可以被感官感知到的东西。","en":"A sign is what can be perceived of the symbol.","de":"Das Zeichen ist das sinnlich Wahrnehmbare am Symbol.","zh_wang":"标记是符号中可以被感官感知到的部分。","zh_huang":"记号是符号的可感部分。"},"children":[{"number":"3.321","texts":{"zh":"故同一个记号（书写记号或声音记号等等）可以为两个不同的符号所共有——这时两者是以不同的方式在标示。","en":"Two different symbols can thus have a sign (written or spoken, etc.) in common with one another—they then signify in different ways.","de":"Zwei verschiedene Symbole können also das Zeichen (Schriftzeichen oder Lautzeichen etc.) miteinander gemein haben – sie bezeichnen dann auf verschiedene Art und Weise.","zh_wang":"因此两个不同的符号可以共有一个标记（书写标记或声音标记等等）——这时两者是以不同的方式来标示。","zh_huang":"所以，两个不同符号就可以共有同一个记号（写下来的、说出来的，等等），在这种情况下它们表示事物的方式就是不同的。"},"children":[]},{"number":"3.322","texts":{"zh":"如果我们应用同一
