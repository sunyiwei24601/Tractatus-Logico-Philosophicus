zh":"我是我的世界。（小宇宙。）","en":"I am my world. (The microcosm.)","de":"Ich bin meine Welt. (Der Mikrokosmos.)","zh_wang":"我是我的世界。（小宇宙）","zh_huang":"我就是我的世界（小宇宙）"},"children":[{"number":"5.631","texts":{"zh":"没有思考着或想象着的主体这种东西。 如果我写一本书叫做《我所发现的世界》，我也应该在其中报道我的身体，并且说明哪些部分服从我的意志，哪些部分不服从我的意志，等等。这是一种孤立主体的方法，或者不如说，是在一种重要意义上表明并没有主体的方法；因为在这本书里唯独不能 谈到的就是主体。——","en":"There is no thinking, representing subject. If I wrote a book, ‘The world as I found it’, then this would also have to report on my body and say which parts of it obey my will and which not, etc.; for this is a method of isolating the subject, or rather, of showing that, in an important sense, there is no subject—for of this alone could there be no talk in this book.","de":"Das denkende, vorstellende, Subjekt gibt es nicht. Wenn ich ein Buch schriebe „Die Welt, wie ich sie vorfand“, so wäre darin auch über meinen Leib zu berichten und zu sagen, welche Glieder meinem Willen unterstehen und welche nicht etc., dies ist nämlich eine Methode, das Subjekt zu isolieren, oder vielmehr zu zeigen, dass es in einem wichtigen Sinne kein Subjekt gibt: Von ihm allein nämlich könnte in diesem Buche nicht die Rede sein. –","zh_wang":"没有思考着和想象着的主体。 如果我写了一本书《我所发现的世界》，在其中也写出了我身体的一些情况，说明我身体哪些肢体遵循我的意志，哪些肢体没有，等等。那么这就是离开主体的一个方法，或者在一个重要意义上显示主体是不存在的，那就是说，只是对于主体，在本书中是不能讲的。","zh_huang":"思考的主体、描述的主体，这些东西是没有的。 如果写一本题为《我所发现的世界》的书，我就会在书中描写我的身体，并说明哪些部分服从我的意志，哪些部分不服从。这种方法与其说是在区分出主体，倒不如说是在一种重要的意义上说明没有主体。因为，唯独主体是书中不能提的。"},"children":[]},{"number":"5.632","texts":{"zh":"主体不属于世界，然而它是世界的一个界限。","en":"The subject does not belong to the world but is a limit of the world.","de":"Das Subjekt gehört nicht zur Welt, sondern es ist eine Grenze der Welt.","zh_wang":"主体不属于世界，而是世界的一个界限。","zh_huang":"主体不属于世界，而是世界的界限。"},"children":[]},{"number":"5.633","texts":{"zh":"在世界上哪里 可以找到一个形而上主体呢？ 你会说这就正好像眼睛和视域的情形一样。但是事实上你看不 见眼睛。 而且在视野里 没有任何东西使得你能推论出那是被一只眼睛看到的。","en":"Where in the world is a metaphysical subject to be found? You say that this is just like the case of the eye and the visual field. But you don’t actually see the eye itself. And nothing in the visual field lets you infer that it is seen by an eye.","de":"Wo in der Welt ist ein metaphysisches Subjekt zu merken? Du sagst, es verhält sich hier ganz, wie mit Auge und Gesichtsfeld. Aber das Auge siehst du wirklich nicht. Und nichts am Gesichtsfeld lässt darauf schliessen, dass es von einem Auge gesehen wird.","zh_wang":"在世界的什么地方可以发现一个形而上学的主体？ 你说，这个情况就像眼睛跟视野之间的关系一样。但是你确实不能看见自己的眼睛。 并且，在视野里没有任何东西让你能推出：它是由眼睛看到的。","zh_huang":"在世界中，哪里才能找到形而上学主体呢？ 你会说，这完全就像眼睛和视野的情况。的确，你看不到眼睛。 你不能从视野中的任何东西，推论出那是眼睛所看到的。"},"children":[{"number":"5.6331","texts":{"zh":"视域肯定不具有如图这样的形式：","en":"For the visual field does not have a form such as this:","de":"Das Gesichtsfeld hat nämlich nicht etwa eine solche Form:","zh_wang":"因为视野没有如下的形式：。","zh_huang":"因为，视野的形式肯定不是这样的：。"},"children":[]}]},{"number":"5.634","texts":{"zh":"与此有联系的一点是，我们的经验中也没有一部分同时是先天的。 我们看到的一切也可能是别种样子。 我们通常能够描述的一切也可能是别种样子。 没有先天的事物秩序。","en":"Connected with this is that no part of our experience is a priori as well. Everything we see could also be otherwise. Everything we can describe at all could also be otherwise. There is no order of things a priori.","de":"Das hängt damit zusammen, dass kein Teil unserer Erfahrung auch a priori ist. Alles, was wir sehen, könnte auch anders sein. Alles, was wir überhaupt beschreiben können, könnte auch anders sein. Es gibt keine Ordnung der Dinge a priori.","zh_wang":"这跟如下的事实是相关的：我们的经验中，没有任何部分也是先天的。 我们所看到的一切东西也可能是另外的样子。 我们能描述出来的东西也可能是另外的样子。 没有先天的事物之间的秩序。","zh_huang":"与之相联系，我们经验中没有哪个部分同时也是先验的。 我们所看到的所有东西都可能是其他样子的。 所有能够描述的东西都可能不是实际的那种情况。 事物没有先验的秩序。"},"children":[]}]},{"number":"5.64","texts":{"zh":"这里可以看到，严格贯彻的唯我论与纯粹的实在论是一致的。唯我论的自我收缩为无广延的点，保留的是与它相关的实在。","en":"One sees here that solipsism, strictly followed through, coincides with pure realism. The self of solipsism shrinks to an extensionless point and what is left is the reality coordinated with it.","de":"Hier sieht man, dass der Solipsismus, streng durchgeführt, mit dem reinen Realismus zusammenfällt. Das Ich des Solipsismus schrumpft zum ausdehnungslosen Punkt zusammen, und es bleibt die ihm koordinierte Realität.","zh_wang":"在这里，我们看到：严格贯彻下去的唯我论跟纯粹的实在论是一致的。在唯我论中的“自我”缩小到一个没有长度的点，而仍留有与之相应的实在。","zh_huang":"从这里可以看出，严格贯彻的唯我论与纯粹的实在论相重合。唯我论的自我缩成一个没有大小的点，与之对应的实在则保留了下来。"},"children":[{"number":"5.641","texts":{"zh":"因此，确实有一种意义使哲学可以用非心理学的方式来谈论自我。 由于“世界是我的世界”而使自我进入哲学之中。 哲学上的自我并不是人，也不是人的身体或者心理学所考察的人的心灵，而是形而上主体，是世界的界限——而不是它的一个部分。","en":"Thus there really is a sense in which philosophy can address the self non-psychologically. The self enters philosophy through this, that ‘the world is my world’. The philosophical self is not the human being, not the human body or the human soul, with which psychology is concerned, but the metaphysical subject, the limit—not a part—of the world.","de":"Es gibt also wirklich einen Sinn, in welchem in der Philosophie nicht-psychologisch vom Ich die Rede sein kann. Das Ich tritt in die Philosophie dadurch ein, dass die „Welt meine Welt ist“. Das philosophische Ich ist nicht der Mensch, nicht der menschliche Körper, oder die menschliche Seele, von der die Psychologie handelt, sondern das metaphysische Subjekt, die Grenze – nicht ein Teil der Welt.","zh_wang":"因此确实有一种意义，就这个意义我们可以在哲学上谈论非心理学的“自我”。 通过“世界是我的世界”这个事实，在哲学上“自我”的概念才得以产生。 哲学意义上的“自我”不是这个人本身，也不是人的身体或心理学研究的人的灵魂，而是一个形而上学意义上的主体，是这个世界的界限而不是它的一部分。","zh_huang":"哲学的确能在一种意义上以非心理学的方式谈论自我。 自我是通过“世界是我的世界”这个事实进入哲学的。 哲学的自我不是人，不是人的身体，也不是心理学所研究的人类灵魂，而是形而上学－自我；是世界的界限，而不是世界的一部分。"},"children":[]}]}]}]},{"number":"6","texts":{"zh":"真值函项的一般形式是： 这也是命题的一般形式。","en":"The general form of a truth-function is: []. This is the general form of a proposition.","de":"Die allgemeine Form der Wahrheitsfunktion ist:. Dies ist die allgemeine Form des Satzes.","zh_wang":"真值函项的一般形式是： 。 这是命题的一般形式。","zh_huang":"真值函项的一般形式是[p, ξ, N(ξ)]。 这就是句子的一般形式。"},"children":[{"number":"6.001","texts":{"zh":"它只是说明：每个命题都是连续应用运算N（）于基本命题的结果。","en":"This simply says that every proposition is a result of the successive application of the operation to elementary propositions.","de":"Dies sagt nichts anderes, als dass jeder Satz ein Resultat der successiven Anwendung der Operation auf die Elementarsätze ist.","zh_wang":"这只是说：每个命题都是把N ’（ ）运算连续应用于基本命题的结果。","zh_huang":"这恰恰是在说，所有句子都是对基本命题迭代运用操作N(ξ)的结果。"},"children":[]},{"number":"6.002","texts":{"zh":"如果有了怎样构成一个命题的一般形式，那么也就随之有了怎样通过一个运算可以从一个命题产生出另一个命题的一般形式。","en":"If we are given the general form of how a proposition is constructed, then we are thereby also given the general form of how one proposition can be generated from another by an operation.","de":"Ist die allgemeine Form gegeben, wie ein Satz gebaut ist, so ist damit auch schon die allgemeine Form davon gegeben, wie aus einem Satz durch eine Operation ein anderer erzeugt werden kann.","zh_wang":"如果我们得到了如何构成一个命题的一般形式，从而也就得到了如何通过运算从一个命题产生出另外一个命题的一般形式。","zh_huang":"确定了构建句子的一般形式，也就随之确定了可以利用操作从一个句子产生另一个句子的一般形式。"},"children":[]},{"number":"6.01","texts":{"zh":"因此运算Ω’）的一般形式是： 这是由一个命题过渡到另一个命题的最一般的形式。","en":"The general form of an operation is thus:. This is the most general form of transition from one proposition to another.","de":"Die allgemeine Form der Operation ist also:. Das ist die allgemeinste Form des Überganges von einem Satz zum anderen.","zh_wang":"因此运算Ω’（ ）的一般形式就是： 。 这是从一个命题转换成另一个命题的最一般的形式。","zh_huang":"于是，操作Ω(η )的一般形式就是[ξ, N(ξ)](η )=[η , ξ, N(ξ)]。 这就是从一个句子到另外一个句子的转换所采取的最为一般的形式。"},"children":[]},{"number":"6.02","texts":{"zh":"由此 我们就达到了数。我给出如下定义： x＝Ω0 ’x Def.Ω’Ωυ ’x＝Ωυ＋1’ x Def. 并且 这样，根据这些记号规则我把系列 x，Ω’x，Ω’Ω’x，Ω′Ω′Ω′x，…… 写作： Ω0’ x，Ω0＋1’ x，Ω0＋1＋1’ x，Ω0＋1＋1＋1’ x，…… 因此，我不写作“［x，ξ，Ω’ξ］”，而写作： “［Ω0’ x，Ωυ’ x，Ωυ＋1’ x］” 而且我给出如下定义： 0＋1＝1 Def. 0＋1＋1＝2 Def. 0＋1＋1＋1＝3 Def. （以及依次类推）","en":"And in this way we arrive at numbers: I define According to these sign-rules we thus write the series x, Ω’x, Ω’ Ω’x, Ω’ Ω’ Ω’x, … as follows: Ω0,x, Ω0+1,x, Ω0+1+1,x, Ω0+1+1+1,x, … So instead of ‘[x, ξ, Ω’ ξ]’ I write: And define:","de":"Und so kommen wir zu den Zahlen: Ich definiere und Nach diesen Zeichenregeln schreiben wir also die Reihe so: Also schreibe ich statt „ “: „ “. Und definiere: (u. s. f.)","zh_wang":"因此我们得到了数：我定义为： x =Ω°’x Def.and Ω’Ωv’ x =Ωv+1 x Def. 然后，按照这些符号原则，我把系列 x ，Ω’x ，Ω’Ωv’ x ，Ω’Ω’Ω’x ..... 写作： Ω°’x ，Ω°+1 ’x ，Ω°+1+1 ’，Ω°+1+1+1 ’x ..... 因此，我不写作“[x ，ξ ，Ω’ξ ]”，而写作：“[Ω°’x ，Ωv ’x ，Ωv+1 ’x ]”。 而且我定义为： 0+1=1Def. 0+1+1=2Def. 0+1+1+1=3Def. 以下依此类推。","zh_huang":"我们可以这样过渡到数。我定义如下： x=Ω0'x Def. Ω'Ων'x=Ων+1'x Def. 按照这种用来处理记号的规则，我们把序列 x, Ω'x, Ω'Ω'x, Ω'Ω'Ω'x, … 写成如下形式： Ω0'x, Ω0+1'x, Ω0+1+1'x, Ω0+1+1+1'x, … 这样，我就不用“[x, ξ, Ω'ξ]”，而是用“[Ω0'x, Ων'x, Ων+1'x]”。 我还这样定义： 0+1=1 Def. 0+1+1=2 Def. 0+1+1+1=3 Def. 如此等等。"},"children":[{"number":"6.021","texts":{"zh":"数是一个运算的阶次。","en":"A number is the exponent of an operation.","de":"Die Zahl ist der Exponent einer Operation.","zh_wang":"数是运算的一个指数。","zh_huang":"数就是操作的指数。"},"children":[]},{"number":"6.022","texts":{"zh":"数的概念不过是一切数所共有的东西，即数的一般形式。 数的概念是变数。 数相等的概念就是一切特定的数相等情形的一般形式。","en":"The concept of number is simply what is common to all numbers, the general form of a number. The concept of number is the variable number. And the concept of numerical equality is the general form of all particular numerical equalities.","de":"Der Zahlbegriff ist nichts anderes, als das Gemeinsame aller Zahlen, die allgemeine Form der Zahl. Der Zahlbegriff ist die variable Zahl. Und der Begriff der Zahlengleichheit ist die allgemeine Form aller speziellen Zahlengleichheiten.","zh_wang":"数的概念只是所有数中所共有的东西，是数的一般形式。 数的概念是变数。 数的相等概念是所有特殊数字的相等情形的一般形式。","zh_huang":"数的概念就是所有数共同的东西，即数的一般形式。 数的概念就是数变元。 数之间相等的概念，是数之间相等的所有具体情况的一般形式。"},"children":[]}]},{"number":"6.03","texts":{"zh":"整数的一般形式是：","en":"The general form of a whole number is: [0, ξ, ξ +1].","de":"Die allgemeine Form der ganzen Zahl ist:.","zh_wang":"整数的一般形式是：[O，ξξ +1]。","zh_huang":"整数的一般形式是[0, ξ, ξ+1]。"},"children":[{"number":"6.031","texts":{"zh":"类的理论在数学中完全是多余的。 与此相关联的一点是：数学中所需要的概括，不是偶然的概括。","en":"The theory of classes is quite superfluous in mathematics. Connected with this is that the generality that we need in mathematics is not accidental generality.","de":"Die Theorie der Klassen ist in der Mathematik ganz überflüssig. Dies hängt damit zusammen, dass die Allgemeinheit, welche wir in der Mathematik brauchen, nicht die zufällige ist.","zh_wang":"类论在数学中是完全多余的。 这跟我们在数学中所需要的一般性不是偶然的一般性这一事实相关联的。","zh_huang":"在数学中，关于类的理论是完全多余的。 相应地，数学所需要的普遍性也不是偶然的普遍性。"},"children":[]}]},{"number":"6.1","texts":{"zh":"逻辑命题是重言式。","en":"The propositions of logic are tautologies.","de":"Die Sätze der Logik sind Tautologien.","zh_wang":"逻辑命题是重言式。","zh_huang":"逻辑命题是重言式。"},"children":[{"number":"6.11","texts":{"zh":"因此，逻辑命题什么也没有说。（它们是分析命题。）","en":"The propositions of logic thus say nothing. (They are the analytic propositions.)","de":"Die Sätze der Logik sagen also Nichts. (Sie sind die analytischen Sätze.)","zh_wang":"因此逻辑命题什么也没有说。 （它们是分析命题。）","zh_huang":"因此，逻辑命题什么也没有说（它们是分析的命题）"},"children":[{"number":"6.111","texts":{"zh":"凡是使一个逻辑命题显得像是具有内容的理论都是假的。例如，人们也许认为，词“真”和“假”标示着和其它属性一起的两种属性，于是，每个命题都具有这两种属性之一，看起来就是一个很奇怪的事实。按照这种理论，这个事实看起来绝不是自明的，正如命题“所有玫瑰花不是黄的就是红的”一样，即使它为真，也不是自明的。的确，这使得逻辑命题获得了自然科学命题的全部特征，而这也就肯定地标志着逻辑命题遭到了误解。","en":"Theories which make propositions of logic appear contentful are always false. One might suppose, for example, that the words ‘true’ and ‘false’ signify two properties among other properties, and it would then appear as a remarkable fact that every proposition has one of these properties. This seems far from obvious, just as the proposition ‘all roses are either yellow or red’, say, sounds far from obvious, even if it were true. For the logical proposition then entirely acquires the character of a proposition of natural science and this is a sure sign that it has been misconstrued.","de":"Theorien, die einen Satz der Logik gehaltvoll erscheinen lassen, sind immer falsch. Man könnte z. B. glauben, dass die Worte „wahr“ und „falsch“ zwei Eigenschaften unter anderen Eigenschaften bezeichnen, und da erschiene es als eine merkwürdige Tatsache, dass jeder Satz eine dieser Eigenschaften besitzt. Das scheint nun nichts weniger als selbstverständlich zu sein, ebensowenig selbstverständlich, wie etwa der Satz, „alle Rosen sind entweder gelb oder rot“ klänge, auch wenn er wahr wäre. Ja, jener Satz bekommt nun ganz den Charakter eines naturwissenschaftlichen Satzes und dies ist das sichere Anzeichen dafür, dass er falsch aufgefasst wurde.","zh_wang":"使得逻辑命题看起来很有内容的那些理论总是错误的。例如，人们可以相信“真”“假”这两个词代表与许多其他属性一样的的两个属性，那么，每个命题都具有这两种属性之一，看起来是一件值得注意的事实。现在，这个说法看来不再那么自明了，就像“所有玫瑰非黄即红”这个说法如果是真的也不是自明的一样。确实，现今逻辑命题已经完全得到了一个自然科学命题的特征，而这就是它受到误解的确实标志。","zh_huang":"一种理论要是让逻辑命题显得像有内容，那么这种理论就是错误的。比如，有人会认为“真”和“假”像其他词一样，表示两种性质，这样一来，说所有句子都要拥有其中一种性质，就显得不寻常了。按这种理论，你根本看不出来是不是这样，这就像“所有玫瑰花要么是黄的要么是红的”这样的句子一样，即使它是真的，你也完全看不出来。逻辑命题变得和自然科学的命题一模一样，这其实是个确凿的信号：我们理解错了。"},"children":[]},{"number":"6.112","texts":{"zh":"要正确地说明逻辑命题，就必须在所有命题中给与它们以独特的地位。","en":"The correct explanation of logical propositions must give them a unique status among all propositions.","de":"Die richtige Erklärung der logischen Sätze muss ihnen eine einzigartige Stellung unter allen Sätzen geben.","zh_wang":"逻辑命题的正确解释必须在所有命题中给它们一个特殊的地位。","zh_huang":"对逻辑命题的正确解释，必定让它们在所有命题中占据一个独特位置。"},"children":[]},{"number":"6.113","texts":{"zh":"逻辑命题的特有标志是，仅仅从符号人们就能认出它们为真，这个事实包含着全部的逻辑哲学。 因此，一个同样也是非常重要的事实是：非逻辑命题的真或假不能 单从命题本身看出来。","en":"It is the characteristic mark of logical propositions that one can recognize from the symbol alone that they are true, and this fact comprises the whole of philosophy of logic. And so, too, is it one of the most important facts that non-logical propositions do not permit their truth or falsity to be recognized from the proposition alone.","de":"Es ist das besondere Merkmal der logischen Sätze, dass man am Symbol allein erkennen kann, dass sie wahr sind, und diese Tatsache schliesst die ganze Philosophie der Logik in sich. Und so ist es auch eine der wichtigsten Tatsachen, dass sich die Wahrheit oder Falschheit der nicht-logischen Sätze nicht am Satz allein erkennen lässt.","zh_wang":"人们只从符号上就能知道逻辑命题的真假，这是逻辑命题的一个特有标志；而且这个事实本身就包含了全部逻辑哲学。因此，非逻辑命题的真假不能仅仅从命题中看出，这也是最重要的事实之一。","zh_huang":"逻辑命题的标志性特征是，从符号本身就可以看出它们是真的。单单这个事实，就包含了整个逻辑哲学。同样极为重要的是，非逻辑命题的真假不能从句子本身看出。"},"children":[]}]},{"number":"6.12","texts":{"zh":"逻辑命题是重言式，这显示 语言和世界的形式的——逻辑的——属性。 命题成分以这种特定方式 联结起来构成重言式，这就表明了这些命题成分的逻辑特征。 如果一些命题以一定方式联结起来构成重言式，那么它们必定具有一定的结构性质。所以，当它们以这种方式 结合起来而构成重言式时，就表明它们具有这些结构性质。","en":"That the propositions of logic are tautologies shows the formal—logical—properties of language, of the world. That its constituents, so connected, yield a tautology is what characterizes the logic of its constituents. For propositions, connected in a particular way, to yield a tautology, they must have particular structural properties. That they yield a tautology so combined thus shows that they have these structural properties.","de":"Dass die Sätze der Logik Tautologien sind, das zeigt die formalen – logischen – Eigenschaften der Sprache, der Welt. Dass ihre Bestandteile so verknüpft eine Tautologie ergeben, das charakterisiert die Logik ihrer Bestandteile. Damit Sätze, auf bestimmte Art und Weise verknüpft, eine Tautologie ergeben, dazu müssen sie bestimmte Eigenschaften der Struktur haben. Dass sie so verbunden eine Tautologie ergeben, zeigt also, dass sie diese Eigenschaften der Struktur besitzen.","zh_wang":"逻辑命题是重言式，这显示了语言和世界的形式的——逻辑的——属性。 其组成部分通过这种特定方式结合起来就产生了重言式，这就表明了其组成部分的逻辑特征。 为了通过一定的方式使得彼此结合的命题能产生重言式，这些命题应该具有特定的结构属性。当进行那样的结合时就产生重言式，因此就表明这些命题具有那种结构属性。","zh_huang":"逻辑命题是重言式，这显示着语言以及世界的（形式）逻辑性质。 其构成成分按照这种特定的方式连接就构成重言式，这揭示了这些构成成分的逻辑。 为了让句子以特定方式连接以构成重言式，这些句子必须具备特定的结构特征。因此，它们这样连接得到了重言式，这表明它们具备了这些结构特征。"},"children":[{"number":"6.1201","texts":{"zh":"例如，命题“p”和“～p”在结合“～（p・～p）”中构成一个重言式，这就表明它们是互相矛盾的。命题“p⊃q”、“p”、“q”在形式“（p⊃q）・（p）∶⊃∶（q）”中互相结合起来构成一个重言式，这就表明q从p并且p⊃q得出来。“（x）・fx∶⊃∶fa”是一个重言式，就表明fa从（x）・fx得出来，等等。","en":"For example, that the propositions ‘p’ and ‘~p’ yield a tautology in the combination ‘~(p. ~p)’ shows that they contradict one another. That the propositions ‘p⊃q’, ‘p’ and ‘q’ combined together in the form ‘(p⊃q).(p):⊃:(q)’ yield a tautology shows that q follows from p and p⊃q. That ‘(x).fx:⊃:fa’ is a tautology shows that fa follows from (x).fx, etc. etc.","de":"Dass z. B. die Sätze „p“ und „∼p“ in der Verbindung „∼(p.∼p)“ eine Tautologie ergeben, zeigt, dass sie einander widersprechen. Dass die Sätze „p ⊃ q“, „p“ und „q“ in der Form „(p ⊃ q).(p): ⊃: (q)“ miteinander verbunden eine Tautologie ergeben, zeigt, dass q aus p und p ⊃ q folgt. Dass „(x). fx: ⊃: fa“ eine Tautologie ist, dass fa aus (x). fx folgt. etc. etc.","zh_wang":"例如，命题“p ”和“～p ”结合为“～（p .～p ）”就产生了一个重言式，这表明这些命题互相矛盾。命题“p ⊃q ”、“p ”和“q ”以“（p ⊃q ）.（p ）：⊃：（q ）”的形式相结合，产生一个重言式，这表明q 是从p 和p ⊃q 中得来的。“（x ）.ƒx ：⊃ƒa ”是一个重言式，这表明ƒa 是从（x ）·ƒx 中得来的，等等。","zh_huang":"比如，句子“p”与“~p”连接而成的“~(p˄~p)”是重言式，这表明它们彼此矛盾。句子“p➛q”“p”以及“q”连接成的“((p➛q)˄p)➛q”是重言式，表明q是从p以及p➛q中推出来的。“∀xf(x)➛f(a)”是重言式，表明f(a)是从∀xf(x)中推出来的。"},"children":[]},{"number":"6.1202","texts":{"zh":"很清楚，用矛盾式取代重言式也能达到同样的目的。","en":"It is clear that one could also use contradictions instead of tautologies for the same purpose.","de":"Es ist klar, dass man zu demselben Zweck statt der Tautologien auch die Kontradiktionen verwenden könnte.","zh_wang":"显然，为了这个目的，我们也可以使用矛盾式而不是重言式。","zh_huang":"显然，用矛盾式而不是重言式，可以达到同样目的。"},"children":[]},{"number":"6.1203","texts":{"zh":"为了看出一个表达式是重言式，在其中没有概括记号出现的情形下，可以应用如下的直观方法：我将“p”、“q”、“r”等等，写为“WpF”、“WqF”、“WrF”等等。用括号来表达真值组合，如： 并且用线段表示整个命题的真或假与其真值主目的真值组合之间的相关，方式如下： 这样，如上述这个记号就表述命题p⊃q。现在我想以举例的方式来考察一下命题～（p・～p）（矛盾律），看它是否为重言式。在我们的记号法中，形式“～ ”写为： 形式“ ・η”则写为： 因而，命题～（p・～q）就表为： 如果在这里我们用“p”代换“q”，并考察最外层的W和F与最里层的W和F的结合，那么就得出，整个命题的真相关于其主目的一切 真值组合，而其假则不与其主目的任何真值组合相关。","en":"To recognize a tautology as such, in cases in which no generality-sign occurs in the tautology, one can make use of the following perspicuous method: instead of ‘p’, ‘q’, ‘r’, etc., I write ‘TpF’, ‘TqF’, ‘TrF’, etc. I express the truth-combinations by means of brackets, for example: and the correlation of the truth or falsity of the whole proposition with the truth-combinations of the truth-arguments by means of lines in the following way: This sign, for example, would thus represent the proposition p⊃q. Now I want to test whether the proposition ~(p.~q) (law of contradiction), for example, is a tautology. The form ‘~ξ’ is written in our notation as and the form ‘ξ ‧η’ thus: The proposition ~ (p. ~q) is therefore written thus: If we substitute ‘p’ for ‘q’ here and examine the combination of the outermost T and F with the innermost, then the result is that the truth of the whole proposition is correlated with all the truth-combinations of its argument, its falsity with none of the truth-combinations.","de":"Um eine Tautologie als solche zu erkennen, kann man sich, in den Fällen, in welchen in der Tautologie keine Allgemeinheitsbezeichnung vorkommt, folgender anschaulichen Methode bedienen: Ich schreibe statt „p“, „q“, „r“ etc. „WpF“, „WqF“, „WrF“ etc. Die Wahrheitskombinationen drücke ich durch Klammern aus. z. B.: und die Zuordnung der Wahr- oder Falschheit des ganzen Satzes und der Wahrheitskombinationen der Wahrheitsargumente durch Striche auf folgende Weise: Dies Zeichen würde also z. B. den Satz p ⊃ q darstellen. Nun will ich z. B. den Satz ∼(p. ∼p) (Gesetz des Widerspruchs) daraufhin untersuchen, ob er eine Tautologie ist. Die Form „∼ξ“ wird in unserer Notation geschrieben; die Form „ξ. η“ so: Daher lautet der Satz ∼(p. ∼q) so: Setzen wir hier statt „q“ „p“ ein und untersuchen die Verbindung der äussersten W und F mit den innersten, so ergibt sich, dass die Wahrheit des ganzen Satzes allen Wahrheitskombinationen seines Argumentes, seine Falschheit keiner der Wahrheitskombinationen zugeordnet ist.","zh_wang":"为了认识一个真正的重言式，在重言式中没有一般性符号的情况下，我们可以使用下面的直观法：我把“p ”“q ”“r ”等替换成“TpF ”“TqF ”“TrF ”等。我用括号来表示真值组合。 整个命题的真或假与真值主目的真值组合的配合，是通过下面的线条来表示的： 因此，比如这个标记就可以表示命题现在我想在此基础上继续研究一个像～（p .～q ）这样的命题（矛盾律）是否是重言式。形式“～ξ”，在我们的记法中写 因此形式“ξ·η”就写作 因此命题～（p .～q ）就是： 如果我们把“q ”换成“p ”，并观察最外面的T和F与最里面的T与F的结合，那么就看出，整个命题的真与其主目的一切真值组合相配合，而其假则不与其主目的任何一个真值组合相配合。","zh_huang":"在没有概括记号的情况下要识别重言式，可以使用下面这种直观性的方法： 用“TpF”“TqF”“TrF”等等来替换“p”“q”“r”，真值组合则用括号来表示，例如： 整个句子的真假与真值主目的真值组合之间的对应关系，则用直线表示，例如： 这个图表示的是句子p➛q。现在，我想通过例子来看句子~(p˄~p)（矛盾律）是否重言式。按我们的记号法，“～ξ”这种形式写成： 而“ξ˄η ”这种形式则写成： 因此，句子~(p˄~q)就成为： 如果用“p”来替换其中的“q”，看最外层的T和F怎样与最内层的联系起来，结果就是主目的所有真值组合都对应于整个句子的真，而没有一个真值组合对应于假。"},"children":[]},{"number":"6.121","texts":{"zh":"逻辑命题通过把一些命题结合成为什么也没有说的命题而展现这些命题的逻辑性质。 这种方法也可称为置零法。在逻辑命题中各命题之间达到平衡，而这种平衡状态则指明这些命题在逻辑上必须怎样构成。","en":"The propositions of logic demonstrate the logical properties of propositions by combining them into propositions that say nothing. This method could also be called a zero-method. In a logical proposition propositions are brought into equilibrium with one another, and the state of equilibrium then shows how these propositions have to be constituted logically.","de":"Die Sätze der Logik demonstrieren die logischen Eigenschaften der Sätze, indem sie sie zu nichtssagenden Sätzen verbinden. Diese Methode könnte man auch eine Nullmethode nennen. Im logischen Satz werden Sätze miteinander ins Gleichgewicht gebracht und der Zustand des Gleichgewichts zeigt dann an, wie diese Sätze logisch beschaffen sein müssen.","zh_wang":"逻辑命题展示了命题的逻辑属性，方法是把它们结合成什么也没有说的命题。 这个方法可以称为零方法。在一个逻辑命题中，各种命题互相平衡，那时，平衡的状态表明这些命题在逻辑上是必须怎样构成。","zh_huang":"逻辑命题表现句子逻辑特性的方式是，把若干句子连接起来，构成一个什么都没有说的句子。 这种方法也可以叫作零度法。在一个逻辑命题中，各个句子彼此平衡，这种平衡状态表明这些句子必须具备什么逻辑构造。"},"children":[]},{"number":"6.122","texts":{"zh":"由此得出，不用逻辑命题也行；因为在一个合适的记号系统中，我们只需仔细考察命题本身就能看出命题的形式属性。","en":"From this it follows that we can even do without logical propositions, since in an appropriate notation we can recognize the formal properties of propositions by merely looking at the propositions.","de":"Daraus ergibt sich, dass wir auch ohne die logischen Sätze auskommen können, da wir ja in einer entsprechenden Notation die formalen Eigenschaften der Sätze durch das blosse Ansehen dieser Sätze erkennen können.","zh_wang":"由此得出：也可不用逻辑命题，因为在适当的记法中，我们只要看看这两个命题就能认识到命题的形式属性。","zh_huang":"由此可见，我们实际上可以不要逻辑命题。因为在记号法合适的条件下，只检查句子本身，我们实际上就可以辨别出句子的形式性质。"},"children":[{"number":"6.1221","texts":{"zh":"例如，若两个命题“p”和“q”在组合“p⊃q”中构成重言式，那么很清楚，q是从p得来的。 例如，我们从这两个命题本身看出：“q”从“p⊃q・p”得出来，但是我们同样也可以用如下方式来表明这一点：我们将其结合为形式“p⊃q・p：⊃：q”，并且表明这是一个重言式。","en":"For example, if two propositions ‘p’ and ‘q’ in the combination ‘p⊃q’ yield a tautology, then it is clear that q follows from p.That ‘q’ follows from ‘p⊃q.p’, for example, we see from the two propositions themselves, but we can also show it like this: by combining them into ‘p⊃q.p:⊃:q’ and then showing that this is a tautology.","de":"Ergeben z. B. zwei Sätze „p“ und „q“ in der Verbindung „p ⊃ q“ eine Tautologie, so ist klar, dass q aus p folgt. Dass z. B. „q“ aus „p ⊃ q. p“ folgt, ersehen wir aus diesen beiden Sätzen selbst, aber wir können es auch so zeigen, indem wir sie zu „p ⊃ q. p: ⊃: q“ verbinden und nun zeigen, dass dies eine Tautologie ist.","zh_wang":"举例来说，如果两个命题“p ”和“q ”在“p ⊃q ”，这个结合上产生了一个重言式，那么很明显，q 是从p 中得来的。 例如，“q ”从“p⊃q .p ”得来，这从两个命题本身就可以看出，但是也可以这样表明，即把它们结合为“p ⊃q .p ：⊃q ”，然后表明这是重言式。","zh_huang":"比如，如果“p”和“q”这两个句子连接到“p➛q”中构成重言式，那么q显然就是从p推出的。 比如，从两个句子本身就可以看出“q”是从“(p➛q)˄p”中推出的。不过这一点也可以用另一种方式显示出来，我们用它们构成“[(p➛q)˄p]➛q”这样的形式，然后表明它是重言式。"},"children":[]},{"number":"6.1222","texts":{"zh":"这就颇有启发地说明，为何逻辑命题不可被经验确证，就像它不可被经验驳倒一样。一个逻辑命题不仅必须不被任何可能的经验驳倒，它也必须不被任何可能的经验确证。","en":"This sheds light on the question why logical propositions cannot be confirmed by experience, any more than they can be refuted by experience. Not only must a proposition of logic be incapable of being refuted by any possible experience but it must also be incapable of being confirmed by any possible experience.","de":"Dies wirft ein Licht auf die Frage, warum die logischen Sätze nicht durch die Erfahrung bestätigt werden können, ebenso wenig, wie sie durch die Erfahrung widerlegt werden können. Nicht nur muss ein Satz der Logik durch keine mögliche Erfahrung widerlegt werden können, sondern er darf auch nicht durch eine solche bestätigt werden können.","zh_wang":"这给下面的问题带来了启发：为什么逻辑命题既不能在经验上证实也不能否定。逻辑命题不仅一定不能被任何可能的经验所否定，也一定不能被任何可能的经验所证实。","zh_huang":"这让我们得以理解，逻辑命题为什么既不能为经验所证实，也不能被经验推翻。逻辑命题不仅不能为所有可能的经验所推翻，而且不可能为所有可能的经验所证实。"},"children":[]},{"number":"6.1223","texts":{"zh":"现在清楚了，为什么人们常觉得好像我们要“设立 ”“逻辑真理”。道理就在于，我们可以要求设立逻辑真理，就如我们可以要求设立一种合适的记号系统一样。","en":"Now it becomes clear why it was often felt as if the ‘logical truths’ had to be ‘postulated’ by us: for we can postulate them inasmuch as we can postulate an adequate notation.","de":"Nun wird klar, warum man oft fühlte, als wären die „logischen Wahrheiten“ von uns zu „fordern“: Wir können sie nämlich insofern fordern, als wir eine genügende Notation fordern können.","zh_wang":"现在，显而易见的是：为什么我们经常感觉好像“逻辑真理”一定是我们“要求设定”的。实际上，我们可以要求设立逻辑真理，就如同我们可以要求设定一种合适的记号系统一样。","zh_huang":"为什么我们会觉得“逻辑真理”是我们“设定”的，也就变得清楚起来。因为，只要可以设定恰当的记号法，我们就可以设定逻辑真理。"},"children":[]},{"number":"6.1224","texts":{"zh":"现在也清楚了，逻辑为何被称为形式和推论的理论。","en":"It also becomes clear now why logic was called the theory of forms and of inference.","de":"Es wird jetzt auch klar, warum die Logik die Lehre von den Formen und vom Schliessen genannt wurde.","zh_wang":"下面的问题在这里也变得清楚了：为什么称逻辑为形式和推论的理论。","zh_huang":"为什么逻辑被称为关于形式和推理的理论，这也清楚了。"},"children":[]}]},{"number":"6.123","texts":{"zh":"很清楚，逻辑规律不能反过来又遵从逻辑规律。 （并不像罗素所认为的，每个“类型”都有一个特殊的矛盾律；一个规律就够了，因为它不应用于自身。）","en":"This is clear: logical laws must not themselves in turn be subject to logical laws. (There is not, as Russell supposed, a distinct law of contradiction for each ‘type’, but one is enough, since it is not applied to itself.)","de":"Es ist klar: Die logischen Gesetze dürfen nicht selbst wieder logischen Gesetzen unterstehen. (Es gibt nicht, wie Russell meinte, für jede „Type“ ein eigenes Gesetz des Widerspruches, sondern Eines genügt, da es auf sich selbst nicht angewendet wird.)","zh_wang":"很明显，逻辑规律本身不能反过来又遵守逻辑规律。 （没有像罗素假设的每一种“类型”都有特殊的矛盾律，一个规律就足够了，因为这个规律不是应用在自己身上的。）","zh_huang":"显然，逻辑律本身不可能也服从于逻辑律。 （并不是像罗素所想的那样，每个“类型”都会有一种特殊的矛盾律。一个矛盾律就够了，因为它不会运用于它自身。）"},"children":[{"number":"6.1231","texts":{"zh":"逻辑命题的特征不 是普遍有效性。普遍不过意味着偶然地适合于一切事物。非概括命题和概括命题一样，也可以是重言式的。","en":"The mark of a logical proposition is not its general validity.For to be general is only to be accidentally valid for all things. For an ungeneralized proposition can be tautological just as well as a generalized one.","de":"Das Anzeichen des logischen Satzes ist nicht die Allgemeingültigkeit. Allgemein sein, heisst ja nur: Zufälligerweise für alle Dinge gelten. Ein unverallgemeinerter Satz kann ja ebensowohl tautologisch sein, als ein verallgemeinerter.","zh_wang":"逻辑命题的特征不是它们的一般有效性。 一般对所有事物来说只是偶然有效。一个非一般化的命题跟一个一般化的命题一样都可能是重言式。","zh_huang":"逻辑命题的标志不是普遍性。 普遍性仅仅意味着偶然地对所有东西都有效。非概括句与概括句一样可以是重言式。"},"children":[]},{"number":"6.1232","texts":{"zh":"逻辑的普遍有效性同“凡人皆有死”这类命题的偶然的普遍有效性相对比，可以称为本质的普遍有效性。如罗素的“可归约性公理”这类命题不是逻辑命题，这就说明了我们的这种感觉：即使这些命题为真，也只能是一件碰巧的偶然事情。","en":"Logical generality could be called essential, as opposed to that accidental generality of, say, the proposition ‘All humans are mortal’. Propositions such as Russell’s ‘axiom of reducibility’ are not logical propositions, and this explains our feeling that, if true, they could only be true by happy accident.","de":"Die logische Allgemeingültigkeit könnte man wesentlich nennen, im Gegensatz zu jener zufälligen, etwa des Satzes „alle Menschen sind sterblich“. Sätze, wie Russells „Axiom of reducibility“ sind nicht logische Sätze, und dies erklärt unser Gefühl: Dass sie, wenn wahr, so doch nur durch einen günstigen Zufall wahr sein könnten.","zh_wang":"逻辑的一般有效性，我们可以称为本质的一般有效性，这跟偶然的一般有效性，例如命题“人必有一死”是相对立的。类似罗素的”可归约性公理“的命题不是逻辑命题，这就解释了我们的一个感觉：即使这些命题是真的，也只能发生在很幸运的情况下。","zh_huang":"逻辑的普遍有效性可以被称为本质性的普遍有效性，以区别于像“所有人都是有死的”这类句子的偶然的普遍有效性。罗素的“可还原公理”之类的句子不是逻辑命题，这就解释了为什么我们会觉得，即使这类句子是真的，那也只是偶然和运气。"},"children":[]},{"number":"6.1233","texts":{"zh":"可能设想一个世界，其中可归约性公理是无效的。因此很清楚，我们的世界实际上是否也像这样的，这个问题同逻辑毫无关系。","en":"A world can be imagined in which the axiom of reducibility is not valid. It is clear, however, that logic has nothing to do with the question whether our world is actually like this or not.","de":"Es lässt sich eine Welt denken, in der das Axiom of reducibility nicht gilt. Es ist aber klar, dass die Logik nichts mit der Frage zu schaffen hat, ob unsere Welt wirklich so ist oder nicht.","zh_wang":"我们可以想象有一个可归约性公理无效的世界。但很明显的是：逻辑与“我们的世界是否真是如此”这个问题，是没有任何关系的。","zh_huang":"可以设想可还原公理在一个世界中无效。然而，逻辑与世界实际上是这样的还是那样的显然没有任何关系。"},"children":[]}]},{"number":"6.124","texts":{"zh":"逻辑命题描述世界的脚手架。或者不如说，它们展示世界的脚手架。它们不“论及”什么。它们假定名称具有指谓。基本命题具有意义，这就是它们同世界的联系。显然，符号——它们本质上具有确定的特性——的一定结合是重言式，这种情况必定指示着关于世界的某种东西。这是关键所在。我们说过，在我们使用的符号中，有些东西是随意的，有些东西则不是随意的。逻辑中只表达后者，这就意味着，逻辑领域不是我们 借助记号来自由表达的地方，而是绝对必要的记号自身表现其本性的地方。如果我们知道任何一种记号语言的逻辑句法，那么也就有了所有的逻辑命题。","en":"Logical propositions describe the scaffolding of the world, or rather, they represent it. They ‘concern’ nothing. They presuppose that names have meaning and elementary propositions have sense: and this is their connection with the world. It is clear that it must show something about the world that certain combinations of symbols—which essentially have a particular character—are tautologies. This is the key point. We say that something is arbitrary in the symbols we use, something is not. In logic only the latter expresses: but this is to say that, in logic, it is not we who express what we want by means of signs, but rather that, in logic, the nature of the absolutely necessary signs itself speaks: if we know the logical syntax of any sign-language, then all propositions of logic are already given.","de":"Die logischen Sätze beschreiben das Gerüst der Welt, oder vielmehr, sie stellen es dar. Sie „handeln“ von nichts. Sie setzen voraus, dass Namen Bedeutung, und Elementarsätze Sinn haben: Und dies ist ihre Verbindung mit der Welt. Es ist klar, dass es etwas über die Welt anzeigen muss, dass gewisse Verbindungen von Symbolen – welche wesentlich einen bestimmten Charakter haben – Tautologien sind. Hierin liegt das Entscheidende. Wir sagten, manches an den Symbolen, die wir gebrauchen, wäre willkürlich, manches nicht. In der Logik drückt nur dieses aus: Dass heisst aber, in der Logik drücken nicht wir mit Hilfe der Zeichen aus, was wir wollen, sondern in der Logik sagt die Natur der naturnotwendigen Zeichen selbst aus: Wenn wir die logische Syntax irgend einer Zeichensprache kennen, dann sind bereits alle Sätze der Logik gegeben.","zh_wang":"逻辑命题描述世界的框架，或更确切地说，是展现世界的框架。这些命题没有“涉及”任何问题。它们先假定名字是有指谓的，基本命题是有意义的。这就是它们跟世界的联系。很明显，符号——本质上具有一个特定的性质——的某些结合是重言式，这必定于世界有所显示。这一点具有决定性的意义。我们说过，在我们使用的标记里有些是随意的，有些则不是。在逻辑中只有后者才得以表达，而这就意味着，逻辑领域中并非我们借助标记来表达我们所要的东西，而是绝对需要的标记的本性自身在发言。如果我们知道任何一种记号语言的逻辑句法，那么逻辑的一切命题就都有了。","zh_huang":"逻辑命题描述了世界的脚手架，或者说是展现了它。这些命题不“处理”任何东西。它们预设名称有指称，基本命题有含义，这就构成它们与世界的联系。显然，作为本质上就具备了某些特性的东西，符号通过特定连接构成重言式，这件事必定对世界有所揭示。决定性的一点就在于此。我们已经说过，我们使用的符号中有些东西是任意的，有些东西不是。在逻辑中只有后面那种东西得到表达，而这意味着，在逻辑的领域中，不是我们借助记号来表达想表达的东西，而是记号的具有本质必然性的本性自己在表达自己。只要知道任何一种记号语言的逻辑句法，那么所有的逻辑命题也就已经给定了。"},"children":[]},{"number":"6.125","texts":{"zh":"即使按照旧逻辑的观点，事先描述所有的“真”逻辑命题，也是可能的。","en":"It is possible, and even according to the old conception of logic, to give from the outset a description of all ‘true’ logical propositions.","de":"Es ist möglich, und zwar auch nach der alten Auffassung der Logik, von vornherein eine Beschreibung aller „wahren“ logischen Sätze zu geben.","zh_wang":"即使按照旧逻辑的观念，在一开始就给出关于所有“真”的逻辑命题的表述，也是可能的。","zh_huang":"即使是按照以前对于逻辑的理解，事先就描述所有“真的”逻辑命题，这也是可能的。"},"children":[{"number":"6.1251","texts":{"zh":"因而在逻辑中绝不 可能有出乎意料的东西。","en":"That is why there can never be surprises in logic.","de":"Darum kann es in der Logik auch nie Überraschungen geben.","zh_wang":"因此在逻辑中从来没有令人惊奇的东西。","zh_huang":"因此，逻辑中从来不会有意外的东西。"},"children":[]}]},{"number":"6.126","texts":{"zh":"通过对符号 的逻辑属性的演算，可以演算一个命题是否属于逻辑命题。 当我们“证明”一个逻辑命题时，就是这样做的。因为无须关心意义和指谓，我们只是应用处理记号的规则 来从其它命题构造逻辑命题。 逻辑命题的证明过程如下：我们连续应用总是由初始的重言式重又生成重言式的一定运算来从别的逻辑命题产生出待证明的逻辑命题。（而且，事实上从一个重言式只能得出 重言式来。） 当然，这种指明逻辑命题是重言式的方法，对于逻辑是完全不重要的，因为作为证明的出发点的那些命题，必定无须任何证明就表明自己是重言式。","en":"Whether a proposition belongs to logic can be worked out by working out the logical properties of the symbol. And we do this when we ‘prove’ a logical proposition. For, without concern for sense or meaning, we form the logical proposition from others according to mere sign-rules. The proof of logical propositions consists in our producing them from other propositions by successive application of certain operations that always generate further tautologies from the first ones. (And indeed, only tautologies follow from a tautology.) Of course, this way of showing that its propositions are tautologies is by no means essential to logic. Simply because the propositions from which the proof proceeds must themselves show without proof that they are tautologies.","de":"Ob ein Satz der Logik angehört, kann man berechnen, indem man die logischen Eigenschaften des Symbols berechnet. Und dies tun wir, wenn wir einen logischen Satz „beweisen“. Denn, ohne uns um einen Sinn und eine Bedeutung zu kümmern, bilden wir den logischen Satz aus anderen nach blossen Zeichenregeln. Der Beweis der logischen Sätze besteht darin, dass wir sie aus anderen logischen Sätzen durch successive Anwendung gewisser Operationen entstehen lassen, die aus den ersten immer wieder Tautologien erzeugen. (Und zwar folgen aus einer Tautologie nur Tautologien.) Natürlich ist diese Art zu zeigen, dass ihre Sätze Tautologien sind, der Logik durchaus unwesentlich. Schon darum, weil die Sätze, von welchen der Beweis ausgeht, ja ohne Beweis zeigen müssen, dass sie Tautologien sind.","zh_wang":"一个命题是否属于逻辑范畴，可以通过对符号的逻辑属性的演算来算出。 当我们“证明”一个逻辑命题的时候，我们就是这样做的。因为我们不必受意义和指谓的困扰，我们只靠符号规则就能从其他命题里构成逻辑命题。 我们通过从其他逻辑命题里创造命题的方式来证明一个逻辑命题。这个创造法是连续使用特定的运算，这种运算再次从第一个重言式中生成新的重言式。（从一个重言式里产生出来的只能是重言式。） 很自然的，表明其命题是重言式的这个方法，对逻辑来说并不重要。因为开始产生证明的命题，必须在没有证明的条件下表明它们是重言式。","zh_huang":"通过对符号的逻辑性质进行运算，可以确定一个句子是否属于逻辑范畴。 在“证明”逻辑命题时我们做的就是这件事。不用劳烦考虑含义或指称，只需要借助记号规则，我们就可以从其他句子构造出逻辑命题来。 证明一个逻辑命题，其实就是通过迭代运用某些操作，来从其他重言式产生要证明的命题。而这些操作如果从重言式开始，就总是产生重言式。（实际上，从重言式推出的只能是重言式） 这种显示逻辑命题是重言式的方法，对逻辑来说当然不是本质性的了。这只是因为，作为开端的那些重言式不经过证明肯定就能表明是重言式。"},"children":[{"number":"6.1261","texts":{"zh":"在逻辑中，中间过程和结果的地位是等同的。（因此没有出乎意料的东西。）","en":"In logic process and result are equivalent. (That is why no surprise.)","de":"In der Logik sind Prozess und Resultat äquivalent. (Darum keine Überraschung.)","zh_wang":"在逻辑中，过程和结果是相等的。（因此没有值得惊奇的事情。）","zh_huang":"在逻辑中，过程与结果是等价的。（因此不会有意外）"},"children":[]},{"number":"6.1262","texts":{"zh":"逻辑中的证明只是一种使得在复杂的情况下易于辨识重言式的机械的便利方法。","en":"Proof in logic is only a mechanical aid for easier recognition of a tautology, where it is complicated.","de":"Der Beweis in der Logik ist nur ein mechanisches Hilfsmittel zum leichteren Erkennen der Tautologie, wo sie kompliziert ist.","zh_wang":"在逻辑中，证明只是在复杂的情况下，便于认识重言式的一个机械的手段。","zh_huang":"逻辑证明只是在情况复杂时用于识别重言式的机械手段。"},"children":[]},{"number":"6.1263","texts":{"zh":"如果一个有意义的命题可以逻辑地 证明是从一些别的命题得来，一个逻辑命题也是如此 的话，那就的确太奇怪了。一开始就很清楚，一个有意义的命题的证明和逻辑中 的证明必然是根本不同的两回事情。","en":"For it would be quite remarkable if one could prove a senseful proposition logically from others, and a logical proposition as well. It is clear from the outset that logical proof of a senseful proposition and proof in logic must be two quite different things.","de":"Es wäre ja auch zu merkwürdig, wenn man einen sinnvollen Satz logisch aus anderen beweisen könnte, und einen logischen Satz auch. Es ist von vornherein klar, dass der logische Beweis eines sinnvollen Satzes und der Beweis in der Logik zwei ganz verschiedene Dinge sein müssen.","zh_wang":"如果一个有意义的命题能以逻辑方法由别的命题证明出来，而一个逻辑命题也是如此的话，那就的确是太奇怪了。从一开始就很清楚的是：一个有意义命题的逻辑证明和在逻辑中的证明是完全不同的两回事。","zh_huang":"如果利用逻辑的手段不仅能够从有意义的句子证明有意义的句子，而且也能够证明逻辑命题，那就太奇怪了。从一开始就很清楚，对有意义句子的逻辑证明，和在逻辑中证明一个句子，肯定完全是两回事。"},"children":[]},{"number":"6.1264","texts":{"zh":"有意义的命题陈述某件事情，它的证明表明确是如此。 在逻辑中每个命题都是一种证明的形式。 每个逻辑命题都是一个用记号表示的modus ponens。（而modus ponens不能用一个命题来表达。）","en":"A senseful proposition states something, and its proof shows that this is so; in logic every proposition is the form of a proof.Every proposition of logic is a modus ponens represented in signs. (And one cannot express the modus ponens by a proposition.)","de":"Der sinnvolle Satz sagt etwas aus, und sein Beweis zeigt, dass es so ist; in der Logik ist jeder Satz die Form eines Beweises. Jeder Satz der Logik ist ein in Zeichen dargestellter modus ponens. (Und den modus ponens kann man nicht durch einen Satz ausdrücken.)","zh_wang":"有意义的命题陈述一些事情，并且它的证明表明确实如此；在逻辑上每一个命题都是一个证明的形式。 每一个逻辑命题都是一个用标记表现的假言推理的肯定式。（并且，假言推理的肯定式不能用一个命题的形式来表现。）","zh_huang":"有意义的句子陈述某件事，而对句子的证明则表明，事实就是如此。但是，在逻辑中任何句子都是一种证明的形式。 所有逻辑命题都是以记号形式出现的肯定前件推理。（不能用句子来表达肯定前件推理）"},"children":[]},{"number":"6.1265","texts":{"zh":"对逻辑始终可以这样来理解：每个逻辑命题都是它自身的证明。","en":"One can always construe logic so that every proposition is its own proof.","de":"Immer kann man die Logik so auffassen, dass jeder Satz sein eigener Beweis ist.","zh_wang":"逻辑永远可以这样理解：每一个命题都是它自身的证明。","zh_huang":"总是可以把逻辑理解成，所有句子都是自己的证明。"},"children":[]}]},{"number":"6.127","texts":{"zh":"所有逻辑命题都是同等地位的：其中并没有本质上为初始命题和本质上为派生命题之分。 每个重言式本身表明它是一个重言式。","en":"All propositions of logic have equal status, without essential division into basic laws and derived propositions. Every tautology itself shows that it is a tautology.","de":"Alle Sätze der Logik sind gleichberechtigt, es gibt unter ihnen nicht wesentlich Grundgesetze und abgeleitete Sätze. Jede Tautologie zeigt selbst, dass sie eine Tautologie ist.","zh_wang":"一切逻辑的命题都有平等的地位；其中并没有本质上是初始命题和本质上是派生命题的区分。 每一个重言式自身就显示自己是重言式。","zh_huang":"所有逻辑命题都地位平等，没有哪个本身就是初始命题，而其他则属派生。 所有重言式自己就表明自己是重言式。"},"children":[{"number":"6.1271","texts":{"zh":"很清楚，“逻辑的初始命题”的数目是任意的，因为可以从单独一个初始命题，例如，从弗雷格的那些初始命题简单地构成的一个逻辑积，推演出逻辑来。（弗雷格也许会说，这样我们就不再有一个直接自明的初始命题了。但是一位像弗雷格这样的严谨的思想家竟会援引自明的程度作为逻辑命题的标准，那是很奇怪的。）","en":"It is clear that the number of ‘logically basic laws’ is arbitrary, since one could derive logic from one basic law by simply forming the logical product, for example, of Frege’s basic laws. (Frege would perhaps say that this basic law would no longer be immediately self-evident. But it is remarkable that so exact a thinker as Frege appealed to the degree of self-evidence as criterion for a logical proposition.)","de":"Es ist klar, dass die Anzahl der „logischen Grundgesetze“ willkürlich ist, denn man könnte die Logik ja aus Einem Grundgesetz ableiten, indem man einfach z. B. aus Freges Grundgesetzen das logische Produkt bildet. (Frege würde vielleicht sagen, dass dieses Grundgesetz nun nicht mehr unmittelbar einleuchte. Aber es ist merkwürdig, dass ein so exakter Denker wie Frege sich auf den Grad des Einleuchtens als Kriterium des logischen Satzes berufen hat.)","zh_wang":"很明显，“逻辑的初始命题”的数目是任意的，因为我们通过简单的构造方式就可以从一个初始命题推出逻辑，例如弗雷格的初始命题的逻辑积。（弗雷格可能会说：这个命题不再是直接自明的了。但奇怪的是，作为弗雷格这么严谨的思想家竟求助于自明程度，把它作为一个逻辑命题的评价标准。）","zh_huang":"显然，“初始逻辑命题”的数目是任意的，因为可以从单个初始命题导出逻辑，这个初始命题就是弗雷格的初始命题构成的合取。（弗雷格可能会说，这样就不会有直接自明的初始命题了。然而，像弗雷格那样严格的思想家还在用自明性的程度来充当逻辑命题的标准，那可是一件怪事。）"},"children":[]}]}]},{"number":"6.13","texts":{"zh":"逻辑不是一种学说，而是世界的一个映象。 逻辑是先验的。","en":"Logic is not a set of teachings but a mirror image of the world. Logic is transcendental.","de":"Die Logik ist keine Lehre, sondern ein Spiegelbild der Welt. Die Logik ist transcendental.","zh_wang":"逻辑不是一个理论，而是对世界的一个映像。 逻辑是先验的。","zh_huang":"逻辑不是理论，而是世界的镜像。 逻辑是超验的（transzendental）"},"children":[]}]},{"number":"6.2","texts":{"zh":"数学是一种逻辑方法。 数学命题是等式，因此都是伪命题。","en":"Mathematics is a logical method. The propositions of mathematics are equations, that is, pseudo-propositions.","de":"Die Mathematik ist eine logische Methode. Die Sätze der Mathematik sind Gleichungen also Scheinsätze.","zh_wang":"数学是一种逻辑方法。 数学的命题是等式，因此是伪命题。","zh_huang":"数学是一种逻辑方法。 数学命题是等式，因此只是伪命题。"},"children":[{"number":"6.21","texts":{"zh":"数学命题不表达思想。","en":"A proposition of mathematics does not express a thought.","de":"Der Satz der Mathematik drückt keinen Gedanken aus.","zh_wang":"数学命题不表达思想。","zh_huang":"数学命题并不表达思想。"},"children":[{"number":"6.211","texts":{"zh":"在现实生活中我们要得到的并非数学命题；或者说，我们应用数学命题只是 为了从一些不属于数学的命题推论出另一些同样也不属于数学的命题。 （“我们使用这个词或者这个命题究竟为了什么？”这个问题在哲学中往往导致有价值的领悟。）","en":"In life it is never mathematical propositions that we need; rather, we use mathematical propositions only to infer, from propositions that do not belong to mathematics, other propositions that likewise do not belong to mathematics. (In philosophy the question ‘For what do we really use this word, this proposition?’ leads time and again to valuable insights.)","de":"Im Leben ist es ja nie der mathematische Satz, den wir brauchen, sondern wir benützen den mathematischen Satz nur, um aus Sätzen, welche nicht der Mathematik angehören, auf andere zu schliessen, welche gleichfalls nicht der Mathematik angehören. (In der Philosophie führt die Frage „wozu gebrauchen wir eigentlich jenes Wort, jenen Satz“ immer wieder zu wertvollen Einsichten.)","zh_wang":"在生活中，我们需要的从来不是一个数学命题，但我们使用数学命题只是为了从那些不属于数学的命题里推理出其他同样不属于数学的命题。 （在哲学里，“我们究竟为什么用那个词语和那个命题”这个问题总是不断产生有价值的见解。）","zh_huang":"生活中数学命题从来不是我们所需要的东西。只是在从不属于数学的句子到同样不属于数学的句子的推理中，我们才用到数学命题。 （在哲学中问，“实际上我们出于什么目的要用这个词或这个句子”？这总是会通向有价值的见解。）"},"children":[]}]},{"number":"6.22","texts":{"zh":"逻辑命题在重言式中显示的世界的逻辑，数学在等式中显示出来。","en":"The logic of the world, which the propositions of logic show in tautologies, mathematics shows in equations.","de":"Die Logik der Welt, die die Sätze der Logik in den Tautologien zeigen, zeigt die Mathematik in den Gleichungen.","zh_wang":"逻辑命题在重言式里显示世界的逻辑，数学则在等式中显示。","zh_huang":"世界的逻辑，这在逻辑命题中通过重言式表现，在数学中则是通过等式表现的。"},"children":[]},{"number":"6.23","texts":{"zh":"如果两个表达式用等号连接起来，这就意味着它们可以彼此代换。但是事实是否如此，两个表达式本身必可显示出来。 两个表达式可以彼此代换，这表明它们的逻辑形式的特征。","en":"If two expressions are connected by the equality sign, then that means that they are substitutable by one another. Whether this is the case, however, must show itself in the two expressions themselves. The logical form of two expressions is characterized by their being substitutable by one another.","de":"Wenn zwei Ausdrücke durch das Gleichheitszeichen verbunden werden, so heisst das, sie sind durch einander ersetzbar. Ob dies aber der Fall ist muss sich an den beiden Ausdrücken selbst zeigen. Es charakterisiert die logische Form zweier Ausdrücke, dass sie durch einander ersetzbar sind.","zh_wang":"如果两个表达式通过标记连接起来，这就意味着两者可以相互代替。但这是否是实际情况，还要通过两个表达式自身来表明。 两个表达式可以相互替换，这是它们的逻辑形式特征。","zh_huang":"两个表达式由等号连接，这表示它们可以彼此替换。但是否真能替换，则一定要由两个表达式本身表现出来。 如果两个表达式可以互相替换，这样连接就刻画了它们的逻辑形式。"},"children":[{"number":"6.231","texts":{"zh":"肯定可以看作双重否定，这是肯定的一个性质。 “1＋1＋1＋1”可以看作“（1＋1）＋（1＋1）”，这是“1＋1＋1＋1”的一个性质。","en":"It is a property of affirmation that it can be construed as double negation. It is a property of ‘1 + 1 + 1 + 1’ that it can be construed as ‘(1 + 1) + (1 + 1)’.","de":"Es ist eine Eigenschaft der Bejahung, dass man sie als doppelte Verneinung auffassen kann. Es ist eine Eigenschaft von „1 + 1 + 1 + 1“, dass man es als „(1 + 1) + (1 + 1)“ auffassen kann.","zh_wang":"肯定可以看作是双重否定，这是肯定的一种性质。 “1+1+1+1”的一个性质是可以看作是“（1+1）+（1+1）”","zh_huang":"能够解释成双重否定，这是肯定的一个性质。 能够解释成“(1+1)+(1+1)”，是“1+1+1+1”的一个性质。"},"children":[]},{"number":"6.232","texts":{"zh":"弗雷格说，上述两个表达式有相同的指谓，但是有不同的意义。 但是对于等式来说，具有根本意义的一点是：为了显示用等号连接的两个表达式有相同的指谓，等式并非必要，因为这一点从两个表达式本身即可以看出来。","en":"Frege says that the two expressions have the same meaning but different sense. What is essential about an equation, however, is that it is not necessary to show that the two expressions that are combined by the equality sign have the same meaning, since this makes itself manifest in the two expressions themselves.","de":"Frege sagt, die beiden Ausdrücke haben dieselbe Bedeutung, aber verschiedenen Sinn. Das Wesentliche an der Gleichung ist aber, dass sie nicht notwendig ist, um zu zeigen, dass die beiden Ausdrücke, die das Gleichheitszeichen verbindet, dieselbe Bedeutung haben, da sich dies aus den beiden Ausdrücken selbst ersehen lässt.","zh_wang":"弗雷格说：这两个表述式有相同的指谓，但有不同的意义。 但是就等式来说，具有根本意义的一点是：为了表明两个通过标记连接起来的表达式具有相同的指谓，等式不是必要的：因为通过两个表达式自身就能看出这一点。","zh_huang":"弗雷格说，这两个表达式指称相同而含义不同。 但关于等式，有本质意义的一点是，为了表明用等号连接的两个表达式有相同的指称，等式本身是不必要的。因为等式是否成立，可以从两个表达式本身中看出来。"},"children":[{"number":"6.2321","texts":{"zh":"而数学命题证明的可能性，不过意味着数学命题的正确性可以直接察知，而无须将它们表达的东西本身同事实比较以确定其正确性。","en":"And, that the propositions of mathematics can be proved means simply that their correctness can be seen without what they express having to be compared with the facts for their correctness to be seen.","de":"Und, dass die Sätze der Mathematik bewiesen werden können, heisst ja nichts anderes, als dass ihre Richtigkeit einzusehen ist, ohne dass das, was sie ausdrücken, selbst mit den Tatsachen auf seine Richtigkeit hin verglichen werden muss.","zh_wang":"数学命题可以得到证明，这只意味着它们的正确性可以直接看出来，而不用将它们所表达的东西跟事实比较以确定其正确性。","zh_huang":"数学命题是可以证明的，这仅仅意味着，不必将其所表达的内容与事实相比较，这些命题的正确与否就能够看出来。"},"children":[]},{"number":"6.2322","texts":{"zh":"两个表达式指谓的同一是不能断言 的。因为，为了能够断言关于它们指谓的任何东西，我就必须知道它们的指谓，而一旦知道了它们的指谓，也就知道了它们所指的是否相同。","en":"The identity of meaning of two expressions cannot be asserted. For to be able to assert anything about their meaning, I must know their meaning: and in knowing their meaning, I know whether they mean the same or something different.","de":"Die Identität der Bedeutung zweier Ausdrücke lässt sich nicht behaupten. Denn um etwas von ihrer Bedeutung behaupten zu können, muss ich ihre Bedeutung kennen: und indem ich ihre Bedeutung kenne, weiss ich, ob sie dasselbe oder verschiedenes bedeuten.","zh_wang":"两个表达式的指谓的同一是不能确认的。因为为了能够确认关于其指谓的任何事情，我必须知道这些表达式的指谓，而如果我知道了这些指谓，我就知道它们的指谓是相同还是不同。","zh_huang":"两个表达式指称相同，这是不能加以断定的。因为，为了能够对其指称有所断定，我必须知道其指称；但我不可能知道其指称，而不知道其指称是否相同。"},"children":[]},{"number":"6.2323","texts":{"zh":"等式不过标志我考察两个表达式的角度，即它们的指谓相等的角度。","en":"An equation only marks the standpoint from which I regard the two expressions, that is, from the standpoint of their sameness of meaning.","de":"Die Gleichung kennzeichnet nur den Standpunkt, von welchem ich die beiden Ausdrücke betrachte, nämlich vom Standpunkte ihrer Bedeutungsgleichheit.","zh_wang":"等式只表示我用以考察两个表达式的观点，也就是说指谓相同的观点。","zh_huang":"等式只是标出了我看待两边表达式的角度，在这个角度上我看出它们的指称相同。"},"children":[]}]},{"number":"6.233","texts":{"zh":"在解决数学问题中是否需要直觉，这个问题应该这样回答：这里语言已经提供了必需的直觉。","en":"The question whether intuition is needed for the solution of mathematical problems must be answered by saying that language itself provides the necessary intuition here.","de":"Die Frage, ob man zur Lösung der mathematischen Probleme die Anschauung brauche, muss dahin beantwortet werden, dass eben die Sprache hier die nötige Anschauung liefert.","zh_wang":"解决数学问题我们是否需要直觉，对这个问题必须回答说：语言本身在这里正好就提供了必要的直觉。","zh_huang":"对于问题“解决数学问题是否需要直觉”，必须回答道，“在这种情况下语言本身会提供必要的直觉”"},"children":[{"number":"6.2331","texts":{"zh":"演算 过程正好引进了这种直觉。 演算并非试验。","en":"The process of calculation conveys precisely this intuition.Calculation is not an experiment.","de":"Der Vorgang des Rechnens vermittelt eben diese Anschauung. Die Rechnung ist kein Experiment.","zh_wang":"演算过程带来的就是这种直觉。 演算不是一种实验。","zh_huang":"计算过程的目的，就是促成这种直觉。 计算不是做实验。"},"children":[]}]},{"number":"6.234","texts":{"zh":"数学是一种逻辑的方法。","en":"Mathematics is a method of logic.","de":"Die Mathematik ist eine Methode der Logik.","zh_wang":"数学是逻辑的一种方法。","zh_huang":"数学是一种逻辑方法。"},"children":[{"number":"6.2341","texts":{"zh":"数学方法的本质特征在于它是用等式来工作的。正是由于这种方法，每个数学命题本身必须足以表明自己的成立。","en":"What is essential in mathematical method is working with equations. For it is on the basis of this method that every proposition of mathematics must be self-explanatory.","de":"Das Wesentliche der mathematischen Methode ist es, mit Gleichungen zu arbeiten. Auf dieser Methode beruht es nämlich, dass jeder Satz der Mathematik sich von selbst verstehen muss.","zh_wang":"数学方法的本质就是使用等式。正是由于这种方法，数学的每一个命题必须是自明的。","zh_huang":"数学方法的本质就在于用等式来工作。因为这种方法就决定了所有数学命题都必须是不言自明的。"},"children":[]}]}]},{"number":"6.24","texts":{"zh":"数学用来得到等式的方法是代换法。 因为等式表达两个表达式的可代换性；我们从一定数目的等式出发，按照等式的条件，通过代换不同的表达式而推进到新的等式。","en":"The method of mathematics by which it arrives at its equations is the method of substitution. For equations express the substitutability of two expressions and we proceed from a number of equations to new equations by substituting expressions by others in accordance with the equations.","de":"Die Methode der Mathematik, zu ihren Gleichungen zu kommen, ist die Substitutionsmethode. Denn die Gleichungen drücken die Ersetzbarkeit zweier Ausdrücke aus und wir schreiten von einer Anzahl von Gleichungen zu neuen Gleichungen vor, indem wir, den Gleichungen entsprechend, Ausdrücke durch andere ersetzen.","zh_wang":"数学用来得到等式的方法是代换法。 因为等式表示两个表达式的可代换性，我们从一定数目的等式出发，按照等式的条件，通过代换不同的表达式而得出新的等式。","zh_huang":"数学中用来获得等式的就是替换方法。 等式表达了两个表达式的可替换性。我们从若干等式出发，依据等式来把一些表达式替换成另一些表达式，从而得到新的等式。"},"children":[{"number":"6.241","texts":{"zh":"因此，命题2×2＝4的证明进行如下： （Ωv）μ ’χ＝Ωv×μ ’χ Def.， Ω2×2， χ＝（Ω2）2 ’χ＝（Ω2）1＋1 ’χ ＝Ω2 ’Ω2 ’＝Ω1＋1 ’Ω1＋1 ’χ＝（Ω’Ω）’（Ω’Ω）’χ ＝Ω’Ω’Ω’Ω’χ＝Ω1＋1＋1＋1 ’χ＝Ω4 ’χ。","en":"Thus the proof of the proposition 2 × 2 = 4 runs:","de":"So lautet der Beweis des Satzes 2 × 2 = 4:","zh_wang":"因此，命题2×2=4的证明过程是： （Ωv ）μ’ x =Ωvμ’ x Def. Ω2×2’ x =（Ω2 ）2’ x =（Ω2 ）1+1’ =Ω2’ Ω2’ x =Ω1+1’ Ω1+1’ x =（Ω’Ω）’（Ω’Ω）’x =Ω’Ω’Ω’x =Ω1+1+1+1’ x =Ω4’ x。","zh_huang":"例如，对命题2×2=4的证明是这样的： (Ων)μ'x=Ων×μ'x Def. Ω2×2'x =(Ω2)2'x=(Ω2)1+1'x =Ω2'Ω2'x=Ω1+1'Ω1+1'x=(Ω'Ω)'(Ω'Ω)'x =Ω'Ω'Ω'Ω'x=Ω1+1+1+1'x=Ω4'x.。"},"children":[]}]}]},{"number":"6.3","texts":{"zh":"逻辑的探究就是对所有符合规律性的东西 的探究。逻辑之外的一切都是偶然的。","en":"The investigation of logic means the investigation of all regularity. And outside logic all is accident.","de":"Die Erforschung der Logik bedeutet die Erforschung aller Gesetzmässigkeit. Und ausserhalb der Logik ist alles Zufall.","zh_wang":"逻辑研究意味着对一切规律性的探讨。在逻辑之外一切都是偶然的。","zh_huang":"逻辑研究的领域涵盖了所有服从定律的东西。逻辑之外的一切都是偶然的。"},"children":[{"number":"6.31","texts":{"zh":"所谓的归纳律不可能是一条逻辑规律，因为它显然是一个有意义的命题。——因此它也不可能是一条先天的规律。","en":"The so-called law of induction cannot possibly be a logical law, since it is obviously a senseful proposition.—And that is why it cannot be an a priori law either.","de":"Das sogenannte Gesetz der Induktion kann jedenfalls kein logisches Gesetz sein, denn es ist offenbar ein sinnvoller Satz. – Und darum kann es auch kein Gesetz a priori sein.","zh_wang":"所谓的归纳律无论如何也不是一个逻辑律，因为很明显它是一个有意义的命题——因此它也不可能是一个先天律。","zh_huang":"所谓的归纳律不可能是逻辑定律，因为表达它的句子显然不是空洞的。——因此它也不可能是先验的定律。"},"children":[]},{"number":"6.32","texts":{"zh":"因果律不是规律而是一种规律的形式。","en":"The law of causality is not a law but the form of a law.","de":"Das Kausalitätsgesetz ist kein Gesetz, sondern die Form eines Gesetzes.","zh_wang":"因果律不是一个规律，而是一个规律的形式。","zh_huang":"因果律不是定律，而是定律的一种形式。"},"children":[{"number":"6.321","texts":{"zh":"“因果律”是一个通名。正如在力学中有一些“极小原理”，如最小作用律，在物理学中也有一些因果律，即具有因果形式的规律。","en":"‘Law of causality’, that is a generic name. And just as, in mechanics, we say that there are minimum-laws, such as that of least action, so in physics there are causal laws, laws of the causal form.","de":"„Kausalitätsgesetz“, das ist ein Gattungsname. Und wie es in der Mechanik, sagen wir, Minimum-Gesetze gibt, – etwa der kleinsten Wirkung – so gibt es in der Physik Kausalitätsgesetze, Gesetze von der Kausalitätsform.","zh_wang":"“因果律”是一个类名。正如在力学中，有些极小律，例如最小作用律一样，在物理学里就有因果律，即具有因果形式的规律。","zh_huang":"“因果律”是一个通名。在力学中有比如像最小作用量定律这样的“极小原则”，同样，在物理学中也有因果律，即一些具有因果形式的定律。"},"children":[{"number":"6.3211","texts":{"zh":"的确，人们在精确地知道怎样表述“最小作用律”以前，就已经猜测到应该有一个 这样的规律。（在这里，像通常那样，一定的先天的东西被证明是某种纯属逻辑的东西。）","en":"It was suspected that there had to be some ‘law of least action’ even before it was known exactly how it went. (Here, as always, what is a priori certain turns out to be something purely logical.)","de":"Man hat ja auch davon eine Ahnung gehabt, dass es ein „Gesetz der kleinsten Wirkung“ geben müsse, ehe man genau wusste, wie es lautete. (Hier, wie immer, stellt sich das a priori Gewisse als etwas rein Logisches heraus.)","zh_wang":"人们在确切知道“最小作用律”这个说法以前，就已经想到一定有这一个规律。（这里就像通常一样，先天确定的东西证实就是一种纯逻辑的东西。）","zh_huang":"甚至在不知道具体内容的情况下，人们其实也预感到，一定会有某种“最小作用量定律”。（在这儿，其实向来如此，先验的确定性被证明是某种纯粹逻辑的确定性）"},"children":[]}]}]},{"number":"6.33","texts":{"zh":"我们并非先天地相信 一种守恒律，而是先天地知道 一种逻辑形式的可能性。","en":"We do not believe a priori in a law of conservation, but we do know a priori the possibility of a logical form.","de":"Wir glauben nicht a priori an ein Erhaltungsgesetz, sondern wir wissen a priori die Möglichkeit einer logischen Form.","zh_wang":"我们并不先天地相信一个守恒定律，但我们先天地就知道一个逻辑形式的可能性。","zh_huang":"我们不是先验地相信守恒律，而是先验地知道一种逻辑形式是可能的。"},"children":[]},{"number":"6.34","texts":{"zh":"如充足理由律、自然界的连续性原理和最小耗损原理等等，所有这些命题都是关于科学命题可能的规范形式的先天领悟。","en":"All propositions such as the principle of sufficient reason, of continuity in nature, of the least effort in nature, etc. etc., are all a priori insights about the possible forms that the propositions of science can take.","de":"Alle jene Sätze, wie der Satz vom Grunde, von der Kontinuität in der Natur, vom kleinsten Aufwande in der Natur etc. etc., alle diese sind Einsichten a priori über die mögliche Formgebung der Sätze der Wissenschaft.","zh_wang":"一切命题，例如因果律、自然界连续律和自然界最小耗损律等，都是对科学命题的可能形式的先天直觉。","zh_huang":"包括充足理由律、自然的连续律以及最省力原则等在内的这些句子，都表达了对于科学命题可以采取何种形式的先验直觉。"},"children":[{"number":"6.341","texts":{"zh":"例如，牛顿力学给世界的描述提供了一种统一的形式。让我们设想一个上面有着一些不规则黑斑的白色表面。于是我们可以说，不管这些斑块构成一种什么图像，只要用一张足够精细的方格网覆盖住这个表面，然后说出每一个方格是黑的还是白的，我就总是能够使对这个表面的描述达到任意程度的近似。用这个办法我就给这个表面的描述提供了一种统一的形式。这种形式是任意选择的，因为我可以用一张三角形格子或者六角形格子的网来达到同样的效果。也许用三角形格子的网会使描述更为简单：也就是说，用较稀的三角形网格也许比用较密的四方形网格能够更精确地描述这个表面（或者相反），如此等等。不同的网相当于不同的描述世界的系统。力学规定了一种描述世界的形式：它指出，所有描述世界的命题都必须以一定的方式从若干给定的命题——力学公理而得到。这样它就提供了建筑科学大厦的砖块，而且指出：不管你想建筑怎样的大厦，你总得必须使用而且只能使用这些砖块。 （正如借助数字系统我们能够写出任何数目一样，借助力学系统我们也应该能够写出任何物理学命题。）","en":"Newtonian mechanics, for example, imposes a unified form on the description of the world. Imagine a white surface on which there are irregular black spots. We now say: whatever picture results from this, I can always get as close as I want to its description by covering the surface by a sufficiently fine square mesh and then saying of each square whether it is white or black. In this way I will have imposed a unified form on the description of the surface. The form is up to me, as I could have used a net with a triangular or hexagonal mesh with the same success. It might be that the description is made simpler by means of a triangular net; that is, it might be that the surface can be described more precisely with a coarser triangular net than with a finer square one (or conversely), and so on. To the different nets correspond different systems for describing the world. Mechanics determines a form of describing the world by saying: all propositions that describe the world must be obtained in a given way from a number of given propositions—the axioms of mechanics. It thereby provides the building blocks for the construction of the scientific edifice and says: whatever edifice you want to erect, you must somehow assemble with these and only these building blocks. (Just as we must be able to write down any number we want, in the number system, so we must be able to write down any proposition of physics we want, in the system of mechanics.)","de":"Die Newtonsche Mechanik z. B. bringt die Weltbeschreibung auf eine einheitliche Form. Denken wir uns eine weisse Fläche, auf der unregelmässige schwarze Flecken wären. Wir sagen nun: Was für ein Bild immer hierdurch entsteht, immer kann ich seiner Beschreibung beliebig nahe kommen, indem ich die Fläche mit einem entsprechend feinen quadratischen Netzwerk bedecke und nun von jedem Quadrat sage, dass es weiss oder schwarz ist. Ich werde auf diese Weise die Beschreibung der Fläche auf eine einheitliche Form gebracht haben. Diese Form ist beliebig, denn ich hätte mit dem gleichen Erfolge ein Netz aus dreieckigen oder sechseckigen Maschen verwenden können. Es kann sein, dass die Beschreibung mit Hilfe eines Dreiecks-Netzes einfacher geworden wäre; das heisst, dass wir die Fläche mit einem gröberen Dreiecks-Netz genauer beschreiben könnten, als mit einem feineren quadratischen (oder umgekehrt) u. s. w. Den verschiedenen Netzen entsprechen verschiedene Systeme der Weltbeschreibung. Die Mechanik bestimmt eine Form der Weltbeschreibung, indem sie sagt: Alle Sätze der Weltbeschreibung müssen aus einer Anzahl gegebener Sätze – den mechanischen Axiomen – auf eine gegebene Art und Weise erhalten werden. Hierdurch liefert sie die Bausteine zum Bau des wissenschaftlichen Gebäudes und sagt: Welches Gebäude immer du aufführen willst, jedes musst du irgendwie mit diesen und nur diesen Bausteinen zusammenbringen. (Wie man mit dem Zahlensystem jede beliebige Anzahl, so muss man mit dem System der Mechanik jeden beliebigen Satz der Physik hinschreiben können.)","zh_wang":"例如牛顿力学为描述宇宙提供了统一的形式。让我们想象一个具有不规则黑色斑点的白色表面。我们现在说：不论它们形成什么样的图像，如果我把足够细密的方格网覆盖在表面上，然后说出每个方格是黑还是白，我就总是能够使对这个表面的描述达到我所要的近似程度。通过这种方式我为这个表面的描述提供了统一的形式。这处形式是任意的，因为我可以用三角形网眼或六角形网眼的网来覆盖而取得同样的效果。情况可能是：使用三角形网眼的网可能更为简单；这就是说，使用三角形或较稀疏的网眼比使用较细密的方格网眼可能把表面描述得更精确些（或者相反），等等。不同的网相当于不同的描述世界的系统。力学决定了一个描述世界的方式，指出：描述世界的所有命题必须以一种已知的命题——力学公理中得出。因此它为建筑科学大厦提供砖块，并且说：不论你要建立什么大厦，你必须按照某种方式使用这些砖块并且只能使用它们去建造。 （正如借助数的系统，人们一定能够写出任意的数字；在力学理论上，也能写出任意的物理学命题。）","zh_huang":"比如，牛顿力学就为我们对世界的描述赋予了统一的形式。设想一个白色表面，上面有不规则的黑色块。不管这些色块形成什么图案，我都可以加以描述，并且要多接近就有多接近。方法是，在表面上覆盖网眼足够细的网，并说明每一个网格是黑的还是白的。这样我就为关于这个表面的描述赋予了一种统一的形式。用三角形网眼的网和用六边形网眼的网，我都可以达到同样的效果，因此形式是可以选择的。用三角形网眼也许让描述更加简单些，也就是说，用网眼更粗的三角形网，可能比用更细的正方形网描述得更加精确些（或者反之）。不同的网对应描述世界的不同系统。力学通过规定，所有用来描述世界的句子都必须按某种方式从一组句子（即力学公理）中得出，由此确定了描述世界的一种形式。这样它就为建造科学大厦提供了砖块，并且说：“你要建造的所有建筑物，不管是什么，都必须想办法用这些砖块来建，并且只能用这些来建。” （用数的系统我们肯定可以写下任何想写的数，同样，用力学系统，我们也一定能够写下任何想写的物理学命题。）"},"children":[]},{"number":"6.342","texts":{"zh":"现在我们可以看出逻辑和力学的相对地位。（这张网也可由不止一种形状的网眼组成：例如，我们可以用三角形和六角形两种网眼。）以一种给定形式的网来描述一个如上所述的图像，这一可能性关于这图像本身并无所 说。（因为这种可能性对于所有这类图像都是有效的。）但是，这图像能够用具有特定 大小网眼的特定的网来完全地 描述，这件事确实 说明了这图像的特征。 同样，世界可以用牛顿力学来描述，这关于世界并无所说；但是恰如实际上所用的描述世界的这种确定方式，却告诉了我们关于世界的某些东西。用一种力学可以比用另一种力学更为简单地描述世界，也告诉了我们关于世界的某些东西。","en":"And now we see the relative position of logic and mechanics. (The net could also consist of different kinds of figures such as of triangles as well as hexagons.) That a picture like that mentioned above can be described by a net of a given form states nothing about the picture. (For this holds of every picture of this kind.) But what does characterize the picture is that it can be completely described by a specific net with a specific fineness of grain. So, too, that it can be described by Newtonian mechanics states nothing about the world; but what does state something is that it can be described in precisely the way that it is actually described in a given case. What also says something about the world is that it can be described more simply by one mechanics than by another.","de":"Und nun sehen wir die gegenseitige Stellung von Logik und Mechanik. (Man könnte das Netz auch aus verschiedenartigen Figuren etwa aus Dreiecken und Sechsecken bestehen lassen.) Dass sich ein Bild, wie das vorhin erwähnte, durch ein Netz von gegebener Form beschreiben lässt, sagt über das Bild nichts aus. (Denn dies gilt für jedes Bild dieser Art.) Das aber charakterisiert das Bild, dass es sich durch ein bestimmtes Netz von bestimmter Feinheit vollständig beschreiben lässt. So auch sagt es nichts über die Welt aus, dass sie sich durch die Newtonsche Mechanik beschreiben lässt; wohl aber, dass sie sich so durch jene beschreiben lässt, wie dies eben der Fall ist. Auch das sagt etwas über die Welt, dass sie sich durch die eine Mechanik einfacher beschreiben lässt, als durch die andere.","zh_wang":"现在我们可以看到逻辑和力学相对的地位。（那张网可以用种种不同的图形来构成，如使用三角形和六角形等。）就像前面所举的例子，一个图像可以通过一定形式的网来描述，但这个可能性对于那个图像并没有说明什么。（因为这对于这一类的每个图形都是有效的。）但是那个图像可以使用一张具有一定细密度的特定的网来进行完全描述：这一点就是那个图像的特性。 所以，世界可以用牛顿力学来描述，这个做法对于世界也没说明什么，但是这却告诉我们可以由此来如实描述世界。用一种力学可以比用另一种力学更为简单地描述世界，这一点对世界也确实有所讲述。","zh_huang":"由此我们可以看到逻辑和力学的相对位置。（我们可以用不止一种形状的网格来做成网，比如同时用三角形和六边形。）像前面提到的，可以用特定形式的网来描述图案，这本身对于图案来说并不说明什么（因为对所有图案来说都是如此）。但是，能够用有特定大小网眼的网完全地描述一个图案，这真的表明了图案的特征。 同样，可以用牛顿力学来描述世界，这对世界来说也并不说明什么；对世界有所说明的，是用这些手段可以这样描述世界。用一个力学系统可以比另一个系统更简单地描述世界，这个事实也表明了世界的某种特征。"},"children":[]},{"number":"6.343","texts":{"zh":"力学是一种按照单一的计划来构造我们描述世界所需的全部真 命题的尝试。","en":"Mechanics is an attempt to construct, following one plan, all the true propositions that we need for describing the world.","de":"Die Mechanik ist ein Versuch, alle wahren Sätze, die wir zur Weltbeschreibung brauchen, nach Einem Plane zu konstruieren.","zh_wang":"力学是一种构造我们依照某个统一计划描述世界所需要的一切真的命题的尝试。","zh_huang":"力学是一种尝试，它希望按照一个单一的计划，来构建描述世界所需要的所有真句子。"},"children":[{"number":"6.3431","texts":{"zh":"物理学定律借助其全部的逻辑机制而间接地说及世界的对象。","en":"Through their whole logical apparatus the laws of physics still speak of the objects of the world.","de":"Durch den ganzen logischen Apparat hindurch sprechen die physikalischen Gesetze doch von den Gegenständen der Welt.","zh_wang":"物理学规律通过自己的全部逻辑手段还是谈到了世界的对象。","zh_huang":"物理定律，透过那一整套的逻辑装置，终究还是谈到了世界中的对象。"},"children":[]},{"number":"6.3432","texts":{"zh":"我们不应忘记，力学对世界的描述都是完全一般的描述。例如，它从不提到特定的 质点：它只是谈论任何一个不论怎样的质点。","en":"We should not forget that the description of the world by mechanics is always quite general. There is never mention, for example, of particular material points, but always only of any such points.","de":"Wir dürfen nicht vergessen, dass die Weltbeschreibung durch die Mechanik immer die ganz allgemeine ist. Es ist in ihr z. B. nie von bestimmten materiellen Punkten die Rede, sondern immer nur von irgend welchen.","zh_wang":"我们一定不要忘记：通过力学对世界进行描述总是很一般的。例如，其中从来不谈某些特定的质点，而总是谈任何一个质点。","zh_huang":"一定不要忘了，力学对世界的描述总是完全一般性的。比如，其中从来不提到特定质点，而只是谈论任意质点。"},"children":[]}]}]},{"number":"6.35","texts":{"zh":"虽然我们上述图像中的斑块是几何图形，但是几何学显然根本不能谈论它的实际形状和位置。而网是纯粹 几何学的，它的全部属性可以先天地给出来。 像充足理由律等等这样的定律，涉及的是网而不是网所描述的东西。","en":"Even though the spots in our picture are geometrical figures, geometry can say nothing at all, of course, about their actual form and position. The net, though, is purely geometrical, and all its properties can be specified a priori. Laws, such as the principle of sufficient reason, etc., are about the net, not what the net describes.","de":"Obwohl die Flecke in unserem Bild geometrische Figuren sind, so kann doch selbstverständlich die Geometrie gar nichts über ihre tatsächliche Form und Lage sagen. Das Netz aber ist rein geometrisch, alle seine Eigenschaften können a priori angegeben werden. Gesetze, wie der Satz vom Grunde, etc., handeln vom Netz, nicht von dem, was das Netz beschreibt.","zh_wang":"虽然我们的上述图像中的斑点是几何图形，但几何学对于其实际的形式和位置，根本说不出什么。但是网是纯粹几何学的，它的全部属性都可以先天地举出。 规律，就像因果律等，涉及的是网而不是网所描述的东西。","zh_huang":"尽管图案上的色块是几何图形，几何显然并不包含关于这些色块实际形状和位置的内容。不过，网格是纯几何的，它的所有性质都可以先验地给出。 像充足理由律之类的定律，关心的是网，而不是网所描述的东西。"},"children":[]},{"number":"6.36","texts":{"zh":"要是有因果律，也就可以说“有自然律”。不过，这当然不可说，而是自己显露出来的。","en":"If there were a law of causality, then it might go like this: ‘There are laws of nature’. But that, of course, cannot be said; it shows itself.","de":"Wenn es ein Kausalitätsgesetz gäbe, so könnte es lauten: „Es gibt Naturgesetze“. Aber freilich kann man das nicht sagen: es zeigt sich.","zh_wang":"如果有一个因果律，它就会说：“存在自然规律。”但很明显这不能说出，而是自己显示出来。","zh_huang":"如果有因果律，那就应该这样表述：“存在自然律”。 然而当然，那是不能说的，它显示自己。"},"children":[{"number":"6.361","texts":{"zh":"可以用赫兹的话来说：只有遵从规律的 联系才是可以思考 的。","en":"In Hertz’s terminology one could say: only regular connections are thinkable.","de":"In der Ausdrucksweise Hertz’s könnte man sagen: Nur gesetzmässige Zusammenhänge sind denkbar.","zh_wang":"借用赫兹的话，我们可以说：只有遵从规律的联系才是可以思考的。","zh_huang":"用赫兹的方式来说就是，只有服从于定律的联系才是可以思考的。"},"children":[{"number":"6.3611","texts":{"zh":"我们不能将一个过程和“时间之流”——不存在这种东西——相比较，而只能将它同另一个过程（如计时器的运行过程）相比较。 因此，我们只有依靠另外一种过程才能描述一段时间的经过。 对于空间也有完全类似的情形。例如，当人们说，两个（相互排斥的）事件中一个也不能发生，因为没有任何东西导致发生 一个事件而不发生另一个事件，这实际上是由于，除非有某种不对称，我们就不能描述这两件事当中的一件。而如果有 这种不对称，我们就可以认为它是一件事发生而另一件事不发生的原因。","en":"We cannot compare any process with the ‘passage of time’—there is no such thing—but only with another process (such as the movement of a chronometer).The description of a sequence in time is thus only possible by relying on another process.Something quite analogous holds for space. When it is said, for example, that neither of two (mutually exclusive) events occur, because there is no cause explaining why the one should occur rather than the other, in reality it has to do with our being unable to describe one of the two events at all unless there is some asymmetry. And if there is such an asymmetry, then we can regard this as the cause for the occurrence of the one and the non-occurrence of the other.","de":"Wir können keinen Vorgang mit dem „Ablauf der Zeit“ vergleichen – diesen gibt es nicht –, sondern nur mit einem anderen Vorgang (etwa mit dem Gang des Chronometers). Daher ist die Beschreibung des zeitlichen Verlaufs nur so möglich, dass wir uns auf einen anderen Vorgang stützen. Ganz Analoges gilt für den Raum. Wo man z. B. sagt, es könne keines von zwei Ereignissen (die sich gegenseitig ausschliessen) eintreten, weil keine Ursache vorhanden sei, warum das eine eher als das andere eintreten solle, da handelt es sich in Wirklichkeit darum, dass man gar nicht eines der beiden Ereignisse beschreiben kann, wenn nicht irgend eine Asymmetrie vorhanden ist. Und wenn eine solche Asymmetrie vorhanden ist, so können wir diese als Ursache des Eintreffens des einen und Nicht-Eintreffens des anderen auffassen.","zh_wang":"我们不能把任何过程跟“时间之流”——没有那样的东西——来进行比较，而只能将它跟其他过程（如精密记时计的运动）进行比较。 因此，对时间过程的描述，只有依靠别的过程才有可能。 对于空间情况也是一样。例如，说两件（相互排斥的）事情中没有一件能发生，因为没有什么原因使得这件事情发生而那件不发生。这实际上意味着除非有一种不对称情况出现，否则我们不能描述两者中的一个。如果有这种不对称的存在，那么我们就可以把它看作是这件事情发生而那件事情不发生的原因。","zh_huang":"我们不可能把一种过程与“时间的流动”相比较，因为没有这种流动，只能将其与另外一个过程，比如计时器的运转相比较。 因此，只有依靠其他某个过程，我们才能描述时间进程。 类似的情况也出现在空间上。比如，人们说，对两件事（它们彼此排斥）来说，如果没有原因导致其中一个而不是另一个发生，那么两个就都不会发生。问题其实在于，如果没有某种不对称性出现，我们就不能描述两件事中的一件。而如果有这种非对称性，我们就可以将其当作一件事发生而另外那件事不发生的原因。"},"children":[{"number":"6.36111","texts":{"zh":"康德的关于右手和左手不能使之重合的问题，在平面中就已经存在，甚至也存在于一维空间中： …o——×…×——o… a b 如其中两个全等的图形a和b，除非越出这个空间，就不能使之重合。右手和左手事实上是真正地全等的，人们不能使它们重合与这一事实没有关系。 假如能够在四维空间中旋转，右手套就可以戴到左手上面。","en":"The Kantian problem of the right and left hand, which cannot be made to coincide, already exists in the plane, and even in one-dimensional space, where the two congruent figures a and b cannot be made to coincide without being moved out of this space. Right and left hand are in fact completely congruent. And that they cannot be made to coincide has nothing to do with it.A right-hand glove could be put on the left hand, if it could be turned in four-dimensional space.","de":"Das Kant’sche Problem von der rechten und linken Hand, die man nicht zur Deckung bringen kann, besteht schon in der Ebene, ja im eindimensionalen Raum, wo die beiden kongruenten Figuren a und b auch nicht zur Deckung gebracht werden können, ohne aus diesem Raum herausbewegt zu werden. Rechte und linke Hand sind tatsächlich vollkommen kongruent. Und dass man sie nicht zur Deckung bringen kann, hat damit nichts zu tun. Den rechten Handschuh könnte man an die linke Hand ziehen, wenn man ihn im vierdimensionalen Raum umdrehen könnte.","zh_wang":"康德提出的“左右手不能互相遮盖”的问题，已经在平面中甚至一度空间里存在了； 这两个重合的图形a与b，除非越出这个空间，否则就不能重合。左手和右手实际上是完全重合的。它们不能彼此遮盖，与这一点是没有关系的。 一只右手的手套，如果在四维空间里转过来，就可以戴在左手上。","zh_huang":"康德关于左右手不可能重合的问题，也存在于二维的情况。它甚至在一维空间中也存在。下面两个全等的图形a和b，就不可能在不移出这个空间的前提下重合。 左手和右手实际上是全等的，但它们不能重合，这是另一回事。 如果能够在四维空间中翻转一下，右手手套是可以戴到左手上的。"},"children":[]}]}]},{"number":"6.362","texts":{"zh":"凡能描述的就能够发生；而为因果律所排除的东西是不可描述的。","en":"What can be described can happen, too, and what the law of causality is supposed to exclude cannot even be described.","de":"Was sich beschreiben lässt, das kann auch geschehen, und was das Kausalitätsgesetz ausschliessen soll, das lässt sich auch nicht beschreiben.","zh_wang":"凡能描述的东西，也就能发生，凡是因果律排除的东西，也就不能描述。","zh_huang":"能够描述的就能够发生，而因果律所排除的东西是不能够描述的。"},"children":[]},{"number":"6.363","texts":{"zh":"归纳程序的实质在于，我们承认能够同我们的经验协调的最简单的 规律为真。","en":"The process of induction consists in adopting the simplest law with which to bring our experiences into accord.","de":"Der Vorgang der Induktion besteht darin, dass wir das einfachste Gesetz annehmen, das mit unseren Erfahrungen in Einklang zu bringen ist.","zh_wang":"归纳的过程在于我们采取可以跟我们的经验相互协调的最简单的规律。","zh_huang":"使用归纳就相当于接受能够与我们的经验相协调的最简单的定律。"},"children":[{"number":"6.3631","texts":{"zh":"但是这种程序只有心理的依据而没有逻辑的依据。 很清楚，相信实际上只会发生最简单的可能事件是没有根据的。","en":"This process, however, has no logical but only a psychological grounding.It is clear that there is no ground for believing that the simplest case would actually even occur.","de":"Dieser Vorgang hat aber keine logische, sondern nur eine psychologische Begründung. Es ist klar, dass kein Grund vorhanden ist, zu glauben, es werde nun auch wirklich der einfachste Fall eintreten.","zh_wang":"但是这个过程没有逻辑基础，只有心理基础。 很清楚，没有理由相信实际上要发生的也就是最简单的事件。","zh_huang":"但归纳法没有逻辑依据，只有心理学上的依据。 显然，没有理由让我们相信最简单的事件进程真的会实现。"},"children":[{"number":"6.36311","texts":{"zh":"太阳会在明天出来是一个假设：这意味着我们不知道 它是否会出来。","en":"That the sun will rise tomorrow is a hypothesis; and that is to say: we do not know whether it will rise.","de":"Dass die Sonne morgen aufgehen wird, ist eine Hypothese; und das heisst: wir wissen nicht, ob sie aufgehen wird.","zh_wang":"太阳明天会升起，这是一个假设，那就意味着：我们不知道太阳是否将要升起。","zh_huang":"太阳明天会升起，这是一个假定。这就是说，我们并不知道它会升起。"},"children":[]}]}]}]},{"number":"6.37","texts":{"zh":"由于另外某个事件的发生，一个事件就必定发生，这种强制性是没有的。只有一种逻辑的 必然性。","en":"There is no compulsion for one thing to happen because something else has happened. There is only logical necessity.","de":"Einen Zwang, nach dem Eines geschehen müsste, weil etwas anderes geschehen ist, gibt es nicht. Es gibt nur eine logische Notwendigkeit.","zh_wang":"因为别的事件发生了，另一件事情就必定发生，这种必然性是不存在的。只有逻辑的必然性。","zh_huang":"因为一件事发生另一件事也要发生，这种必然性是不存在的。只存在逻辑的必然性。"},"children":[{"number":"6.371","texts":{"zh":"整个现代的世界观都建立在一种幻觉的基础上，即认为所谓的自然律是自然现象的解释。","en":"Underlying the entire modern worldview is the illusion that the so-called laws of nature are explanations of natural phenomena.","de":"Der ganzen modernen Weltanschauung liegt die Täuschung zugrunde, dass die sogenannten Naturgesetze die Erklärungen der Naturerscheinungen seien.","zh_wang":"整个现代的世界观都是建立在一种幻觉基础之上的，即认为所谓的自然律是自然现象的解释。","zh_huang":"整个现代世界观都建立在一个幻觉上，以为所谓的自然律是对自然现象的解释。"},"children":[]},{"number":"6.372","texts":{"zh":"所以，当代人们站在自然律面前，就像古代人们站在神和命运面前一样，把它视为某种神圣不可侵犯的东西。 事实上他们两者都是正确的，也都是错误的：虽然古代人们的观点更为清楚一些，因为他们承认有一个明白的界限，而现代的系统则力求显得似乎一切东西 都已经得到解释。","en":"People thus stop at the laws of nature as if they were sacrosanct, like the ancients did at God and Fate. And they are both right—and wrong. The ancients were at least clearer insofar as they recognized a clear endpoint, while the new system tries to make it appear as if everything were explained.","de":"So bleiben sie bei den Naturgesetzen als bei etwas Unantastbarem stehen, wie die Älteren bei Gott und dem Schicksal. Und sie haben ja beide Recht, und Unrecht. Die Alten sind allerdings insofern klarer, als sie einen klaren Abschluss anerkennen, während es bei dem neuen System scheinen soll, als sei alles erklärt.","zh_wang":"所以，人们在自然律面前止步，就像面对不可侵犯的东西，就像古人敬畏上帝和命运。 两者既是正确的，又是不正确的。但古人由于承认有一个明确的终点，而较为明白。而现在的体系则使它显得就像一切都已解释过了似的。","zh_huang":"于是人们止步于自然律面前，以为它们是不可侵犯的东西，就像古代人对待神和命运一样。 他们和古代人其实都对，又都不对。只不过古代人更加明白些，他们承认有一个清楚的终点；而现代的系统则把事情弄得好像一切都得到了解释。"},"children":[]},{"number":"6.373","texts":{"zh":"世界是独立于我的意志的。","en":"The world is independent of my will.","de":"Die Welt ist unabhängig von meinem Willen.","zh_wang":"世界独立于我的意志之外。","zh_huang":"世界独立于我的意志。"},"children":[]},{"number":"6.374","texts":{"zh":"即使我们所希望的一切都会发生，这也只能说是命运的恩赐，因为在意志和世界之间没有保证这一点的逻辑的 联系，而假定的物理的联系又不是我们自己所能意愿的东西。","en":"Even if everything we wish were to happen, this would still only happen, so to speak, by the grace of Fate, for there is no logical connection between will and world that guaranteed this, and the supposed physical connection is not something that we could, in turn, will ourselves.","de":"Auch wenn alles, was wir wünschen, geschähe, so wäre dies doch nur, sozusagen, eine Gnade des Schicksals, denn es ist kein logischer Zusammenhang zwischen Willen und Welt, der dies verbürgte, und den angenommenen physikalischen Zusammenhang könnten wir doch nicht selbst wieder wollen.","zh_wang":"即便我们所希冀的一切事情都将发生，这只能说是命运的恩赐，因为在意志和世界之间，没有逻辑的联系可以保证这一点，而所设想中的物理联系自身又不受人的意愿的去配。","zh_huang":"即使我所希望的所有事情都发生了，这也只能说，比如这是命运的眷顾。因为在意志与世界之间没有一种逻辑的联系能够保证这一点，而一种假想的物理性的联系我却又不能指望。"},"children":[]},{"number":"6.375","texts":{"zh":"正如只有逻辑的 必然性一样，也只有逻辑的 不可能性。","en":"Just as there is only logical necessity, so too there is only logical impossibility.","de":"Wie es nur eine logische Notwendigkeit gibt, so gibt es auch nur eine logische Unmöglichkeit.","zh_wang":"正如只有一种逻辑的必然性，所以就只有一种逻辑的不可能性。","zh_huang":"只有逻辑的必然性，同样，也只有逻辑的不可能性。"},"children":[{"number":"6.3751","texts":{"zh":"例如，在视域的一个位置上同时显现两种颜色是不可能的，而且是逻辑上的不可能，因为它为颜色的逻辑结构所排斥。 让我们设想这种矛盾在物理学中是如何表现的：大体上是这样的——一个质点不可能同时具有两个速度；也就是说，它不可能同时处在两个位置；也就是说，同一时刻处在不同位置的质点不可能是同一的。 （很清楚，两个基本命题的逻辑积可以既不是重言式也不是矛盾。说视野中的一个点同时具有两种不同颜色，这个陈述是一个矛盾。）","en":"For example, for two colours to be in one place in the visual field at the same time is impossible—logically impossible— for it is excluded by the logical structure of colour.Consider how this contradiction manifests itself in physics—roughly like this: that a particle cannot have two velocities at the same time; that is, that it cannot be in two places at the same time; that is, that particles in different places at one time cannot be identical.(It is clear that the logical product of two elementary propositions can be neither a tautology nor a contradiction. The statement that a point in the visual field has two different colours at the same time is a contradiction.)","de":"Dass z. B. zwei Farben zugleich an einem Ort des Gesichtsfeldes sind, ist unmöglich und zwar logisch unmöglich, denn es ist durch die logische Struktur der Farbe ausgeschlossen. Denken wir daran, wie sich dieser Widerspruch in der Physik darstellt: Ungefähr so, dass ein Teilchen nicht zu gleicher Zeit zwei Geschwindigkeiten haben kann; das heisst, dass es nicht zu gleicher Zeit an zwei Orten sein kann; das heisst, dass Teilchen an verschiedenen Orten zu Einer Zeit nicht identisch sein können. (Es ist klar, dass das logische Produkt zweier Elementarsätze weder eine Tautologie noch eine Kontradiktion sein kann. Die Aussage, dass ein Punkt des Gesichtsfeldes zu gleicher Zeit zwei verschiedene Farben hat, ist eine Kontradiktion.)","zh_wang":"例如，在视野的同一个位置上表明两种颜色，这是不可能的，而且是逻辑上不可能的，因为它被颜色的逻辑结构排斥在外。 让我们思考一下，这种矛盾现象在物理学上是怎样出现的。就像下面一样：一个质点不能同时有两个速度；也就是说，它不可能同时处于两个位置；也就是说，同一时刻处在不同位置的质点不可能是同一的。 （显然，两个基本命题的逻辑积，既不是重言式也不是矛盾式。在视野里的一个点具有两种颜色，这个说法是矛盾式。）","zh_huang":"比如，视野中同一个位置同时有两种颜色，这是不可能的，并且是在逻辑上不可能，因为它为颜色的逻辑结构所排除。 想想这种矛盾在物理学中是如何体现出来的。大体是这样的，一个粒子不可能同时有两个速度，也就是说，它不可能同一时刻在不同位置；这意味着，同一时刻在不同位置的不可能是同一个粒子。 （两个基本命题的合取显然既非重言式也非矛盾式。断定视野中的一个点同时有两种不同的颜色，这是一个矛盾。）"},"children":[]}]}]}]},{"number":"6.4","texts":{"zh":"所有命题都是同等价值的。","en":"All propositions are of equal value.","de":"Alle Sätze sind gleichwertig.","zh_wang":"一切命题都有同等的价值。","zh_huang":"所有句子都具有同等价值。"},"children":[{"number":"6.41","texts":{"zh":"世界的意义必定在世界之外。世界中一切事情就如它们之所是而是，如它们之所发生而发生；世界中 不存在价值——如果存在价值，那它也会是无价值的。 如果存在任何有价值的价值，那么它必定处在一切发生的和既存的东西之外。因为一切发生的和既存的东西都是偶然的。 使它们成为非偶然的那种东西，不可能在 世界之中，因为如果在世界之中，它本身就是偶然的了。 它必定在世界之外。","en":"The sense of the world must lie outside it. In the world everything is as it is and happens as it happens; there is no value in it—and if there were, then it would be of no value. If there is a value that is of value, then it must lie outside all happening and being-so. For all happening and being-so is accidental. What makes it non-accidental cannot lie in the world, for otherwise this would again be accidental. It must lie outside the world.","de":"Der Sinn der Welt muss ausserhalb ihrer liegen. In der Welt ist alles wie es ist und geschieht alles wie es geschieht; es gibt in ihr keinen Wert – und wenn es ihn gäbe, so hätte er keinen Wert. Wenn es einen Wert gibt, der Wert hat, so muss er ausserhalb alles Geschehens und So-Seins liegen. Denn alles Geschehen und So-Sein ist zufällig. Was es nicht-zufällig macht, kann nicht in der Welt liegen, denn sonst wäre dies wieder zufällig. Es muss ausserhalb der Welt liegen.","zh_wang":"世界的意义必定在世界之外。在这个世界里，每个事物都以其本来面目出现，都按照实际发生的样子发生。在世界里没有价值——如果有的话，那也会没有价值。 如果有任何有价值的价值，那么它必定处在一切发生的和既存的东西之外。因为一切发生的和既存的东西都是偶然的。 使得这些事物非偶然的东西不能在世界之中，因为否则这些事件又变成偶然的了。 它一定在世界之外。","zh_huang":"世界的意义必定在世界之外。在世界中，一切都那样存在，那样发生。在世界之内没有价值存在——即使有价值存在，它也没有价值。 如果有种价值是有价值的话，它一定在事实和发生的领域之外。因为，所有的事实与发生都是偶然的。 使其成为非偶然的东西不可能在世界之内，因为如果是的话，那又是偶然的了。 它一定在世界之外。"},"children":[]},{"number":"6.42","texts":{"zh":"所以也不可能有伦理命题。 命题不能表达更高的东西。","en":"That is why there cannot be propositions of ethics. Propositions cannot express anything higher.","de":"Darum kann es auch keine Sätze der Ethik geben. Sätze können nichts Höheres ausdrücken.","zh_wang":"因此也不能有伦理的命题。 命题不能表达更高级的东西。","zh_huang":"因此，也不可能有伦理学命题。 句子不可能表达任何更高的东西。"},"children":[{"number":"6.421","texts":{"zh":"很清楚，伦理是不可说的。 伦理是超验的。 （伦理和美学是同一个东西。）","en":"It is clear that ethics cannot be stated. Ethics is transcendental. (Ethics and aesthetics are one.)","de":"Es ist klar, dass sich die Ethik nicht aussprechen lässt. Die Ethik ist transcendental. (Ethik und Aesthetik sind Eins.)","zh_wang":"很明显伦理是不能表达的。 伦理学是超验的。 （伦理学和美学是一回事。）","zh_huang":"显然，伦理学是不可能表达出来的。 伦理学是超验的。 （伦理学和美学是同一回事。）"},"children":[]},{"number":"6.422","texts":{"zh":"当列出一个“你应该……”形式的伦理规范时，人们首先的一个想法就是：如果我不这样做又怎么样呢？可是很清楚，伦理与通常意义下的奖和惩没有什么关系。所以关于行为后果 的问题必定是不重要的。——至少那些后果不是重大事件。但是这问题的提出必有某种正确的东西。确实应该有某种伦理的奖励和伦理的惩罚，但是这些必须就包含在行动本身之中。 （同样也很清楚，奖励应该是某种愉快的东西，而惩罚应该是某种不愉快的东西。）","en":"The first thought in drawing up an ethical law of the form ‘Thou shalt…’ is: and what if I don’t do it? It is clear, though, that ethics has nothing to do with punishment and reward in the ordinary sense. So this question as to the consequences of an action must be irrelevant.—At least, these consequences must not be events. For something must still be right in the posing of this question. That is, there must be a kind of ethical reward and ethical punishment, but these must lie in the action itself. (And it is also clear that the reward must be something pleasant and the punishment something unpleasant.)","de":"Der erste Gedanke bei der Aufstellung eines ethischen Gesetzes von der Form „du sollst....“ ist: Und was dann, wenn ich es nicht tue? Es ist aber klar, dass die Ethik nichts mit Strafe und Lohn im gewöhnlichen Sinne zu tun hat. Also muss diese Frage nach den Folgen einer Handlung belanglos sein. – Zum Mindesten dürfen diese Folgen nicht Ereignisse sein. Denn etwas muss doch an jener Fragestellung richtig sein. Es muss zwar eine Art von ethischem Lohn und ethischer Strafe geben, aber diese müssen in der Handlung selbst liegen. (Und das ist auch klar, dass der Lohn etwas Angenehmes, die Strafe etwas Unangenehmes sein muss.)","zh_wang":"在建立一个“你应该……”的形式的伦理准则时，第一个想法是：如果我不做这个，那又是什么结果？但很明显，伦理与通常意义上的奖罚没有关系。因此“一个行为的后果”这个问题必然是毫不相干的。至少这些后果不是什么大事。因为在问题的表述中一定有一些东西是正确的。一定有某种伦理意义上的奖惩，但这一定存在于行为本身。 （同样清楚的是，奖励一定是某种愉快的东西，惩罚一定是某种不愉快的东西。）","zh_huang":"当“你应当……”这种形式的伦理律制定出来时，人们首先想到的是，“如果我不这样，那又怎样”？但伦理学明显与通常意义上的惩罚和奖励没有关系。因此，关于行为后果的问题肯定是不重要的。至少这种后果不应当是发生的事情，因为我们所提的问题中还是有些对的东西。肯定还是有某种伦理的奖赏和惩罚，只不过应该是在行为本身之中。 （显然，奖励应该是某种合意的东西，而惩罚则是不合意的。）"},"children":[]},{"number":"6.423","texts":{"zh":"作为伦理主体的意志是不可说的。 而作为一种现象的意志只有心理学才感到兴趣。","en":"Of the will as the bearer of the ethical we cannot speak. And only psychology is interested in the will as phenomenon.","de":"Vom Willen als dem Träger des Ethischen kann nicht gesprochen werden. Und der Wille als Phänomen interessiert nur die Psychologie.","zh_wang":"作为伦理主体的意志是不可说的。 作为现象的意志只是心理学感兴趣的。","zh_huang":"作为伦理主体的意志是不能谈论的。 作为现象的意志则只有心理学感兴趣。"},"children":[]}]},{"number":"6.43","texts":{"zh":"如果善的意志或恶的意志可以改变世界，那么它只能改变世界的界限，而不能改变事实，即不能改变可以用语言表达的东西。 简言之，其结果必然是世界整个地变成另外的样子。也就是说，世界必定作为整体而消长。 幸福者的世界不同于不幸者的世界。","en":"If good or bad willing changes the world, then it can only change the limits of the world, not the facts—not that which can be expressed by language. In short, the world must thereby become an altogether different one. It must, so to speak, wax or wane as a whole. The world of the happy is a different one from that of the unhappy.","de":"Wenn das gute oder böse Wollen die Welt ändert, so kann es nur die Grenzen der Welt ändern, nicht die Tatsachen; nicht das, was durch die Sprache ausgedrückt werden kann. Kurz, die Welt muss dann dadurch überhaupt eine andere werden. Sie muss sozusagen als Ganzes abnehmen oder zunehmen. Die Welt de
