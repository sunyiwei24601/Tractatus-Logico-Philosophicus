个记号，而以不同的标示方式来标示两个不同的对象，这样做决不能指示这两者有一个共同的特征。当然，这是因为这记号是未加规定的。因此我们可以选用两个不同的记号，这样，标示者一方还保持有什么共同点呢？","en":"It can never indicate a common mark of two objects that we signify them by the same sign but through two different modes of signification. For the sign, of course, is arbitrary. Two different signs could just as well be chosen, and what would then remain of something common in the signification?","de":"Es kann nie das gemeinsame Merkmal zweier Gegenstände anzeigen, dass wir sie mit demselben Zeichen, aber durch zwei verschiedene Bezeichnungsweisen bezeichnen. Denn das Zeichen ist ja willkürlich. Man könnte also auch zwei verschiedene Zeichen wählen, und wo bliebe dann das Gemeinsame in der Bezeichnung.","zh_wang":"如果我们用同一个标记，但是以不同的标示方式来标示两个对象，这样做绝不能指明两个对象的共同特征。因为，这个标记是任意的。因此，我们应当仔细地选择两种不同的标记，这样一来，标示上的共同点又在哪里呢？","zh_huang":"当用同一个记号表示两个不同对象，如果我们用了两种不同的表示方式，那么这个记号就不能表示两个对象的共同特征。因为，记号当然是任意的。如果我们选择的是两个不同的记号，那么在我们的表示中还有什么共同的东西可言呢？"},"children":[]},{"number":"3.323","texts":{"zh":"在日常语言中经常碰到同一个词有着不同的标示方式——因而属于不同的符号——，或者有着不同标示方式的两个词以表面上相似的方式应用于命题之中。 就如“是”（ist）这个词既作为系词，也作为相等的记号和存在的表达式 出现；“存在”（existieren）作为像“去”（gehen）一样的不及物动词出现；“同一的”（identisch）作为一个形容词出现；我们说到某事，同时也意味着说到某事 的发生。 （在命题“Grün ist grün” 中，第一个词“Grün”是一个人的专名，最后一个词“grün”是一个形容词，这两个词不仅具有不同的指谓，而且它们是不同的符号。）","en":"In everyday language it occurs extremely often that the same word signifies in different ways—that is, belongs to different symbols—or that two words, which signify in different ways, are applied in a proposition in ostensibly the same way. Thus the word ‘is’ appears as a copula, as an identity sign, and as an expression of existence; ‘exist’ as an intransitive verb like ‘go’; ‘identical’ as an adjective; we talk of something, but also say that something happens. (In the proposition ‘Green is green’—where the first word is a person’s name, the last an adjective—these words do not simply have different meaning but involve different symbols.)","de":"In der Umgangssprache kommt es ungemein häufig vor, dass dasselbe Wort auf verschiedene Art und Weise bezeichnet – also verschiedenen Symbolen angehört –, oder, dass zwei Wörter, die auf verschiedene Art und Weise bezeichnen, äusserlich in der gleichen Weise im Satze angewandt werden. So erscheint das Wort „ist“ als Kopula, als Gleichheitszeichen und als Ausdruck der Existenz; „existieren“ als intransitives Zeitwort wie „gehen“; „identisch“ als Eigenschaftswort; wir reden von Etwas, aber auch davon, dass etwas geschieht. (Im Satze „Grün ist grün“ – wo das erste Wort ein Personenname, das letzte ein Eigenschaftswort ist – haben diese Worte nicht einfach verschiedene Bedeutung, sondern es sind verschiedene Symbole.)","zh_wang":"在日常语言中，经常会碰到同一个字词，以两种不同的标示方式标示因此就属于不同的符号或者两个字词以不同的方式标示，通过表面看起来相同的方式应用于命题之中。 比如“是（is）”这个词作为系动词出现，即作为相等的标记，也作为存在的表达式出现；“存在（to exist）”作为类似“去（to go）”这样的不及物动词出现；“同一的（identical）”作为一个形容词出现；我们说到某事，也说到某事的发生。 （在命题“Green is green ”中——第一个词是一个专有名称，最后一个词是一个形容词——这些词不仅具有不同的指谓，而且它们是不同的符号。）","zh_huang":"在日常语言中我们经常见到同一个词按不同的方式表示事物的情况，这样它们就属于不同的符号。也经常见到，两个以不同方式表示事物的词，只是以表面上相同的方式用于句子。 比如，“是”这个词可以充当系词，可以用来表示等同，还可以用来表示存在。比如，“存在”这个词像“离开”一样被用作不及物动词，“相同的”被用作形容词。再比如，我们既谈论事物（Etwas/something），也谈论事物的发生。 （在句子“格林是绿色的”[Grün ist grün]中，第一个词是人名，最后一个词则是形容词。这些词不光是有不同的意义，它们还是不同的符号）"},"children":[]},{"number":"3.324","texts":{"zh":"这样就容易发生最根本的混淆（整个哲学充满着这类混淆）。","en":"Thus the most fundamental confusions easily arise (of which the whole of philosophy is full).","de":"So entstehen leicht die fundamentalsten Verwechslungen (deren die ganze Philosophie voll ist).","zh_wang":"这样就容易发生最根本的混淆（整个哲学充满了这种混淆）","zh_huang":"最为基本的混淆很容易就这样产生（整个哲学到处都是这种错误）"},"children":[]},{"number":"3.325","texts":{"zh":"为了避免这类错误，我们必须使用一种能够排除这类错误的记号语言，其中不将同一记号用于不同的符号中，也不以表面上相似的方式应用那些有着不同的标示方式的记号：也就是说，要使用一种遵从逻辑 语法——逻辑句法——的语言记号。 （弗雷格和罗素的概念记号系统就是这样的一种语言，诚然它也还未能排除一切错误。）","en":"To avoid these errors, we must use a sign-language that excludes them, by not using the same sign in different symbols, and not using signs that signify in different ways in ostensibly the same way. A sign-language, that is, that obeys logical grammar—logical syntax. (Frege’s and Russell’s concept-script is one such language, though it still fails to exclude all mistakes.)","de":"Um diesen Irrtümern zu entgehen, müssen wir eine Zeichensprache verwenden, welche sie ausschliesst, indem sie nicht das gleiche Zeichen in verschiedenen Symbolen, und Zeichen, welche auf verschiedene Art bezeichnen, nicht äusserlich auf die gleiche Art verwendet. Eine Zeichensprache also, die der logischen Grammatik – der logischen Syntax – gehorcht. (Die Begriffsschrift Frege’s und Russell’s ist eine solche Sprache, die allerdings noch nicht alle Fehler ausschliesst.)","zh_wang":"为了避免这些错误，我们必须使用一种排除这些错误的符号语言，不将相同的标记用于不同的符号中，也不以相同的方式使用那些有着不同指谓的逻辑符号。也就是说，它是一种遵从逻辑语法——逻辑句法——的符号语言。 （弗雷格和罗素的逻辑符号系统就是这样的一种语言，然而，它也还未能排除所有的错误。）","zh_huang":"为了避免这些错误，我们得使用一种能排除它们的记号语言。在这种语言中，同样的记号不会用于不同的符号，而且记号如果在表示事物的方式上不同，就不会用表面上相似的方式付诸使用。其实就是说，这种记号语言遵守的是逻辑语法，或者说逻辑句法。 （弗雷格和罗素的概念文字就是这种语言，但它还是未能排除所有错误。）"},"children":[]},{"number":"3.326","texts":{"zh":"为了通过其记号来辨识一个符号，我们必须在有意义的使用中观察它。","en":"To recognize the symbol by its sign, one must pay attention to the senseful use.","de":"Um das Symbol am Zeichen zu erkennen, muss man auf den sinnvollen Gebrauch achten.","zh_wang":"要通过符号来分辨一个标记，我们必须在有意义的使用中观察它。","zh_huang":"为了依据记号来辨别出一个符号，你得注意它是如何得到有意义的使用的。"},"children":[]},{"number":"3.327","texts":{"zh":"记号只有结合它的符合逻辑句法的应用才能规定一种逻辑形式。","en":"A sign determines a logical form only together with its logical-syntactic use.","de":"Das Zeichen bestimmt erst mit seiner logisch-syntaktischen Verwendung zusammen eine logische Form.","zh_wang":"标记只有与它的逻辑句法的应用相结合，才能规定一种逻辑形式。","zh_huang":"只有结合其合乎逻辑句法的使用，记号才能确定一种逻辑形式。"},"children":[]},{"number":"3.328","texts":{"zh":"如果一个记号是无用的，它也就是无指谓的。这就是奥卡姆准则 的要旨。 （如果一切情况都表明一个记号具有指谓，那么这个记号就是具有指谓的。）","en":"If a sign is not needed, then it is meaningless. That is the point of Occam’s razor. (If everything in the sign-language works as though a sign had meaning, then it does have meaning.)","de":"Wird ein Zeichen nicht gebraucht, so ist es bedeutungslos. Das ist der Sinn der Devise Occams. (Wenn sich alles so verhält als hätte ein Zeichen Bedeutung, dann hat es auch Bedeutung.)","zh_wang":"一个标记如果是不必要的，它也就是没有指谓的。这就是奥卡姆准则的主旨。 （如果一切都表明符号系统中一个标记有指谓，那么它就是有指谓的。）","zh_huang":"一个记号如果没有用处，它就没有指称。这就是奥卡姆格言的意义。 （在记号语言中，如果一切都按照记号有指称的方式运作，那么记号就有指称）"},"children":[]}]},{"number":"3.33","texts":{"zh":"在逻辑句法中，记号的指谓决不应起任何作用。逻辑句法应该无须提到记号的指谓 而建立起来；它仅仅 以表达式的描述为前提。","en":"In logical syntax the meaning of a sign should never play a role; it must permit being drawn up without talk of the meaning of a sign; it should presuppose only the description of the expressions.","de":"In der logischen Syntax darf nie die Bedeutung eines Zeichens eine Rolle spielen; sie muss sich aufstellen lassen, ohne dass dabei von der Bedeutung eines Zeichens die Rede wäre, sie darf nur die Beschreibung der Ausdrücke voraussetzen.","zh_wang":"在逻辑句法中，标记的指谓决不应起任何作用。逻辑句法无须提到符号的指谓，它只要以表达式的描述为前提，就可建立。","zh_huang":"在逻辑句法中，记号意义不应该起作用。应该可以在不提到记号的意义的情况下建立逻辑句法，需要预设的只是对表达式的描述。"},"children":[{"number":"3.331","texts":{"zh":"根据这一见解我们回过来看罗素的“类型论”：罗素的错误显然在于，他在建立记号的规则时必须提到记号的指谓。","en":"This remark gives us insight into Russell’s ‘theory of types’: Russell’s error is shown in his having to talk of the meaning of signs in drawing up the rules for them.","de":"Von dieser Bemerkung sehen wir in Russell’s „Theory of types“ hinüber: Der Irrtum Russell’s zeigt sich darin, dass er bei der Aufstellung der Zeichenregeln von der Bedeutung der Zeichen reden musste.","zh_wang":"根据这一见解我们再来考察一下罗素的“类型论”：罗素的错误，很显然就在于他在建立符号规则时必须提到标记的指谓。","zh_huang":"由此出发再来看罗素的“类型论”。可以发现罗素是错误的，在为记号建立规则时他还是得提到记号的意义。"},"children":[]},{"number":"3.332","texts":{"zh":"没有一个命题能够作出关于自身的陈述，因为一个命题记号不能包含于它自身之中（这就是全部的“类型论”）。","en":"No proposition can state anything about itself, since a propositional sign cannot be contained in itself (that is all there is to the ‘theory of types’).","de":"Kein Satz kann etwas über sich selbst aussagen, weil das Satzzeichen nicht in sich selbst enthalten sein kann, (das ist die ganze „Theory of types“).","zh_wang":"没有一个命题能够做出关于自身的陈述，因为命题标记不能包含在它自身当中（这就是全部的“类型论”）","zh_huang":"所有句子都不能陈述它自己，因为句子记号不能包含自身（这就是整个“类型论”）"},"children":[]},{"number":"3.333","texts":{"zh":"一个函项所以不能成为它自身的主目，因为函项的记号已经包含着其主目的原型，而且它不能包含自身。 让我们假设函项F（fx）可以成为它自身的主目，这时就会有一个命题“F（F（fx））”，其中的外函项F和内函项F必定有不同的指谓，因为内函项具有φ（fx）的形式，而外函项则具有ψ（φ（fx））的形式。只有字母“F”对于两个函项是共同的，但是字母本身不标示任何东西。 如果我们把“F（F（u））”写作“（Ǝ φ）：F（φu）・φu＝Fu”，这一点就立刻清楚了。 这样罗素的悖论就消解了。","en":"That is why a function cannot be its own argument, since the function sign already contains the prototype of its argument and thus cannot contain itself. For let us suppose that the function F(fx) could be its own argument; there would then be a proposition ‘F(F(fx))’, and in this the outer function F and the inner function F must have different meanings, for the inner has the form ϕ(fx), the outer the form ψ(ϕ(fx)). The two functions only have in common the letter ‘F’, but this by itself signifies nothing. This becomes immediately clear if, instead of ‘F(F(u)’, we write ‘(∃ϕ):F(ϕ u).ϕ u=Fu’. This resolves Russell’s paradox.","de":"Eine Funktion kann darum nicht ihr eigenes Argument sein, weil das Funktionszeichen bereits das Urbild seines Arguments enthält und es sich nicht selbst enthalten kann. Nehmen wir nämlich an, die Funktion F (fx) könnte ihr eigenes Argument sein; dann gäbe es also einen Satz: „F (F (fx))“ und in diesem müssen die äussere Funktion F und die innere Funktion F verschiedene Bedeutungen haben, denn die innere hat die Form ϕ(fx), die äussere, die Form ψ(ϕ(fx)). Gemeinsam ist den beiden Funktionen nur der Buchstabe „F “, der aber allein nichts bezeichnet. Dies wird sofort klar, wenn wir statt „F (F (u))“ schreiben „(∃ϕ): F (ϕu). ϕu = Fu“. Hiermit erledigt sich Russell’s Paradox.","zh_wang":"一个函项不能成为它自身的主目，因为函项的标记已经包含着它自身的主目的原型，而且它不能包含自身。 比如说，如果我们假设函项F（ƒx） 可以成为它自身的主目，那么这时就会有一个命题“F （F （ƒx ）”，其中的外函项F 和内函项F 必定有不同的指谓；因为内函项具有φ（ƒx） 的形式，外函项具有ψ（φ（ƒx） ）的形式。对于两个函项来说，只有本身不标示任何东西的字母”F“是共同的。 如果我们把“F （F （u））”写成“（ョφ ）：F （φu ）.φu=Fu ”，这一点马上就清楚了。 这样罗素的悖论就消除了。","zh_huang":"函项不可能充当自己的主目，因而这是因为表示函项的记号已经包含了其主目的原型，不能自己包含自己。 比如，假定函项F(fx)可以充当自己的主目，这时就会有句子“F(F(fx))”，句子中外层函项与内层函项肯定有不同的意义，因为内层函项的形式是ϕ(fx)，而外层函项的形式是ψ(ϕ(fx))。两个函项共有的只是字母“F”，但字母本身并不表示什么。 我们不写“F(Fu)”，而是写“∃ϕ(F(ϕu)˄(ϕu=Fu))”，事情立刻就清楚了。 这样就解除了罗素悖论。"},"children":[]},{"number":"3.334","texts":{"zh":"只要我们知道每一个别记号如何起标示作用，逻辑句法的规则就应当是自明的。","en":"The rules of logical syntax must be self-explanatory, once it is known how every single sign signifies.","de":"Die Regeln der logischen Syntax müssen sich von selbst verstehen, wenn man nur weiss, wie ein jedes Zeichen bezeichnet.","zh_wang":"我们只需要知道每个标记是如何标示事物的，逻辑句法的规则就肯定是自明的。","zh_huang":"只要知道每个记号是怎样表示事物的，逻辑句法的规则随之也就自己清楚了。"},"children":[]}]},{"number":"3.34","texts":{"zh":"命题具有本质特征和偶然特征。 偶然特征是随同产生命题记号的特定方式而来的特征，本质特征则是命题为了能够表达其意义所必不可少的那些特征。","en":"A proposition has essential and accidental features. Accidental are the features that arise from the particular way that the propositional sign is generated. Essential are those that enable the proposition to express its sense.","de":"Der Satz besitzt wesentliche und zufällige Züge. Zufällig sind die Züge, die von der besonderen Art der Hervorbringung des Satzzeichens herrühren. Wesentlich diejenigen, welche allein den Satz befähigen, seinen Sinn auszudrücken.","zh_wang":"一个命题具有本质特征和偶然特征。 偶然特征是通过一种产生命题标记的特殊方式而来的特征，本质特征是单独能让命题表达其意义的那些特征。","zh_huang":"句子有本质特征和偶然特征。 偶然特征来源于产生句子记号的具体方法。本质特征则是对句子表达含义来说不可缺少的东西。"},"children":[{"number":"3.341","texts":{"zh":"因此一个命题中本质的东西，是所有能够表达相同意义的命题共有的东西。 同样地，一般说来，一个符号中本质的东西，是所有能够达到同一目的的符号共有的东西。","en":"The essential in a proposition is thus what all propositions that can express the same sense have in common. And so too, in general, the essential in a symbol is what all symbols that can fulfil the same purpose have in common.","de":"Das Wesentliche am Satz ist also das, was allen Sätzen, welche den gleichen Sinn ausdrücken können, gemeinsam ist. Und ebenso ist allgemein das Wesentliche am Symbol das, was alle Symbole, die denselben Zweck erfüllen können, gemeinsam haben.","zh_wang":"因此，一个命题中本质的东西就是所有能够表达相同意义的命题共有的东西。 同样，一般来说，一个符号中本质的东西，就是所有能达到同样目的的符号共有的东西。","zh_huang":"因此，句子中的本质特征就是能表达同样含义的所有句子共有的东西。 同理，符号中本质的东西，一般说来就是用于实现同一目的的所有符号所共有的东西。"},"children":[{"number":"3.3411","texts":{"zh":"因此可以说：一个对象的真正的名称，是所有标示这个对象的符号共有的东西。由此可以依次得出，任何一种组合对于一个名称都不是本质的。","en":"So one could say: the real name is what all symbols that can signify an object have in common. It would thus progressively turn out that no kind of composition is essential to a name.","de":"Man könnte also sagen: Der eigentliche Name ist das, was alle Symbole, die den Gegenstand bezeichnen, gemeinsam haben. Es würde sich so successive ergeben, dass keinerlei Zusammensetzung für den Namen wesentlich ist.","zh_wang":"因此，可以说，一个对象的真正的名称就是所有标示该对象的符号共有的东西。因此可以逐步推断出，任何一个组合对于一个名称都不是本质的东西。","zh_huang":"于是也就可以说，一个对象的真正的名称，就是表示该对象的所有符号所共有的东西。这样，任何形式的复合性特征对于名称来说最终都会相继被证明不是必要的。"},"children":[]}]},{"number":"3.342","texts":{"zh":"虽然我们的记号系统中确有某种随意的东西，但是如下这一点 却不是随意的：即只要 我们随意地规定了一个东西，某种其它的东西就必然要发生。（这一点来自记号系统的本质。）","en":"In our notations there is indeed something arbitrary, but this is not arbitrary: that when we have determined something arbitrarily, then something else must be the case. (This arises from the essence of notation.)","de":"An unseren Notationen ist zwar etwas willkürlich, aber das ist nicht willkürlich: Dass, wenn wir etwas willkürlich bestimmt haben, dann etwas anderes der Fall sein muss. (Dies hängt von dem Wesen der Notation ab.)","zh_wang":"在我们的符号系统中，虽然确实有一些随意的东西，但是只要我们随意规定了一个东西，那么其他的东西就必然会发生，这一点是不能随意规定的。（这是由符号系统的本质造成的。）","zh_huang":"在我们的记号法中确实有些东西是任意的。但是，这一点并非任意：如果把某个东西任意地确定下来，就必定会有其他事情发生（这取决于记号法的本质）"},"children":[{"number":"3.3421","texts":{"zh":"一种特定的标示样式也许是不重要的，但它是一种可能的 标示样式，这一点永远是重要的。在哲学中一般地正是这样：个别的情形总是一再表明是不重要的，但是每一个别情形的可能性都揭示了关于世界本质的某种东西。","en":"A particular mode of signification may be unimportant, but it is always important that this is a possible mode of signification. And this is how it is generally in philosophy: the particular proves time and again to be unimportant, but the possibility of each particular tells us something about the essence of the world.","de":"Eine besondere Bezeichnungsweise mag unwichtig sein, aber wichtig ist es immer, dass diese eine mögliche Bezeichnungsweise ist. Und so verhält es sich in der Philosophie überhaupt: Das Einzelne erweist sich immer wieder als unwichtig, aber die Möglichkeit jedes Einzelnen gibt uns einen Aufschluss über das Wesen der Welt.","zh_wang":"一种特殊的标示方式可能是不重要的，但是它是一种可能的标示方式，这一点永远都是重要的。这一点也会经常在哲学中出现：个别的情形会反复地表明是不重要的，但是每一个别情形的可能性就揭示了一些关于世界本质的东西。","zh_huang":"某种特定的表示方式可能是不重要的，但它是一种可能的表示方式，这却总是重要的。哲学中总是这样的：单个的情况一再证明是不重要的，但每个个例是可能的，这却对世界的本质有所揭示。"},"children":[]}]},{"number":"3.343","texts":{"zh":"定义是从一种语言翻译为另一种语言的规则。凡是正确的记号语言都应该按照这种规则可以翻译为任何其它一种语言：这一点 是一切正确的记号语言所共有的。","en":"Definitions are rules for translating from one language into another. Every correct sign-language must be translatable into every other according to such rules: this is what they all have in common.","de":"Definitionen sind Regeln der Übersetzung von einer Sprache in eine andere. Jede richtige Zeichensprache muss sich in jede andere nach solchen Regeln übersetzen lassen: Dies ist, was sie alle gemeinsam haben.","zh_wang":"定义是将一种语言翻译为另一种语言的规则。每个正确的符号语言都必须按照这种规则才可以翻译为其它另外一种语言。这一点是所有正确的符号语言所共有的。","zh_huang":"定义就是从一种语言到另一种语言的翻译规则。按照这样的规则，任何一种正确的符号语言总是可以翻译成任何其他语言。这些语言所共同的，正是这一点。"},"children":[]},{"number":"3.344","texts":{"zh":"在一个符号中起标示作用的东西，是依据逻辑句法规则可以代换这个符号的一切符号所共有的东西。","en":"What signifies in a symbol is what is common to all those symbols by which it can be replaced according to the rules of logical syntax.","de":"Das, was am Symbol bezeichnet, ist das Gemeinsame aller jener Symbole, durch die das erste den Regeln der logischen Syntax zufolge ersetzt werden kann.","zh_wang":"在符号中进行标示的，是按照逻辑句法规则可以代换它的所有符号所共有的东西。","zh_huang":"符号中表示事物的，是逻辑句法的规则允许我们用来替换的所有符号所共有的特征。"},"children":[{"number":"3.3441","texts":{"zh":"例如我们可以这样来表述所有真值函项记号系统共同的东西：它们的共同之处在于，比如说，它们每一种都能够 用“～p”（“非p”）和“p∨q”（“p或q”）构成的记号系统来替换。 （这就表明了一种特定记号系统的可能性如何能够揭示某种一般东西的方式。）","en":"One can express, for example, what is common to all notations for truth-functions thus: they have in common that they can all be replaced—for example—by the notation that uses ‘~p’ (‘not-p’) and ‘p v q’ (‘p or q’).(This typifies the way in which a specific possible notation can tell us something general.)","de":"Man kann z. B. das Gemeinsame aller Notationen für die Wahrheitsfunktionen so ausdrücken: Es ist ihnen gemeinsam, dass sich alle – z. B. – durch die Notation von „∼p“ („nicht p“) und „p ∨ q“ („p oder q“) ersetzen lassen. (Hiermit ist die Art und Weise gekennzeichnet, wie eine spezielle mögliche Notation uns allgemeine Aufschlüsse geben kann.)","zh_wang":"比如，所有真值函项符号系统所共有的东西，我们就可以通过如下方式来表示：例如，它们都能够被“～p ”（“非p ”）和“pvq ”（“p 或q ”）构成的符号系统来代替。 （这就表明了一种可能的特定符号系统是怎样来为我们提供一般信息的。）","zh_huang":"例如，对于所有表示真值函项的符号所共有的特征，我们可以这样表达：它们都可以代换成比如“~p”（“并非p”）和“p˅q”（“p或q”）这类记号。 （这样就可以表明，可能的特定记法何以能够揭示一般性的东西。）"},"children":[]},{"number":"3.3442","texts":{"zh":"复合物记号在分析中不能这样随意地分解，以致在不同的命题结合中它的每一次分解都不相同。","en":"The sign for a complex, too, is not resolved arbitrarily in analysis, so that, say, its resolution might be different in every propositional structure.","de":"Das Zeichen des Komplexes löst sich auch bei der Analyse nicht willkürlich auf, so dass etwa seine Auflösung in jedem Satzgefüge eine andere wäre.","zh_wang":"复合物标记在分析中是不能随意分解的，如果那样的话，它的分解在每一个命题结构中都会不一样。","zh_huang":"此外，表示复合物的记号不能任意地分解，以至出现在不同句子中时分解的方式也不同。"},"children":[]}]}]}]},{"number":"3.4","texts":{"zh":"一个命题规定逻辑空间中的一个位置。命题的各组成部分的存在——有意义的命题的存在，即保证了这种逻辑位置的存在。","en":"A proposition determines a place in logical space. The existence of this logical place is guaranteed by the existence of the constituents themselves, by the existence of the senseful proposition.","de":"Der Satz bestimmt einen Ort im logischen Raum. Die Existenz dieses logischen Ortes ist durch die Existenz der Bestandteile allein verbürgt, durch die Existenz des sinnvollen Satzes.","zh_wang":"在逻辑空间中，一个命题规定一个位置。只靠命题的各组成部分的存在和有意义的命题的存在，就保证了这种逻辑位置的存在。","zh_huang":"句子确定了逻辑空间中的位置。逻辑位置的存在由句子成分的存在本身即可保证，也就是说，由有意义的句子的存在来保证。"},"children":[{"number":"3.41","texts":{"zh":"命题记号加上逻辑坐标，即是逻辑位置。","en":"The propositional sign and the logical coordinates: that is the logical place.","de":"Das Satzzeichen und die logischen Koordinaten: Das ist der logische Ort.","zh_wang":"命题标记和逻辑坐标结合在一起就是逻辑位置。","zh_huang":"句子记号与逻辑坐标，这就是逻辑位置。"},"children":[{"number":"3.411","texts":{"zh":"几何位置和逻辑位置的一致之处在于，二者都是某物存在的可能性。","en":"A geometrical and a logical place accord in that both are the possibility of an existence.","de":"Der geometrische und der logische Ort stimmen darin überein, dass beide die Möglichkeit einer Existenz sind.","zh_wang":"几何位置和逻辑位置的相同之处在于，二者都是一种存在的可能性。","zh_huang":"几何位置和逻辑位置一样，都是某个东西存在的可能性。"},"children":[]}]},{"number":"3.42","texts":{"zh":"一个命题虽然只能规定逻辑空间中的一个位置，然而整个逻辑空间也应该已经由它而给出。 （不然的话，通过否定、逻辑和、逻辑积等等就会在坐标上不断引入新的要素。） （围绕着一个图像的逻辑脚手架规定着逻辑空间。一个命题有贯通整个逻辑空间的力量。）","en":"Although a proposition may determine only one place in logical space, nevertheless the whole of logical space must already be given by it. (Otherwise, by means of negation, logical sum, logical product, etc., more and more new elements—in coordination—would be introduced.) (The logical scaffolding around a picture determines the logical space. A proposition reaches through the whole of logical space.)","de":"Obwohl der Satz nur einen Ort des logischen Raumes bestimmen darf, so muss doch durch ihn schon der ganze logische Raum gegeben sein. (Sonst würden durch die Verneinung, die logische Summe, das logische Produkt, etc. immer neue Elemente – in Koordination – eingeführt.) (Das logische Gerüst um das Bild herum bestimmt den logischen Raum. Der Satz durchgreift den ganzen logischen Raum.)","zh_wang":"一个命题虽然只能规定逻辑空间中一个位置，但是整个逻辑空间也必然已经由它给出。 （要不然，通过否定，逻辑和、逻辑积等等就会在坐标上不断引入新的要素。） （逻辑框架围绕着一个图像来规定逻辑空间。命题贯通整个逻辑空间。）","zh_huang":"尽管一个句子只能确定逻辑空间中的一个位置，但整个逻辑空间还是肯定已经经由这个句子给定了。 （否则，否定、析取、合取，等等，就势必为坐标引入越来越多新的成分。） （环绕图像的脚手架确定了逻辑空间。逻辑空间则整个儿为句子所贯穿。）"},"children":[]}]},{"number":"3.5","texts":{"zh":"被使用的、被思考的命题记号即是思想。","en":"A propositional sign as applied in thinking is a thought.","de":"Das angewandte, gedachte, Satzzeichen ist der Gedanke.","zh_wang":"被应用的、被思考的命题标记即是思想。","zh_huang":"被使用、被思考的句子记号，就是思想。"},"children":[]}]},{"number":"4","texts":{"zh":"思想是有意义的命题。","en":"A thought is a senseful proposition.","de":"Der Gedanke ist der sinnvolle Satz.","zh_wang":"思想是有意义的命题。","zh_huang":"思想就是有意义的句子。"},"children":[{"number":"4.001","texts":{"zh":"命题的总体即是语言。","en":"The totality of propositions is language.","de":"Die Gesamtheit der Sätze ist die Sprache.","zh_wang":"命题的总体就是语言。","zh_huang":"句子的总体就构成语言。"},"children":[]},{"number":"4.002","texts":{"zh":"人有能力构造语言，可以用它表达任何意义，而无须想到每一个词怎样具有指谓和指谓的是什么。——就像人们说话时无须知道每个声音是怎样发生的一样。 日常语言是人的机体的一部分，而且也像机体那样复杂。 人不可能直接从日常语言中懂得语言逻辑。 语言掩饰着思想。而且达到这种程度，就像不能根据衣服的外形来推出它所遮盖的思想的形式一样；因为衣服外形的设计不是为了揭示身体的形状，而是为了全然不同的目的。 理解日常语言所要依赖的种种默契是极其复杂的。","en":"Human beings possess the ability to construct languages in which every sense can be expressed, without having any idea of how and what each word means.—Just as one speaks without knowing how the individual sounds are produced. Everyday language is a part of the human organism and no less complicated than it. It is humanly impossible to immediately gather from it the logic of language. Language disguises thought. And in such a way that the form of the thought that is clothed cannot be inferred from the outer form of the clothing, because the outer form of the clothing is designed for quite other purposes than to allow the form of the body to be recognized. The tacit agreements underlying the understanding of everyday language are enormously complicated.","de":"Der Mensch besitzt die Fähigkeit Sprachen zu bauen, womit sich jeder Sinn ausdrücken lässt, ohne eine Ahnung davon zu haben, wie und was jedes Wort bedeutet. – Wie man auch spricht, ohne zu wissen, wie die einzelnen Laute hervorgebracht werden. Die Umgangssprache ist ein Teil des menschlichen Organismus und nicht weniger kompliziert als dieser. Es ist menschenunmöglich, die Sprachlogik aus ihr unmittelbar zu entnehmen. Die Sprache verkleidet den Gedanken. Und zwar so, dass man nach der äusseren Form des Kleides, nicht auf die Form des bekleideten Gedankens schliessen kann; weil die äussere Form des Kleides nach ganz anderen Zwecken gebildet ist, als danach, die Form des Körpers erkennen zu lassen. Die stillschweigenden Abmachungen zum Verständnis der Umgangssprache sind enorm kompliziert.","zh_wang":"人类具有构造语言的能力，可以用它来表达任何意义，而不需要知道每一个词怎样指谓以及指谓什么。就像人们不需要知道每个声音是怎样发生的，也能说话一样。 日常语言是人的机体的一部分，而且也并不比它简单。 人们不可能直接就能从日常语言中得知语言逻辑。 语言掩盖着思想。因此，就像不能通过衣服的外形来推出它们所遮盖的思想的形式；因为衣服的外形是为完全不同的目的设计的，并非为了揭示身体的形状。 理解日常语言所要依赖的默契是极其复杂的。","zh_huang":"人们能够在对每个词语指称什么以及如何指称一无所知的情况下，建立能表达所有含义的语言。这就像一个人会说话，但不知道单个音节是怎么发出来的一样。 日常语言是人类机体的一部分，它一点也不比人类机体更为简单。 从这种语言中直接获知支配语言的逻辑是什么，这不是人力可及的。 语言伪装了思想。从这种伪装的外衣你不可能推知下面的思想是什么样的，因为这种外衣的形式本来就不是为了让人看出身体的样子而设计的，它有完全不同的目的。 理解日常语言所需要的暗中起作用的约定是极其复杂的。"},"children":[]},{"number":"4.003","texts":{"zh":"关于哲学问题所写的大多数命题和问题，不是假的而是无意义的。因此我们根本不能回答这类问题，而只能确定它们的无意义性。哲学家们的大多数命题和问题，都是因为我们不懂得我们语言的逻辑而产生的。 （它们都是像善是否比美更为同一或者更不同一之类的问题。） 因而用不着奇怪，一些最深刻的问题实际上却根本不是 问题。","en":"Most of the propositions and questions that have been formulated about philosophical matters are not false but nonsensical. So we cannot answer questions of this kind at all, but only expose their nonsensicality. Most of philosophers’ questions and propositions are due to our not understanding the logic of our language. (They are of the same kind as the question whether the good is more or less identical than the beautiful.) And it is no wonder that the deepest problems are really not problems.","de":"Die meisten Sätze und Fragen, welche über philosophische Dinge geschrieben worden sind, sind nicht falsch, sondern unsinnig. Wir können daher Fragen dieser Art überhaupt nicht beantworten, sondern nur ihre Unsinnigkeit feststellen. Die meisten Fragen und Sätze der Philosophen beruhen darauf, dass wir unsere Sprachlogik nicht verstehen. (Sie sind von der Art der Frage, ob das Gute mehr oder weniger identisch sei als das Schöne.) Und es ist nicht verwunderlich, dass die tiefsten Probleme eigentlich keine Probleme sind.","zh_wang":"历来对于哲学问题所写的大多数命题和问题，不是假的，而是无意义的。因此，这类问题根本就不能得到回答，我们只能确定它们的无意义性。哲学家们的大多数命题和问题，都是由于我们不懂得我们的语言逻辑而产生的。 （它们与“善比美更为同一还是更不同一”之类的问题同属一类问题。） 因此无须奇怪，一些最深奥的问题实际上都不是问题。","zh_huang":"有关哲学主题的大部分句子和问题不是假的，而是无意义的。于是我们就不能够回答这类问题，而只能指出它们是无意义的。哲学家们的大部分句子和问题之所以被提出来，是因为不懂我们语言的逻辑。 （它们就类似于善是否比美更加同一这样的问题。） 因此毫不奇怪，最深刻的问题其实根本就不是问题。"},"children":[{"number":"4.0031","texts":{"zh":"全部哲学都是一种“语言批判”。（当然不是在毛特纳的意义上的批判。）罗素的功绩在于指明了一个命题表面的逻辑形式不一定就是它真正的逻辑形式。","en":"All philosophy is ‘critique of language’. (Albeit not in Mauthner’s sense.) Russell’s merit is to have shown that the apparent logical form of a proposition need not be its real one.","de":"Alle Philosophie ist „Sprachkritik“. (Allerdings nicht im Sinne Mauthners.) Russell’s Verdienst ist es, gezeigt zu haben, dass die scheinbare logische Form des Satzes nicht seine wirkliche sein muss.","zh_wang":"所有的哲学都是“语言批判”（但决不是毛特纳意义上的）。罗素的功绩在于指明了命题表面的逻辑形式不一定就是它真正的逻辑形式。","zh_huang":"哲学整个儿来说就是“语言批判”（但不是毛特纳那种）。是罗素表明了，句子表面上的逻辑形式不一定就是其真正的逻辑形式。"},"children":[]}]},{"number":"4.01","texts":{"zh":"命题是实在的图像。 命题是我们所想象的实在的模型。","en":"A proposition is a picture of reality. A proposition is a model of reality as we conceive it.","de":"Der Satz ist ein Bild der Wirklichkeit. Der Satz ist ein Modell der Wirklichkeit, so wie wir sie uns denken.","zh_wang":"命题是实在的图像。 命题是我们所设想的实在的模型。","zh_huang":"句子是实在的图像。 句子，以我们思考它的方式来看，就是实在的模型。"},"children":[{"number":"4.011","texts":{"zh":"乍看起来，一个命题——例如印在纸上的某个命题——不像是它所论及的实在的一个图像。但是书写的音符乍看起来也不像是一首乐曲的图像，我们的声音记号（字母）也不像是我们口语的图像。 然而，即使在通常的意义下，这些记号语言也证明是它们所表现的东西的图像。","en":"At first sight a proposition—as printed out on paper, say—does not appear to be a picture of the reality it concerns. But neither does musical notation appear at first sight to be a picture of music, nor our phonetic (alphabetic) notation a picture of our spoken language. And yet these sign-languages prove to be pictures, even in the ordinary sense, of what they represent.","de":"Auf den ersten Blick scheint der Satz – wie er etwa auf dem Papier gedruckt steht – kein Bild der Wirklichkeit zu sein, von der er handelt. Aber auch die Notenschrift scheint auf den ersten Blick kein Bild der Musik zu sein, und unsere Lautzeichen- (Buchstaben-)Schrift kein Bild unserer Lautsprache. Und doch erweisen sich diese Zeichensprachen auch im gewöhnlichen Sinne als Bilder dessen, was sie darstellen.","zh_wang":"乍看起来，命题——例如印在纸上的某个命题——似乎不像是它所讨论的实在的一个图像。但是乍看起来，乐谱也不像是一首乐曲的图像；声音符号（字母文字）看起来也不像是我们口语的图像。但是，这些符号语言证明，甚至是在通常意义下，它们所表现的东西也仍是图像。","zh_huang":"初看起来，句子，比如写在纸上的句子，并不像是想要谈论的实在的图像。同样，乐谱初看起来不像音乐的图像，表音符号（字母）也不像口语的图像。 但这些符号确实是其所表现的东西的图像，甚至就是通常意义上的那种图像。"},"children":[]},{"number":"4.012","texts":{"zh":"显然，一个“aRb”形式的命题使我们产生一个图像的印象。这种情况下这个记号显然是被标示者的一个相像物。","en":"It is obvious we have a sense of a proposition of the form ‘aRb’ as a picture. Here the sign is obviously a likeness of what is signified.","de":"Offenbar ist, dass wir einen Satz von der Form „aRb“ als Bild empfinden. Hier ist das Zeichen offenbar ein Gleichnis des Bezeichneten.","zh_wang":"很明显，我们把一个形式为“aRb”的命题理解为一个图像。在这里，标记显然是被标示者的一个相似物。","zh_huang":"显然，我们把像“aRb”这样形式的句子看作图像。在这种情况下，记号显然是所表示的东西的相似物。"},"children":[]},{"number":"4.013","texts":{"zh":"如果我们深入到图像特性的本质，就会看到，这种特性并不 因表面的不规则性 （如乐谱中使用＃和b）而蒙受损害。 因为就是这种不规则性也图示它们想要表达的东西；不过用的是另外一种方式。","en":"And if we penetrate to the essence of this pictoriality, then we see that this is not confounded by apparent irregularities (as in the use of ♯ and ♭ in musical notation). For these irregularities, too, depict what they are intended to express, just in a different way.","de":"Und wenn wir in das Wesentliche dieser Bildhaftigkeit eindringen, so sehen wir, dass dieselbe durch scheinbare Unregelmässigkeiten (wie die Verwendung der ♯ und ♭ in der Notenschrift) nicht gestört wird. Denn auch diese Unregelmässigkeiten bilden das ab, was sie ausdrücken sollen; nur auf eine andere Art und Weise.","zh_wang":"如果我们察觉到这个图像自身的本质，我们就会看到，这种本质并未被表面的不规则性（如乐谱中#和b的使用）所干扰。 因为这些不规则性也图示它们所要表达的东西；只不过是用另外一种方式来图示而已。","zh_huang":"明白了这种图像性的本质，我们就会看出，表面上的不规则性（比如乐谱中使用的♯和♭）无损于其图像性。 因为甚至这种不规则性也描绘了其所表达的东西，只不过方式不同罢了。"},"children":[]},{"number":"4.014","texts":{"zh":"留声机唱片、音乐思想、乐谱、声波，彼此之间都处在一种图示的内在关系之中，这就是语言和世界之间具有的关系。 它们的逻辑结构都是共同的。 （就像童话里的两个少年，他们的两匹马和他们的百合花。在某种意义上，他们都是同一的。）","en":"A gramophone record, the musical thought, the musical notation, the sound waves, all stand to one another in that internal relation of depicting that holds between language and world. Common to all of them is the logical construction. (Like the two youths, their two horses and their lilies in the fairy tale. They are all in a certain sense one.)","de":"Die Grammophonplatte, der musikalische Gedanke, die Notenschrift, die Schallwellen, stehen alle in jener abbildenden internen Beziehung zu einander, die zwischen Sprache und Welt besteht. Ihnen allen ist der logische Bau gemeinsam. (Wie im Märchen die zwei Jünglinge, ihre zwei Pferde und ihre Lilien. Sie sind alle in gewissem Sinne Eins.)","zh_wang":"留声机唱片、音乐的思想、乐谱、声波，相互之间都处于那种图示的内在关系之中，这就是连接语言和世界之间的关系。 它们的逻辑结构是共同的。 （就像故事当中的两个少年，他们的两匹马和他们的百合花。在某种意义上都是同一的。）","zh_huang":"唱片、音乐思想、乐谱、声波，所有这些东西都彼此处于描绘与被描绘的内在关系中，而这种关系也存在于语言和世界之间。 它们都拥有共同的逻辑结构。 （就像童话中的两个小伙子，他们的两匹马以及他们的百合花。在某种意义上它们都是一个东西。）"},"children":[{"number":"4.0141","texts":{"zh":"有一条总的规则，使得音乐家能从总谱读出交响乐，使得我们能够通过唱片的沟纹放出交响乐来，而且应用原规则还可以从交响乐重新推得总谱。这些看起来完全不同的东西之间的内在相似性正在于此。这条规则就是将交响乐投射到音符语言上去的投影法则，也是把这种音符语言翻译为唱片语言的规则。","en":"That there is a general rule by which the musician can read off the symphony from the score, and that there is a rule by which the symphony can be reconstructed from the line on the gramophone record and from this again—by means of the first rule—construct the score, is what constitutes the internal similarity between these apparently very different things. And this rule is the law of projection which projects the symphony into the language of the musical score. It is the rule for translating this language into the language of the gramophone record.","de":"Dass es eine allgemeine Regel gibt, durch die der Musiker aus der Partitur die Symphonie entnehmen kann, durch welche man aus der Linie auf der Grammophonplatte die Symphonie und nach der ersten Regel wieder die Partitur ableiten kann, darin besteht eben die innere Ähnlichkeit dieser scheinbar so ganz verschiedenen Gebilde. Und jene Regel ist das Gesetz der Projektion, welches die Symphonie in die Notensprache projiziert. Sie ist die Regel der Übersetzung der Notensprache in die Sprache der Grammophonplatte.","zh_wang":"有一条总的规则，可以让音乐家能够从乐谱读出交响乐，可以让我们能够通过唱片的沟纹放出交响乐来，而且，通过第一个规则还可以从该交响乐当中重新推出乐谱。这些乍看起来完全不同的东西之间的内在的相似性正在于此。这条规则就是将交响乐投射到音符语言当中去的投影法则。它也是将这种语言翻译为唱片语言的规则。","zh_huang":"有种通用规则，让音乐家可以从乐谱中读出交响乐，也有一种规则让人可以依据唱片的刻线导出交响乐，再利用前一种规则得到乐谱。这样就在这些初看起来迥然不同的东西之间，建立了一种内在的相似性。规则决定了如何把交响乐投影到乐谱语言，也决定了如何把这种语言翻译成唱片语言。"},"children":[]}]},{"number":"4.015","texts":{"zh":"所有的比喻以及所有的表达方式的图示性质，其可能性都是基于图示的逻辑。","en":"The possibility of all similes, of the whole pictoriality of our language, lies in the logic of depiction.","de":"Die Möglichkeit aller Gleichnisse, der ganzen Bildhaftigkeit unserer Ausdrucksweise, ruht in der Logik der Abbildung.","zh_wang":"我们语言中所有比喻以及所有的形象语言的可能性都基于图示的逻辑。","zh_huang":"所有这些相似性，我们语言中所有图像性的表达方式，它们之所以成为可能，全赖于描绘的逻辑。"},"children":[]},{"number":"4.016","texts":{"zh":"为了理解命题的本质，我们可以看一看象形文字，它图示着它所描述的事实。 从象形文字发展而来的字母文字，并未失去图示的本质。","en":"To understand the essence of a proposition, consider hieroglyphic script, which depicts the facts that it describes. And alphabetic script came out of it, without losing what is essential in depiction.","de":"Um das Wesen des Satzes zu verstehen, denken wir an die Hieroglyphenschrift, welche die Tatsachen die sie beschreibt abbildet. Und aus ihr wurde die Buchstabenschrift, ohne das Wesentliche der Abbildung zu verlieren.","zh_wang":"为了理解命题的本质，可以考察一下象形文字，它图示它所描述的事实。 从它演化而来的字母文字并没有失去图示的本质。","zh_huang":"要理解句子的本质，我们应该想想象形文字，这种文字是怎样描绘其所陈述的事实。 而表音文字从中发展出来时，并未丢失这种描绘的本质要素。"},"children":[]}]},{"number":"4.02","texts":{"zh":"我们看出这一点是基于如下事实：无须向我们解释我们就理解命题记号的意义。","en":"We see this from our ability to understand the sense of a propositional sign without its having been explained to us.","de":"Dies sehen wir daraus, dass wir den Sinn des Satzzeichens verstehen, ohne dass er uns erklärt wurde.","zh_wang":"我们看出这一点是通过以下的事实：不需要向我们解释，我们就理解命题标记的意义。","zh_huang":"我们可以在未经解释的情况下理解句子记号的含义，就说明了这个问题。"},"children":[{"number":"4.021","texts":{"zh":"命题是实在的图像：因为当我理解一个命题，我就知道它所表述的情况，而且无须向我解释其意义，我就理解这个命题。","en":"A proposition is a picture of reality: for I know the state of affairs it represents if I understand the proposition. And I understand the proposition without its sense having been explained to me.","de":"Der Satz ist ein Bild der Wirklichkeit: Denn ich kenne die von ihm dargestellte Sachlage, wenn ich den Satz verstehe. Und den Satz verstehe ich, ohne dass mir sein Sinn erklärt wurde.","zh_wang":"命题是实在的图像，因为如果我理解一个命题，我就知道它所表述的事态。而且不需要向我解释它的意义，我就理解这个命题。","zh_huang":"句子是实在的图像，因为只要理解了句子就知道它表现的是什么。而且，无须向我解释含义，我就能理解它。"},"children":[]},{"number":"4.022","texts":{"zh":"命题显示 其意义。 命题显示当 它为真时事情是怎样的，而且宣称 事情就是这样的。","en":"A proposition shows its sense. A proposition shows how things stand if it is true. And it says that they so stand.","de":"Der Satz zeigt seinen Sinn. Der Satz zeigt, wie es sich verhält, wenn er wahr ist. Und er sagt, dass es sich so verhält.","zh_wang":"命题表明其意义。 当命题为真的时候，命题表明事情是怎样的，而且说事情就是这样的。","zh_huang":"句子显示其含义。 句子显示出，如果它是真的，事情是怎样的。并且它说，事情就是如此。"},"children":[]},{"number":"4.023","texts":{"zh":"命题对实在的确定必须达到二者取一：是或者否。 为此命题必须完全地描述实在。 命题是对事态的描述。 正如一个对象是通过给出其外部属性来加以描述一样，命题是通过实在的内部属性来描述实在的。 命题借助一种逻辑的脚手架来构造一个世界，因此如果 一个命题为真，就可从中看出所有合乎逻辑的东西是怎样的。人们可以从假的命题作出推论。","en":"Reality must be fixed by a proposition to elicit either yes or no. To do this, it must be completely described by the proposition. A proposition is a description of a state-of-things. Like the description of an object by its external properties, so a proposition describes reality by its internal properties. A proposition constructs a world by means of a logical scaffolding and that is how one can actually see in the proposition all the logical features of reality if it is true. One can draw inferences from a false proposition.","de":"Die Wirklichkeit muss durch den Satz auf ja oder nein fixiert sein. Dazu muss sie durch ihn vollständig beschrieben werden. Der Satz ist die Beschreibung eines Sachverhaltes. Wie die Beschreibung einen Gegenstand nach seinen externen Eigenschaften, so beschreibt der Satz die Wirklichkeit nach ihren internen Eigenschaften. Der Satz konstruiert eine Welt mit Hilfe eines logischen Gerüstes und darum kann man am Satz auch sehen, wie sich alles Logische verhält, wenn er wahr ist. Man kann aus einem falschen Satz Schlüsse ziehen.","zh_wang":"命题确定实在达到这种程度，即：为了符合实在，人们只需要说出“是”或“不是”。 因此命题必须完全地描述实在。 命题是对原子事实的描述。 正如一个对象的描述是通过其外部属性来进行描述的，所以命题是通过实在的内部属性来描述实在的。 命题借助于一种逻辑的框架来构造一个世界，所以，如果一个命题是真的，便可以从中看出实在中一切合乎逻辑的东西是怎样的。人们可以从一个假命题做出结论。","zh_huang":"句子对实在的确定应该达到只需要说是或否的程度。 要达到这种程度，句子就要充分地描述实在。 句子是对事态的描述。 由于对于对象的描述是利用其外在性质，句子对实在的描述诉诸其内在性质。 句子借助逻辑脚手架来构建世界，于是人们实际上就可以从句子中看到，如果句子是真的，那么在逻辑上，可知事实是否存在，可以从假句子得出结论。"},"children":[]},{"number":"4.024","texts":{"zh":"理解一个命题意味着知道若命题为真事情该是怎样的。 （因此，不知道一个命题是否为真也可以理解它。）理解一个命题的组成部分也就理解这个命题。","en":"To understand a proposition is to know what is the case if it is true. (One can thus understand it without knowing whether it is true.) One understands it if one understands its constituents.","de":"Einen Satz verstehen, heisst, wissen was der Fall ist, wenn er wahr ist. (Man kann ihn also verstehen, ohne zu wissen, ob er wahr ist.) Man versteht ihn, wenn man seine Bestandteile versteht.","zh_wang":"要理解一个命题的意思，就是要知道如果命题是真的，事情就该是怎样的。 （所以，不用知道一个命题是否为真，也可以理解它。） 理解了命题的组成部分也就理解了这个命题。","zh_huang":"理解一个句子，就意味着知道当句子为真时情况是怎样的。 （因此人们可以在不知句子是真是假的情况下理解它。） 只要理解了句子的构成成分，你就理解了句子。"},"children":[]},{"number":"4.025","texts":{"zh":"把一种语言翻译为另一种语言时，我们并不是把一种语言的每一个命题 翻译为另一种语言的命题，而是只翻译命题的组成部分。 （字典不仅翻译名词，也翻译动词、形容词和连接词等等，它以同样方式对待所有这些词。）","en":"The translation of one language into another does not proceed by translating every proposition of one into a proposition of another, but only the constituents of the proposition are translated. (And the dictionary translates not only substantives but also verbs, adjectives, and conjunctions, etc.; and it treats them all alike.)","de":"Die Übersetzung einer Sprache in eine andere geht nicht so vor sich, dass man jeden Satz der einen in einen Satz der anderen übersetzt, sondern nur die Satzbestandteile werden übersetzt. (Und das Wörterbuch übersetzt nicht nur Substantiva, sondern auch Zeit-, Eigenschafts- und Bindewörter etc.; und es behandelt sie alle gleich.)","zh_wang":"一种语言翻译为另一种语言，并不是把这种语言的每一个命题翻译为另一种语言的命题，而是只翻译命题的组成部分。 （字典并不仅仅翻译名词，也翻译动词、形容词和连接词等等，并且用同样方式来对待它们。）","zh_huang":"把一种语言翻译成另外一种语言，并不是整句整句地翻译，而只是翻译句子的构成成分。 （字典不仅翻译名词，而且翻译动词、连词等，所有这些都按同样方式处理。）"},"children":[]},{"number":"4.026","texts":{"zh":"必须向我们解释简单记号（词）的指谓，我们才能理解它们。 但是我们可以用命题清楚地表达自己的意思。","en":"The meanings of simple signs (words) must be explained to us for us to understand them. With propositions, however, we communicate.","de":"Die Bedeutungen der einfachen Zeichen (der Wörter) müssen uns erklärt werden, dass wir sie verstehen. Mit den Sätzen aber verständigen wir uns.","zh_wang":"简单标记（词）的指谓，必须向我们说明。这样我们才能理解它们。 我们利用命题就可以清楚地表达自己的意思。","zh_huang":"要理解简单记号（词语），就必须有人向我们解释其意义。 但在表达的时候我们用的是句子。"},"children":[]},{"number":"4.027","texts":{"zh":"命题能够传达新的 意义，这一点属于命题的本质。","en":"It is essential to a proposition that it can convey a new sense to us.","de":"Es liegt im Wesen des Satzes, dass er uns einen neuen Sinn mitteilen kann.","zh_wang":"命题能够给人传达一种新的意义，这就是命题的本质。","zh_huang":"句子的本质就决定了，它可以向我们传达新的含义。"},"children":[]}]},{"number":"4.03","texts":{"zh":"命题必须用已有的表达式来传达新的意义。 命题传达情况，因此它必定在本质上 与情况有关联。 而这种关联恰恰在于，命题是情况的逻辑图像。 命题仅仅在它是一个图像时才能陈述某种东西。","en":"A proposition must convey a new sense with old expressions. A proposition conveys a state of affairs to us, and hence must connect essentially to the state of affairs. And the connection is precisely that it is its logical picture. A proposition only states something insofar as it is a picture.","de":"Ein Satz muss mit alten Ausdrücken einen neuen Sinn mitteilen. Der Satz teilt uns eine Sachlage mit, also muss er wesentlich mit der Sachlage zusammenhängen. Und der Zusammenhang ist eben, dass er ihr logisches Bild ist. Der Satz sagt nur insoweit etwas aus, als er ein Bild ist.","zh_wang":"一个命题必须用已有的词来表达一个新的意义。 命题告诉我们一种事态，因此在本质上它必定与事态有关联。 而这种关联就在于命题是事态的逻辑图像。 命题仅仅在它是一个图像时，才能陈述某种事情。","zh_huang":"句子必须用旧词汇来表达新意思。 句子告诉我们一种情况，因此它必须在本质上与这种情况联系在一起。 这种联系恰恰就在于，句子是这种情况的逻辑图像。 只有作为图像，句子才陈述一件事。"},"children":[{"number":"4.031","texts":{"zh":"在命题中情况就像是用试验的方法组合起来的。可以径直说：“这个命题表述如此这般的情况”，而不说：“这个命题有如此这般的意义”。","en":"In a proposition a state of affairs is put together experimentally, as it were. Saying that this proposition has such and such a sense is really saying that this proposition represents such and such a state of affairs.","de":"Im Satz wird gleichsam eine Sachlage probeweise zusammengestellt. Man kann geradezu sagen: statt, dieser Satz hat diesen und diesen Sinn; dieser Satz stellt diese und diese Sachlage dar.","zh_wang":"在命题中事态就好像是为了试验而组合起来的。 可以直接说：“这个命题表述如此这般的事态”，而不说：“这个命题有如此这般的意义”","zh_huang":"通过句子，人们好像做实验一样拼合出一种情况来。 可以不说“这个句子有这样一种含义”，而是直接说，“这个句子表现这样一种情况”"},"children":[{"number":"4.0311","texts":{"zh":"一个名称代表一个事物，另一个名称代表另一个事物，而且它们是彼此组合起来的；这样它们整个地就像一幅活的画一样表现一个事态。","en":"One name stands for one thing, another for another thing, and they are combined with one another; in this way the whole—like a tableau vivant—presents a state-of-things.","de":"Ein Name steht für ein Ding, ein anderer für ein anderes Ding und untereinander sind sie verbunden, so stellt das Ganze – wie ein lebendes Bild – den Sachverhalt vor.","zh_wang":"一个名称代表一个事物，另一个名称代表另一个事物，而且它们彼此联在一起；这样，它们整个就像一幅生动的图画一样表现一个原子事实。","zh_huang":"一个名称表示一个东西，另一个名称表示另一个东西，这些名称连接在一起。这样，由此得到的整体就像一幅生动的图画，表现着事态。"},"children":[]},{"number":"4.0312","texts":{"zh":"命题的可能性建立在对象以记号为其代表物这一原理的基础上。 我的一个基本的思想是：“逻辑常项”不是代表物，事实的逻辑 是不能有代表物的。","en":"The possibility of a proposition rests on the principle of the representation of objects by signs. My fundamental thought is that the ‘logical constants’ do not represent. That the logic of facts cannot be represented.","de":"Die Möglichkeit des Satzes beruht auf dem Prinzip der Vertretung von Gegenständen durch Zeichen. Mein Grundgedanke ist, dass die „logischen Konstanten“ nicht vertreten. Dass sich die Logik der Tatsachen nicht vertreten lässt.","zh_wang":"命题的可能性是建立在标记代表对象这一原理的基础之上的。 我的基本思想是：“逻辑常项”不代表任何东西，事实的逻辑是不能由任何东西所代表的。","zh_huang":"句子之所以成为可能，是基于记号表示对象这一原则。 我的基本思想是，“逻辑常项”没有表示什么，没有什么东西可以表示事实的逻辑。"},"children":[]}]},{"number":"4.032","texts":{"zh":"只有当一个命题是合乎逻辑地组合起来的才是一个情况的图像。 （甚至命题“Ambulo” 也是组合的，因为它的词干配合另一种词尾，或它的词尾配合另一种词干，都会产生不同的意义。）","en":"A proposition is a picture of a state of affairs only insofar as it is logically articulated. (The proposition ‘ambulo’ is composite, too, since its stem with a different ending and its ending with a different stem yield different senses.)","de":"Nur insoweit ist der Satz ein Bild einer Sachlage, als er logisch gegliedert ist. (Auch der Satz „ambulo“ ist zusammengesetzt, denn sein Stamm ergibt mit einer anderen Endung und seine Endung mit einem anderen Stamm, einen anderen Sinn.)","zh_wang":"一个命题只有当其是合乎逻辑地组合起来时，才是一个事态的图像。 （甚至命题“ambulo” 也是组合的，因为它的词根配合另一种词尾，或它的词尾配合别的词根，都会得到不同的意义。）","zh_huang":"句子描述一种情况，只是因为它在逻辑上是结构分明的。 （甚至像“Ambulo”这样的句子也是组合而成的，因为它的词干配以不同词尾，其词尾结合不同词干，都会得到不同的含义）"},"children":[]}]},{"number":"4.04","texts":{"zh":"在一个命题和它所表述的情况中，应该恰好具有同样多的可以区分开来的部分。 两者必定具有同样的逻辑（数学）的多样性。（参照赫兹的《力学》论动力学模型。）","en":"In a proposition there must be exactly as many things distinguishable as in the state of affairs it represents. The two must have the same logical (mathematical) multiplicity. (Compare Hertz’s Mechanics, on Dynamic Models.)","de":"Am Satz muss gerade soviel zu unterscheiden sein, als an der Sachlage die er darstellt. Die beiden müssen die gleiche logische (mathematische) Mannigfaltigkeit besitzen. (Vergleiche Hertz’s Mechanik, über Dynamische Modelle.)","zh_wang":"在命题中和它所表述的事态必须具有恰好同样多的可区分的部分。 两者必须具有同样的逻辑的（数学的）多样性。（参照赫兹的《力学》论动力学模型部分。）","zh_huang":"句子中的可区分的部分，必须与其所表现的情况中的可区分部分同样多。 它们必须拥有同样程度的逻辑上的（数学上的）复杂度（参见赫兹《力学》中关于动力学模型的讨论）"},"children":[{"number":"4.041","texts":{"zh":"这种数学的多样性本身当然不能再被图示，因为图示时不可能摆脱这种多样性。","en":"This mathematical multiplicity, of course, cannot in its turn be depicted. One cannot get outside it in depiction.","de":"Diese mathematische Mannigfaltigkeit kann man natürlich nicht selbst wieder abbilden. Aus ihr kann man beim Abbilden nicht heraus.","zh_wang":"这种数学的多样性本身自然不能再被图示。在图示时，是不能超越这种多样性的。","zh_huang":"这种数学上的复杂度当然不能反过来成为所描述的对象。在描述的时候人们不能来到这种复杂度之外。"},"children":[{"number":"4.0411","texts":{"zh":"例如，如果我们想把“（x）・fx”所表达的东西，通过在“fx”前面加上一个附标来表达，如写作“Alg・fX”，那是不恰当的：我们会不知道那个附标概括的是什么。如果想用一个下标“a”来标示，如写作“f（xa）”，也不恰当：我们会不知道那个概括记号的范围。 如果试图在主目位置上引入一个标记来表达，如写作“（A，A）・F（A，A）”，仍然不恰当：我们会不能确立诸变项的同一性，如此等等。 所有这些标示方式都不恰当，因为它们没有必需的数学多样性。","en":"Trying to express, for example, what we express by ‘(x).fx’ by putting an index before ‘fx’—as in ‘Gen.fx’—wouldn’t work: we would not know what was being generalized. Trying to register it by an index ‘g’—as in ‘f (xg)’—wouldn’t work either: we would not know the scope of the generality-sign. Trying to do it by introducing a mark in the argument-places—as in ‘(G, G).F(G, G)’—wouldn’t work: we could not determine the identity of the variables. And so on. All these modes of signification do not work because they do not have the necessary mathematical multiplicity.","de":"Wollten wir z. B. das, was wir durch „(x).fx“ ausdrücken, durch Vorsetzen eines Indexes vor „fx“ ausdrücken – etwa so: „Alg. fx“, es würde nicht genügen – wir wüssten nicht, was verallgemeinert wurde. Wollten wir es durch einen Index „a“ anzeigen – etwa so: „f (xa)“ – es würde auch nicht genügen – wir wüssten nicht den Bereich der Allgemeinheitsbezeichnung. Wollten wir es durch Einführung einer Marke in die Argumentstellen versuchen – etwa so: „(A, A). F (A, A)“ – es würde nicht genügen – wir könnten die Identität der Variablen nicht feststellen. U. s. w. Alle diese Bezeichnungsweisen genügen nicht, weil sie nicht die notwendige mathematische Mannigfaltigkeit haben.","zh_wang":"例如，如果我们要把“（x ）·ƒx ”所表达的东西，通过在“ƒx ”之前加上一个指标来表达，比如写作“Ger·ƒx ” ，那是不行的：我们会不知道所概括的是什么。如果我们想要用一个指标“g ”来表示，如写作“ƒ （x g ） ，也不恰当：我们会不知道概括的范围。 如果试图在主目位置上引入一个标记，例如写作“（G，G）、F（G，G）”，还是不恰当的：我们会不能确定诸变项的同一性。如此等等。 所有这些标示方式都是不恰当的，因为它们缺乏必需的数学的多样性。","zh_huang":"比如，对于用“∀xf (x)”来表达的内容，如果我们采用在“f(x)”前面加词缀的方式，例如用“Algf(x)”这样的形式来表达，这就不行。我们不知道被概括的是什么。而如果加脚标“a”，写成比如说“f(xa)”的形式，这也不行。我们不知道概括记号的辖域。 如果是在主目位置上引入标记，比如“(A, A)F(A, A)”，还是不行。这样对变元我们就分不清哪个是哪个了。其他就不赘述了。 这些方法之所以都行不通，是因为缺乏必要的数学复杂度。"},"children":[]},{"number":"4.0412","texts":{"zh":"同样的道理，唯心主义者以“空间眼镜”解释空间关系的视觉是不恰当的，因为它不能解释这些关系的多样性。","en":"For the same reason the idealist’s explanation of the seeing of spatial relations via ‘spatial spectacles’ doesn’t work, because it cannot explain the multiplicity of these relations.","de":"Aus demselben Grunde genügt die idealistische Erklärung des Sehens der räumlichen Beziehungen durch die „Raumbrille“ nicht, weil sie nicht die Mannigfaltigkeit dieser Beziehungen erklären kann.","zh_wang":"根据同样的原因，唯心主义者以“空间眼镜“解释空间关系的视觉，那也是不恰当的，因为它不能解释这些关系的多样性。","zh_huang":"同样道理，利用“空间眼镜”来对空间关系的视像做出唯心论的解释，这也不行。因为这样不能解释这些关系的复杂度。"},"children":[]}]}]},{"number":"4.05","texts":{"zh":"实在是与命题相比较的。","en":"Reality is compared with a proposition.","de":"Die Wirklichkeit wird mit dem Satz verglichen.","zh_wang":"实在与命题相比较。","zh_huang":"实在被用来与句子相比较。"},"children":[]},{"number":"4.06","texts":{"zh":"命题只因为是实在的图像，才能为真或者为假。","en":"A proposition can be true or false only by being a picture of reality.","de":"Nur dadurch kann der Satz wahr oder falsch sein, indem er ein Bild der Wirklichkeit ist.","zh_wang":"命题只因为它是实在的图像，才能为真或者为假。","zh_huang":"句子能够是真是假，只因它是实在的图像。"},"children":[{"number":"4.061","texts":{"zh":"决不可忽略命题有一种独立于事实的意义，否则就很容易认为真和假是记号和它们所标示的东西之间具有同等地位的关系。 例如，这时人们就可以说，“p”以真的方式标示“～p”以假的方式所标示的东西，等等。","en":"If one does not bear in mind that a proposition has a sense that is independent of the facts, then one can easily suppose that true and false are relations between sign and what is signified that are on an equal footing. One could then say, for example, that ‘p’ signifies in the true way what ‘~p’ signifies in the false way, etc.","de":"Beachtet man nicht, dass der Satz einen von den Tatsachen unabhängigen Sinn hat, so kann man leicht glauben, dass wahr und falsch gleichberechtigte Beziehungen von Zeichen und Bezeichnetem sind. Man könnte dann z. B. sagen, dass „p“ auf die wahre Art bezeichnet, was „∼p“ auf die falsche Art, etc.","zh_wang":"如果不能注意到命题有一种不依附于事实的意义，便很容易相信真与假是标记与所标示物之间具有的两种平等的关系。 例如，这时人们就可以说“p ”以真的方式标示“～p ”以假的方式所标示的东西，等等。","zh_huang":"一定不要忽视，句子独立于事实拥有含义，否则就很容易以为，真和假是记号与所表示的事物之间具有同等地位的关系。 在这种意义上人们就会说，比如，“p”作为真方式表示“~p”作为假方式所表示的东西，诸如此类。"},"children":[]},{"number":"4.062","texts":{"zh":"我们能否用假命题——只要我们知道它们被认为是假的——来表达自己，就像我们一直用真命题表达自己一样呢？不能！因为如果我们用一个命题来说一些事物处于一定情况，而且它们确实如此，则这个命题为真；如果我们用“p”意指“～p”，而且情况确如我们所指的那样，那么在新的理解下“p”为真而不为假。","en":"Can’t we communicate with false propositions as we have done up to now with true ones? So long as we know that they are meant to be false. No! For a proposition is true if things are as we say they are by using it; and if we mean ~p by ‘p’, and things are as we mean it, then ‘p’ in the new conception is true and not false.","de":"Kann man sich nicht mit falschen Sätzen, wie bisher mit wahren, verständigen? Solange man nur weiss, dass sie falsch gemeint sind. Nein! Denn, wahr ist ein Satz, wenn es sich so verhält, wie wir es durch ihn sagen; und wenn wir mit „p“ ∼p meinen, und es sich so verhält wie wir es meinen, so ist „p“ in der neuen Auffassung wahr und nicht falsch.","zh_wang":"只要知道那些命题是设定为假的，我们能否就用这些假命题来表达自己，就像用真的命题表达自己一样呢？不能！因为如果情况确如命题所说的那样，那么这个命题就是真的；如果我们用“p ”来指“～p ”，而且情况确如我们所指的那样，那么在新的理解下“p ”则为真而不为假。","zh_huang":"难道我们就不能像人们以前用真句子那样，用假句子来表达吗？只要知道我们用那些句子来表达的是假的就行了。——不行！因为，只要我们用句子来说情况如何，而情况就是所说的那样，那么句子就是真的；而如果用“p”我们要说的是~p，而情况就是那样，那么按照这种新的解释，“p”就是真的而不是假的。"},"children":[{"number":"4.0621","texts":{"zh":"然而记号“p”和“～p”能 说同样的东西，这一点很重要，因为它表明实在中没有与记号“～”相对应的东西。 一个命题中出现的否定，不足以表征这个命题的意义（～～p＝p）。 命题“p”和“～p”具有相反的意义，但是和它们相对应的是同一个实在。","en":"However, it is important that the signs ‘p’ and ‘~p’ can say the same. For it shows that nothing in reality corresponds to the sign ‘~’. The occurrence of negation in a proposition is not necessarily a mark of its sense (~~p = p). The propositions ‘p’ and ‘~p’ have opposite sense, but one and the same reality corresponds to them.","de":"Dass aber die Zeichen „p“ und „∼p“ das gleiche sagen können, ist wichtig. Denn es zeigt, dass dem Zeichen „∼“ in der Wirklichkeit nichts entspricht. Dass in einem Satz die Verneinung vorkommt, ist noch kein Merkmal seines Sinnes (∼∼p = p). Die Sätze „p“ und „∼p“ haben entgegengesetzten Sinn, aber es entspricht ihnen eine und dieselbe Wirklichkeit.","zh_wang":"然而，标记“p ”和“～p ”能说同样的东西，这一点是重要的，因为它表明，标记“～”在实在中没有与之相对应的东西。 在一个命题中出现的否定，不是这个命题意义的表征（～～p =p ）。 命题“p ”和“～p ”具有相反的意义，但是和它们相对应的是同一个实在。","zh_huang":"然而，记号“p”和“~p”能够表达同样的事情，是重要的，因为这表明“～”在实在中不对应于任何东西。 在句子中出现否定，这不足以表明其含义有什么特征（~~p=p）。 句子“p”与“~p”有相反的含义，但与之对应的是同一个实在。"},"children":[]}]},{"number":"4.063","texts":{"zh":"可用一个比喻来说明真这个概念：设想白纸上有一个黑斑块：通过指明这纸上的每一点是黑的还是白的，就可描述这个斑块的形状。一个点是黑的事实，相应于一个肯定的事实，一个点是白（非黑）的事实，则相应于一个否定的事实。如果我在纸面上指出一个点（即弗雷格所谓的真值），这就相应于一个为判断而提出的假定，如此等等。 但是为了能够说出一个点是黑的或者白的，我必须首先知道一个点在什么情况下称为黑的和在什么情况下称为白的：为了能够说“p”为真（或者假），我必须规定在何种情况下我称“p”为真，并由此而规定这命题的意义。 这一比喻的不足之处在于：即使我们不知道什么是黑的和白的，我们也可以指出纸上的一点；但是如果一个命题没有意义，是没有什么东西与它相对应的，因为它并不标示一个具有可以称为“假”或“真”这种属性的东西（即真值）。一个命题的动词，并非如弗雷格所认为的，“为真”或者“为假”，而是“为真”的东西必须已经包含着动词。","en":"A picture to explain the concept of truth: black spot on white paper; the form of the spot can be described by stating for each point of the surface whether it is white or black. The fact that a point is black corresponds to a positive fact, that a point is white (not black) to a negative fact. If I signify a point of the surface (a Fregean truth-value), then this corresponds to the supposition that is put up for judgement, etc. etc. However, to be able to say that a point is black or white, I must first know when a point is called black and when white; to be able to say that ‘p’ is true (or false), I must have determined under what circumstances I call ‘p’ true, and I thereby determine the sense of the proposition. The point at which the analogy breaks down is now this: we can indicate a point on the paper without even knowing what white and black are; but nothing at all corresponds to a proposition without sense, since it does not signify a thing (truth-value) whose properties are called, say, ‘false’ or ‘true’; the verb of a proposition is not ‘is true’ or ‘is false’—as Frege supposed—but that which is ‘true’ must already contain the verb.","de":"Ein Bild zur Erklärung des Wahrheitsbegriffes: Schwarzer Fleck auf weissem Papier; die Form des Fleckes kann man beschreiben, indem man für jeden Punkt der Fläche angibt, ob er weiss oder schwarz ist. Der Tatsache, dass ein Punkt schwarz ist, entspricht eine positive – der, dass ein Punkt weiss (nicht schwarz) ist, eine negative Tatsache. Bezeichne ich einen Punkt der Fläche (einen Frege’schen Wahrheitswert), so entspricht dies der Annahme, die zur Beurteilung aufgestellt wird, etc. etc. Um aber sagen zu können, ein Punkt sei schwarz oder weiss, muss ich vorerst wissen, wann man einen Punkt schwarz und wann man ihn weiss nennt; um sagen zu können: „p“ ist wahr (oder falsch), muss ich bestimmt haben, unter welchen Umständen ich „p“ wahr nenne, und damit bestimme ich den Sinn des Satzes. Der Punkt an dem das Gleichnis hinkt ist nun der: Wir können auf einen Punkt des Papiers zeigen, auch ohne zu wissen, was weiss und schwarz ist; einem Satz ohne Sinn aber entspricht gar nichts, denn er bezeichnet kein Ding (Wahrheitswert) dessen Eigenschaften etwa „falsch“ oder „wahr“ hiessen; das Verbum eines Satzes ist nicht „ist wahr“ oder „ist falsch“ – wie Frege glaubte –, sondern das, was „wahr ist“ muss das Verbum schon enthalten.","zh_wang":"用一个比喻来说明真这个概念：设想白纸上有一个黑斑点：通过说出这纸上的每一点是黑的还是白的，就可将这个斑点的形状描述出来。对于一个点是黑的这一事实，相应于一个肯定的事实，对于一个点是白（不是黑）的事实，相应于一个否定的事实。如果我指纸面上的一个点（即弗雷格所谓的真值），这便与为判断而设的假定相对应，如此等等。 但是要想能够说出一个点是黑或者是白，我必须先知道在什么情况下一个点称为黑的，在什么情况下称为白的：要想能够说“p ”是真的（或者假的），我必须已经先规定了在什么情况下说“P ”是真，从而规定了命题的意义。 这个比喻的缺陷在于：即使我们不知道什么是黑的和白的，我们也可以指出纸上的一点；但是一个没有意义的命题，是没有任何东西与它相对应的，因为它并不标示一个具有称为“假”或“真”的属性的东西（即真值）。命题的动词并不是“是真的”或者“是假的”——如弗雷格所认为的那样——而是“是真的”东西必定已经含有动词。","zh_huang":"用类比来解释“真”这个概念。白纸上有块黑斑，你可以说明纸上的每一个点是黑的还是白的，以此来描述黑斑的形状。一个点是黑的，这对应于肯定事实，而与一个点是白的（不是黑的）对应的则是否定事实。如果我指出纸上的一个点（用弗雷格的说法就是一个真值），那就对应于要在判断中给出的一个设定等。 此外，确定一个点是黑的还是白的，我必须先知道在什么情况下一个点叫作黑还是白；而要确定“p”是真的（或假的），我必须确定在什么情况下称“p”为真，从而确定句子的含义。 然而，相似性在这一点上消失了：我们可以在纸上指出一个点，而无须知道什么是黑什么是白；但句子若没有含义，那就没有任何东西与之对应，因为它并不表示某种以我们所说的“真”和“假”为性质的东西（即真值）。句子的动词不是像弗雷格所想的那样“是真的”或“是假的”；应当说，那些“是真的”的东西已经包含了动词。"},"children":[]},{"number":"4.064","texts":{"zh":"每个命题必须已经 具有一个意义：肯定并不能给命题以意义，因为所肯定的东西正好就是命题的意义。这一点同样也适用于否定，等等。","en":"Every proposition must already have sense; affirmation cannot give it sense, for what is affirmed is precisely its sense. And the same holds for negation, etc.","de":"Jeder Satz muss schon einen Sinn haben; die Bejahung kann ihn ihm nicht geben, denn sie bejaht ja gerade den Sinn. Und dasselbe gilt von der Verneinung, etc.","zh_wang":"每个命题必定已经具有一个意义；肯定并不能给命题以意义，因为所肯定的东西就是命题的意义本身。这一点也同样适用于否定，等等。","zh_huang":"所有命题都必定已经有含义，断定并不能赋予其含义。其实被断定的恰恰就是含义本身。对于否定以及其他诸如此类的情况也是如此。"},"children":[{"number":"4.0641","texts":{"zh":"可以说，否定必定已经与被否定命题所规定的逻辑位置有关。 否定命题规定一个不同于 被否定命题所规定的逻辑位置。 否定命题借助被否定命题的逻辑位置来规定一个逻辑位置，因为它是在后者逻辑位置之外来描述后者的。 被否定命题可以再被否定，这本身就表明，被否定者已经是一个命题，而不仅仅是命题的某个起始部分。","en":"One could say: negation already relates to the logical place that the negated proposition determines. The negating proposition determines a different logical place than the negated does. The negating proposition determines a logical place by means of the logical place of the negated proposition in describing the former as lying outside the latter. That the negated proposition can again be negated alone shows that what is negated is already a proposition and not just the preliminary to a proposition.","de":"Man könnte sagen: Die Verneinung bezieht sich schon auf den logischen Ort, den der verneinte Satz bestimmt. Der verneinende Satz bestimmt einen anderen logischen Ort als der verneinte. Der verneinende Satz bestimmt einen logischen Ort mit Hilfe des logischen Ortes des verneinten Satzes, indem er jenen als ausserhalb diesem liegend beschreibt. Dass man den verneinten Satz wieder verneinen kann, zeigt schon, dass das, was verneint wird, schon ein Satz und nicht erst die Vorbereitung zu einem Satze ist.","zh_wang":"可以说，否定已经与被否定命题所规定的逻辑位置相关。 否定命题规定一个与被否定命题所规定的不同的逻辑位置。 否定命题借助被否定命题的逻辑位置来规定一个逻辑位置，因为它把后者说成是处于该逻辑位置之外的。 被否定的命题可以再被否定，这表明：被否定者已经是一个命题，而不仅仅是命题的起始部分。","zh_huang":"可以说，否定必须与被否定的句子所确定的逻辑位置相联系。 否定句确定了一个区别于被否定句的位置。 借助被否定句子的逻辑位置，否定句也确定一个逻辑位置，它把该位置描述为位于被否定句子的逻辑位置之外。 可以对否定句进行再次否定，而这就说明被否定的已经是一个句子，而不是某种还够不上句子的东西。"},"children":[]}]}]},{"number":"4.1","texts":{"zh":"命题表述事态的存在和不存在。","en":"A proposition represents the obtaining and non-obtaining of states-of-things.","de":"Der Satz stellt das Bestehen und Nichtbestehen der Sachverhalte dar.","zh_wang":"命题表述原子事实的存在与不存在。","zh_huang":"句子表现事态的存在和不存在。"},"children":[{"number":"4.11","texts":{"zh":"真命题的总体就是全部自然科学（或各门自然科学的总体）。","en":"The totality of true propositions is natural science in total (or the totality of the natural sciences).","de":"Die Gesamtheit der wahren Sätze ist die gesamte Naturwissenschaft (oder die Gesamtheit der Naturwissenschaften).","zh_wang":"真命题的总和就是全部自然科学（或各门自然科学的总和）","zh_huang":"整个自然科学（或自然科学的总体）就构成所有真句子。"},"children":[{"number":"4.111","texts":{"zh":"哲学不是自然科学之一。 （“哲学”一词所指的东西，应该位于各门自然科学之上或者之下，而不是同它们并列。）","en":"Philosophy is not one of the natural sciences. (The word ‘philosophy’ must mean something that stands above or below, but not next to, the natural sciences.)","de":"Die Philosophie ist keine der Naturwissenschaften. (Das Wort „Philosophie“ muss etwas bedeuten, was über oder unter, aber nicht neben den Naturwissenschaften steht.)","zh_wang":"哲学不是自然科学之一。 （“哲学”一词所指的东西，必须是某种位于自然科学之上或之下，而不是同它们并列的东西。）","zh_huang":"哲学不属于自然科学。 （“哲学”这个词应该意味着某种位于自然科学之上或之下的学科，而不会与之并列。）"},"children":[]},{"number":"4.112","texts":{"zh":"哲学的目的是从逻辑上澄清思想。 哲学不是一门学说，而是一项活动。 哲学著作从本质上来看是由一些解释构成的。 哲学的成果不是一些“哲学命题”，而是命题的澄清。 可以说，没有哲学，思想就会模糊不清：哲学应该使思想清晰，并且为思想划定明确的界限。","en":"The purpose of philosophy is the logical clarification of thoughts. Philosophy is not a set of teachings but an activity. A philosophical work consists essentially of elucidations. Philosophy results not in ‘philosophical propositions’ but in propositions becoming clear. Philosophy should make clear and delimit sharply thoughts that are otherwise, as it were, cloudy and blurred.","de":"Der Zweck der Philosophie ist die logische Klärung der Gedanken. Die Philosophie ist keine Lehre, sondern eine Tätigkeit. Ein philosophisches Werk besteht wesentlich aus Erläuterungen. Das Resultat der Philosophie sind nicht „philosophische Sätze“, sondern das Klarwerden von Sätzen. Die Philosophie soll die Gedanken, die sonst, gleichsam, trübe und verschwommen sind, klar machen und scharf abgrenzen.","zh_wang":"哲学的目的是对思想的逻辑澄清。 哲学不是一种学说，而是一种活动。 一部哲学著作，从本质上来看是由一些阐明构成的。 哲学的成果不是若干“哲学命题”，而是把命题澄清。 哲学应该把那些没有哲学就会模糊不清的思想弄清楚，并为之划定明确的界限。","zh_huang":"哲学的目的是在逻辑上澄清思想。 哲学不是理论，而是活动。 哲学著作本质上是由阐明所构成的。 哲学并不产出“哲学命题”，而是澄清命题。 没有哲学，思想就会是混乱和模糊的。哲学的任务就是使之清楚起来，并赋予明确的界限。"},"children":[{"number":"4.1121","texts":{"zh":"心理学不比任何其它自然科学更为接近哲学。 知识论是心理学的哲学。 我对记号语言的研究，和哲学家们认为对逻辑哲学如此重要的那种思想过程的研究，难道不是一致的吗？只是在大多数情形下，他们都纠缠于一些非本质的心理学考察，在我的方法这里也有类似的危险。","en":"Psychology is no more akin to philosophy than is any other natural science.Theory of knowledge is the philosophy of psychology.Does not my study of sign-language correspond to the study of thought processes, which philosophers considered so essential to philosophy of logic? Only they usually got entangled in inessential psychological investigations, and there is an analogous danger as well with my method.","de":"Die Psychologie ist der Philosophie nicht verwandter als irgend eine andere Naturwissenschaft. Erkenntnistheorie ist die Philosophie der Psychologie. Entspricht nicht mein Studium der Zeichensprache dem Studium der Denkprozesse, welches die Philosophen für die Philosophie der Logik für so wesentlich hielten? Nur verwickelten sie sich meistens in unwesentliche psychologische Untersuchungen und eine analoge Gefahr gibt es auch bei meiner Methode.","zh_wang":"心理学与哲学的关系并不比其它任何自然科学更为接近。 认识论是心理学的哲学。 我对标记语言的研究不是相当于哲学家们认为对逻辑哲学如此重要的那种思想过程的研究吗？只是他们主要都纠缠于非本质的心理学研究上，就我的方法来说，也有一种类似的危险。","zh_huang":"心理学与其他自然科学一样区别于哲学。 知识论就是关于心理学的哲学。 难道我关于记号语言的研究不就对应于对思考过程展开的研究吗？这种对思考过程的研究曾被哲学家认为对逻辑哲学是重要的，只不过过去的哲学家大都纠缠于不重要的心理学研究了。我的方法也有类似危险。"},"children":[]},{"number":"4.1122","texts":{"zh":"达尔文的理论不比自然科学中任何其它一种假设更与哲学有关。","en":"Darwinian theory has no more to do with philosophy than has any other hypothesis of natural science.","de":"Die Darwinsche Theorie hat mit der Philosophie nicht mehr zu schaffen, als irgend eine andere Hypothese der Naturwissenschaft.","zh_wang":"达尔文的理论并不比自然科学中主要任何其它一种假设更与哲学有关。","zh_huang":"达尔文的理论和任何其他自然科学假说一样，都与哲学无关。"},"children":[]}]},{"number":"4.113","texts":{"zh":"哲学为自然科学划定可以在其中进行争论的范围。","en":"Philosophy limits the disputable realm of natural science.","de":"Die Philosophie begrenzt das bestreitbare Gebiet der Naturwissenschaft.","zh_wang":"哲学为自然科学中存在争论的范围划出界限。","zh_huang":"哲学限定了自然科学争论的范围。"},"children":[]},{"number":"4.114","texts":{"zh":"哲学应当为能思考的东西划定界限，从而也为不能思考的东西划定界限。 哲学应当从内部通过能思考的东西为不能思考的东西划定界限。","en":"It should delimit the thinkable and thereby the unthinkable. It should limit the unthinkable from within through the thinkable.","de":"Sie soll das Denkbare abgrenzen und damit das Undenkbare. Sie soll das Undenkbare von innen durch das Denkbare begrenzen.","zh_wang":"哲学应当为可思考的东西划出界限，从而也为不可思考的东西划出界限。 哲学应当从内部通过可思考的东西为不可思考的东西划出界限。","zh_huang":"它应该为可以思考的东西划定界限，从而为不可思考的东西划定界限。 它应当通过从可思考的范围之内出发，来分出不可思考的。"},"children":[]},{"number":"4.115","texts":{"zh":"哲学将通过清楚地表达可说的东西来指谓那不可说的东西。","en":"It will indicate the unsayable by clearly representing the sayable.","de":"Sie wird das Unsagbare bedeuten, indem sie das Sagbare klar darstellt.","zh_wang":"哲学要通过清楚地表达可说的东西来指谓不可说的东西。","zh_huang":"通过清楚地展示哪些可以说，它表明哪些不可说。"},"children":[]},{"number":"4.116","texts":{"zh":"凡是能思考的东西都能清楚地思考。凡是可以说的东西都可以清楚地说出来。","en":"Everything that can be thought at all can be thought clearly. Everything that can be stated can be stated clearly.","de":"Alles was überhaupt gedacht werden kann, kann klar gedacht werden. Alles was sich aussprechen lässt, lässt sich klar aussprechen.","zh_wang":"凡是可思考的东西都可清楚地思考。凡是可以说的东西都可以清楚地说出来。","zh_huang":"一切终究可以思考的东西都可以清楚地加以思考。一切可以说的，都可以说清楚。"},"children":[]}]},{"number":"4.12","texts":{"zh":"命题能够表述全部实在，但是不能表述它们为了能够表述实在而必须和实在共有的东西——即逻辑形式。 为了能够表述逻辑形式，我们必须能够和命题一起置身于逻辑之外，也就是说，置身于世界之外。","en":"A proposition can represent the whole of reality, but it cannot represent what it must have in common with reality to be able to represent it—the logical form. To be able to represent the logical form, we would have to be able to position ourselves with a proposition outside logic, that is, outside the world.","de":"Der Satz kann die gesamte Wirklichkeit darstellen, aber er kann nicht das darstellen, was er mit der Wirklichkeit gemein haben muss, um sie darstellen zu können – die logische Form. Um die logische Form darstellen zu können, müssten wir uns mit dem Satze ausserhalb der Logik aufstellen können, das heisst ausserhalb der Welt.","zh_wang":"命题能够表现全部实在，但是不能表现它们为表现实在而必须和实在共有的东西——逻辑形式。 为了能够表述逻辑形式，我们必须能把自己和命题一起置身于逻辑之外，也就是世界之外。","zh_huang":"句子可以描述整个实在，但不能描述为了描述实在而必须与之共有的东西，即逻辑形式。 为了能够描述逻辑形式，我们就得能够带着句子一起来到逻辑之外，也就是说，来到世界之外。"},"children":[{"number":"4.121","texts":{"zh":"命题不能表述逻辑形式：后者反映于命题之中。 自行反映在语言中的东西，语言不能表述。 语言中表达了自己 的东西，我们 不能用语言来表达。 命题显示 实在的逻辑形式。 命题展示出这种逻辑形式。","en":"A proposition cannot represent the logical form; the logical form mirrors itself in the proposition. What mirrors itself in language, language cannot represent. What expresses itself in language we cannot express by means of language. A proposition shows the logical form of reality. It features it.","de":"Der Satz kann die logische Form nicht darstellen, sie spiegelt sich in ihm. Was sich in der Sprache spiegelt, kann sie nicht darstellen. Was sich in der Sprache ausdrückt, können wir nicht durch sie ausdrücken. Der Satz zeigt die logische Form der Wirklichkeit. Er weist sie auf.","zh_wang":"命题不能表述逻辑形式；逻辑形式自己反映于命题之中。 自己反映在语言中的东西，语言不能表述。 在语言中表达了自身的东西，我们不能用语言来表达。 命题表明实在的逻辑形式。 命题展示出逻辑形式。","zh_huang":"逻辑形式不能为句子所描述，它在句子中反映自己。 在语言中反映出来的东西，语言不能描述。 能够自己在语言中表达自己的东西，不能由我们用语言来表达。 句子显示实在的逻辑形式。 句子展示它。"},"children":[{"number":"4.1211","texts":{"zh":"因此，一个命题“fa”显示：对象a出现在该命题的意义中：两个命题“fa”和“ga”则显示：二者说的是同一个对象。 如果两个命题互相矛盾，则它们的结构显示这一点；如果其中一个从另一个推导出来，也由其结构显示出来。如此等等。","en":"A proposition ‘fa’ thus shows that the object a occurs in its sense, two propositions ‘fa’ and ‘ga’ show that they are both about the same object.If two propositions contradict one another, then their structure shows this; likewise, if one follows from the other. And so on.","de":"So zeigt ein Satz „fa“, dass in seinem Sinn der Gegenstand a vorkommt, zwei Sätze „fa“ und „ga“, dass in ihnen beiden von demselben Gegenstand die Rede ist. Wenn zwei Sätze einander widersprechen, so zeigt dies ihre Struktur; ebenso, wenn einer aus dem anderen folgt. U. s. w.","zh_wang":"因此，“fa”这一个命题表明在它的意义中包含了对象a ；“ƒa” 和“ga ”两个命题则表明二者说的是同一个对象。 如果两个命题互相矛盾，那么它们的结构便表明这一点；如果其中一个是从另一个推导出来的，同样由其结构表明。如此等等。","zh_huang":"比如，句子“f(a)”显示出，对象a出现在它的含义中，而“f(a)”和“g(a)”则显示出它们谈论的是同一个对象。 要是两个句子彼此矛盾，那么其结构会显示这一点。同样，结构也会表明一个句子是从另外一个句子推出来的。其他情况也是一样。"},"children":[]},{"number":"4.1212","texts":{"zh":"能 显示出来的东西，不能 说出来。","en":"What can be shown cannot be said.","de":"Was gezeigt werden kann, kann nicht gesagt werden.","zh_wang":"能表明出来的东西，就不能说出来。","zh_huang":"能显示的，不能言说。"},"children":[]},{"number":"4.1213","texts":{"zh":"现在我们也理解了我们的这种感觉：只要我们的记号语言中一切都得到正确处理，我们也就有了一个正确的逻辑观点。","en":"Now we understand, too, our feeling that we are in possession of a correct logical conception once everything is in order in our sign-language.","de":"Jetzt verstehen wir auch unser Gefühl: dass wir im Besitze einer richtigen logischen Auffassung seien, wenn nur einmal alles in unserer Zeichensprache stimmt.","zh_wang":"现在我们理解到，为什么觉得只要我们的符号语言中没有错误，我们就有了正确的逻辑观点。","zh_huang":"这样也就可以明白，我们为什么会觉得，只要在记号语言中一切各就其位，我们也就拥有了正确的逻辑概念。"},"children":[]}]},{"number":"4.122","texts":{"zh":"在某种意义上我们可以谈对象和事态的形式属性，或者，对事实而言，谈它们的结构属性，以及在同一意义上谈它们的形式关系和结构关系。 ［我也可以不说“结构属性”而说“内部属性”；不说“结构关系”而说“内部关系”。 我引入这些表达式，是为了指明在哲学家当中广为流行的混淆内部关系和真正的（外部）关系的根源。］ 不过，这些内部属性和关系的存在不能通过命题来断言，而是在表述有关事态和涉及有关对象的命题中它们自己显示出来。","en":"We can talk in a certain sense of formal properties of objects and states-of-things, or of properties of the structure of facts, and in the same sense of formal relations and relations of structures. (Instead of ‘property of a structure’ I also say ‘internal property’; instead of ‘relation of structures’ ‘internal relation’. I introduce these expressions to show the ground of the widespread confusion among philosophers between internal relations and real (external) relations.) The obtaining of such internal properties and relations, however, cannot be asserted by means of propositions, but shows itself in the propositions that represent the relevant states-of-things and concern the relevant objects.","de":"Wir können in gewissem Sinne von formalen Eigenschaften der Gegenstände und Sachverhalte bezw. von Eigenschaften der Struktur der Tatsachen reden und in demselben Sinne von formalen Relationen und Relationen von Strukturen. (Statt Eigenschaft der Struktur sage ich auch „interne Eigenschaft“; statt Relation der Strukturen „interne Relation“. Ich führe diese Ausdrücke ein, um den Grund der, bei den Philosophen sehr verbreiteten Verwechslung zwischen den internen Relationen und den eigentlichen (externen) Relationen zu zeigen.) Das Bestehen solcher interner Eigenschaften und Relationen kann aber nicht durch Sätze behauptet werden, sondern es zeigt sich in den Sätzen, welche jene Sachverhalte darstellen und von jenen Gegenständen handeln.","zh_wang":"在某种意义上我们可以谈对象和原子事实的形式属性或事实的结构属性，以及在同一意义上谈它们的形式关系和结构关系。 [我也用“内在属性”代替“结构属性”；“内在关系”代替“结构关系”。 我引入这些表达式，是为了指明在哲学家当中非常流行的混淆内部关系和真正的（外部）关系的根源。] 但是，这些内部属性和关系的存在，不能以命题来判定，而是显示在表述有关原子事实和涉及有关对象的命题中。","zh_huang":"在某种意义上我们可以谈论对象或事态的形式性质，而对于事实，可以谈论结构上的性质。在同样意义上也可以谈论形式关系和结构关系。 （我不说“结构性质”，而是说“内在性质”，不用“结构关系”，而用“内在关系”。） 我引入这些术语，意在表明为什么会把内在关系和真正的（外在的）关系弄混。这种混淆在哲学家中相当普遍。 内在性质和内在关系的存在是不能用句子来断言的，而是自己显示在描述相关事态和谈论相关对象的句子中。"},"children":[{"number":"4.1221","texts":{"zh":"事实的一个内部属性也可以称为这个事实的一个特征（如在我们所说的面部特征的意义上。）","en":"An internal property of a fact we can also call a feature of the fact. (In the sense in which we speak, say, of facial features.)","de":"Eine interne Eigenschaft einer Tatsache können wir auch einen Zug dieser Tatsache nennen. (In dem Sinn, in welchem wir etwa von Gesichtszügen sprechen.)","zh_wang":"一个事实的内部属性也可以称为该事实的一个特征（在我们所说面貌特征的意义上）","zh_huang":"事实的内在性质也可以说是事实的一种特征（比如，这有点像在说面部特征）"},"children":[]}]},{"number":"4.123","texts":{"zh":"一个属性，如果不能设想它的对象不具有它，它就是一个内部属性。 （因此，这个蓝色同那个蓝色处在浅些或者深些的内部关系中。这 两个对象不处在这种关系中是不可设想的。） （在这里，“对象”一词的变化不定的用法和“属性”、“关系”这两个词的变化不定的用法是一致的。）","en":"A property is internal if it is unthinkable that its object does not have it. (This blue colour and that one stand in the internal relation of lighter and darker eo ipso. It is unthinkable that these two objects should not stand in this relation.) (Here to the shifting use of the words ‘property’ and ‘relation’ there corresponds the shifting use of the word ‘object’.)","de":"Eine Eigenschaft ist intern, wenn es undenkbar ist, dass ihr Gegenstand sie nicht besitzt. (Diese blaue Farbe und jene stehen in der internen Relation von heller und dunkler eo ipso. Es ist undenkbar, dass diese beiden Gegenstände nicht in dieser Relation stünden.) (Hier entspricht dem schwankenden Gebrauch der Worte „Eigenschaft“ und „Relation“ der schwankende Gebrauch des Wortes „Gegenstand“.)","zh_wang":"一个属性，如果不能设想它的对象不具有它，它就是一个内部属性。 （因此，这个蓝色同那个蓝色处在较浅或者较深的内部关系中。这两个对象不处于这种关系中，是难以想象的。） （在此，“对象”一词的变化不定的用法和“属性”、“关系”这两个词的变化不定的用法是相应的。）","zh_huang":"一种性质，如果对象缺少它就不可想象，那么它就是内在性质。 （这块蓝色与那块蓝色之间就有一个比另一个更亮或更暗这样一种内在关系。这两个对象不具备这种关系，这是不可想象的。） （这里，用不同的方式使用“性质”与“关系”这两个词，也就要用不同的方式使用“对象”这个词。）"},"children":[]},{"number":"4.124","texts":{"zh":"一个可能情况的某个内部属性的存在，不是用命题来表达，而是在表述这个情况的命题中，通过该命题的一个内部属性自己表达出来。 断言命题具有一种形式属性和否认它具有一种形式属性，同样是无意义的。","en":"The obtaining of an internal property of a possible state of affairs is not expressed by a proposition, but expresses itself in the proposition that represents the state of affairs by an internal property of the proposition. It would be just as nonsensical to ascribe a formal property to a proposition as to deny its ascription.","de":"Das Bestehen einer internen Eigenschaft einer möglichen Sachlage wird nicht durch einen Satz ausgedrückt, sondern es drückt sich in dem sie darstellenden Satz, durch eine interne Eigenschaft dieses Satzes aus. Es wäre ebenso unsinnig, dem Satze eine formale Eigenschaft zuzusprechen, als sie ihm abzusprechen.","zh_wang":"一个可能事态的一个内部属性的存在，不是以一个命题来表达的，而是在表述这个事态的命题中，通过该命题的一个内部属性自己表达出来。 断言一个命题具有一种形式属性与否定其具有一种形式属性，同样是毫无意义的。","zh_huang":"一种可能情况的内在性质的存在，不是用句子表达出来的，而是在描述这种情况的句子中，通过句子的内在性质，自己表达出来。 断定一个句子有一种形式性质，这和否定它有这种形式性质一样，都是无意义的。"},"children":[{"number":"4.1241","texts":{"zh":"说一种形式具有这种属性而另一种形式具有那种属性，是不可能把两种形式彼此区分开来的：因为这样就要假定二者之中任一属性归属任一形式是有意义的。","en":"Forms cannot be distinguished from one another by saying that one has this and another has that property, since this presupposes that it makes sense to predicate the two properties to the two forms.","de":"Formen kann man nicht dadurch von einander unterscheiden, dass man sagt, die eine habe diese, die andere aber jene Eigenschaft; denn dies setzt voraus, dass es einen Sinn habe, beide Eigenschaften von beiden Formen auszusagen.","zh_wang":"说一种形式具有这种属性，另外一种形式具有那种属性，是不能把两种形式区别开来的：因为这样就假定了它们两者之中任何一个属性归属任何一种形式是有意义的。","zh_huang":"不可能通过说一种形式具有这种性质，另一种形式具有那种性质，以此把不同形式区别开，因为这就假定了能有意义地断定形式具有性质。"},"children":[]}]},{"number":"4.125","texts":{"zh":"可能情况之间的某种内部关系的存在，通过表述这些情况的命题之间的某种内部关系在语言中自己表达出来。","en":"The obtaining of an internal relation between possible states of affairs expresses itself linguistically by an internal relation between the propositions that represent them.","de":"Das Bestehen einer internen Relation zwischen möglichen Sachlagen drückt sich sprachlich durch eine interne Relation zwischen den sie darstellenden Sätzen aus.","zh_wang":"可能的事态之间的一个内在关系的存在，通过表述这些情况的命题之间的一种内在关系而在语言中表达出来。","zh_huang":"可能情况之间内在关系的存在，是通过描述情况的句子之间的内在关系，在语言中表达自己的。"},"children":[{"number":"4.1251","texts":{"zh":"这里我们就得到了关于“是否所有关系都是内部的或者外部的”这个争论不休的问题的回答。","en":"This resolves the dispute ‘whether all relations are internal or external’.","de":"Hier erledigt sich nun die Streitfrage „ob alle Relationen intern oder extern“ seien.","zh_wang":"现在“一切关系都是内在的还是外在的”这个争论不休的问题在这里就得以解决了。","zh_huang":"这样也就解决了“所有关系是内在的还是外在的”这样的问题。"},"children":[]},{"number":"4.1252","texts":{"zh":"一个按照内部 关系依次序排列的系列，我称为形式系列。数列不是按照外部关系，而是按照内部关系依次序排列的。 命题系列也是如此： “aRb” “（Ǝ x）：aRx・xRb” “（Ǝ x，y）：aRx・xRy・yRb”如此等等。 （如果b对a处在上述关系之一，我称b为a的一个后继。）","en":"Series that are ordered by internal relations I call form-series. The number series is ordered not by an external but by an internal relation. Just as in the series of propositions‘aRb’,‘(∃x):aRx.xRb’,‘(∃x,y):aRx.xRy.yRb’,and so forth.(If b stands in one of these relations to a, then I call b a successor of a.)","de":"Reihen, welche durch interne Relationen geordnet sind, nenne ich Formenreihen. Die Zahlenreihe ist nicht nach einer externen, sondern nach einer internen Relation geordnet. Ebenso die Reihe der Sätze „aRb“, „(∃x): aRx. xRb“, „(∃x, y): aRx. xRy. yRb“, u. s. f. (Steht b in einer dieser Beziehungen zu a, so nenne ich b einen Nachfolger von a.)","zh_wang":"按照内在关系，依次排列的系列，我叫做形式系列。 数列不是按照外在关系，而是按照内在关系按照次序排列的。 命题系列“aRb”也是这样： “（ョx ）：aRx.xRb ”， “（ョx ，y）aRx.xRy.yRb” ，等等。 （如果b 对a 处在这些关系之一，我把b 称为a 的一个后继。）","zh_huang":"通过内在关系排列而成的序列，我称为形式序列。 数列的顺序受制于内在关系，而非外在关系。 下列句子构成的序列也是如此： “aRb”， “∃x(aRx˄xRb)”， “∃x∃y(aRx˄xRy˄yRb)”，等等。 （如果b与a之间有其中一种关系，就称b是a的后继）"},"children":[]}]},{"number":"4.126","texts":{"zh":"现在我们也可以在形式属性的意义上来谈形式概念。 （我引入这个表达式，是为了弄清楚那贯穿于整个传统逻辑中的混淆形式概念和真正概念的根源。） 当某种东西归入形式概念而成为后者的一个对象，这一点是不能用命题来表达的，而是在这个对象的记号自身中显示出来。（一个名称显示它标示一个对象，一个数的记号显示它标示一个数，等等。） 形式概念确实不能和专有概念一样用函项来表述。 因为它们的特征，即形式属性，是不能用函项来表达的。形式属性的表达式是一定符号的特征。 因此，代表一个形式概念特征的记号，是其指谓属于该概念的所有符号的特有特征。 因此，一个形式概念的表达式是一个以这种特有特征为唯一常项的命题变项。","en":"In the sense in which we speak of formal properties, we can also talk of formal concepts. (I introduce this expression to make clear the ground of the confusion of formal concepts with real concepts, which pervades the whole of the old logic.) That something falls under a formal concept, as one of its objects, cannot be expressed by a proposition. Rather, it shows itself in the sign for the object itself. (A name shows that it signifies an object, a numerical sign that it signifies a number, etc.) Formal concepts, unlike real concepts, cannot be represented by a function. For its marks, the formal properties, are not expressed by functions. The expression of a formal property is a feature of certain symbols. The sign of the marks of a formal concept is thus a characteristic feature of all symbols whose meanings fall under the concept. The expression of a formal concept is thus a propositional variable, in which only this characteristic feature is constant.","de":"In dem Sinne, in welchem wir von formalen Eigenschaften sprechen, können wir nun auch von formalen Begriffen reden. (Ich führe diesen Ausdruck ein, um den Grund der Verwechslung der formalen Begriffe mit den eigentlichen Begriffen, welche die ganze alte Logik durchzieht, klar zu machen.) Dass etwas unter einen formalen Begriff als dessen Gegenstand fällt, kann nicht durch einen Satz ausgedrückt werden. Sondern es zeigt sich an dem Zeichen dieses Gegenstandes selbst. (Der Name zeigt, dass er einen Gegenstand bezeichnet, das Zahlenzeichen, dass es eine Zahl bezeichnet etc.) Die formalen Begriffe können ja nicht, wie die eigentlichen Begriffe, durch eine Funktion dargestellt werden. Denn ihre Merkmale, die formalen Eigenschaften, werden nicht durch Funktionen ausgedrückt. Der Ausdruck der formalen Eigenschaft ist ein Zug gewisser Symbole. Das Zeichen der Merkmale eines formalen Begriffes ist also ein charakteristischer Zug aller Symbole, deren Bedeutungen unter den Begriff fallen. Der Ausdruck des formalen Begriffes also, eine Satzvariable, in welcher nur dieser charakteristische Zug konstant ist.","zh_wang":"现在我们也可以照谈形式属性的意思来谈形式概念。 （我引入这个表达式，是为了把那种贯穿全部传统逻辑中的混淆形式概念和固有概念的根源弄清楚。） 某种东西属于一种形式概念而成为其对象，这一点不能用命题来表述。但这却表明显示在这个对象自身的符号上。（名字显示它标示的一个对象，数字符号显示它标示的一个数，等等。） 形式概念不能像专有概念一样，用一个函项来表述。 因为它们的特征，即形式属性，不是用函项来表述的。 形式属性的表达式是一些符号的一种特征。 因此，代表一个形式概念特征的标记就是其指谓属于该概念的一切符号的特有特征。 因此，一个形式概念的表达式，即是一个只以此特征为常项的命题变项。","zh_huang":"在形式性质那种意义上，我们也可以谈论形式概念。 （我引入这个术语是为了避免把形式概念与真正的概念混淆。这种混淆充斥了旧的逻辑。） 某个东西作为对象落于形式概念之下，这是不能通过句子来表达的，而是在对象的记号本身中显示出来。（名称显示自己所表示的是对象，数词显示自己表示的是数，等等。） 形式概念不能像真正的概念那样表达成函项。 因为作为其标志的形式性质，不是用函项来表达的。 形式性质是通过特定符号的特征来表达的。 因此，表示形式概念的记号，就是其指称落于该概念之下的所有符号的标志性特征。 于是，表达形式概念的就是命题变元，在这种变元中只有这种标志性特征是固定的。"},"children":[]},{"number":"4.127","texts":{"zh":"命题变项标示形式概念，命题变项的值标示属于该形式概念的对象。","en":"The propositional variable signifies the formal concept, and its values signify the objects that fall under the concept.","de":"Die Satzvariable bezeichnet den formalen Begriff und ihre Werte die Gegenstände, welche unter diesen Begriff fallen.","zh_wang":"命题变项标示形式概念，它的值标示属于该形式概念的对象。","zh_huang":"命题变元表示形式概念，而它的值则表示落于这一概念之下的对象。"},"children":[{"number":"4.1271","texts":{"zh":"每一个变项都是一个形式概念的记号。 因为每一个变项都表示一个为它的所有值具有的不变形式，而这一形式就可以看作为这些值的形式属性。","en":"Every variable is the sign of a formal concept.For every variable represents a constant form that all its values have, and which can be taken as a formal property of these values.","de":"Jede Variable ist das Zeichen eines formalen Begriffes. Denn jede Variable stellt eine konstante Form dar, welche alle ihre Werte besitzen, und die als formale Eigenschaft dieser Werte aufgefasst werden kann.","zh_wang":"每个变项都是一个形式概念的标记。 因为每个变项都表现一个为它的一切值所具有的不变形式，此不变形式可以看作这些值的一个形式属性。","zh_huang":"每个变元都是形式概念的记号。 因为每个变元都表现了固定的形式，这种形式为变元的所有值所拥有，因而可以看成这些值的形式性质。"},"children":[]},{"number":"4.1272","texts":{"zh":"因此变名“x”就是对象 这个伪概念的专有记号。 凡属正确地使用“对象”（“事物”、“物”，等等）一词的地方，在概念记号系统中总是用变项名称来表达的。 例如，在命题“有两个对象，它们……”中，就用“（Ǝ x，y）…”来表达。 一旦以别种方式来使用这个词，如把它作为专有概念词使用，就只能造成无意义的似是而非的命题。 因此，例如，不能像说“有一些书”那样，说“有一些对象”。同样也不能说“有100个对象”，或者，“有χ0 个对象”。 因而说对象的总数 是无意义的。 这一点同样适用于“复合物”、“事实”、“函项”、“数”这些词，等等。 它们全都标示形式概念，因而在概念记号系统中用变项来表述，而不是（如弗雷格和罗素所认为的）用函项或者类来表述。 诸如“1是一个数”，“只有一个零”以及一切类似的表达式，都是无意义的。 （说“只有一个1”就和说“2＋2在3点钟的时候等于4”一样是无意义的。）","en":"The variable name ‘x’ is thus the real sign of the pseudo-concept object.Wherever the word ‘object’ (‘thing’, ‘entity’, etc.) is correctly used, it is expressed in a concept-script by a variable name.For example, in the proposition ‘There are 2 objects which…’ by ‘(∃x,y)…’.Wherever it is used differently, that is, as a real concept-word, nonsensical pseudo-propositions arise.So one cannot say, for example, ‘There are objects’ as one might say ‘There are books’. Nor is ‘There are 100 objects’ or ‘There are ℵ0 objects’ any better.And it is nonsensical to speak of the number of all objects.The same applies to the words ‘complex’, ‘fact’, ‘function’, ‘number’, etc.They all signify formal concepts and are represented in a concept-script by variables, not by functions or classes (as Frege and Russell held).Expressions such as ‘1 is a number’, ‘there is only one zero’ and the like are nonsensical.(It is just as nonsensical to say ‘There is only one 1’ as it would be to say ‘2 + 2 at 3 o’clock equals 4’.)","de":"So ist der variable Name „x“ das eigentliche Zeichen des Scheinbegriffes Gegenstand. Wo immer das Wort „Gegenstand“ („Ding“, „Sache“, etc.) richtig gebraucht wird, wird es in der Begriffsschrift durch den variablen Namen ausgedrückt. Zum Beispiel in dem Satz „es gibt 2 Gegenstände, welche... “ durch „(∃x, y)...“. Wo immer es anders, also als eigentliches Begriffswort gebraucht wird, entstehen unsinnige Scheinsätze. So kann man z. B. nicht sagen „Es gibt Gegenstände“, wie man etwa sagt „Es gibt Bücher“. Und ebenso wenig „Es gibt 100 Gegenstände“, oder „Es gibt ℵ0 Gegenstände“. Und es ist unsinnig, von der Anzahl aller Gegenstände zu sprechen. Dasselbe gilt von den Worten „Komplex“, „Tatsache“, „Funktion“, „Zahl“, etc. Sie alle bezeichnen formale Begriffe und werden in der Begriffsschrift durch Variable, nicht durch Funktionen oder Klassen dargestellt. (Wie Frege und Russell glaubten.) Ausdrücke wie „1 ist eine Zahl“, „es gibt nur Eine Null“ und alle ähnlichen sind unsinnig. (Es ist ebenso unsinnig zu sagen „es gibt nur eine 1“, als es unsinnig wäre, zu sagen: 2 + 2 ist um 3 Uhr gleich 4.)","zh_wang":"因此，变项名称“x ”就是对象这个伪概念的固有符号。 凡是正确使用了”对象（“事物”、“物”等等）一词的地方，在概念符号系统中，都是以变项名称来表述的。 例如，在命题“有两个对象，它们……”中，就是用“（ョx ，y）…”来表达的。 凡是错误使用“对象”一词即将其用作专有概念的地方，就产生无意义的伪命题。 因此，例如，不能像说“有些书”一样说“有些对象”。也不能说“有100个对象”或者“有X 0 个对象”。 谈所有对象的数是无意义的。 这对“复合物”、“事实”、“函项”、“数”等词也同样适用。 它们全都标示形式概念，在逻辑符号系统中用变项，而不是用（如同弗雷格与罗素所认为的）函项或者类来表述。 诸如“1是一个数字”，“只有一个零”以及一切类似的表达式，都是无意义的。 （说“只有一个1”是无意义的，这就和说“2+2在3点钟的时候等于4”一样无意义。）","zh_huang":"比如，名称变元“x”是对象这个伪概念的真正的记号。 只要“对象”（“物”，等等）这个词得到了正确的使用，相应概念在逻辑记号法中就可以用变元名称来表达。 比如，在句子“有两个对象，它们……”中，这个概念就表达成“∃x∃y(…)”。 只要是用其他方式来表达，比如用真正的概念词来表达，就会产生无意义的伪命题。 比如，人们不能像说“那里有书”那样说“那里有对象”，也不能说“有100个对象”，或者“有ℵ0个对象”。 谈论所有对象的数是无意义的。 对“复合物”“事实”“函项”“数”等这些词来说，也是如此。 它们都表示形式概念，而在逻辑记号法中则表现为变元，而不是（像弗雷格和罗素所认为的那样）函项或者类。 像“1是一个数”，“只有一个0”之类的说法，都是无意义的。 （说“只有一个1”之为无意义，就像是在说“2+2在3点钟的时候等于4”。）"},"children":[{"number":"4.12721","texts":{"zh":"一个形式概念是随着属于它的任何一个对象的给定而立即给定的，因此，不能把属于一个形式概念的对象和这个形式概念本身一起作为初始观念引入。因此，比如说，不能如罗素那样，把函项概念和特定的函项两者一起作为初始观念引入；或者，把数的概念和确定的数两者一起作为初始观念引入。","en":"A formal concept is already given with an object that falls under it. So one cannot introduce as primitive ideas the objects of a formal concept and the formal concept itself. So one cannot,
